          classes.push("inner-drop-target");
        }
        el.className = classes.join(" ");
        el.style.left = s.x + "px";
        el.style.top = s.y + "px";
        el.style.width = nodeWidth(s) + "px";
        el.style.height = nodeHeight(s) + "px";
        el.dataset.id = s.id;
        el.draggable = false;
        if (s.virtualProxy?.side) el.dataset.boundarySide = s.virtualProxy.side;
        el.tabIndex = s.virtualProxy ? -1 : 0;
        if (s.virtualProxy) {
          el.ondragover = null;
          el.ondragleave = null;
          el.ondrop = null;
        } else {
          el.ondragover = evt => {
            if (!hasTemplateDrag(evt)) return;
            evt.preventDefault();
            if (evt.dataTransfer) evt.dataTransfer.dropEffect = "copy";
            templateDragOverStateId = el.__state.id;
            el.classList.add("inner-drop-target");
          };
          el.ondragleave = evt => {
            if (!el.contains(evt.relatedTarget)) {
              if (templateDragOverStateId === el.__state.id) templateDragOverStateId = "";
              el.classList.remove("inner-drop-target");
            }
          };
          el.ondrop = evt => {
            const templateId = templateIdFromDrag(evt);
            if (!templateId) return;
            evt.preventDefault();
            evt.stopPropagation();
            addTemplateInside(templateId, el.__state.id, { enter: false, selectTitle: false });
            clearTemplateDragState();
          };
        }
        
        if (isNewNode) {
          el.addEventListener("dragstart", evt => {
            evt.preventDefault();
            evt.stopPropagation();
          });
          el.addEventListener("focus", () => {
            if (el.__state.virtualProxy) return;
            if (dragging || connecting || boxSelecting || panning) return;
            if (!nodeSelection.has(el.__state.id)) {
              setSingleSelection("node", el.__state.id);
              draw();
            }
          });
        }
        
        if (s.virtualProxy) {
          el.innerHTML = "";
        } else if (isNewNode) {
          el.innerHTML = `
            <div class="badge">INITIAL</div>
            <div class="live-badge">LIVE</div>
            <div class="layer-badge"></div>
            <div class="title"></div>
            <div class="body"></div>
            <button class="node-edit" type="button" title="Edit state" aria-label="Edit state">⚙</button>
          `;
        }
        
        if (!s.virtualProxy) {
          el.querySelector(".title").textContent = s.title || s.id;
          el.querySelector(".body").textContent = statePreviewText(s);
          el.querySelector(".layer-badge").textContent = innerCount === 1 ? "1 state" : `${innerCount} states`;
        }
        
        if (isNewNode && !s.virtualProxy) {
          const editButton = el.querySelector(".node-edit");
          editButton.addEventListener("mousedown", evt => {
            evt.stopPropagation();
          });
          editButton.addEventListener("pointerdown", evt => {
            evt.stopPropagation();
            if (!isTouchPointer(evt)) return;
            evt.preventDefault();
            lastTouchAt = Date.now();
            setSingleSelection("node", el.__state.id);
            draw();
            showNodeInspector(el.__state, { forceOpen: true, manualOpen: true });
          });
          editButton.addEventListener("click", evt => {
            evt.preventDefault();
            evt.stopPropagation();
            if (Date.now() - lastTouchAt < 700) return;
            setSingleSelection("node", el.__state.id);
            draw();
            showNodeInspector(el.__state, { forceOpen: true, manualOpen: true });
          });
        }

        if (isNewNode) {
          el.addEventListener("mousedown", evt => {
            const s = el.__state;
            if (Date.now() - lastTouchAt < 700) return;
            if (evt.target.closest(".port, .port-slot, .node-edit")) return;
            if (s.virtualProxy) {
              evt.preventDefault();
              return;
            }
            if (evt.button === 1 || evt.button === 2 || isSpaceDown) return startPanning(evt);
            if (evt.button !== 0) return;

            startNodeDrag(evt, s);
          });

          el.addEventListener("pointerdown", evt => {
            const s = el.__state;
            if (!isTouchPointer(evt) || evt.target.closest(".port, .port-slot, .node-edit")) return;
            evt.preventDefault();
            evt.stopPropagation();
            lastTouchAt = Date.now();
            if (pinchZoom || s.virtualProxy) return;
            activePointerId = evt.pointerId;
            captureTouchPointer(evt);
            startNodeDrag(evt, s);
          });

          el.addEventListener("dblclick", evt => {
            const s = el.__state;
            evt.preventDefault();
            evt.stopPropagation();
            evt.stopImmediatePropagation();
            if (s.virtualProxy) return;
            if (s.id === lastCreatedStateId && Date.now() - lastCreatedStateTime < 500) return;
            enterStateLayer(s.id, { source: "node-dblclick", explicit: true });
          });
        }

        if (isNewNode) nodesEl.appendChild(el);
      }
      
      oldNodes.forEach(el => el.remove());
      nodesEl.__recycledNodes = nextNodes;
      if (focusedNodeId) {
        const newEl = nodesEl.querySelector(`.node[data-id="${cssEscapeValue(focusedNodeId)}"]`);
        if (newEl) {
          newEl.focus({ preventScroll: true });
        }
      }
      for (const state of states) addSvgStatePorts(state);

      applyRuntimeEdgePulses();
      applyRuntimeStatePulses();
      updateSelectionActions();
    }

    function scheduleDraw() {
      if (drawFrame) return;
      drawFrame = requestAnimationFrame(() => {
        drawFrame = 0;
        draw();
      });
    }

    function svgEl(name, attrs) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", name);
      for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
      return el;
    }

    function setEdgeHover(id, on) {
      hoveredEdgeId = on ? id : hoveredEdgeId === id ? null : hoveredEdgeId;
      wiresEl.querySelectorAll(`[data-edge-id="${id}"]`).forEach(el => el.classList.toggle("hovered", on));
    }

    function selectEdge(id, x, y, opts = {}) {
      const edge = edgeById(id);
      if (!edge) return;
      const editEdge = opts.edit === true;
      setSingleSelection("edge", id);
      draw();
      showEdgeInspector(edge, {
        focus: editEdge,
        forceOpen: !inspectorCollapsedByUser,
        manualOpen: !inspectorCollapsedByUser,
        pulse: inspectorCollapsedByUser
      });
      if (!editEdge) focusCanvasForSelection();
    }

    function showNodeProperties(state, opts = {}) {
      if (!state) return;
      const editNode = opts.edit === true;
      showNodeInspector(state, {
        focus: editNode,
        forceOpen: !inspectorCollapsedByUser,
        manualOpen: !inspectorCollapsedByUser,
        pulse: inspectorCollapsedByUser,
        ...opts
      });
      if (!editNode) focusCanvasForSelection();
    }

    function setupEditorAccessibility(root = stateInspectorBodyEl, focusFirstInput = true, opts = {}) {
      const controls = [...root.querySelectorAll("input, textarea, select, button")];
      const hiddenForKeyboard = el =>
        el.matches("[data-skip-tab='true'], [hidden], [type='hidden']") ||
        el.closest("[data-skip-tab='true']") ||
        el.closest("[hidden]") ||
        (el.closest("details:not([open])") && !el.closest("summary"));
      controls.forEach(el => {
        el.tabIndex = hiddenForKeyboard(el) ? -1 : 0;
      });
      root.querySelectorAll("details").forEach(details => {
        if (details.dataset.accessibilityBound === "true") return;
        details.dataset.accessibilityBound = "true";
        details.addEventListener("toggle", () => setupEditorAccessibility(root, false, opts));
      });
      root.onkeydown = evt => {
        if (evt.key !== "Enter" || evt.isComposing || evt.shiftKey || evt.altKey || evt.ctrlKey || evt.metaKey) return;
        const target = evt.target;
        if (!target?.matches?.("input:not([type='button']):not([type='submit']):not([type='checkbox']):not([type='radio']), select")) return;
        evt.preventDefault();
        evt.stopPropagation();
        lastHistoryKey = null;
        opts.onCommit?.();
      };
      const firstInput = controls.find(el => !hiddenForKeyboard(el) && el.matches("input, textarea, select"));
      if (firstInput && focusFirstInput) {
        const focusFirst = () => {
          const active = document.activeElement;
          const rootAlreadyFocused = active && active !== document.body && root.contains(active);
          const rootVisible = !workspaceEl.classList.contains("inspector-collapsed") || root !== stateInspectorBodyEl;
          if (rootVisible && document.contains(firstInput) && !rootAlreadyFocused) {
            firstInput.focus({ preventScroll: true });
            if (opts.selectFirstInput && typeof firstInput.select === "function") firstInput.select();
          }
        };
        requestAnimationFrame(focusFirst);
        setTimeout(focusFirst, 80);
      }
    }

      if (type === "heading") return "Section title";

      if (type === "list") return "First item\nSecond item";
      if (type === "link") return "Open link";
      if (type === "text") return "Text";
      return "";

    function componentTitle(type) {
      if (type === "heading") return "Heading";
      if (type === "image") return "Image";
      if (type === "list") return "List";
      if (type === "link") return "Link";
      if (type === "note") return "Note";
      if (type === "divider") return "Divider";
      if (type === "daisy") return "Daisy UI";
      if (type === "transitionButton") return "Button";

      const coreTemplates = [

      return [...daisySpecs.map(daisyTemplate), ...coreTemplates];
    }

    function templateById(templateId) {
      return stateTemplates.find(item => item.id === templateId) ||
        builtinStateTemplates().find(item => item.id === templateId) ||
        null;
    }

    function defaultComponentUrl(type) {
      if (type === "image") return "https://";
      if (type === "link") return "https://";
      return "";
    }

    function freshComponentPreset(type, id = uid("c")) {
      const nextType = componentPresetTypes().includes(type) ? type : "text";
      const component = {
        id,
        type: nextType,
        text: defaultComponentText(nextType),
        url: defaultComponentUrl(nextType)
      };
      if (nextType === "list") component.items = normalizeListItems(null, component.text);
      return component;
    }

    function bindImmediateButton(button, fn) {
      let pointerHandledAt = 0;
      button.addEventListener("pointerdown", evt => {
        evt.preventDefault();
        evt.stopPropagation();
        pointerHandledAt = Date.now();
        fn();
      });
      button.addEventListener("click", evt => {
        evt.preventDefault();
        evt.stopPropagation();
        if (Date.now() - pointerHandledAt < 350) return;
        fn();
      });
    }

    function renderComponentEditors(s, focusRequest = null, root = stateInspectorBodyEl, options = {}) {
      const list = root.querySelector("#pComponents");
      if (!list) return;
      s.components = normalizeComponents(s.components);
      list.innerHTML = "";
      const syncRenderEditorChange = () => {
        if (!options.skipLiveStateSync) scheduleSync(false);
      };
      const persistOwner = options.persistOwner || (historyKey => {
        saveModel(historyKey);
        draw();
        syncRenderEditorChange();
      });
      const rerender = request => renderComponentEditors(s, request, root, options);
      const transitionButtonComponentId = transitionId => `transition-button:${transitionId}`;
      const dataWireComponentId = wireId => `data-wire:${wireId}`;
      const cleanRenderComponent = component => {
        const clean = {
          id: String(component.id || (component.type === "transitionButton" ? transitionButtonComponentId(component.transitionId) : component.type === "dataWire" ? dataWireComponentId(component.wireId) : uid("c"))),
          type: component.type,
          text: component.type === "transitionButton" || component.type === "dataWire" ? "" : String(component.text || ""),
          url: component.type === "transitionButton" || component.type === "dataWire" ? "" : String(component.url || ""),
          variant: component.type === "transitionButton" || component.type === "dataWire" ? "" : String(component.variant || "")
        };
        if (component.type === "transitionButton") clean.transitionId = String(component.transitionId || "");
        if (component.type === "dataWire") clean.wireId = String(component.wireId || "");
        if (component.type === "list") clean.items = normalizeListItems(component.items, component.text);
        if (component.type !== "transitionButton" && component.type !== "dataWire") {
          if (component.dataPath) clean.dataPath = normalizeComponentDataPath(component.dataPath, "");
          if (component.dataRole) clean.dataRole = String(component.dataRole || "").slice(0, 40);
          if (component.dataLabel) clean.dataLabel = String(component.dataLabel || "").slice(0, 80);
        }
        return clean;
      };
      const renderActionTransitionMap = () => new Map(editorActionTransitionsForState(s).map(transition => [transition.id, transition]));
      const renderDataWireMap = () => new Map(normalizeDataWires(s.dataWires).map(wire => [wire.id, wire]));
      const transitionButtonLabel = component => {
        const transition = renderActionTransitionMap().get(component.transitionId);
        return transition ? transitionDisplayLabel(transition) : "Missing transition";
      };
      const dataWireComponentLabel = component => {
        const wire = renderDataWireMap().get(component.wireId);
        return wire ? dataWireRenderLabel(wire) : "Missing data";
      };
      const renderComponentsForEditor = () => {
        const transitionMap = renderActionTransitionMap();
        const wireMap = renderDataWireMap();
        const components = normalizeComponents(s.components)
          .filter(component => component.type !== "transitionButton" || transitionMap.has(component.transitionId))
          .filter(component => component.type !== "dataWire" || wireMap.has(component.wireId));
        const placedTransitions = new Set(components
          .filter(component => component.type === "transitionButton")
          .map(component => component.transitionId));
        const placedWires = new Set(components
          .filter(component => component.type === "dataWire")
          .map(component => component.wireId));
        const syntheticDataWires = [...wireMap.values()]
          .filter(wire => !placedWires.has(wire.id))
          .map(wire => ({
            id: dataWireComponentId(wire.id),
            type: "dataWire",
            text: "",
            url: "",
            variant: "",
            wireId: wire.id,
            synthetic: true
          }));
        const syntheticButtons = [...transitionMap.values()]
          .filter(transition => !placedTransitions.has(transition.id))
          .map(transition => ({
            id: transitionButtonComponentId(transition.id),
            type: "transitionButton",
            text: "",
            url: "",
            variant: "",
            transitionId: transition.id,
            synthetic: true
          }));
        return [...syntheticDataWires, ...components, ...syntheticButtons].slice(0, 160);
      };
      const persistRenderComponents = components => {
        s.components = normalizeComponents(components.map(cleanRenderComponent));
        const orderedWireIds = s.components
          .filter(component => component.type === "dataWire" && component.wireId)
          .map(component => component.wireId);
        if (orderedWireIds.length) {
          const order = new Map(orderedWireIds.map((id, index) => [id, index]));
          s.dataWires = normalizeDataWires(s.dataWires).sort((a, b) => {
            const aOrder = order.has(a.id) ? order.get(a.id) : Number.MAX_SAFE_INTEGER;
            const bOrder = order.has(b.id) ? order.get(b.id) : Number.MAX_SAFE_INTEGER;
            return aOrder - bOrder;
          });
        }
      };
      let draggingComponentId = null;
      const clearComponentDropMarks = () => {
        list.querySelectorAll(".component-editor.drop-before,.component-editor.drop-after").forEach(el => el.classList.remove("drop-before", "drop-after"));
      };
      const moveComponentBefore = (dragId, targetId, after = false) => {
        if (!dragId || !targetId || dragId === targetId) return false;
        const components = renderComponentsForEditor();
        const fromIndex = components.findIndex(component => component.id === dragId);
        let toIndex = components.findIndex(component => component.id === targetId);
        if (fromIndex < 0 || toIndex < 0) return false;
        const [moved] = components.splice(fromIndex, 1);
        if (fromIndex < toIndex) toIndex -= 1;
        components.splice(after ? toIndex + 1 : toIndex, 0, moved);
        persistRenderComponents(components);
        persistOwner("state:component-order:" + dragId);
        if (!options.skipLiveStateSync) scheduleSync(false);
        rerender();
        return true;
      };
      const persistDataWireEditor = historyKey => {
        s.dataWires = normalizeDataWires(s.dataWires);
        persistOwner(historyKey);
        if (!options.skipLiveStateSync) scheduleSync(false);
        if (typeof refreshInspectorGlobalStateTree === "function") refreshInspectorGlobalStateTree();
      };
      const saveComponent = component => {
        if (!options.skipLiveStateSync) {
          const liveState = byId(s.id);
          const liveComponent = liveState?.components?.find(item => item.id === component.id);
          if (liveComponent) {
            liveComponent.text = component.text || "";
            liveComponent.url = component.url || "";
            if (component.type === "list") {
              liveComponent.items = normalizeListItems(component.items, component.text).map(item => ({
                id: item.id || uid("c"),
                type: item.type || "text",
                text: String(item.text || ""),
                url: String(item.url || "")
              }));
            }
          }
        }
        persistOwner("state:component:" + component.id);
      };
      const changeComponentPreset = async (component, nextType, selectEl) => {
        const currentType = component.type;
        if (!componentPresetTypes().includes(nextType) || nextType === currentType) return;
        if (selectEl) selectEl.value = currentType;
        const ok = await modalConfirm(
          `Diese Content-Unit von ${componentTitle(currentType)} zu ${componentTitle(nextType)} wechseln? Vorhandene Inhalte werden überschrieben und die Component startet frisch.`,
          "Component wechseln",
          { confirmText: "Wechseln", cancelText: "Abbrechen", danger: true }
        );
        if (!ok) return;
        const components = normalizeComponents(s.components);
        const index = components.findIndex(item => item.id === component.id);
        if (index < 0) return;
        const fresh = freshComponentPreset(nextType, component.id);
        components[index] = fresh;
        s.components = components;
        persistOwner("state:component-type:" + component.id);
        if (!options.skipLiveStateSync) scheduleSync(false);
        rerender({ componentId: fresh.id, listIndex: 0 });
      };
      const repeatConfig = normalizeRepeatConfig(s.repeat);
      const autoDataRoleLabel = role => ({
        image: "Image",
        title: "Title",
        price: "Price",
        description: "Description",
        field: "Field",
        item: "Item"
      })[role] || "Field";
      const addRenderMappingFromPath = path => {
        const key = normalizeBindingPath(path, "");
        if (!key) return false;
        const wire = dataWireFromPath(s, key, dataWirePathValue(s, key));
        if (!wire) return false;
        const added = upsertDataWire(s, wire);
        persistDataWireEditor("state:data-wire-render-add:" + s.id);
        return added;
      };
      const renderDataWireAddPanel = () => {
        const addOptions = dataWireCandidatePaths(s);
        if (!addOptions.length) return 0;
        const panel = document.createElement("section");
        panel.className = "data-wire-panel data-wire-render-panel";
        panel.dataset.skipTab = "true";
        const title = document.createElement("div");
        title.className = "data-wire-render-title";
        title.innerHTML = "<strong>Render from globalState</strong><span>Add visible rows from data</span>";
        panel.append(title);
        const addRow = document.createElement("div");
        addRow.className = "data-wire-add";
        const addSelect = document.createElement("select");
        addSelect.setAttribute("aria-label", "Add render path");
        addOptions.forEach(item => {
          const option = document.createElement("option");
          option.value = item.path;
          option.textContent = item.path + (item.source ? " · " + item.source : "");
          addSelect.appendChild(option);
        });
        const addButton = document.createElement("button");
        addButton.type = "button";
        addButton.className = "component-editor-action";
        addButton.textContent = "+ Add render";
        addButton.onclick = () => {
          if (addRenderMappingFromPath(addSelect.value)) rerender();
          else rerender();
        };
        addRow.append(addSelect, addButton);
        panel.append(addRow);
        list.appendChild(panel);
        return 1;
      };
      const editorComponents = renderComponentsForEditor();
      const renderedDataWireRows = renderDataWireAddPanel();
      if (!editorComponents.length) {
        if (renderedDataWireRows) return;
        const empty = document.createElement("div");
        empty.className = "component-empty";
        const text = document.createElement("div");
        text.textContent = "No render mapping yet. Pick a globalState field, then show it as image, heading, text, price, etc.";
        const action = document.createElement("button");
        action.type = "button";
        action.className = "component-editor-action";
        action.textContent = "Choose data";
        action.onclick = () => {
          const card = root.querySelector("#pDataCard");
          if (card) card.open = true;
          const tree = root.querySelector("#pSubscriptionTree");
          if (tree) tree.scrollIntoView({ block: "nearest", behavior: "smooth" });
        };
        empty.append(text, action);
        list.appendChild(empty);
        return;
      }
      for (const component of editorComponents) {
        const isTransitionButtonComponent = component.type === "transitionButton";
        const isDataWireComponent = component.type === "dataWire";
        const dataWire = isDataWireComponent ? renderDataWireMap().get(component.wireId) : null;
        const actionTransition = isTransitionButtonComponent ? renderActionTransitionMap().get(component.transitionId) : null;
        const item = document.createElement("div");
        item.className = "component-editor";
        if (isTransitionButtonComponent) {
          item.classList.add("transition-button-render");
          item.dataset.transitionId = component.transitionId;
          if (actionTransition) item.style.setProperty("--transition-button-color", actionTransitionColor(actionTransition, s));
        }
        item.addEventListener("dragover", evt => {
          if (!draggingComponentId || draggingComponentId === component.id) return;
          evt.preventDefault();
          const rect = item.getBoundingClientRect();
          const after = evt.clientY > rect.top + rect.height / 2;
          clearComponentDropMarks();
          item.classList.add(after ? "drop-after" : "drop-before");
          evt.dataTransfer.dropEffect = "move";
        });
        item.addEventListener("dragleave", evt => {
          if (!item.contains(evt.relatedTarget)) item.classList.remove("drop-before", "drop-after");
        });
        item.addEventListener("drop", evt => {
          if (!draggingComponentId || draggingComponentId === component.id) return;
          evt.preventDefault();
          const rect = item.getBoundingClientRect();
          const after = evt.clientY > rect.top + rect.height / 2;
          const dragId = evt.dataTransfer.getData("text/plain") || draggingComponentId;
          moveComponentBefore(dragId, component.id, after);
        });
        const head = document.createElement("div");
        head.className = "component-editor-head";
        const label = document.createElement("span");
        label.textContent = isTransitionButtonComponent
          ? "Button: " + transitionButtonLabel(component)
          : isDataWireComponent
            ? "Data: " + dataWireComponentLabel(component)
            : componentTitle(component.type);
        label.className = "component-editor-title";
        const typeSwitcher = document.createElement("select");
        typeSwitcher.className = "component-type-select";
        typeSwitcher.title = "Change component preset";
        typeSwitcher.setAttribute("aria-label", "Change component preset");
        typeSwitcher.dataset.skipTab = "true";
        const currentTypeSupported = componentPresetTypes().includes(component.type);
        if (!currentTypeSupported) {
          const current = document.createElement("option");
          current.value = component.type;
          current.textContent = componentTitle(component.type);
          current.disabled = true;
          current.selected = true;
          typeSwitcher.appendChild(current);
        }
        componentPresetTypes().forEach(type => {
          const option = document.createElement("option");
          option.value = type;
          option.textContent = componentTitle(type);
          if (type === component.type) option.selected = true;
          typeSwitcher.appendChild(option);
        });
        typeSwitcher.onchange = () => changeComponentPreset(component, typeSwitcher.value, typeSwitcher);
        const dragHandle = document.createElement("button");
        dragHandle.type = "button";
        dragHandle.className = "component-drag-handle";
        dragHandle.textContent = "⋮⋮";
        dragHandle.title = "Drag to reorder";
        dragHandle.dataset.skipTab = "true";
        dragHandle.draggable = true;
        dragHandle.addEventListener("dragstart", evt => {
          evt.stopPropagation();
          draggingComponentId = component.id;
          item.classList.add("dragging");
          evt.dataTransfer.effectAllowed = "move";
          evt.dataTransfer.setData("text/plain", component.id);
        });
        dragHandle.addEventListener("dragend", () => {
          draggingComponentId = null;
          item.classList.remove("dragging");
          clearComponentDropMarks();
        });
        const remove = document.createElement("button");
        remove.type = "button";
        remove.className = "component-editor-action danger";
        remove.textContent = "Delete";
        bindImmediateButton(remove, () => {
          if (isDataWireComponent) {
            s.dataWires = normalizeDataWires(s.dataWires).filter(item => item.id !== component.wireId);
            s.components = normalizeComponents(s.components).filter(item => item.type !== "dataWire" || item.wireId !== component.wireId);
            persistDataWireEditor("state:data-wire-render-remove:" + s.id);
          } else {
            s.components = s.components.filter(item => item.id !== component.id);
            persistOwner("state:components:" + s.id);
          }
          rerender(null);
        });
        const actions = document.createElement("div");
        actions.className = "component-editor-actions";
        if (isTransitionButtonComponent) {
          actions.append(dragHandle);
        } else if (isDataWireComponent) {
          actions.append(dragHandle, remove);
        } else {
          actions.append(typeSwitcher, dragHandle, remove);
        }
        head.append(label, actions);
        item.appendChild(head);
        if (isDataWireComponent && dataWire) {
          const field = document.createElement("div");
          field.className = "field";
          const fieldLabel = document.createElement("label");
          fieldLabel.textContent = "Mapping";
          const controls = document.createElement("div");
          controls.className = "data-wire-controls";
          const pathSelect = document.createElement("select");
          pathSelect.setAttribute("aria-label", "Source path");
          const pathOptions = dataWireCandidatePaths(s, [dataWire.sourcePath]);
          if (!pathOptions.some(item => item.path === dataWire.sourcePath)) pathOptions.unshift({ path: dataWire.sourcePath, source: "mapped" });
          pathOptions.forEach(item => {
            const option = document.createElement("option");
            option.value = item.path;
            option.textContent = item.path + (item.source ? " · " + item.source : "");
            if (item.path === dataWire.sourcePath) option.selected = true;
            pathSelect.appendChild(option);
          });
          pathSelect.onchange = () => {
            if (updateDataWirePath(s, dataWire.id, pathSelect.value)) {
              persistDataWireEditor("state:data-wire-render-path:" + s.id);
            }
            rerender();
          };
          const role = document.createElement("select");
          role.setAttribute("aria-label", "Render as");
          DATA_WIRE_ROLES.forEach(item => {
            const option = document.createElement("option");
            option.value = item;
            option.textContent = dataWireRoleLabel(item);
            if (item === dataWire.role) option.selected = true;
            role.appendChild(option);
          });
          role.onchange = () => {
            s.dataWires = normalizeDataWires(s.dataWires).map(item => item.id === dataWire.id
              ? { ...item, role: normalizeDataWireRole(role.value), componentType: normalizeDataWireComponentType("", role.value) }
              : item);
            persistDataWireEditor("state:data-wire-render-role:" + s.id);
            rerender();
          };
          controls.append(pathSelect, role);
          field.append(fieldLabel, controls);
          item.appendChild(field);
        }
        if (component.type !== "divider" && !isTransitionButtonComponent && !isDataWireComponent) {
          if (component.type === "list") {
            const field = document.createElement("div");
            field.className = "field";
            const fieldLabel = document.createElement("label");
            fieldLabel.textContent = "Items";
            field.appendChild(fieldLabel);
            component.items = normalizeListItems(component.items, component.text);
            const writeItems = () => {
              component.text = component.items.map(item => item.text).join("\n");
              saveComponent(component);
            };
            component.items.forEach((itemVal, index) => {
              const row = document.createElement("div");
              row.className = "list-item-editor";

              const itemHead = document.createElement("div");
              itemHead.className = "list-item-head";

              const typeSelect = document.createElement("select");

              const types = [
                { value: "text", label: "Text" },
                { value: "link", label: "Link" },
                { value: "image", label: "Image" },
                { value: "note", label: "Note" },
                { value: "divider", label: "Divider" }
              ];
              types.forEach(t => {
                const opt = document.createElement("option");
                opt.value = t.value;
                opt.textContent = t.label;
                if (itemVal.type === t.value) opt.selected = true;
                typeSelect.appendChild(opt);
              });
              typeSelect.onchange = () => {
                itemVal.type = typeSelect.value;
                writeItems();
                rerender({ componentId: component.id, listIndex: index });
              };

              const del = document.createElement("button");
              del.type = "button";
              del.className = "danger";
              del.textContent = "Delete";
              bindImmediateButton(del, () => {
                component.items.splice(index, 1);
                writeItems();
                rerender({ componentId: component.id, listIndex: Math.max(0, index - 1) });
              });

              itemHead.append(typeSelect, del);
              row.appendChild(itemHead);

              if (itemVal.type !== "divider") {
                const textField = document.createElement("div");
                textField.className = "field list-item-field";
                const label = document.createElement("label");
                label.textContent = itemVal.type === "image" ? "Alt text" : itemVal.type === "link" ? "Label" : "Text";

                const input = document.createElement("input");
                input.value = itemVal.text || "";
                input.placeholder = label.textContent;
                input.dataset.componentId = component.id;
                input.dataset.listIndex = String(index);
                input.oninput = () => {
                  itemVal.text = input.value;
                  writeItems();
                };
                input.onblur = () => { lastHistoryKey = null; draw(); };
                textField.append(label, input);
                row.appendChild(textField);
              }

              if (itemVal.type === "image" || itemVal.type === "link") {
                const urlField = document.createElement("div");
                urlField.className = "field list-item-field";
                const label = document.createElement("label");
                label.textContent = itemVal.type === "image" ? "Image URL" : "URL";

                const input = document.createElement("input");
                input.value = itemVal.url || "";
                input.placeholder = "https://...";
                input.oninput = () => {
                  itemVal.url = input.value;
                  writeItems();
                };
                input.onblur = () => { lastHistoryKey = null; draw(); };
                urlField.append(label, input);
                row.appendChild(urlField);
              }

              field.appendChild(row);
            });

            const add = document.createElement("button");
            add.type = "button";
            add.className = "component-add-item";
            add.textContent = "+ Item";
            bindImmediateButton(add, () => {
              component.items.push({
                id: Math.random().toString(36).slice(2, 9),
                type: "text",
                text: "",
                url: ""
              });
              writeItems();
              rerender({ componentId: component.id, listIndex: component.items.length - 1 });
            });
            field.appendChild(add);
            item.appendChild(field);
          } else {
            const field = document.createElement("div");
            field.className = "field";
            const fieldLabel = document.createElement("label");
            fieldLabel.textContent = component.type === "image" ? "Alt text" : component.type === "link" ? "Label" : "Text";
            const input = component.type === "heading" || component.type === "link" || component.type === "image" ? document.createElement("input") : document.createElement("textarea");
            input.value = component.text || "";
            input.oninput = () => {
              component.text = input.value;
              saveComponent(component);
            };
            input.onblur = () => { lastHistoryKey = null; draw(); };
            field.append(fieldLabel, input);
            item.appendChild(field);
          }
        }
        if (component.type === "image" || component.type === "link") {
          const field = document.createElement("div");
          field.className = "field";
          const fieldLabel = document.createElement("label");
          fieldLabel.textContent = component.type === "image" ? "Image URL" : "URL";
          const input = document.createElement("input");
          input.value = component.url || "";
          input.placeholder = "https://...";
          input.oninput = () => {
            component.url = input.value;
            saveComponent(component);
          };
          input.onblur = () => { lastHistoryKey = null; draw(); };
          field.append(fieldLabel, input);
          item.appendChild(field);
        }
        list.appendChild(item);
      }
      if (focusRequest) {
        const focusAddedInput = () => {
          const selector = `input[data-component-id="${CSS.escape(focusRequest.componentId)}"][data-list-index="${focusRequest.listIndex}"]`;
          const input = list.querySelector(selector);
          if (!input) return;
          input.focus({ preventScroll: true });
          input.scrollIntoView({ block: "nearest", inline: "nearest" });
        };
        requestAnimationFrame(focusAddedInput);
        setTimeout(focusAddedInput, 60);
        setTimeout(focusAddedInput, 160);
      }
    }

    function showEmptyInspector() {
      inspectorStateId = null;
      inspectorEdgeId = null;
      transitionInspectorKeyboardEditing = false;
      const wasEditingTemplate = Boolean(editingTemplateId);
      editingTemplateId = null;
      stateInspectorEl.classList.remove("template-inspector", "transition-inspector");

    function refreshInspectorForSelection() {
      const stateId = singleSelectedNodeId();
      const edgeId = singleSelectedEdgeId();
      const state = stateId ? byId(stateId) : null;
      const edge = edgeId ? edgeById(edgeId) : null;
      if (state) showNodeInspector(state, { focus: false });
      else if (edge) showEdgeInspector(edge, { focus: false });
