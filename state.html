        if (byId(edge.from) && isCurrentLayerState(edge.from)) selectedIds.add(edge.from);
        if (byId(edge.to) && isCurrentLayerState(edge.to)) selectedIds.add(edge.to);
      }
      if (selectedIds.size === 0) return;
      const selectedIdList = [...selectedIds];

      if (currentLayerId !== null) {
        // Already inside a layer (has a parent)
        const parentState = byId(currentLayerId);
        const parentTitle = parentState ? parentState.title : "Unbekannt";
        await modalAlert(`Diese States befinden sich bereits in dem Parent-State "${parentTitle}". Layerwechsel passiert nur per Doppelclick auf einen State.`, "Bereits gruppiert");
        return;
      }

      // Root level: perform collapse
      const selectedStates = selectedIdList.map(byId).filter(Boolean);
      let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
      selectedStates.forEach(s => {
        minX = Math.min(minX, s.x);
        maxX = Math.max(maxX, s.x + nodeWidth(s));
        minY = Math.min(minY, s.y);
        maxY = Math.max(maxY, s.y + NODE_H);
      });

      const cx = (minX + maxX) / 2;
      const cy = (minY + maxY) / 2;

      // Create new parent state P at average center
      const parentName = "Group_" + nextStateTitle();
      const parentState = makeState(cx - 84, cy - 48, parentName, null);
      model.states.push(parentState);

      // Reconnect transitions that cross the opened group.
      const setIds = new Set(selectedIdList);
      model.transitions.forEach(t => {
        const fromInside = setIds.has(t.from);
        const toInside = setIds.has(t.to);
        if (fromInside && !toInside) {
          t.groupExitId = t.from;
          t.from = parentState.id;
        } else if (!fromInside && toInside) {
          t.groupEntryId = t.to;
          t.to = parentState.id;
        }
      });

      // Update parentId of all selected states to P.id
      selectedStates.forEach(s => {
        s.parentId = parentState.id;
      });

      // Select the new parent state
      selected = selectionFromParts([parentState.id], []);
      saveModel("state:collapse");
      draw();
      showNodeInspector(parentState, { forceOpen: true });
    }


    function applyCamera() {
      camera.scale = clampScale(camera.scale);
      const tx = Math.round(camera.x);
      const ty = Math.round(camera.y);
      worldEl.style.transform = `translate(${tx}px, ${ty}px) scale(${camera.scale})`;
      const grid = 24 * camera.scale;
      mapEl.style.backgroundSize = `${grid}px ${grid}px, ${grid}px ${grid}px, 100% 100%, 100% 100%`;
      mapEl.style.backgroundPosition = `${tx % grid}px ${ty % grid}px, ${tx % grid}px ${ty % grid}px, 0 0, 0 0`;
      scheduleCameraSave();
    }

    function clampScale(value) {
      return clamp(value, 0.25, 2.4);
    }

    function crispScale(value) {
      return Math.round(clampScale(value) * 100) / 100;
    }

    function wheelDeltaPixels(evt) {
      const lineMode = typeof WheelEvent === "undefined" ? 1 : WheelEvent.DOM_DELTA_LINE;
      const pageMode = typeof WheelEvent === "undefined" ? 2 : WheelEvent.DOM_DELTA_PAGE;
      const modeScale = evt.deltaMode === lineMode ? 16 : evt.deltaMode === pageMode ? 240 : 1;
      const deltaY = Number(evt.deltaY);
      return Number.isFinite(deltaY) ? deltaY * modeScale : 0;
    }

    function wheelZoomFactor(evt) {
      const deltaY = clamp(wheelDeltaPixels(evt), -640, 640);
      return Math.pow(2, -deltaY / WHEEL_ZOOM_PIXEL_DENOMINATOR);
    }

    function zoomAtClientPoint(clientX, clientY, nextScale) {
      const r = mapEl.getBoundingClientRect();
      const before = screenToWorldXY(clientX, clientY);
      camera.scale = clampScale(nextScale);
      camera.x = clientX - r.left - before.x * camera.scale;
      camera.y = clientY - r.top - before.y * camera.scale;
      applyCamera();
    }

    function zoomAtViewportCenter(nextScale) {
      const r = mapEl.getBoundingClientRect();
      zoomAtClientPoint(r.left + r.width / 2, r.top + r.height / 2, nextScale);
    }

    function zoomByFactor(factor, clientX = null, clientY = null) {
      if (clientX === null || clientY === null) {
        zoomAtViewportCenter(camera.scale * factor);
        return;
      }
      zoomAtClientPoint(clientX, clientY, camera.scale * factor);
    }

    function viewportCenterWorld() {
      const r = mapEl.getBoundingClientRect();
      return {
        x: (r.width / 2 - camera.x) / camera.scale,
        y: (r.height / 2 - camera.y) / camera.scale
      };
    }

    function keepViewportCenteredOn(worldPoint) {
      const r = mapEl.getBoundingClientRect();
      camera.x = Math.round(r.width / 2 - worldPoint.x * camera.scale);
      camera.y = Math.round(r.height / 2 - worldPoint.y * camera.scale);
      applyCamera();
    }

    function togglePreviewCollapsed() {
      const center = viewportCenterWorld();
      previewCollapsed = !previewCollapsed;
      applyPreviewCollapsed();
      requestAnimationFrame(() => keepViewportCenteredOn(center));
      setTimeout(() => keepViewportCenteredOn(center), 210);
    }

    function resetView() {
      camera = { x: 32, y: 32, scale: 1 };
      applyCamera();
    }

    function fitView() {
      const states = visibleStates();
      if (!states.length) return resetView();
      const r = mapEl.getBoundingClientRect();
      const minX = Math.min(...states.map(s => s.x));
      const minY = Math.min(...states.map(s => s.y));
      const maxX = Math.max(...states.map(s => s.x + nodeWidth(s)));
      const maxY = Math.max(...states.map(s => s.y + nodeHeight(s)));
      const w = Math.max(1, maxX - minX);
      const h = Math.max(1, maxY - minY);
      const pad = 120;
      const rawScale = Math.min(r.width / (w + pad * 2), r.height / (h + pad * 2));
      const scale = rawScale >= 0.92 ? 1 : crispScale(rawScale);
      camera.scale = scale;
      camera.x = Math.round((r.width - w * scale) / 2 - minX * scale);
      camera.y = Math.round((r.height - h * scale) / 2 - minY * scale);
      applyCamera();
    }

    function startPanning(evt) {
      stopRuntimeLayerFollow();
      evt.preventDefault();
      evt.stopPropagation();
      panning = { startX: evt.clientX, startY: evt.clientY, cameraX: camera.x, cameraY: camera.y };
      mapEl.classList.add("panning");
    }

    function startNodeDrag(evt, s) {
      stopRuntimeLayerFollow();
      evt.stopPropagation();
      const previousNode = singleSelectedNodeId();
      if (!evt.shiftKey) selected = selectionFromParts([s.id], []);
      const singleNode = singleSelectedNodeId();
      if (singleNode && singleNode !== previousNode) startAppAtState(singleNode, { preserveFocus: true, suppressLayerFollow: true });
      const p = screenToWorld(evt);
      dragging = {
        id: s.id,
        shiftKey: Boolean(evt.shiftKey),
        originalX: s.x,
        originalY: s.y,
        dx: p.x - s.x,
        dy: p.y - s.y,
        startClientX: evt.clientX,
        startClientY: evt.clientY,
        touch: isTouchPointer(evt),
        moved: false
      };
      updateNodeElementPosition(s);
      mapEl.classList.add("dragging-state");
      draw();
    }

    function connectionStartSide(state) {
      return state?.virtualProxy?.side === "output" ? "in" : "out";
    }

    function startConnection(evt, s, fromSide = null) {
      stopRuntimeLayerFollow();
      evt.stopPropagation();
      const p = screenToWorld(evt);
      blockLayerEntryAfterPointerAction(1000);
      connecting = { from: s.id, to: p, fromSide: fromSide || connectionStartSide(s) };
      connectingTargetId = null;
      mapEl.classList.add("connecting");
      draw();
    }

    function startEdgeRewire(evt, t) {
      stopRuntimeLayerFollow();
      evt.preventDefault();
      evt.stopPropagation();
      const concrete = projectedTransitionSource(t);
      const from = byId(t.from);
      if (!from) return;
      blockLayerEntryAfterPointerAction(1000);
      connecting = {
        from: t.from,
        to: screenToWorld(evt),
        edgeId: concrete?.id || t.id,
        projection: t.projection || null
      };
      connectingTargetId = null;
      selected = selectionFromParts([], [concrete?.id || t.id]);
      suppressEdgeClickUntil = Date.now() + 650;
      mapEl.classList.add("connecting");
      draw();
    }

    function nodeCenter(s, side) {
      const width = nodeWidth(s);
      const centerY = s.y + nodeHeight(s) / 2;
      const portY = s.y + Math.min(Math.max(12, PORT_ANCHOR_Y), Math.max(12, nodeHeight(s) - 12));
      if (side === "out") return { x: s.x + width, y: portY };
      if (side === "in") return { x: s.x, y: portY };
      return { x: s.x + width / 2, y: centerY };
    }

    function draftConnectionRoute(from, to, fromSide) {
      const side = fromSide || "out";
      const a = nodeCenter(from, side);
      const b = nodeCenter(to, "in");
      const step = side === "in" ? -GRID_SIZE * 2 : GRID_SIZE * 2;
      return [
        a,
        { x: a.x + step, y: a.y },
        { x: a.x + step, y: b.y },
        b
      ];
    }

    function transitionColorSource(transition) {
      const projectedSource = projectedTransitionSource(transition);
      return concreteTransitionById(projectedSource?.id) || projectedSource || transition;
    }

    function transitionLineColorLayerId(transition, state = null, fallbackLayerId = currentLayerId) {
      const projectedParent = transition?.projection?.parentId ? byId(transition.projection.parentId) : null;
      if (projectedParent) return stateParentId(projectedParent);
      const parentExit = transition?.runtimeParentFrom ? byId(transition.runtimeParentFrom) : null;
      if (parentExit) return stateParentId(parentExit);
      const source = transitionColorSource(transition);
      const from = byId(source?.from);
      const to = byId(source?.to);
      if (from && to && stateParentId(from) === stateParentId(to)) return stateParentId(from);
      return state ? stateParentId(state) : fallbackLayerId;
    }

    function transitionColorInLayer(transition, layerId = currentLayerId) {
      const source = transitionColorSource(transition);
      const index = Math.max(0, transitionsInLayer(layerId).findIndex(item => item.id === source?.id));
      const hue = (195 + index * 137.508) % 360;
      return `hsl(${hue.toFixed(1)} 84% 62%)`;
    }

    function edgeColor(transition, layerId = currentLayerId) {
      return transitionColorInLayer(transition, transitionLineColorLayerId(transition, null, layerId));
    }

    function actionTransitionColor(transition, state = null) {
      return transitionColorInLayer(transition, transitionLineColorLayerId(transition, state, currentLayerId));
    }

    function edgePath(from, to, transition = null) {
      return pathFromPoints(edgeRoutePoints(from, to, transition));
    }

    function orthogonalizeRoutePoints(points) {
      const source = (points || []).filter(Boolean).map((point, index, list) =>
        index === 0 || index === list.length - 1 ? { x: point.x, y: point.y } : snapPointToGrid(point)
      );
      const out = [];
      for (const point of source) {
        const previous = out[out.length - 1];
        if (!previous) {
          out.push(point);
          continue;
        }
        if (previous.x === point.x && previous.y === point.y) continue;
        if (previous.x !== point.x && previous.y !== point.y) {
          out.push({ x: point.x, y: previous.y });
        }
        out.push(point);
      }
      const compact = [];
      for (const point of out) {
        const previous = compact[compact.length - 1];
        if (!previous || previous.x !== point.x || previous.y !== point.y) compact.push(point);
      }
      const straightened = [];
      for (const point of compact) {
        const previous = straightened[straightened.length - 1];
        const beforePrevious = straightened[straightened.length - 2];
        if (previous && beforePrevious &&
          ((beforePrevious.x === previous.x && previous.x === point.x) ||
            (beforePrevious.y === previous.y && previous.y === point.y))) {
          straightened[straightened.length - 1] = point;
        } else {
          straightened.push(point);
        }
      }
      return straightened;
    }

    function pathFromPoints(points) {
      return orthogonalizeRoutePoints(points)
        .map((point, index) => (index ? "L" : "M") + " " + point.x + " " + point.y)
        .join(" ");
    }

    function compactRoutePoints(points) {
      return orthogonalizeRoutePoints(points);
    }

    function edgeLaneSortValue(transition, side) {
      const neighbor = byId(side === "out" ? transition.to : transition.from);
      return {
        y: neighbor?.y ?? 0,
        x: neighbor?.x ?? 0,
        label: String(transition.label || ""),
        id: String(transition.id || "")
      };
    }

    function compareEdgeLane(a, b, side) {
      const av = edgeLaneSortValue(a, side);
      const bv = edgeLaneSortValue(b, side);
      return av.y - bv.y ||
        av.x - bv.x ||
        av.label.localeCompare(bv.label) ||
        av.id.localeCompare(bv.id);
    }

    function orderedPortTransitions(stateId, side) {
      return visibleTransitions()
        .filter(transition => side === "out" ? transition.from === stateId : transition.to === stateId)
        .slice()
        .sort((a, b) => compareEdgeLane(a, b, side));
    }

    function edgePortPoint(state, side, transition = null) {
      const anchor = nodeCenter(state, side);
      if (!transition) return anchor;
      const transitions = orderedPortTransitions(state.id, side);
      const index = transitions.findIndex(item => item.id === transition.id);
      if (state?.virtualProxy) {
        const offset = index >= 0 ? laneSlot(index) * GRID_SIZE : 0;
        return { x: anchor.x, y: snapToGrid(anchor.y + offset) };
      }
      let y = anchor.y;
      if (index >= 0) y = state.y + PORT_ANCHOR_Y + PORT_SLOT_GAP * (index + 1);
      y = Math.min(state.y + nodeHeight(state) - 10, Math.max(state.y + 10, y));
      if (side === "out") return { x: state.x + nodeWidth(state), y };
      if (side === "in") return { x: state.x, y };
      return anchor;
    }

    function edgeApproachPoint(state, side, transition = null) {
      const point = snapPointToGrid(edgePortPoint(state, side, transition));
      const offset = GRID_SIZE * 2;
      if (side === "out") return { x: point.x + offset, y: point.y };
      if (side === "in") return { x: point.x - offset, y: point.y };
      return point;
    }

    function doglegRoutePoints(from, to, transition = null) {
      const a = edgePortPoint(from, "out", transition);
      const b = edgePortPoint(to, "in", transition);
      if (from.id === to.id) {
        const loopTop = snapToGrid(from.y - GRID_SIZE * 3);
        return [
          a,
          { x: a.x + GRID_SIZE * 2, y: a.y },
          { x: a.x + GRID_SIZE * 2, y: loopTop },
          { x: b.x - GRID_SIZE * 2, y: loopTop },
          { x: b.x - GRID_SIZE * 2, y: b.y },
          b
        ];
      }

      const canRouteBetweenNodes = b.x - a.x >= GRID_SIZE * 4;
      if (canRouteBetweenNodes) {
        const outX = a.x + GRID_SIZE * 2;
        const inX = b.x - GRID_SIZE * 2;
        let laneY = snapToGrid((a.y + b.y) / 2);
        if (laneY === a.y || laneY === b.y) {
          const direction = b.y >= a.y ? 1 : -1;
          laneY = snapToGrid(a.y + direction * GRID_SIZE * 2);
          if (laneY === b.y) laneY = snapToGrid(laneY + direction * GRID_SIZE * 2);
        }
        return [
          a,
          { x: outX, y: a.y },
          { x: outX, y: laneY },
          { x: inX, y: laneY },
          { x: inX, y: b.y },
          b
        ];
      }

      const laneY = snapToGrid(Math.min(from.y, to.y) - GRID_SIZE * 2);
      return [
        a,
        { x: a.x + GRID_SIZE * 2, y: a.y },
        { x: a.x + GRID_SIZE * 2, y: laneY },
        { x: b.x - GRID_SIZE * 2, y: laneY },
        { x: b.x - GRID_SIZE * 2, y: b.y },
        b
      ];
    }

    function leftInputApproachRoutes(points) {
      const compact = compactRoutePoints(points || []);
      if (compact.length < 2) return [compact];
      const end = compact[compact.length - 1];
      const before = compact[compact.length - 2];
      const approachX = snapToGrid(end.x - GRID_SIZE * 2);
      const routes = [];
      const pushRoute = route => {
        const compactRoute = compactRoutePoints(route);
        const key = compactRoute.map(point => `${point.x},${point.y}`).join("|");
        if (!routes.some(item => item.key === key)) routes.push({ key, route: compactRoute });
      };
      if (before.y === end.y && before.x < end.x) pushRoute(compact);
      if (before.y === end.y && before.x >= end.x) {
        const escapeX = snapToGrid(Math.max(before.x, end.x) + GRID_SIZE * 2);
        const laneY = snapToGrid(end.y - GRID_SIZE * 2);
        const next = compact.slice(0, -1);
        const last = next[next.length - 1];
        if (!last || last.x !== escapeX || last.y !== before.y) next.push({ x: escapeX, y: before.y });
        next.push(
          { x: escapeX, y: laneY },
          { x: approachX, y: laneY },
          { x: approachX, y: end.y },
          end
        );
        pushRoute(next);
        return routes.map(item => item.route);
      }
      const rebuildPrefix = before.y === end.y && before.x < end.x ? compact.slice(0, -2) : compact.slice(0, -1);
      const prefix = rebuildPrefix.length ? rebuildPrefix : compact.slice(0, 1);
      const approachSteps = [2, 1, 3, 4, 5, 6, 8, 10, 12];
      for (const steps of approachSteps) {
        const x = snapToGrid(end.x - GRID_SIZE * steps);
        if (x >= end.x) continue;
        const next = prefix.slice();
        const last = next[next.length - 1];
        if (!last || last.x !== x) next.push({ x, y: last?.y ?? end.y });
        if ((next[next.length - 1]?.y ?? end.y) !== end.y) next.push({ x, y: end.y });
        next.push(end);
        pushRoute(next);
      }
      return routes.map(item => item.route);
    }

    function ensureLeftInputApproach(points) {
      return leftInputApproachRoutes(points)[0] || compactRoutePoints(points || []);
    }

    function cleanPortApproachRoute(points) {
      let route = compactRoutePoints(points || []);
      if (route.length < 2) return route;

      const start = route[0];
      const second = route[1];
      const hasCleanOutput =
        second &&
        second.y === start.y &&
        second.x >= start.x + GRID_SIZE;
      if (!hasCleanOutput) {
        const outputStub = { x: snapToGrid(start.x + GRID_SIZE * 2), y: start.y };
        const outputLane = { x: outputStub.x, y: second?.y ?? start.y };
        route = [start, outputStub, outputLane, ...route.slice(2)];
      }

      route = compactRoutePoints(route);
      if (route.length < 2) return route;

      const end = route[route.length - 1];
      const beforeEnd = route[route.length - 2];
      const hasCleanInput =
        beforeEnd &&
        beforeEnd.y === end.y &&
        beforeEnd.x <= end.x - GRID_SIZE;
      if (!hasCleanInput) {
        const inputStub = { x: snapToGrid(end.x - GRID_SIZE * 2), y: end.y };
        const prefix = route.slice(0, -1);
        const last = prefix[prefix.length - 1];
        if (last && last.x !== inputStub.x && last.y !== inputStub.y) {
          prefix.push({ x: inputStub.x, y: last.y });
        }
        prefix.push(inputStub, end);
        route = prefix;
      }

      return compactRoutePoints(route);
    }

    function ensureCleanPortApproach(points) {
      return cleanPortApproachRoute(ensureLeftInputApproach(points));
    }

    function directRoutePoints(from, to, transition = null) {
      if (from.id === to.id) return null;
      const a = edgePortPoint(from, "out", transition);
      const b = edgePortPoint(to, "in", transition);
      if (a.y !== b.y || b.x <= a.x) return null;
      const direct = [a, b];
      return routeIsClear(direct, transition || { from: from.id, to: to.id }) ? direct : null;
    }

    function portStubRouteCandidates(from, to, transition = null) {
      if (from.id === to.id) return [];
      const a = snapPointToGrid(edgePortPoint(from, "out", transition));
      const b = snapPointToGrid(edgePortPoint(to, "in", transition));
      if (b.x - a.x < GRID_SIZE * 3) return [];
      const candidates = [];
      const pushCandidate = points => {
        const route = compactRoutePoints(points);
        if (route.length >= 2) candidates.push(route);
      };
      const outX = snapToGrid(a.x + GRID_SIZE * 2);
      const inX = snapToGrid(b.x - GRID_SIZE * 2);
      if (outX > a.x && outX < b.x) {
        pushCandidate([
          a,
          { x: outX, y: a.y },
          { x: outX, y: b.y },
          b
        ]);
      }
      if (inX > a.x && inX < b.x && inX !== outX) {
        pushCandidate([
          a,
          { x: inX, y: a.y },
          { x: inX, y: b.y },
          b
        ]);
      }
      return candidates;
    }

    function portStubRoutePoints(from, to, transition = null) {
      const routeTransition = transition || { from: from.id, to: to.id };
      return portStubRouteCandidates(from, to, transition)
        .find(route => routeIsClear(route, routeTransition)) || null;
    }

    function forwardBendRoutePoints(from, to, transition = null) {
      if (from.id === to.id) return null;
      const a = snapPointToGrid(edgePortPoint(from, "out", transition));
      const b = snapPointToGrid(edgePortPoint(to, "in", transition));
      if (b.x - a.x < GRID_SIZE * 3) return null;
      if (Math.abs(b.y - a.y) > GRID_SIZE * 3) return null;
      const midX = snapToGrid((a.x + b.x) / 2);
      if (midX <= a.x || midX >= b.x) return null;
      const route = compactRoutePoints([
        a,
        { x: midX, y: a.y },
        { x: midX, y: b.y },
        b
      ]);
      return routeIsClear(route, transition || { from: from.id, to: to.id }) ? route : null;
    }

    function segmentIntersectsBox(a, b, box) {
      if (a.x === b.x) {
        if (a.x <= box.x1 || a.x >= box.x2) return false;
        return Math.max(Math.min(a.y, b.y), box.y1) < Math.min(Math.max(a.y, b.y), box.y2);
      }
      if (a.y === b.y) {
        if (a.y <= box.y1 || a.y >= box.y2) return false;
        return Math.max(Math.min(a.x, b.x), box.x1) < Math.min(Math.max(a.x, b.x), box.x2);
      }
      return false;
    }

    function stateBox(state, margin = 0) {
      return {
        id: state.id,
        x1: state.x - margin,
        y1: state.y - margin,
        x2: state.x + nodeWidth(state) + margin,
        y2: state.y + nodeHeight(state) + margin
      };
    }

    function routeBlockingBoxes(transition, margin = 0) {
      const boxes = visibleStates()
        .filter(state => state.id !== transition?.from && state.id !== transition?.to)
        .map(state => stateBox(state, margin));
      const commentBox = layerFrameCommentBox(margin);
      if (commentBox) boxes.push(commentBox);
      return boxes;
    }

    function routeIntersectsBlockingState(points, transition, margin = 0) {
      const boxes = routeBlockingBoxes(transition, margin);
      for (let i = 1; i < points.length; i++) {
        const a = snapPointToGrid(points[i - 1]);
        const b = snapPointToGrid(points[i]);
        if (boxes.some(box => segmentIntersectsBox(a, b, box))) return true;
      }
      return false;
    }

    function routeIsClear(points, transition, margin = ROUTE_NODE_CLEARANCE) {
      return !routeIntersectsBlockingState(points, transition, margin);
    }

    function obstacleRoutePointIsBlocked(from, to, transition = null, points) {
      const routeTransition = transition || { from: from.id, to: to.id };
      return routeBlockingBoxes(routeTransition, 0).some(box =>
        points.some(point => pointInBox(point, box))
      );
    }

    function obstaclePortIsBlocked(from, to, transition = null) {
      return obstacleRoutePointIsBlocked(from, to, transition, [
        snapPointToGrid(edgePortPoint(from, "out", transition)),
        snapPointToGrid(edgePortPoint(to, "in", transition))
      ]);
    }

    function obstacleSearchEndpointIsBlocked(from, to, transition = null) {
      return obstacleRoutePointIsBlocked(from, to, transition, [
        snapPointToGrid(edgePortPoint(from, "out", transition)),
        snapPointToGrid(edgeApproachPoint(from, "out", transition)),
        snapPointToGrid(edgeApproachPoint(to, "in", transition)),
        snapPointToGrid(edgePortPoint(to, "in", transition))
      ]);
    }

    function clearLeftInputRoute(points, transition, margin = ROUTE_NODE_CLEARANCE) {
      const route = ensureCleanPortApproach(points);
      if (routeIsClear(route, transition, margin)) return route;
      for (const variant of leftInputApproachRoutes(points)) {
        const cleanVariant = cleanPortApproachRoute(variant);
        if (routeIsClear(cleanVariant, transition, margin)) return cleanVariant;
      }
      return null;
    }

    function pointInBox(point, box) {
      return point.x > box.x1 && point.x < box.x2 && point.y > box.y1 && point.y < box.y2;
    }

    function routeLength(points) {
      const compact = compactRoutePoints(points || []);
      let total = 0;
      for (let i = 1; i < compact.length; i++) {
        total += Math.abs(compact[i].x - compact[i - 1].x) + Math.abs(compact[i].y - compact[i - 1].y);
      }
      return total;
    }

    function routeBendCount(points) {
      const segments = routeSegments(points);
      let bends = 0;
      for (let i = 1; i < segments.length; i++) {
        if (segments[i].orientation !== segments[i - 1].orientation) bends += 1;
      }
      return bends;
    }

    function envelopeRoutePoints(from, to, transition = null) {
      if (obstaclePortIsBlocked(from, to, transition)) return null;
      const routeTransition = transition || { from: from.id, to: to.id };
      const startPort = snapPointToGrid(edgePortPoint(from, "out", transition));
      const goalPort = snapPointToGrid(edgePortPoint(to, "in", transition));
      const startApproach = edgeApproachPoint(from, "out", transition);
      const goalApproach = edgeApproachPoint(to, "in", transition);
      const boxes = routeBlockingBoxes(routeTransition, ROUTE_NODE_CLEARANCE);
      if (!boxes.length) return clearLeftInputRoute([startPort, startApproach, goalApproach, goalPort], routeTransition);
      const blockers = boxes;
      const minX = Math.min(startPort.x, goalPort.x, ...blockers.map(box => box.x1));
      const maxX = Math.max(startPort.x, goalPort.x, ...blockers.map(box => box.x2));
      const minY = Math.min(startPort.y, goalPort.y, ...blockers.map(box => box.y1));
      const maxY = Math.max(startPort.y, goalPort.y, ...blockers.map(box => box.y2));
      const yLanes = [
        floorToGrid(minY - GRID_SIZE * 2),
        floorToGrid(minY - GRID_SIZE * 4),
        ceilToGrid(maxY + GRID_SIZE * 2),
        ceilToGrid(maxY + GRID_SIZE * 4)
      ];
      const xLanes = [
        floorToGrid(minX - GRID_SIZE * 2),
        floorToGrid(minX - GRID_SIZE * 4),
        ceilToGrid(maxX + GRID_SIZE * 2),
        ceilToGrid(maxX + GRID_SIZE * 4)
      ];
      const outputXs = [2, 1, 0, 3, 4, 6]
        .map(steps => snapToGrid(startPort.x + GRID_SIZE * steps))
        .filter(x => x >= startPort.x && x > WORLD_MIN_X && x < WORLD_MAX_X);
      const inputXs = [2, 1, 3, 4, 5, 6, 8, 10, 12]
        .map(steps => snapToGrid(goalPort.x - GRID_SIZE * steps))
        .filter(x => x <= goalPort.x && x > WORLD_MIN_X && x < WORLD_MAX_X);
      const candidates = [];
      for (const laneY of yLanes) {
        if (laneY <= WORLD_MIN_Y || laneY >= WORLD_MAX_Y) continue;
        for (const outputX of outputXs) {
          for (const inputX of inputXs) {
            candidates.push(compactRoutePoints([
              startPort,
              { x: outputX, y: startPort.y },
              { x: outputX, y: laneY },
              { x: inputX, y: laneY },
              { x: inputX, y: goalPort.y },
              goalPort
            ]));
          }
        }
      }
      for (const laneX of xLanes) {
        if (laneX <= WORLD_MIN_X || laneX >= WORLD_MAX_X) continue;
        for (const outputX of outputXs) {
          for (const inputX of inputXs) {
            candidates.push(compactRoutePoints([
              startPort,
              { x: outputX, y: startPort.y },
              { x: laneX, y: startPort.y },
              { x: laneX, y: goalPort.y },
              { x: inputX, y: goalPort.y },
              goalPort
            ]));
          }
        }
      }
      const ranked = candidates
        .map(route => ({ route, length: routeLength(route), bends: routeBendCount(route) }))
        .sort((a, b) => a.length - b.length || a.bends - b.bends);
      for (const candidate of ranked) {
        const route = clearLeftInputRoute(candidate.route, routeTransition, 0);
        if (route) return route;
      }
      return null;
    }

    function routeSearchBounds(start, goal) {
      const boxes = visibleStates().map(state => stateBox(state, GRID_SIZE * 6));
      const xs = [start.x, goal.x];
      const ys = [start.y, goal.y];
      for (const box of boxes) {
        xs.push(box.x1, box.x2);
        ys.push(box.y1, box.y2);
      }
      return {
        minX: snapToGrid(Math.max(WORLD_MIN_X, Math.min(...xs) - GRID_SIZE * 4)),
        maxX: snapToGrid(Math.min(WORLD_MAX_X, Math.max(...xs) + GRID_SIZE * 4)),
        minY: snapToGrid(Math.max(WORLD_MIN_Y, Math.min(...ys) - GRID_SIZE * 4)),
        maxY: snapToGrid(Math.min(WORLD_MAX_Y, Math.max(...ys) + GRID_SIZE * 4))
      };
    }

    function boxesIntersect(a, b) {
      return a.x1 < b.x2 && a.x2 > b.x1 && a.y1 < b.y2 && a.y2 > b.y1;
    }

    function sparseRouteSearchBounds(startPort, start, goal, goalPort, boxes) {
      const pad = GRID_SIZE * 8;
      let bounds = {
        x1: Math.min(startPort.x, start.x, goal.x, goalPort.x) - pad,
        y1: Math.min(startPort.y, start.y, goal.y, goalPort.y) - pad,
        x2: Math.max(startPort.x, start.x, goal.x, goalPort.x) + pad,
        y2: Math.max(startPort.y, start.y, goal.y, goalPort.y) + pad
      };
      for (let pass = 0; pass < 2; pass++) {
        for (const box of boxes) {
          if (!boxesIntersect(bounds, box)) continue;
          bounds.x1 = Math.min(bounds.x1, box.x1 - GRID_SIZE * 2);
          bounds.y1 = Math.min(bounds.y1, box.y1 - GRID_SIZE * 2);
          bounds.x2 = Math.max(bounds.x2, box.x2 + GRID_SIZE * 2);
          bounds.y2 = Math.max(bounds.y2, box.y2 + GRID_SIZE * 2);
        }
      }
      return {
        minX: floorToGrid(Math.max(WORLD_MIN_X, bounds.x1)),
        maxX: ceilToGrid(Math.min(WORLD_MAX_X, bounds.x2)),
        minY: floorToGrid(Math.max(WORLD_MIN_Y, bounds.y1)),
        maxY: ceilToGrid(Math.min(WORLD_MAX_Y, bounds.y2))
      };
    }

    function sparseObstacleRoutePoints(from, to, transition = null) {
      recordRouteMetric("sparseRouteSearches");
      const startPort = snapPointToGrid(edgePortPoint(from, "out", transition));
      const goalPort = snapPointToGrid(edgePortPoint(to, "in", transition));
      const startApproach = edgeApproachPoint(from, "out", transition);
      const goalApproach = edgeApproachPoint(to, "in", transition);
      const start = startPort;
      const goal = goalPort;
      const routeTransition = transition || { from: from.id, to: to.id };
      const boxes = routeBlockingBoxes(routeTransition, GRID_SIZE);
      const bounds = sparseRouteSearchBounds(startPort, startApproach, goalApproach, goalPort, boxes);
      const relevantBoxes = boxes.filter(box => boxesIntersect({
        x1: bounds.minX,
        y1: bounds.minY,
        x2: bounds.maxX,
        y2: bounds.maxY
      }, box));

      const xs = new Set();
      const ys = new Set();
      const addX = value => {
        const x = snapToGrid(value);
        if (Number.isFinite(x) && x >= bounds.minX && x <= bounds.maxX) xs.add(x);
      };
      const addY = value => {
        const y = snapToGrid(value);
        if (Number.isFinite(y) && y >= bounds.minY && y <= bounds.maxY) ys.add(y);
      };
      [startPort.x, startApproach.x, goalApproach.x, goalPort.x, (startPort.x + goalPort.x) / 2].forEach(addX);
      [startPort.y, startApproach.y, goalApproach.y, goalPort.y, (startPort.y + goalPort.y) / 2].forEach(addY);
      for (const box of relevantBoxes) {
        [
          floorToGrid(box.x1 - GRID_SIZE),
          floorToGrid(box.x1),
          ceilToGrid(box.x2),
          ceilToGrid(box.x2 + GRID_SIZE)
        ].forEach(addX);
        [
          floorToGrid(box.y1 - GRID_SIZE),
          floorToGrid(box.y1),
          ceilToGrid(box.y2),
          ceilToGrid(box.y2 + GRID_SIZE)
        ].forEach(addY);
      }

      const sortedXs = [...xs].sort((a, b) => a - b);
      const sortedYs = [...ys].sort((a, b) => a - b);
      if (!sortedXs.length || !sortedYs.length || sortedXs.length * sortedYs.length > 3600) return null;

      const pointKey = point => `${point.x},${point.y}`;
      const startKey = pointKey(start);
      const goalKey = pointKey(goal);
      const parsePoint = key => {
        const [x, y] = key.split(",").map(Number);
        return { x, y };
      };
      const pointIsBlocked = point =>
        pointKey(point) !== startKey &&
        pointKey(point) !== goalKey &&
        relevantBoxes.some(box => pointInBox(point, box));
      const segmentClear = (a, b) => !relevantBoxes.some(box => segmentIntersectsBox(a, b, box));

      const points = new Map();
      const rows = new Map();
      const cols = new Map();
      for (const y of sortedYs) {
        for (const x of sortedXs) {
          const point = { x, y };
          if (pointIsBlocked(point)) continue;
          const key = pointKey(point);
          points.set(key, point);
          if (!rows.has(y)) rows.set(y, []);
          if (!cols.has(x)) cols.set(x, []);
          rows.get(y).push(key);
          cols.get(x).push(key);
        }
      }
      if (!points.has(startKey) || !points.has(goalKey)) return null;
      for (const keys of rows.values()) keys.sort((a, b) => points.get(a).x - points.get(b).x);
      for (const keys of cols.values()) keys.sort((a, b) => points.get(a).y - points.get(b).y);

      const neighbors = key => {
        const point = points.get(key);
        if (!point) return [];
        const out = [];
        const row = rows.get(point.y) || [];
        const col = cols.get(point.x) || [];
        const rowIndex = row.indexOf(key);
        const colIndex = col.indexOf(key);
        const push = (nextKey, direction) => {
          const next = points.get(nextKey);
          if (next && segmentClear(point, next)) out.push({ key: nextKey, direction, length: Math.abs(next.x - point.x) + Math.abs(next.y - point.y) });
        };
        if (rowIndex > 0) push(row[rowIndex - 1], "h");
        if (rowIndex >= 0 && rowIndex < row.length - 1) push(row[rowIndex + 1], "h");
        if (colIndex > 0) push(col[colIndex - 1], "v");
        if (colIndex >= 0 && colIndex < col.length - 1) push(col[colIndex + 1], "v");
        return out;
      };

      const stateKey = (key, direction) => `${key}|${direction || ""}`;
      const statePointKey = key => key.split("|")[0];
      const stateDirection = key => key.split("|")[1] || "";
      const heuristic = key => {
        const point = points.get(key);
        return Math.abs(point.x - goal.x) + Math.abs(point.y - goal.y);
      };
      const heap = [];
      const scores = new Map();
      const cameFrom = new Map();
      const heapScore = key => scores.get(key) ?? Infinity;
      const heapPush = key => {
        heap.push(key);
        let index = heap.length - 1;
        while (index > 0) {
          const parent = (index - 1) >> 1;
          if (heapScore(heap[index]) >= heapScore(heap[parent])) break;
          const tmp = heap[index]; heap[index] = heap[parent]; heap[parent] = tmp;
          index = parent;
        }
      };
      const heapPop = () => {
        if (!heap.length) return null;
        const top = heap[0];
        const bottom = heap.pop();
        if (heap.length) {
          heap[0] = bottom;
          let index = 0;
          while ((index << 1) + 1 < heap.length) {
            let left = (index << 1) + 1;
            let right = left + 1;
            let best = left;
            if (right < heap.length && heapScore(heap[right]) < heapScore(heap[left])) best = right;
            if (heapScore(heap[index]) <= heapScore(heap[best])) break;
            const tmp = heap[index]; heap[index] = heap[best]; heap[best] = tmp;
            index = best;
          }
        }
        return top;
      };

      const startStateKey = stateKey(startKey, "");
      const gScores = new Map([[startStateKey, 0]]);
      scores.set(startStateKey, heuristic(startKey));
      heapPush(startStateKey);
      const closed = new Set();
      let found = "";
      const bendPenalty = GRID_SIZE * 4;

      while (heap.length && closed.size < 8000) {
        const current = heapPop();
        if (closed.has(current)) continue;
        closed.add(current);
        const currentPointKey = statePointKey(current);
        if (currentPointKey === goalKey) {
          found = current;
          break;
        }
        const currentDirection = stateDirection(current);
        for (const next of neighbors(currentPointKey)) {
          const turnCost = currentDirection && currentDirection !== next.direction ? bendPenalty : 0;
          const nextState = stateKey(next.key, next.direction);
          const tentative = (gScores.get(current) ?? Infinity) + next.length + turnCost;
          if (tentative >= (gScores.get(nextState) ?? Infinity)) continue;
          cameFrom.set(nextState, current);
          gScores.set(nextState, tentative);
          scores.set(nextState, tentative + heuristic(next.key));
          heapPush(nextState);
        }
      }
      if (!found) return null;
      const route = [];
      for (let walk = found; walk; walk = cameFrom.get(walk)) {
        route.unshift(points.get(statePointKey(walk)));
        if (walk === startStateKey) break;
      }
      const routed = ensureCleanPortApproach(compactRoutePoints(route));
      return routeIsClear(routed, routeTransition) ? routed : null;
    }

    function denseGridObstacleRoutePoints(from, to, transition = null) {
      if (obstacleSearchEndpointIsBlocked(from, to, transition)) return null;
      recordRouteMetric("obstacleSearches");
      const startPort = snapPointToGrid(edgePortPoint(from, "out", transition));
      const goalPort = snapPointToGrid(edgePortPoint(to, "in", transition));
      const start = edgeApproachPoint(from, "out", transition);
      const goal = edgeApproachPoint(to, "in", transition);
      const routeTransition = transition || { from: from.id, to: to.id };
      const bounds = routeSearchBounds(start, goal);

      const minBoundsGx = Math.round(bounds.minX / GRID_SIZE);
      const maxBoundsGx = Math.round(bounds.maxX / GRID_SIZE);
      const minBoundsGy = Math.round(bounds.minY / GRID_SIZE);
      const maxBoundsGy = Math.round(bounds.maxY / GRID_SIZE);

      const startGx = Math.round(start.x / GRID_SIZE);
      const startGy = Math.round(start.y / GRID_SIZE);
      const goalGx = Math.round(goal.x / GRID_SIZE);
      const goalGy = Math.round(goal.y / GRID_SIZE);

      // Precompute blocked cells (offset by 1 grid cell for clearance, except for from/to states)
      const blockedCells = new Set();
      const states = visibleStates();
      for (const state of states) {
        if (state.id === from.id || state.id === to.id) continue;
        const minGx = Math.floor((state.x - GRID_SIZE) / GRID_SIZE);
        const maxGx = Math.ceil((state.x + nodeWidth(state) + GRID_SIZE) / GRID_SIZE);
        const minGy = Math.floor((state.y - GRID_SIZE) / GRID_SIZE);
        const maxGy = Math.ceil((state.y + nodeHeight(state) + GRID_SIZE) / GRID_SIZE);
        for (let gx = minGx; gx < maxGx; gx++) {
          for (let gy = minGy; gy < maxGy; gy++) {
            blockedCells.add((gx << 16) | (gy & 0xffff));
          }
        }
      }

      const encode = (gx, gy) => (gx << 16) | (gy & 0xffff);
      const startKey = encode(startGx, startGy);
      const goalKey = encode(goalGx, goalGy);

      const blocked = (gx, gy) => {
        const key = encode(gx, gy);
        if (key === startKey || key === goalKey) return false;
        return blockedCells.has(key);
      };

      const heuristic = (gx, gy) => Math.abs(gx - goalGx) + Math.abs(gy - goalGy);

      const heap = [];
      const fScores = new Map();
      const gScores = new Map();
      const cameFrom = new Map();

      const getFScore = (key) => fScores.get(key) ?? Infinity;

      const heapPush = (key) => {
        heap.push(key);
        let i = heap.length - 1;
        while (i > 0) {
          const p = (i - 1) >> 1;
          if (getFScore(heap[i]) >= getFScore(heap[p])) break;
          const tmp = heap[i]; heap[i] = heap[p]; heap[p] = tmp;
          i = p;
        }
      };

      const heapPop = () => {
        if (heap.length === 0) return null;
        const top = heap[0];
        const bottom = heap.pop();
        if (heap.length > 0) {
          heap[0] = bottom;
          let i = 0;
          const len = heap.length;
          while ((i << 1) + 1 < len) {
            let left = (i << 1) + 1;
            let right = left + 1;
            let best = left;
            if (right < len && getFScore(heap[right]) < getFScore(heap[left])) best = right;
            if (getFScore(heap[i]) <= getFScore(heap[best])) break;
            const tmp = heap[i]; heap[i] = heap[best]; heap[best] = tmp;
            i = best;
          }
        }
        return top;
      };

      const openSet = new Set([startKey]);
      gScores.set(startKey, 0);
      fScores.set(startKey, heuristic(startGx, startGy));
      heapPush(startKey);

      const closed = new Set();

      for (let guard = 0; heap.length && guard < 10000; guard++) {
        const currentKey = heapPop();
        openSet.delete(currentKey);

        if (currentKey === goalKey) {
          const path = [];
          let walkKey = currentKey;
          while (walkKey !== startKey) {
            const gx = walkKey >> 16;
            const gy = (walkKey << 16) >> 16;
            path.unshift({ x: gx * GRID_SIZE, y: gy * GRID_SIZE });
            walkKey = cameFrom.get(walkKey);
          }
          path.unshift(start);
          const routed = compactRoutePoints([startPort, ...path, goalPort]);
          return routeIsClear(routed, routeTransition) ? routed : null;
        }

        closed.add(currentKey);

        const cx = currentKey >> 16;
        const cy = (currentKey << 16) >> 16;

        const neighbors = [
          encode(cx + 1, cy),
          encode(cx - 1, cy),
          encode(cx, cy + 1),
          encode(cx, cy - 1)
        ];

        for (const neighborKey of neighbors) {
          const nx = neighborKey >> 16;
          const ny = (neighborKey << 16) >> 16;

          if (nx < minBoundsGx || nx > maxBoundsGx || ny < minBoundsGy || ny > maxBoundsGy) continue;
          if (blocked(nx, ny)) continue;
          if (closed.has(neighborKey)) continue;

          const tentative = (gScores.get(currentKey) ?? Infinity) + 1;
          if (tentative >= (gScores.get(neighborKey) ?? Infinity)) continue;

          cameFrom.set(neighborKey, currentKey);
          gScores.set(neighborKey, tentative);
          fScores.set(neighborKey, tentative + heuristic(nx, ny));

          if (!openSet.has(neighborKey)) {
            openSet.add(neighborKey);
            heapPush(neighborKey);
          }
        }
      }
      return null;
    }

    function obstacleAvoidingRoutePoints(from, to, transition = null, options = {}) {
      if (obstacleSearchEndpointIsBlocked(from, to, transition)) return null;
      const envelope = envelopeRoutePoints(from, to, transition);
      if (envelope) return envelope;
      const sparse = options.allowSparseObstacleSearch === false ? null : sparseObstacleRoutePoints(from, to, transition);
      if (sparse) return sparse;
      if (options.allowDenseGridSearch === false) return null;
      return denseGridObstacleRoutePoints(from, to, transition);
    }

    function baseEdgeRoutePoints(from, to, transition = null, options = {}) {
      const routeTransition = transition || { from: from.id, to: to.id };
      const allowObstacleSearch = options.allowObstacleSearch !== false;
      const direct = directRoutePoints(from, to, transition);
      const clearDirect = direct ? clearLeftInputRoute(direct, routeTransition) : null;
      if (clearDirect) return clearDirect;
      const portStub = portStubRoutePoints(from, to, transition);
      const clearPortStub = portStub ? clearLeftInputRoute(portStub, routeTransition) : null;
      if (clearPortStub) return clearPortStub;
      const forwardBend = forwardBendRoutePoints(from, to, transition);
      const clearForwardBend = forwardBend ? clearLeftInputRoute(forwardBend, routeTransition) : null;
      if (clearForwardBend) return clearForwardBend;
      const dogleg = doglegRoutePoints(from, to, transition);
      if (from.id !== to.id) {
        const envelope = envelopeRoutePoints(from, to, transition);
        if (envelope) return envelope;
      }
      const clearDogleg = clearLeftInputRoute(dogleg, routeTransition);
      if (clearDogleg) return clearDogleg;
      if (from.id === to.id) {
        const envelope = envelopeRoutePoints(from, to, transition);
        if (envelope) return envelope;
      }
      if (!allowObstacleSearch) return ensureCleanPortApproach(dogleg);
      const obstacle = obstacleAvoidingRoutePoints(from, to, transition, options);
      const clearObstacle = obstacle ? clearLeftInputRoute(obstacle, routeTransition) : null;
      return clearObstacle || ensureCleanPortApproach(dogleg);
    }

    function routeSegments(points) {
      const compact = points.map(snapPointToGrid);
      const segments = [];
      for (let i = 1; i < compact.length; i++) {
        const a = compact[i - 1];
        const b = compact[i];
        if (a.x === b.x && a.y === b.y) continue;
        const vertical = a.x === b.x;
        const horizontal = a.y === b.y;
        if (!vertical && !horizontal) continue;
        segments.push({
          index: i,
          orientation: vertical ? "vertical" : "horizontal",
          coordinate: vertical ? a.x : a.y,
          min: vertical ? Math.min(a.y, b.y) : Math.min(a.x, b.x),
          max: vertical ? Math.max(a.y, b.y) : Math.max(a.x, b.x),
          laneable: i > 1 && i < compact.length - 1
        });
      }
      return segments;
    }

    function laneSlot(index) {
      if (index <= 0) return 0;
      return index % 2 ? Math.ceil(index / 2) : -index / 2;
    }

    // Per-frame route table — populated fresh at the start of every draw() call.
    // Never persisted across frames. No caching, no snapshots.
    let _frameRoutes = new Map();
    let _frameRouteTransitions = new Map();

    function recordRouteMetric(name, amount = 1) {
      window.__stateBlueprintRouteMetrics = window.__stateBlueprintRouteMetrics || {};
      const metrics = window.__stateBlueprintRouteMetrics;
      if (metrics && typeof metrics === "object") metrics[name] = (metrics[name] || 0) + amount;
    }

    function transitionRouteKey(transition) {
      if (transition?.projection) {
        return `projection:${transition.projection.parentId}:${transition.projection.side}:${transition.projection.transitionId}`;
      }
      return String(transition?.id || "");
    }

    function frameRouteTransition(routeKey) {
      return _frameRouteTransitions.get(routeKey) || model.transitions.find(item => item.id === routeKey) || null;
    }

    function edgeOrder(routeKey) {
      const transition = frameRouteTransition(routeKey);
      const source = projectedTransitionSource(transition);
      const index = model.transitions.findIndex(item => item.id === source?.id);
      return index < 0 ? Number.MAX_SAFE_INTEGER : index;
    }

    function routeSegmentRecords(routes) {
      const records = [];
      for (const [transitionId, points] of routes) {
        for (const segment of routeSegments(points)) {
          records.push({ ...segment, transitionId });
        }
      }
      return records;
    }

    function overlappingRouteGroups(routes) {
      const buckets = new Map();
      for (const segment of routeSegmentRecords(routes)) {
        if (!segment.laneable) continue;
        const key = `${segment.orientation}:${segment.coordinate}`;
        if (!buckets.has(key)) buckets.set(key, []);
        buckets.get(key).push(segment);
      }

      const groups = [];
      for (const bucket of buckets.values()) {
        const sorted = bucket
          .slice()
          .sort((a, b) => a.min - b.min || a.max - b.max || edgeOrder(a.transitionId) - edgeOrder(b.transitionId));
        let group = [];
        let groupMax = -Infinity;
        for (const segment of sorted) {
          if (!group.length || segment.min < groupMax) {
            group.push(segment);
            groupMax = Math.max(groupMax, segment.max);
          } else {
            if (new Set(group.map(item => item.transitionId)).size > 1) groups.push(group);
            group = [segment];
            groupMax = segment.max;
          }
        }
        if (new Set(group.map(item => item.transitionId)).size > 1) groups.push(group);
      }
      return groups;
    }

    function applySegmentLane(points, segment, coordinate) {
      const routed = points.map(point => ({ ...point }));
      if (segment.orientation === "vertical") {
        routed[segment.index - 1].x = coordinate;
        routed[segment.index].x = coordinate;
      } else {
        routed[segment.index - 1].y = coordinate;
        routed[segment.index].y = coordinate;
      }
      return routed;
    }

    function coordinateKeepsPortApproach(points, segment, coordinate) {
      const compact = compactRoutePoints(points);
      const first = compact[0];
      const second = compact[1];
      const beforeEnd = compact[compact.length - 2];
      const end = compact[compact.length - 1];
      if (segment.orientation !== "vertical") return true;
      if (segment.index === 2 && first && second && first.y === second.y) {
        return coordinate >= first.x + GRID_SIZE;
      }
      if (segment.index === compact.length - 2 && beforeEnd && end && beforeEnd.y === end.y) {
        return coordinate <= end.x - GRID_SIZE;
      }
      return true;
    }

    function safeLaneCoordinate(points, segment, slotIndex) {
      const transition = frameRouteTransition(segment.transitionId);
      for (let attempt = 0; attempt < 12; attempt++) {
        const coordinate = segment.coordinate + laneSlot(slotIndex + attempt) * GRID_SIZE;
        if (!coordinateKeepsPortApproach(points, segment, coordinate)) continue;
        const candidate = applySegmentLane(points, segment, coordinate);
        if (routeIsClear(candidate, transition)) return coordinate;
      }
      const fallback = segment.coordinate + laneSlot(slotIndex) * GRID_SIZE;
      return coordinateKeepsPortApproach(points, segment, fallback) ? fallback : segment.coordinate;
    }

    function resolveRouteOverlaps(routes, options = {}) {
      const allowObstacleSearch = options.allowObstacleSearch !== false;
      let current = new Map([...routes].map(([id, points]) => [id, points.map(point => ({ ...point }))]));
      for (let pass = 0; pass < 8; pass++) {
        const groups = overlappingRouteGroups(current);
        if (!groups.length) break;
        const adjustments = new Map();
        for (const group of groups) {
          const ordered = group
            .slice()
            .sort((a, b) => edgeOrder(a.transitionId) - edgeOrder(b.transitionId) || a.index - b.index);
          const hasFixedLane = ordered.some(segment => !segment.laneable);
          ordered.forEach((segment, index) => {
            if (!segment.laneable) return;
            const slotIndex = hasFixedLane ? index + 1 : index;
            const coordinate = safeLaneCoordinate(current.get(segment.transitionId), segment, slotIndex);
            adjustments.set(`${segment.transitionId}:${segment.index}`, { segment, coordinate });
          });
        }
        if (!adjustments.size) break;
        current = new Map(current);
        for (const { segment, coordinate } of adjustments.values()) {
          current.set(segment.transitionId, applySegmentLane(current.get(segment.transitionId), segment, coordinate));
        }
      }
      for (const [id, points] of current) {
        const transition = frameRouteTransition(id);
        if (!transition || routeIsClear(points, transition)) continue;
        if (!allowObstacleSearch) continue;
        const from = byId(transition.from);
        const to = byId(transition.to);
        const rerouted = from && to ? obstacleAvoidingRoutePoints(from, to, transition, options) : null;
        if (rerouted) current.set(id, ensureCleanPortApproach(rerouted));
      }
      for (const [id, points] of current) {
        current.set(id, ensureCleanPortApproach(points));
      }
      return current;
    }

    // Compute all transition routes fresh for the current frame; the map is not persisted.
    function computeFrameRoutes(options = {}) {
      const metricName = options.metricName || "finalRouteBuilds";
      if (metricName) recordRouteMetric(metricName);
      const routes = new Map();
      _frameRouteTransitions = new Map();
      for (const transition of visibleTransitions()) {
        const from = byId(transition.from);
        const to = byId(transition.to);
        if (!from || !to) continue;
        const routeKey = transitionRouteKey(transition);
        _frameRouteTransitions.set(routeKey, transition);
        routes.set(routeKey, baseEdgeRoutePoints(from, to, transition, options));
      }
      return resolveRouteOverlaps(routes, options);
    }

    function edgeRoutePoints(from, to, transition = null) {
      if (!transition) return baseEdgeRoutePoints(from, to, transition);
      return _frameRoutes.get(transitionRouteKey(transition)) || baseEdgeRoutePoints(from, to, transition);
    }

    function polylinePoint(points, ratio) {
      const compact = points.map(snapPointToGrid).filter((point, index, list) => {
        const previous = list[index - 1];
        return !previous || previous.x !== point.x || previous.y !== point.y;
      });
      const lengths = [];
      let total = 0;
      for (let i = 1; i < compact.length; i++) {
        const length = Math.hypot(compact[i].x - compact[i - 1].x, compact[i].y - compact[i - 1].y);
        lengths.push(length);
        total += length;
      }
      if (!total) return compact[0] || { x: 0, y: 0 };
      let remaining = total * clamp(ratio, 0, 1);
      for (let i = 1; i < compact.length; i++) {
        const length = lengths[i - 1];
        if (remaining <= length) {
          const start = compact[i - 1];
          const end = compact[i];
          const t = length ? remaining / length : 0;
          return snapPointToGrid({
            x: start.x + (end.x - start.x) * t,
            y: start.y + (end.y - start.y) * t
          });
        }
        remaining -= length;
      }
      return compact[compact.length - 1];
    }

    function edgeTipHandlePoint(from, to, transition = null) {
      const ratio = transition?.projection?.side === "input" ? 0.92 : transition?.projection?.side === "output" ? 0.08 : 0.82;
      const point = polylinePoint(edgeRoutePoints(from, to, transition), ratio);
      return transition?.projection ? clampEdgeHandleToViewport(point) : point;
    }

    function arrowPathForPoints(points) {
      const compact = compactRoutePoints(points);
      if (compact.length < 2) return "";
      const tip = compact[compact.length - 1];
      let previous = compact[compact.length - 2];
      for (let i = compact.length - 2; i >= 0; i--) {
        if (compact[i].x !== tip.x || compact[i].y !== tip.y) {
          previous = compact[i];
          break;
        }
      }
      const dx = Math.sign(tip.x - previous.x);
      const dy = Math.sign(tip.y - previous.y);
      const length = 13;
      const wing = 6;
      if (dx > 0) return `M ${tip.x} ${tip.y} L ${tip.x - length} ${tip.y - wing} L ${tip.x - length} ${tip.y + wing} Z`;
      if (dx < 0) return `M ${tip.x} ${tip.y} L ${tip.x + length} ${tip.y - wing} L ${tip.x + length} ${tip.y + wing} Z`;
      if (dy > 0) return `M ${tip.x} ${tip.y} L ${tip.x - wing} ${tip.y - length} L ${tip.x + wing} ${tip.y - length} Z`;
      if (dy < 0) return `M ${tip.x} ${tip.y} L ${tip.x - wing} ${tip.y + length} L ${tip.x + wing} ${tip.y + length} Z`;
      return "";
    }

    function statePreviewText(s) {
      const firstText = normalizeComponents(s.components).find(component => component.text.trim());
      return firstText?.text || "";
    }

    function midPoint(from, to, transition = null) {
      const point = polylinePoint(edgeRoutePoints(from, to, transition), 0.5);
      return { x: point.x, y: point.y - 10 };
    }

    function attachEdgeInteractions(el, t, canRewire = false) {
      el.addEventListener("mousedown", evt => {
        if (canRewire && evt.button === 0) startEdgeRewire(evt, t);
      });
      el.addEventListener("pointerdown", evt => {
        if (!canRewire || !isTouchPointer(evt)) return;
        evt.preventDefault();
        evt.stopPropagation();
        lastTouchAt = Date.now();
        activePointerId = evt.pointerId;
        startPendingEdgeTouch(evt, t);
      });
      el.addEventListener("click", evt => {
        evt.stopPropagation();
        if (Date.now() < suppressEdgeClickUntil) return;
        const concrete = projectedTransitionSource(t);
        const edgeId = concrete?.id || t.id;
        if (evt.shiftKey) {
          toggleSelection("edge", edgeId);
          refreshInspectorForSelection();
          draw();
          return;
        }
        selectEdge(edgeId, evt.clientX, evt.clientY, { edit: el.classList.contains("edge-label") });
      });
      el.addEventListener("mouseenter", () => setEdgeHover((projectedTransitionSource(t)?.id || t.id), true));
      el.addEventListener("mouseleave", () => setEdgeHover((projectedTransitionSource(t)?.id || t.id), false));
    }

    function appendEdgeHit(hit) {
      const defs = wiresEl.querySelector("defs");
      wiresEl.insertBefore(hit, defs?.nextSibling || wiresEl.firstChild);
    }

    function parentLayerTransitions(parent, side) {
      if (!parent) return [];
      const parentLayerId = parent.parentId || null;
      return transitionsInLayer(parentLayerId)
        .filter(transition => side === "input" ? transition.to === parent.id : transition.from === parent.id)
        .sort((a, b) => {
          const aOther = byId(side === "input" ? a.from : a.to);
          const bOther = byId(side === "input" ? b.from : b.to);
          return (aOther?.y ?? 0) - (bOther?.y ?? 0) ||
            (aOther?.x ?? 0) - (bOther?.x ?? 0) ||
            String(a.label || "").localeCompare(String(b.label || "")) ||
            String(a.id || "").localeCompare(String(b.id || ""));
        });
    }

    function syncBoundaryProxies(parent, states) {
      for (const [id, state] of [..._virtualNodes]) {
        if (state.virtualProxy) _virtualNodes.delete(id);
      }
      if (!parent) return;
      ensureDefaultBoundaryTransitions(parent, states);
      if (!states.length) return;
      const boundary = normalizeBoundaryConfig(parent.rootLayer ? model.boundary : parent.boundary);
      const fallbackCenter = viewportCenterWorld();
      const padX = GRID_SIZE * 4;
      const padY = GRID_SIZE * 4;
      const minX = states.length ? Math.min(...states.map(state => state.x)) : fallbackCenter.x - GRID_SIZE * 8;
      const minY = states.length ? Math.min(...states.map(state => state.y)) : fallbackCenter.y - GRID_SIZE * 5;
      const maxX = states.length ? Math.max(...states.map(state => state.x + nodeWidth(state))) : fallbackCenter.x + GRID_SIZE * 8;
      const maxY = states.length ? Math.max(...states.map(state => state.y + nodeHeight(state))) : fallbackCenter.y + GRID_SIZE * 5;
      const frameLeft = snapToGrid(minX - padX);
      const frameRight = snapToGrid(maxX + padX);
      const frameTop = snapToGrid(minY - padY);
      const frameHeight = snapToGrid(maxY - minY + padY * 2);
      const centerY = frameTop + frameHeight / 2;
      const addProxy = (side) => {
        const proxyWidth = nodeWidth({ virtualProxy: true });
        const title = side === "input" ? "IN" : "OUT";
        const proxyHeight = nodeHeight({ virtualProxy: true });
        const x = side === "input" ? frameLeft - proxyWidth : frameRight;
        const y = snapToGrid(centerY - proxyHeight / 2);
        const id = boundaryProxyId(parent.id, side, defaultBoundaryLaneId(side));
        const layerId = parent.rootLayer ? null : parent.id;
        _virtualNodes.set(id, {
          id,
          title,
          parentId: layerId,
          x,
          y,
          components: [],
          virtualProxy: {
            layerId,
            parentId: parent.id,
            side,
            transitionId: "",
            outsideId: ""
          }
        });
      };
      if (!boundary.entryDisabled) addProxy("input");
      if (!boundary.exitDisabled) addProxy("output");
    }

    function layerFrameBox() {
      const left = Number.parseFloat(layerFrameEl.style.left);
      const top = Number.parseFloat(layerFrameEl.style.top);
      const width = Number.parseFloat(layerFrameEl.style.width);
      const height = Number.parseFloat(layerFrameEl.style.height);
      if (![left, top, width, height].every(Number.isFinite)) return null;
      return { left, top, width, height, right: left + width, bottom: top + height };
    }

    function layerFrameCommentBox(margin = 0) {
      if (!layerFrameCommentEl || layerFrameCommentEl.hidden) return null;
      const left = Number.parseFloat(layerFrameCommentEl.style.left);
      const top = Number.parseFloat(layerFrameCommentEl.style.top);
      const width = layerFrameCommentEl.offsetWidth || Number.parseFloat(layerFrameCommentEl.style.width);
      const height = layerFrameCommentEl.offsetHeight || Number.parseFloat(layerFrameCommentEl.style.height);
      if (![left, top, width, height].every(Number.isFinite)) return null;
      return {
        id: "__layer_frame_comment",
        x1: left - margin,
        y1: top - margin,
        x2: left + width + margin,
        y2: top + height + margin
      };
    }

    function layerFrameAnnotation(parent) {
      const boundary = normalizeBoundaryConfig(parent?.rootLayer ? model.boundary : parent?.boundary);
      return {
        title: boundary.title.trim(),
        note: boundary.note.trim()
      };
    }

    function updateLayerFrameComment(parent, frameLeft, frameTop, frameWidth) {
      if (!layerFrameCommentEl) return;
      const annotation = layerFrameAnnotation(parent);
      if (!annotation.title && !annotation.note) {
        layerFrameCommentEl.hidden = true;
        layerFrameCommentTitleEl.textContent = "";
        layerFrameCommentBodyEl.textContent = "";
        return;
      }
      layerFrameCommentTitleEl.hidden = !annotation.title;
      layerFrameCommentBodyEl.hidden = !annotation.note;
      layerFrameCommentTitleEl.textContent = annotation.title;
      layerFrameCommentBodyEl.textContent = annotation.note;
      layerFrameCommentEl.hidden = false;
      const maxWidth = Math.max(GRID_SIZE * 10, Math.min(GRID_SIZE * 22, frameWidth - GRID_SIZE * 2));
      const left = frameLeft + GRID_SIZE;
      layerFrameCommentEl.style.maxWidth = maxWidth + "px";
      layerFrameCommentEl.style.left = left + "px";
      layerFrameCommentEl.style.top = "0px";
      const height = layerFrameCommentEl.offsetHeight || GRID_SIZE * 2;
      const outsideTop = frameTop - height - Math.round(GRID_SIZE * 0.75);
      const top = outsideTop > WORLD_MIN_Y + GRID_SIZE ? outsideTop : frameTop + GRID_SIZE;
      layerFrameCommentEl.style.top = top + "px";
    }

    function addPortSlot(nodeEl, state, transition, side, edgeSelection) {
      const point = edgePortPoint(state, side, transition);
      const slot = document.createElement("div");
      const classes = ["port-slot", side === "out" ? "port-slot-output" : "port-slot-input"];
      if (edgeSelection.has(transition.id)) classes.push("selected");
      if (hoveredEdgeId === transition.id) classes.push("hovered");
      slot.className = classes.join(" ");
      slot.style.top = (point.y - state.y) + "px";
      slot.style.setProperty("--port-offset", "0px");
      slot.style.left = "";
      slot.style.right = "";
      slot.style.setProperty("--edge-color", edgeColor(transition));
      slot.dataset.edgeId = transition.id;
      slot.dataset.portSlot = side;
      slot.title = "drag to reroute " + (transition.label || "transition");
      slot.addEventListener("mousedown", evt => {
        if (Date.now() - lastTouchAt < 700) return;
        if (evt.button !== 0) return;
        startEdgeRewire(evt, transition);
      });
      slot.addEventListener("pointerdown", evt => {
        if (!isTouchPointer(evt)) return;
        evt.preventDefault();
        lastTouchAt = Date.now();
        if (pinchZoom) return;
        activePointerId = evt.pointerId;
        startEdgeRewire(evt, transition);
      });
      slot.addEventListener("click", evt => {
        evt.preventDefault();
        evt.stopPropagation();
        selectEdge(transition.id, evt.clientX, evt.clientY);
      });
      nodeEl.appendChild(slot);
    }

    function getPortOverlay() {
      let overlay = document.getElementById("ports");
      if (!overlay) {
        overlay = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        overlay.id = "ports";
        worldEl.appendChild(overlay);
      }
      overlay.setAttribute("viewBox", wiresEl.getAttribute("viewBox") || "");
      overlay.style.left = wiresEl.style.left;
      overlay.style.top = wiresEl.style.top;
      overlay.style.width = wiresEl.style.width;
      overlay.style.height = wiresEl.style.height;
      return overlay;
    }

    function addSvgStatePorts(state) {
      if (!state) return;
      if (state.virtualProxy) {
        const side = state.virtualProxy.side === "input" ? "out" : "in";
        addSvgStatePort(state, side);
        return;
      }
      addSvgStatePort(state, "in");
      addSvgStatePort(state, "out");
    }

    function selectVirtualProxyPortReference(state, side, evt) {
      if (state.virtualProxy?.side !== "output" || side !== "in") return false;
      const transition = visibleTransitions().find(item =>
        item.to === state.id &&
        (item.projection?.side === "output" || item.boundaryFlow?.side === "output")
      );
      if (!transition) return false;
      const concrete = projectedTransitionSource(transition);
      selectEdge(concrete?.id || transition.id, evt.clientX, evt.clientY);
      return true;
    }

    function svgStatePortPoint(state, side) {
      if (state?.virtualProxy) {
        const transition = orderedPortTransitions(state.id, side)[0];
        if (transition) return edgePortPoint(state, side, transition);
      }
      return nodeCenter(state, side);
    }

    function updateSvgStatePortPositions(state) {
      if (!state) return;
      const overlay = document.getElementById("ports");
      if (!overlay) return;
      overlay.querySelectorAll(`.svg-port[data-state-id="${CSS.escape(state.id)}"]`).forEach(port => {
        const side = port.dataset.portSide || "out";
        const point = svgStatePortPoint(state, side);
        if (port.tagName.toLowerCase() === "g") {
          port.setAttribute("transform", `translate(${point.x} ${point.y})`);
        } else {
          port.setAttribute("cx", point.x);
          port.setAttribute("cy", point.y);
        }
      });
    }

    function addSvgStatePort(state, side) {
      const point = svgStatePortPoint(state, side);
      const classes = ["svg-port", side === "out" ? "svg-port-output" : "svg-port-input"];
      const sourceSide = connecting?.fromSide || "out";
      if (connecting?.from === state.id && side === sourceSide) classes.push("connecting-source-port");
      const port = svgEl("g", {
        transform: `translate(${point.x} ${point.y})`,
        class: classes.join(" "),
        "data-state-id": state.id,
        "data-port-side": side
      });
      if (side === "out") {
        port.appendChild(svgEl("circle", {
          cx: 0,
          cy: 0,
          r: 7.5,
          class: "svg-port-moon svg-port-output-symbol"
        }));
      } else {
        port.appendChild(svgEl("circle", {
          cx: 0,
          cy: 0,
          r: 7.5,
          class: "svg-port-moon svg-port-input-symbol"
        }));
      }
      port.appendChild(svgEl("circle", {
        cx: 0,
        cy: 0,
        r: 15,
        class: "svg-port-hit"
      }));
      const canStartConnection = side === "out";
      if (canStartConnection) {
        const startSide = side === "in" ? "in" : "out";
        port.addEventListener("mousedown", evt => {
          if (Date.now() - lastTouchAt < 700) return;
          if (evt.button !== 0) return;
          evt.preventDefault();
          startConnection(evt, state, startSide);
        });
        port.addEventListener("pointerdown", evt => {
          if (!isTouchPointer(evt)) return;
          evt.preventDefault();
          lastTouchAt = Date.now();
          if (pinchZoom) return;
          activePointerId = evt.pointerId;
          startConnection(evt, state, startSide);
        });
      } else {
        port.addEventListener("mousedown", evt => {
          if (Date.now() - lastTouchAt < 700) return;
          if (evt.button !== 0) return;
          evt.preventDefault();
          evt.stopPropagation();
        });
        port.addEventListener("pointerdown", evt => {
          if (!isTouchPointer(evt)) return;
          evt.preventDefault();
          evt.stopPropagation();
          lastTouchAt = Date.now();
        });
      }
      port.addEventListener("click", evt => {
        evt.preventDefault();
        evt.stopPropagation();
        focusCanvasForSelection();
        if (selectVirtualProxyPortReference(state, side, evt)) return;
        setSingleSelection("node", state.id);
        showNodeProperties(state);
      });
      getPortOverlay().appendChild(port);
    }

    function updateLayerFrame(states) {
      const parent = currentLayerContainer();
      if (!parent) {
        layerFrameEl.style.display = "none";
        if (layerFrameCommentEl) layerFrameCommentEl.hidden = true;
        layerHudEl.hidden = true;
        layerBackEl.hidden = true;
        layerFrameLabelEl.textContent = "";
        return;
      }
      const padX = GRID_SIZE * 4;
      const padY = GRID_SIZE * 4;
      const fallbackCenter = viewportCenterWorld();
      const minX = states.length ? Math.min(...states.map(state => state.x)) : fallbackCenter.x - GRID_SIZE * 8;
      const minY = states.length ? Math.min(...states.map(state => state.y)) : fallbackCenter.y - GRID_SIZE * 5;
      const maxX = states.length ? Math.max(...states.map(state => state.x + nodeWidth(state))) : fallbackCenter.x + GRID_SIZE * 8;
      const maxY = states.length ? Math.max(...states.map(state => state.y + nodeHeight(state))) : fallbackCenter.y + GRID_SIZE * 5;
      const frameLeft = snapToGrid(minX - padX);
      const frameTop = snapToGrid(minY - padY);
      const frameWidth = snapToGrid(maxX - minX + padX * 2);
      const frameHeight = snapToGrid(maxY - minY + padY * 2);
      layerFrameEl.style.display = "block";
      layerFrameEl.style.left = frameLeft + "px";
      layerFrameEl.style.top = frameTop + "px";
      layerFrameEl.style.width = frameWidth + "px";
      layerFrameEl.style.height = frameHeight + "px";
      updateLayerFrameComment(parent, frameLeft, frameTop, frameWidth);
      layerHudEl.hidden = false;
      layerBackEl.hidden = Boolean(parent.rootLayer);
      layerFrameLabelEl.textContent = parent.rootLayer ? "Root" : `Inside ${parent.title || parent.id}`;
    }

    function draw() {
      if (drawFrame) {
        cancelAnimationFrame(drawFrame);
        drawFrame = 0;
      }
      normalizeModel(model);
      selected = normalizeSelection();
      const states = visibleStates();
      const layerStates = statesInLayer(currentLayerId);
      const transitions = visibleTransitions();
      updateLayerFrame(layerStates);
      _frameRoutes = computeFrameRoutes(dragging
        ? { metricName: "liveDragRouteBuilds", allowDenseGridSearch: false }
        : {});
      const nodeSelection = selectedNodeIds();
      const edgeSelection = selectedEdgeIds();

      const activeEl = document.activeElement;
      let focusedNodeId = null;
      if (activeEl && nodesEl.contains(activeEl)) {
        const nodeEl = activeEl.closest(".node");
        if (nodeEl) {
          focusedNodeId = nodeEl.dataset.id;
        }
      }

      nodesEl.__recycledNodes = nodesEl.__recycledNodes || new Map();
      const oldNodes = nodesEl.__recycledNodes;
      const nextNodes = new Map();

      wiresEl.querySelectorAll(".edge,.edge-arrow,.hit,.edge-label,.edge-tip-hit,.edge-pin,.temp-edge").forEach(el => el.remove());
      getPortOverlay().querySelectorAll(".svg-port,.edge-pin,.edge-tip-hit").forEach(el => el.remove());
      const edgeTipHits = [];
      runtimeStateEl.textContent = "app: " + (currentAppState || "—");

      for (const t of transitions) {
        if (connecting?.edgeId === t.id) continue;
        const from = byId(t.from);
        const to = byId(t.to);
        if (!from || !to) continue;
        const routePoints = edgeRoutePoints(from, to, t);
        const pathD = pathFromPoints(routePoints);
        const edgeStyle = `--edge-color: ${edgeColor(t)}`;

        const hit = svgEl("path", { d: pathD, class: "hit", style: edgeStyle, "data-edge-id": t.id });
        attachEdgeInteractions(hit, t, Boolean(t.projection));
        appendEdgeHit(hit);

        const classes = ["edge"];
        if (edgeSelection.has(t.id)) classes.push("selected");
        if (hoveredEdgeId === t.id) classes.push("hovered");
        if (lastAppTransitionId === t.id) classes.push("runtime");
        const path = svgEl("path", { d: pathD, class: classes.join(" "), style: edgeStyle, "data-edge-id": t.id });
        attachEdgeInteractions(path, t);
        wiresEl.appendChild(path);

        const arrowClasses = ["edge-arrow"];
        if (edgeSelection.has(t.id)) arrowClasses.push("selected");
        if (hoveredEdgeId === t.id) arrowClasses.push("hovered");
        if (lastAppTransitionId === t.id) arrowClasses.push("runtime");
        const arrowD = arrowPathForPoints(routePoints);
        if (arrowD) wiresEl.appendChild(svgEl("path", {
          d: arrowD,
          class: arrowClasses.join(" "),
          style: edgeStyle,
          "data-edge-id": t.id,
          "data-edge-arrow": "in"
        }));

        if (!t.projection) {
          const m = midPoint(from, to, t);
          const labelClasses = ["edge-label"];
          if (edgeSelection.has(t.id)) labelClasses.push("selected");
          if (hoveredEdgeId === t.id) labelClasses.push("hovered");
          const label = svgEl("text", { x: m.x, y: m.y, class: labelClasses.join(" "), style: edgeStyle, "text-anchor": "middle", "data-edge-id": t.id });
          label.textContent = transitionDisplayLabel(t) + (t.condition ? `  [${t.condition}]` : "");
          attachEdgeInteractions(label, t);
          wiresEl.appendChild(label);
        }

        const pinClasses = ["edge-pin"];
        if (edgeSelection.has(t.id)) pinClasses.push("selected");
        if (hoveredEdgeId === t.id) pinClasses.push("hovered");
        const startPin = routePoints[0];
        const endPin = routePoints[routePoints.length - 1];
        const startPinEl = svgEl("circle", {
          cx: startPin.x,
          cy: startPin.y,
          r: 5,
          class: pinClasses.join(" "),
          style: edgeStyle,
          "data-edge-id": t.id,
          "data-edge-pin": "out"
        });
        attachEdgeInteractions(startPinEl, t, true);
        getPortOverlay().appendChild(startPinEl);
        const endPinEl = svgEl("circle", {
          cx: endPin.x,
          cy: endPin.y,
          r: 5,
          class: pinClasses.join(" "),
          style: edgeStyle,
          "data-edge-id": t.id,
          "data-edge-pin": "in"
        });
        attachEdgeInteractions(endPinEl, t, true);
        getPortOverlay().appendChild(endPinEl);

        const tip = edgeTipHandlePoint(from, to, t);
        const tipClasses = ["edge-tip-hit"];
        if (edgeSelection.has(t.id)) tipClasses.push("hovered");
        if (hoveredEdgeId === t.id) tipClasses.push("hovered");
        const tipHit = svgEl("circle", {
          cx: tip.x,
          cy: tip.y,
          r: 13,
          class: tipClasses.join(" "),
          style: edgeStyle,
          "data-edge-id": t.id,
          "data-edge-tip": "to"
        });
        attachEdgeInteractions(tipHit, t, true);
        edgeTipHits.push(tipHit);
      }

      for (const tipHit of edgeTipHits) getPortOverlay().appendChild(tipHit);

      if (connecting) {
        const from = byId(connecting.from);
        const sourceSide = connecting?.fromSide || (from?.virtualProxy ? connectionStartSide(from) : "out");
        const target = connectingTargetId ? byId(connectingTargetId) : null;
        if (target) {
          const points = sourceSide === "out" ? edgeRoutePoints(from, target) : draftConnectionRoute(from, target, sourceSide);
          wiresEl.appendChild(svgEl("path", { d: pathFromPoints(points), class: "temp-edge" }));
        } else {
          const a = nodeCenter(from, sourceSide);
          const b = snapPointToGrid(connecting.to);
          const stepX = sourceSide === "in" ? -GRID_SIZE * 2 : GRID_SIZE * 2;
          wiresEl.appendChild(svgEl("path", {
            d: pathFromPoints([
              a,
              { x: a.x + stepX, y: a.y },
              { x: a.x + stepX, y: b.y },
              b
            ]),
            class: "temp-edge"
          }));
        }
      }

      for (const _s of states) {
        let el = oldNodes.get(_s.id);
        const isNewNode = !el;
        if (isNewNode) {
          el = document.createElement("div");
        } else {
          oldNodes.delete(_s.id);
        }
        el.__state = _s;
        nextNodes.set(_s.id, el);
        const s = _s;

        const classes = ["node"];
        if (s.virtualProxy) classes.push("boundary-proxy");
        if (s.virtualProxy?.side) classes.push(`boundary-${s.virtualProxy.side}`);
        if (s.id === model.initial) classes.push("initial");
        if (connecting?.from === s.id) classes.push("connect-source");
        if (!s.virtualProxy && nodeSelection.has(s.id)) classes.push("selected");
        if (currentAppState === s.id) classes.push("active");
        if (connectingTargetId === s.id) classes.push("drop-target");
        const inputTransitions = orderedPortTransitions(s.id, "in");
        const outputTransitions = orderedPortTransitions(s.id, "out");
        const renderInputSlots = inputTransitions.length > 0;
        const renderOutputSlots = outputTransitions.length > 0;
        const outputAddOffset = outputTransitions.length ? -GRID_SIZE : 0;
        if (renderInputSlots) classes.push("has-input-slots");
        if (renderOutputSlots) classes.push("has-output-slots");
        const innerCount = s.virtualProxy ? 0 : childStateCount(s.id);
        if (innerCount) classes.push("has-children");
        if (!s.virtualProxy && draggingTemplateId && templateById(draggingTemplateId) && templateDragOverStateId === s.id) {
