      try {
        localStorage.setItem(EDITOR_STORAGE_KEY, editorStorageSnapshot());
        localStorage.removeItem(STORAGE_KEY);
      } catch (_) {}
      if (sync) scheduleSync(false);
    }

    function updateHistoryButtons() {
      const undo = document.getElementById("btnUndo");
      const redo = document.getElementById("btnRedo");
      if (undo) undo.disabled = !undoStack.length;
      if (redo) redo.disabled = !redoStack.length;
    }

    function initHistory() {
      historyCurrent = editorSnapshot();
      undoStack = [];
      redoStack = [];
      lastHistoryKey = null;
      updateHistoryButtons();
    }

    function saveEditorState(historyKey = null, sync = true) {
      selected = normalizeSelection();
      const next = editorSnapshot();
      if (next === historyCurrent) {
        persistModel(sync);
        persistStateTemplates();
        return;
      }
      if (!historyCurrent) {
        historyCurrent = next;
      } else if (historyKey && historyKey === lastHistoryKey && undoStack.length) {
        // Continuous edits such as typing or dragging remain one deterministic undo step.
      } else {
        undoStack.push(historyCurrent);
        if (undoStack.length > 100) undoStack.shift();
      }
      redoStack = [];
      historyCurrent = next;
      lastHistoryKey = historyKey;
      persistModel(sync);
      persistStateTemplates();
      updateHistoryButtons();
    }

    function saveModel(historyKey = null) {
      saveEditorState(historyKey, true);
    }

    function saveSelection(historyKey = null) {
      saveEditorState(historyKey, false);
    }

    function restoreHistorySnapshot(snapshot) {
      const restored = parseEditorSnapshot(snapshot);
      model = normalizeModel(restored.model);
      currentLayerId = byId(restored.currentLayerId) ? restored.currentLayerId : null;
      selected = normalizeSelection(restored.selected);
      stateTemplates = snapshotStateTemplates(restored.stateTemplates);
      editingTemplateId = restored.editingTemplateId;
      historyCurrent = editorSnapshot();
      connecting = null;
      connectingTargetId = null;
      dragging = null;
      boxSelecting = null;
      updateSelectRect();
      persistModel();
      persistStateTemplates();
      draw();
      renderStateExplorer();
      const template = editingTemplateId ? stateTemplates.find(item => item.id === editingTemplateId) : null;
      if (template) showTemplateInspector(template, { focus: false });
      else refreshInspectorForSelection();
      updateHistoryButtons();
    }

    function undoModel() {
      if (!undoStack.length) return;
      const current = editorSnapshot();
      const previous = undoStack.pop();
      redoStack.push(current);
      lastHistoryKey = null;
      restoreHistorySnapshot(previous);
    }

    function redoModel() {
      if (!redoStack.length) return;
      const current = editorSnapshot();
      const next = redoStack.pop();
      undoStack.push(current);
      lastHistoryKey = null;
      restoreHistorySnapshot(next);
    }

    function definitionPayload() {
      const definition = {
        kind: DEFINITION_KIND,
        schemaVersion: DEFINITION_SCHEMA_VERSION,
        app: "State Blueprint",
        savedAt: new Date().toISOString(),
        model: modelDefinitionSnapshot(),
        stateTemplates: snapshotStateTemplates(),
        camera: {
          x: Number(camera.x),
          y: Number(camera.y),
          scale: Number(camera.scale)
        },
        previewCollapsed: Boolean(previewCollapsed)
      };
      return validateBlueprintDefinition(definition);
    }

    function isPlainObject(value) {
      return Boolean(value) && typeof value === "object" && !Array.isArray(value);
    }

    function assertPlainObject(value, path) {
      if (!isPlainObject(value)) throw new Error(`${path} must be an object.`);
    }

    function assertString(value, path, { allowEmpty = false } = {}) {
      if (typeof value !== "string") throw new Error(`${path} must be a string.`);
      if (!allowEmpty && !value.trim()) throw new Error(`${path} must not be empty.`);
      return value;
    }

    function assertFiniteNumber(value, path) {
      if (typeof value !== "number" || !Number.isFinite(value)) throw new Error(`${path} must be a finite number.`);
      return value;
    }

    function assertNoNullish(value, path = "definition") {
      if (value === null || value === undefined) throw new Error(`${path} must not be null or undefined.`);
      if (Array.isArray(value)) {
        value.forEach((item, index) => assertNoNullish(item, `${path}[${index}]`));
        return;
      }
      if (!isPlainObject(value)) return;
      for (const [key, item] of Object.entries(value)) {
        assertNoNullish(item, `${path}.${key}`);
      }
    }

    function validateComponents(value, path) {
      if (value === undefined) return [];
      if (!Array.isArray(value)) throw new Error(`${path} must be an array.`);
      return value.map((component, index) => {
        const itemPath = `${path}[${index}]`;
        assertPlainObject(component, itemPath);
        const type = assertString(component.type, `${itemPath}.type`);
        if (!["heading", "text", "image", "list", "link", "note", "divider", "daisy", "transitionButton", "dataWire"].includes(type)) throw new Error(`${itemPath}.type is not supported.`);
        const normalized = {
          id: assertString(component.id, `${itemPath}.id`),
          type,
          text: assertString(component.text, `${itemPath}.text`, { allowEmpty: true }),
          url: "url" in component ? assertString(component.url, `${itemPath}.url`, { allowEmpty: true }) : "",
          variant: "variant" in component ? assertString(component.variant, `${itemPath}.variant`, { allowEmpty: true }) : ""
        };
        if ("dataPath" in component) normalized.dataPath = validateComponentDataPath(component.dataPath, `${itemPath}.dataPath`, { allowEmpty: true });
        if ("dataRole" in component) normalized.dataRole = assertString(component.dataRole, `${itemPath}.dataRole`, { allowEmpty: true }).slice(0, 40);
        if ("dataLabel" in component) normalized.dataLabel = assertString(component.dataLabel, `${itemPath}.dataLabel`, { allowEmpty: true }).slice(0, 80);
        if (type === "transitionButton") normalized.transitionId = assertString(component.transitionId || "", `${itemPath}.transitionId`, { allowEmpty: true });
        if (type === "dataWire") normalized.wireId = assertString(component.wireId || "", `${itemPath}.wireId`, { allowEmpty: true });
        if (type === "list") normalized.items = normalizeListItems(component.items, normalized.text);
        return normalized;
      });
    }

    function validateDataObject(value, path) {
      if (value === undefined) return {};
      assertPlainObject(value, path);
      assertNoNullish(value, path);
      return JSON.parse(JSON.stringify(value));
    }

    function validateContextPath(value, path, { allowEmpty = false, fallback = "fetch" } = {}) {
      if (value === undefined) return allowEmpty ? "" : fallback;
      const text = assertString(value, path, { allowEmpty }).trim();
      if (!text) return allowEmpty ? "" : fallback;
      if (!/^[a-zA-Z_][a-zA-Z0-9_]*(\.[a-zA-Z_][a-zA-Z0-9_]*)*$/.test(text)) {
        throw new Error(`${path} must be a dotted context path like fetch.data.`);
      }
      return text;
    }

    function validateBindingPath(value, path, { allowEmpty = false } = {}) {
      if (value === undefined) return allowEmpty ? "" : "";
      const text = assertString(value, path, { allowEmpty }).trim();
      if (!text) return allowEmpty ? "" : "";
      if (!/^[a-zA-Z_][a-zA-Z0-9_]*(\.(?:[a-zA-Z_][a-zA-Z0-9_]*|\d+))*$/.test(text)) {
        throw new Error(`${path} must be a dotted data path like fetch.data.0.title.`);
      }
      return text;
    }

    function validateComponentDataPath(value, path, { allowEmpty = false } = {}) {
      if (value === undefined) return allowEmpty ? "" : "";
      const text = assertString(value, path, { allowEmpty }).trim();
      if (!text) return allowEmpty ? "" : "";
      if (isStateScopedPathToken(text)) return text;
      return validateBindingPath(text, path, { allowEmpty });
    }

    function validateDataWires(value, path) {
      if (value === undefined) return [];
      if (!Array.isArray(value)) throw new Error(`${path} must be an array.`);
      return value.slice(0, 80).map((wire, index) => {
        const itemPath = `${path}[${index}]`;
        assertPlainObject(wire, itemPath);
        const sourcePath = validateBindingPath(wire.sourcePath || wire.path, `${itemPath}.sourcePath`);
        const role = normalizeDataWireRole(wire.role, "field");
        return {
          id: assertString(wire.id, `${itemPath}.id`),
          sourcePath,
          scopePath: "scopePath" in wire ? validateBindingPath(wire.scopePath, `${itemPath}.scopePath`, { allowEmpty: true }) : "",
          itemPath: "itemPath" in wire ? validateBindingPath(wire.itemPath, `${itemPath}.itemPath`, { allowEmpty: true }) : "",
          role,
          componentType: normalizeDataWireComponentType(wire.componentType || wire.type, role),
          label: "label" in wire ? assertString(wire.label, `${itemPath}.label`, { allowEmpty: true }) : dataPathLabel(sourcePath)
        };
      });
    }

    function validateContextIdentifier(value, path, { fallback = "item" } = {}) {
      if (value === undefined) return fallback;
      const text = assertString(value, path, { allowEmpty: true }).trim();
      if (!text) return fallback;
      if (!/^[a-zA-Z_][a-zA-Z0-9_]*$/.test(text)) throw new Error(`${path} must be a context name like item.`);
      return text;
    }

    function validateDataSource(value, path) {
      if (value === undefined) return normalizeDataSource(null);
      assertPlainObject(value, path);
      return {
        url: assertString(value.url, `${path}.url`, { allowEmpty: true }),
        target: validateContextPath(value.target, `${path}.target`, { fallback: "fetch" }),
        select: validateContextPath(value.select, `${path}.select`, { allowEmpty: true }),
        timeoutMs: "timeoutMs" in value ? clamp(assertFiniteNumber(value.timeoutMs, `${path}.timeoutMs`), 1000, 30000) : 8000,
        retries: "retries" in value ? clamp(Math.round(assertFiniteNumber(value.retries, `${path}.retries`)), 0, 5) : 2
      };
    }

    function validateRepeatConfig(value, path) {
      if (value === undefined) return normalizeRepeatConfig(null);
      assertPlainObject(value, path);
      return {
        path: validateContextPath(value.path, `${path}.path`, { allowEmpty: true }),
        as: validateContextIdentifier(value.as, `${path}.as`, { fallback: "item" }),
        index: validateContextIdentifier(value.index, `${path}.index`, { fallback: "i" })
      };
    }

    function validateModelDefinition(source) {
      assertPlainObject(source, "definition.model");
      if (source.version !== DEFINITION_SCHEMA_VERSION) throw new Error("definition.model.version must be 2.");
      assertString(source.name, "definition.model.name");
      const initial = assertString(source.initial, "definition.model.initial", { allowEmpty: true });
      if (!Array.isArray(source.states)) throw new Error("definition.model.states must be an array.");
      if (!Array.isArray(source.transitions)) throw new Error("definition.model.transitions must be an array.");

      const ids = new Set();
      const states = source.states.map((state, index) => {
        const path = `definition.model.states[${index}]`;
        assertPlainObject(state, path);
        const id = assertString(state.id, `${path}.id`);
        if (ids.has(id)) throw new Error(`${path}.id must be unique.`);
        ids.add(id);
        const parentId = "parentId" in state ? assertString(state.parentId, `${path}.parentId`, { allowEmpty: true }) : "";
        return {
          id,
          title: assertString(state.title, `${path}.title`),
          renderMode: normalizeStateRenderMode(state.renderMode),
          components: validateComponents(state.components, `${path}.components`),
          data: validateDataObject(state.data, `${path}.data`),
          dataSource: validateDataSource(state.dataSource, `${path}.dataSource`),
          repeat: validateRepeatConfig(state.repeat, `${path}.repeat`),
          dataWires: validateDataWires(state.dataWires, `${path}.dataWires`),
          boundary: normalizeBoundaryConfig(state.boundary),
          parentId: parentId || null,
          x: assertFiniteNumber(state.x, `${path}.x`),
          y: assertFiniteNumber(state.y, `${path}.y`)
        };
      });

      if (states.length && !initial) throw new Error("definition.model.initial must reference an existing state.");
      if (initial && !ids.has(initial)) throw new Error("definition.model.initial must reference an existing state.");
      const rootBoundary = normalizeBoundaryConfig(source.boundary);
      if (rootBoundary.entryId) {
        const entry = states.find(item => item.id === rootBoundary.entryId);
        if (!entry || entry.parentId) throw new Error("definition.model.boundary.entryId must reference a root state.");
      }
      if (rootBoundary.exitId) {
        const exit = states.find(item => item.id === rootBoundary.exitId);
        if (!exit || exit.parentId) throw new Error("definition.model.boundary.exitId must reference a root state.");
      }
      for (const state of states) {
        if (state.parentId && (!ids.has(state.parentId) || state.parentId === state.id)) {
          throw new Error(`definition.model.states.${state.id}.parentId must reference another state.`);
        }
        if (state.boundary.entryId) {
          const entry = states.find(item => item.id === state.boundary.entryId);
          if (!entry || entry.parentId !== state.id) throw new Error(`definition.model.states.${state.id}.boundary.entryId must reference a child state.`);
        }
        if (state.boundary.exitId) {
          const exit = states.find(item => item.id === state.boundary.exitId);
          if (!exit || exit.parentId !== state.id) throw new Error(`definition.model.states.${state.id}.boundary.exitId must reference a child state.`);
        }
      }

      const transitionIds = new Set();
      const transitions = source.transitions.map((transition, index) => {
        const path = `definition.model.transitions[${index}]`;
        assertPlainObject(transition, path);
        const id = assertString(transition.id, `${path}.id`);
        if (transitionIds.has(id)) throw new Error(`${path}.id must be unique.`);
        transitionIds.add(id);
        const from = assertString(transition.from, `${path}.from`);
        const to = assertString(transition.to, `${path}.to`);
        if (!ids.has(from)) throw new Error(`${path}.from must reference an existing state.`);
        if (!ids.has(to)) throw new Error(`${path}.to must reference an existing state.`);
        const fromState = states.find(state => state.id === from);
        const toState = states.find(state => state.id === to);
        if ((fromState?.parentId || null) !== (toState?.parentId || null)) throw new Error(`${path} must stay inside one canvas.`);
        const groupEntryId = "groupEntryId" in transition ? assertString(transition.groupEntryId, `${path}.groupEntryId`, { allowEmpty: true }) : "";
        const groupExitId = "groupExitId" in transition ? assertString(transition.groupExitId, `${path}.groupExitId`, { allowEmpty: true }) : "";
        if (groupEntryId) {
          const entryState = states.find(state => state.id === groupEntryId);
          if (!entryState || entryState.parentId !== to) throw new Error(`${path}.groupEntryId must reference a child of ${to}.`);
        }
        if (groupExitId) {
          const exitState = states.find(state => state.id === groupExitId);
          if (!exitState || exitState.parentId !== from) throw new Error(`${path}.groupExitId must reference a child of ${from}.`);
        }
        return {
          id,
          from,
          to,
          label: assertString(transition.label, `${path}.label`),
          condition: assertString(transition.condition, `${path}.condition`, { allowEmpty: true }),
          triggerType: normalizeTransitionTriggerType(transition),
          triggerEvent: normalizeTransitionEvent(transition.triggerEvent || ""),
          timerMs: normalizeTransitionTimerMs(transition.timerMs),
          set: validateDataObject(transition.set, `${path}.set`),
          groupEntryId,
          groupExitId
        };
      });

      return {
        version: DEFINITION_SCHEMA_VERSION,
        name: source.name,
        initial,
        boundary: rootBoundary,
        states,
        transitions
      };
    }

    function validateStateTemplatesDefinition(value, path = "definition.stateTemplates") {
      if (value === undefined) return [];
      if (!Array.isArray(value)) throw new Error(`${path} must be an array.`);
      return value.slice(0, 40).map((template, index) => {
        const itemPath = `${path}[${index}]`;
        assertPlainObject(template, itemPath);
        const id = assertString(template.id, `${itemPath}.id`);
        const rootStateId = "rootStateId" in template ? assertString(template.rootStateId, `${itemPath}.rootStateId`, { allowEmpty: true }) : id;
        const stateIds = new Set([rootStateId || id]);
        const states = (Array.isArray(template.states) ? template.states : []).slice(0, 120).map((state, stateIndex) => {
          const statePath = `${itemPath}.states[${stateIndex}]`;
          assertPlainObject(state, statePath);
          const stateId = assertString(state.id, `${statePath}.id`);
          if (stateIds.has(stateId)) throw new Error(`${statePath}.id must be unique inside the preset.`);
          stateIds.add(stateId);
          const parentId = "parentId" in state ? assertString(state.parentId, `${statePath}.parentId`, { allowEmpty: true }) : "";
          return {
            id: stateId,
            title: assertString(state.title, `${statePath}.title`),
            renderMode: normalizeStateRenderMode(state.renderMode),
            components: validateComponents(state.components, `${statePath}.components`),
            data: validateDataObject(state.data, `${statePath}.data`),
            dataSource: validateDataSource(state.dataSource, `${statePath}.dataSource`),
            repeat: validateRepeatConfig(state.repeat, `${statePath}.repeat`),
            dataWires: validateDataWires(state.dataWires, `${statePath}.dataWires`),
            subscriptions: normalizeSubscriptions(state.subscriptions),
            boundary: normalizeBoundaryConfig(state.boundary),
            parentId: parentId || rootStateId || id,
            x: assertFiniteNumber(state.x, `${statePath}.x`),
            y: assertFiniteNumber(state.y, `${statePath}.y`)
          };
        });
        for (const state of states) {
          if (!stateIds.has(state.parentId)) throw new Error(`${itemPath}.states.${state.id}.parentId must reference another preset state.`);
        }
        const transitions = (Array.isArray(template.transitions) ? template.transitions : []).slice(0, 160).map((transition, transitionIndex) => {
          const transitionPath = `${itemPath}.transitions[${transitionIndex}]`;
          assertPlainObject(transition, transitionPath);
          const from = assertString(transition.from, `${transitionPath}.from`);
          const to = assertString(transition.to, `${transitionPath}.to`);
          if (!stateIds.has(from)) throw new Error(`${transitionPath}.from must reference a preset state.`);
          if (!stateIds.has(to)) throw new Error(`${transitionPath}.to must reference a preset state.`);
          const groupEntryId = "groupEntryId" in transition ? assertString(transition.groupEntryId, `${transitionPath}.groupEntryId`, { allowEmpty: true }) : "";
          const groupExitId = "groupExitId" in transition ? assertString(transition.groupExitId, `${transitionPath}.groupExitId`, { allowEmpty: true }) : "";
          if (groupEntryId && !stateIds.has(groupEntryId)) throw new Error(`${transitionPath}.groupEntryId must reference a preset state.`);
          if (groupExitId && !stateIds.has(groupExitId)) throw new Error(`${transitionPath}.groupExitId must reference a preset state.`);
          return {
            id: assertString(transition.id, `${transitionPath}.id`),
            from,
            to,
            label: assertString(transition.label, `${transitionPath}.label`),
            condition: assertString(transition.condition, `${transitionPath}.condition`, { allowEmpty: true }),
            triggerType: normalizeTransitionTriggerType(transition),
            triggerEvent: normalizeTransitionEvent(transition.triggerEvent || ""),
            timerMs: normalizeTransitionTimerMs(transition.timerMs),
            set: validateDataObject(transition.set, `${transitionPath}.set`),
            groupEntryId,
            groupExitId
          };
        });
        return {
          id,
          title: assertString(template.title, `${itemPath}.title`),
          renderMode: normalizeStateRenderMode(template.renderMode),
          components: validateComponents(template.components, `${itemPath}.components`),
          data: validateDataObject(template.data, `${itemPath}.data`),
          dataSource: validateDataSource(template.dataSource, `${itemPath}.dataSource`),
          repeat: validateRepeatConfig(template.repeat, `${itemPath}.repeat`),
          dataWires: validateDataWires(template.dataWires, `${itemPath}.dataWires`),
          subscriptions: normalizeSubscriptions(template.subscriptions),
          boundary: normalizeBoundaryConfig(template.boundary),
          rootStateId: rootStateId || id,
          states,
          transitions
        };
      });
    }

    function validateBlueprintDefinition(data) {
      assertNoNullish(data);
      assertPlainObject(data, "definition");
      if (data.kind !== DEFINITION_KIND) throw new Error(`definition.kind must be "${DEFINITION_KIND}".`);
      if (data.schemaVersion !== DEFINITION_SCHEMA_VERSION) throw new Error("definition.schemaVersion must be 2.");
      assertString(data.app, "definition.app");
      assertString(data.savedAt, "definition.savedAt");

      const validated = {
        kind: DEFINITION_KIND,
        schemaVersion: DEFINITION_SCHEMA_VERSION,
        app: data.app,
        savedAt: data.savedAt,
        model: validateModelDefinition(data.model),
        stateTemplates: validateStateTemplatesDefinition(data.stateTemplates),
        camera: { x: 32, y: 32, scale: 1 },
        previewCollapsed: false
      };

      if ("camera" in data) {
        assertPlainObject(data.camera, "definition.camera");
        validated.camera = {
          x: assertFiniteNumber(data.camera.x, "definition.camera.x"),
          y: assertFiniteNumber(data.camera.y, "definition.camera.y"),
          scale: clamp(assertFiniteNumber(data.camera.scale, "definition.camera.scale"), 0.25, 2.4)
        };
      }
      if ("previewCollapsed" in data) {
        if (typeof data.previewCollapsed !== "boolean") throw new Error("definition.previewCollapsed must be a boolean.");
        validated.previewCollapsed = data.previewCollapsed;
      }
      return validated;
    }

    function jsLiteral(value) {
      return JSON.stringify(value)
        .replace(/</g, "\\u003c")
        .replace(/>/g, "\\u003e")
        .replace(/&/g, "\\u0026")
        .replace(/\u2028/g, "\\u2028")
        .replace(/\u2029/g, "\\u2029");
    }

    function buildStandaloneAppHtml(appHtml, payload) {
      const modelLiteral = jsLiteral(payload.model);
      const exportedAtLiteral = jsLiteral(payload.savedAt);
      const bootstrap = [
        "    const IS_STANDALONE_EXPORT = true;",
        "    const EXPORTED_STATE_BLUEPRINT = " + modelLiteral + ";",
        "    const EXPORTED_STATE_BLUEPRINT_SAVED_AT = " + exportedAtLiteral + ";",
        "",
        "    let model = normalizeModel(JSON.parse(JSON.stringify(EXPORTED_STATE_BLUEPRINT)));"
      ].join("\n");
      let html = appHtml
        .replace(/<title>[\s\S]*?<\/title>/, `<title>${escapeHtml(payload.model.name || "Generated State App")}</title>`)
        .replace(/    let model = loadModel\\(\\) \\|\\| blankModel\\(\\);/, bootstrap)
        .replace(/    function saveModel\(\) \{\n      try \{ localStorage\.setItem\(STORAGE_KEY, JSON\.stringify\(model\)\); \} catch \(_\) \{\}\n    \}/,
          "    function saveModel() {}")
        .replace(/      saveModel\(\);\n      const oldContext = context;/,
          "      const oldContext = context;")
        .replace(/    window\.addEventListener\("message", evt => \{/, "    if (!IS_STANDALONE_EXPORT) window.addEventListener(\"message\", evt => {")
        .replace(/    window\.addEventListener\("storage", evt => \{/, "    if (!IS_STANDALONE_EXPORT) window.addEventListener(\"storage\", evt => {");
      if (!html.includes("EXPORTED_STATE_BLUEPRINT")) {
        throw new Error("Could not prepare standalone app export.");
      }
      return html;
    }

    function downloadTextFile(text, filename, type) {
      const blob = new Blob([text], { type });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(a.href), 1000);
    }

    function stateExportSnapshot(s) {
      const snapshot = {
        id: String(s.id),
        title: String(s.title || s.id),
        renderMode: normalizeStateRenderMode(s.renderMode),
        components: normalizeComponents(s.components || []),
        data: normalizeDataObject(s.data),
        dataSource: normalizeDataSource(s.dataSource),
        repeat: normalizeRepeatConfig(s.repeat),
        dataWires: normalizeDataWires(s.dataWires),
        subscriptions: normalizeSubscriptions(s.subscriptions),
        boundary: normalizeBoundaryConfig(s.boundary),
        x: Number(s.x || 0),
        y: Number(s.y || 0)
      };
      if (s.parentId) snapshot.parentId = String(s.parentId);
      return snapshot;
    }

    function transitionExportSnapshot(t) {
      const snapshot = {
        id: String(t.id || uid("t")),
        from: String(t.from || ""),
        to: String(t.to || ""),
        label: String(transitionDisplayLabel(t)),
        condition: String(t.condition || ""),
        set: normalizeDataObject(t.set)
      };
      if (t.groupEntryId) snapshot.groupEntryId = String(t.groupEntryId);
      if (t.groupExitId) snapshot.groupExitId = String(t.groupExitId);
      return snapshot;
    }

    function isBoundaryFlowTransition(t) {
      return Boolean(t?.boundaryFlow) || isBoundaryProxyId(t?.from) || isBoundaryProxyId(t?.to);
    }

    function componentExportPayload(type, payload) {
      return {
        kind: COMPONENT_EXPORT_KIND,
        schemaVersion: COMPONENT_EXPORT_SCHEMA_VERSION,
        app: "State Blueprint",
        exportedAt: new Date().toISOString(),
        component: {
          type,
          ...payload
        }
      };
    }

    function exportStateComponentFile(s) {
      const snapshot = stateExportSnapshot(s);
      const payload = componentExportPayload("state", { state: snapshot });
      const stamp = new Date().toISOString().replace(/[:.]/g, "-");
      downloadTextFile(
        JSON.stringify(payload, null, 2) + "\n",
        `${normalizeId(snapshot.title || snapshot.id)}-${stamp}.state-component.json`,
        "application/json"
      );
    }

    function exportTemplateComponentFile(template) {
      const snapshot = snapshotStateTemplates([template])[0];
      const payload = componentExportPayload("preset", { template: snapshot });
      const stamp = new Date().toISOString().replace(/[:.]/g, "-");
      downloadTextFile(
        JSON.stringify(payload, null, 2) + "\n",
        `${normalizeId(snapshot.title || snapshot.id)}-${stamp}.state-component.json`,
        "application/json"
      );
    }

    function saveDefinitionFile() {
      persistModel(false);
      persistStateTemplates();
      saveCamera();
      saveUiState();
      const definition = definitionPayload();
      const stamp = new Date().toISOString().replace(/[:.]/g, "-");
      const text = JSON.stringify(definition, null, 2) + "\n";
      downloadTextFile(text, `${normalizeId(model.name || "state-app")}-${stamp}.state.json`, "application/json");
    }

    async function exportHtmlFile() {
      persistModel(false);
      persistStateTemplates();
      saveCamera();
      saveUiState();
      const payload = definitionPayload();
      let text;
      try {
        const appHtml = typeof APP_HTML === "string" ? APP_HTML : await (await fetch(APP_URL, { cache: "no-store" })).text();
        text = buildStandaloneAppHtml(appHtml, payload);
      } catch (err) {
        await modalAlert(err?.message || "Could not export standalone app.", "Export failed");
        return;
      }
      const stamp = new Date().toISOString().replace(/[:.]/g, "-");
      downloadTextFile(text, `${normalizeId(model.name || "state-app")}-${stamp}.html`, "text/html");
    }

    function requestLoadBlueprintFile() {
      pendingLoadIntent = "definition";
      fileLoadEl.value = "";
      fileLoadEl.click();
    }

    function requestImportComponentFile() {
      pendingLoadIntent = "component";
      fileLoadEl.value = "";
      fileLoadEl.click();
    }

    function importBlueprintDefinition(definition) {
      const data = validateBlueprintDefinition(definition);
      model = normalizeModel(JSON.parse(JSON.stringify(data.model)));
      stateTemplates = snapshotStateTemplates(data.stateTemplates);
      camera = { ...data.camera };
      previewCollapsed = data.previewCollapsed;
      selected = null;
      editingTemplateId = null;
      dragging = null;
      connecting = null;
      connectingTargetId = null;
      boxSelecting = null;
      currentLayerId = null;
      currentAppState = null;
      pendingAppStartStateId = null;
      pendingAppStartSuppressLayerFollow = false;
      latestRuntimeContext = {};
      lastAppTransitionId = null;
      hoveredEdgeId = null;
      showEmptyInspector();
      updateSelectRect();
      applyPreviewCollapsed();
      applyCamera();
      renderStateExplorer();
      draw();
      initHistory();
      persistModel();
      persistStateTemplates();
      syncToApp(true);
    }

    function parseBlueprintDefinitionText(text) {
      let data;
      try {
        data = JSON.parse(text);
      } catch (_) {
        throw new Error("Load expects a formal .state.json definition. Use Export HTML only for the runnable app.");
      }
      return validateBlueprintDefinition(data);
    }

    function parseJsonImportText(text) {
      try {
        return JSON.parse(text);
      } catch (_) {
        throw new Error("Import expects a formal .state.json or .state-component.json file.");
      }
    }

    function uniqueStateTemplateId(base = "tpl") {
      const normalized = normalizeId(base || "tpl");
      const ids = new Set(stateTemplates.map(template => template.id));
      let id = normalized;
      let index = 2;
      while (ids.has(id)) id = `${normalized}_${index++}`;
      return id;
    }

    function validateComponentExportDefinition(data) {
      assertPlainObject(data, "component import");
      if (data.kind !== COMPONENT_EXPORT_KIND) throw new Error(`component import kind must be "${COMPONENT_EXPORT_KIND}".`);
      if (data.schemaVersion !== COMPONENT_EXPORT_SCHEMA_VERSION) throw new Error("component import schemaVersion must be 1.");
      assertPlainObject(data.component, "component import.component");
      const type = assertString(data.component.type, "component import.component.type");
      if (type === "state") {
        assertPlainObject(data.component.state, "component import.component.state");
        assertString(data.component.state.id, "component import.component.state.id");
        assertString(data.component.state.title, "component import.component.state.title");
        return {
          type,
          state: stateExportSnapshot({
            ...data.component.state,
            parentId: null
          })
        };
      }
      if (type === "preset") {
        assertPlainObject(data.component.template, "component import.component.template");
        return {
          type,
          template: validateStateTemplatesDefinition([data.component.template], "component import.component.template")[0]
        };
      }
      throw new Error("component import.component.type must be state or preset.");
    }

    function templateFromStateComponentSnapshot(state) {
      const snapshot = stateExportSnapshot({ ...state, parentId: null });
      return snapshotStateTemplates([{
        id: uid("tpl"),
        rootStateId: snapshot.id,
        title: snapshot.title,
        components: snapshot.components,
        data: snapshot.data,
        dataSource: snapshot.dataSource,
        repeat: snapshot.repeat,
        dataWires: snapshot.dataWires,
        subscriptions: snapshot.subscriptions,
        boundary: snapshot.boundary,
        states: [],
        transitions: []
      }])[0];
    }

    function importStateTemplateComponent(template) {
      const copy = snapshotStateTemplates([template])[0];
      copy.id = uniqueStateTemplateId(copy.id || copy.title || "tpl");
      stateTemplates = [copy, ...stateTemplates].slice(0, 40);
      editingTemplateId = copy.id;
      stateExplorerCollapsed = false;
      saveStateTemplates("template:import:" + copy.id);
      applyStateExplorerCollapsed();
      renderStateExplorer();
      showTemplateInspector(copy, { focus: false });
      return copy;
    }

    function importComponentDefinition(definition) {
      const component = validateComponentExportDefinition(definition);
      if (component.type === "preset") {
        importStateTemplateComponent(component.template);
        return;
      }
      const template = templateFromStateComponentSnapshot(component.state);
      addTemplateToCurrentLayer(template);
    }

    function loadBlueprintFile(file) {
      if (!file) return;
      const intent = pendingLoadIntent;
      pendingLoadIntent = "definition";
      const reader = new FileReader();
      reader.onload = async () => {
        try {
          const text = String(reader.result || "");
          const data = parseJsonImportText(text);
          if (data?.kind === COMPONENT_EXPORT_KIND) {
            importComponentDefinition(data);
          } else {
            if (intent === "component") throw new Error("Import component expects a .state-component.json export.");
            importBlueprintDefinition(validateBlueprintDefinition(data));
          }
        } catch (err) {
          await modalAlert(err?.message || "Could not load blueprint definition.", intent === "component" ? "Import failed" : "Load failed");
        }
      };
      reader.readAsText(file);
    }

    function scheduleSync(reset) {
      clearTimeout(syncTimer);
      if (reset) return syncToApp(true);
      syncTimer = setTimeout(() => syncToApp(false), 40);
    }

    function normalizeId(text) {
      return String(text || "state")
        .trim()
        .toLowerCase()
        .replace(/[^a-z0-9_]+/g, "_")
        .replace(/^_+|_+$/g, "") || "state";
    }

    function normalizeSubscriptionPath(value) {
      const text = String(value || "").trim();
      if (text === "*") return "*";
      return normalizeContextPath(text, "");
    }

    function normalizeSubscriptions(value) {
      const source = Array.isArray(value) ? value : String(value || "").split(/[\n,]+/);
      const seen = new Set();
      const result = [];
      source.forEach(item => {
        const path = normalizeSubscriptionPath(item);
        if (!path || seen.has(path)) return;
        seen.add(path);
        result.push(path);
      });
      return result.slice(0, 64);
    }

    function normalizeListItems(items, fallbackText) {
      const allowed = new Set(["text", "link", "image", "note", "divider"]);
      if (Array.isArray(items)) {
        return items
          .filter(item => item && typeof item === "object" && allowed.has(item.type || "text"))
          .map(item => ({
            id: item.id || uid("c"),
            type: item.type || "text",
            text: String(item.text || ""),
            url: String(item.url || "")
          }));
      }
      const lines = String(fallbackText || "").split(/\r?\n/).map(line => line.trim()).filter(Boolean);
      return lines.map(line => ({
        id: uid("c"),
        type: "text",
        text: line,
        url: ""
      }));
    }


    function isDescendant(parentId, childId) {
      let current = byId(childId);
      while (current) {
        if (current.parentId === parentId) return true;
        current = current.parentId ? byId(current.parentId) : null;
      }
      return false;
    }

    function stateNodeAtClientPoint(clientX, clientY) {
      const p = screenToWorldXY(clientX, clientY);
      return nodeAtWorldPoint(p);
    }

    function normalizeComponents(components) {
      const allowed = new Set(["heading", "text", "image", "list", "link", "note", "divider", "daisy", "transitionButton", "dataWire"]);
      return (Array.isArray(components) ? components : [])
        .filter(component => component && typeof component === "object" && allowed.has(component.type))
        .slice(0, 160)
        .map(component => {
          const norm = {
            id: component.id || uid("c"),
            type: component.type,
            text: String(component.text || ""),
            url: String(component.url || ""),
            variant: String(component.variant || "")
          };
          if (component.generatedFromRepeat) norm.generatedFromRepeat = true;
          if (component.generatedFromDataWire) norm.generatedFromDataWire = true;
          if (component.dataPath) norm.dataPath = normalizeComponentDataPath(component.dataPath, "");
          if (component.dataRole) norm.dataRole = String(component.dataRole || "").slice(0, 40);
          if (component.dataLabel) norm.dataLabel = String(component.dataLabel || "").slice(0, 80);
          if (component.type === "transitionButton") norm.transitionId = String(component.transitionId || "");
          if (component.type === "dataWire") norm.wireId = String(component.wireId || "");
          if (component.type === "list") {
            norm.items = normalizeListItems(component.items, component.text);
          }
          return norm;
        });
    }

    function normalizeDataObject(value) {
      if (!isPlainObject(value)) return {};
      return JSON.parse(JSON.stringify(value));
    }

    function normalizeContextPath(path, fallback = "fetch") {
      const text = String(path || "").trim();
      if (!text) return fallback;
      return /^[a-zA-Z_][a-zA-Z0-9_]*(\.[a-zA-Z_][a-zA-Z0-9_]*)*$/.test(text) ? text : fallback;
    }

    function normalizeBindingPath(path, fallback = "") {
      const text = String(path || "").trim();
      if (!text) return fallback;
      return /^[a-zA-Z_][a-zA-Z0-9_]*(\.(?:[a-zA-Z_][a-zA-Z0-9_]*|\d+))*$/.test(text) ? text : fallback;
    }

    function isStateScopedPathToken(path) {
      return /^\$state(?:\.[a-zA-Z_][a-zA-Z0-9_]*)*$/.test(String(path || "").trim());
    }

    function normalizeComponentDataPath(path, fallback = "") {
      const text = String(path || "").trim();
      if (!text) return fallback;
      if (isStateScopedPathToken(text)) return text;
      return normalizeBindingPath(text, fallback);
    }

    function isRuntimeBookkeepingPath(path) {
      const key = String(path || "").trim();
      return key === "lastEvent" ||
        key === "lastEventAt" ||
        key === "lastChangedPath" ||
        key === "lastChangedAt" ||
        key === "state.previous" ||
        key === "state.lastTransition" ||
        key.startsWith("events.");
    }


    function normalizeDataWireRole(value, fallback = "field") {
      const role = String(value || "").trim().toLowerCase();
      return DATA_WIRE_ROLES.includes(role) ? role : fallback;
    }

    function normalizeDataWireComponentType(value, role = "field") {
      const type = String(value || "").trim().toLowerCase();
      if (["heading", "text", "image", "link", "note"].includes(type)) return type;
      if (role === "image") return "image";
      if (role === "title") return "heading";
      if (role === "link") return "link";
      if (role === "note") return "note";
      return "text";
    }

    function normalizeDataWire(value) {
      if (!isPlainObject(value)) return null;
      const sourcePath = normalizeBindingPath(value.sourcePath || value.path, "");
      if (!sourcePath) return null;
      const scopePath = normalizeBindingPath(value.scopePath || value.repeatPath || "", "");
      const itemPath = normalizeBindingPath(value.itemPath || "", "");
      const role = normalizeDataWireRole(value.role || value.dataRole, "field");
      const componentType = normalizeDataWireComponentType(value.componentType || value.type, role);
      return {
        id: String(value.id || uid("wire")),
        sourcePath,
        scopePath,
        itemPath,
        role,
        componentType,
        label: String(value.label || value.dataLabel || dataPathLabel(itemPath || sourcePath, role)).slice(0, 80)
      };
    }

    function normalizeDataWires(value) {
      const seen = new Set();
      return (Array.isArray(value) ? value : [])
        .map(normalizeDataWire)
        .filter(Boolean)
        .filter(wire => {
          const key = [wire.sourcePath, wire.scopePath, wire.itemPath, wire.role, wire.componentType].join("\u0000");
          if (seen.has(key)) return false;
          seen.add(key);
          return true;
        })
        .slice(0, 80);
    }

    function dataWireRoleLabel(role) {
      return ({
        image: "Image",
        title: "Heading",
        price: "Price",
        description: "Text",
        field: "Field",
        link: "Link",
        note: "Note"
      })[normalizeDataWireRole(role, "field")] || "Field";
    }

    function dataWireRenderLabel(wire) {
      const clean = normalizeDataWire(wire);
      if (!clean) return "Global State field";
      return clean.label || dataPathLabel(clean.itemPath || clean.sourcePath, dataWireRoleLabel(clean.role));
    }

    function dataWireScopeLabel(wire) {
      const clean = normalizeDataWire(wire);
      if (!clean) return "globalState";
      if (clean.scopePath) return clean.scopePath + (clean.itemPath ? " / item." + clean.itemPath : " / item");
      return clean.sourcePath || "globalState";
    }

    function dataWireScopeForPath(owner, path) {
      const key = normalizeBindingPath(path, "");
      const source = normalizeDataSource(owner?.dataSource);
      const targetData = normalizeContextPath(source.target, "fetch") + ".data";
      const currentRepeat = normalizeRepeatConfig(owner?.repeat);
      const scopes = [currentRepeat.path, targetData].filter(Boolean);
      for (const scopePath of scopes) {
        if (key === scopePath || key.startsWith(scopePath + ".")) {
          const parts = key === scopePath ? [] : key.slice(scopePath.length + 1).split(".").filter(Boolean);
          if (parts.length && /^\d+$/.test(parts[0])) parts.shift();
          return { scopePath, itemPath: normalizeBindingPath(parts.join("."), "") };
        }
      }
      return { scopePath: "", itemPath: "" };
    }

    function dataWirePathValue(owner, path) {
      const key = normalizeBindingPath(path, "");
      if (!key) return undefined;
      const scope = dataWireScopeForPath(owner, key);
      if (scope.scopePath) {
        const sample = repeatSampleForPath(scope.scopePath, owner);
        return scope.itemPath && sample ? jsonValueAtPath(sample, scope.itemPath) : sample;
      }
      return jsonValueAtPath(latestRuntimeContext, key);
    }

    function inferDataWireRole(path, value) {
      const component = componentForDataField(path, value, "item");
      if (component.type === "image") return "image";
      if (component.type === "link") return "link";
      if (component.type === "heading") return "title";
      if (component.type === "note") return "note";
      return component.variant === "field" ? "field" : "description";
    }

    function dataWireFromPath(owner, path, value = undefined, opts = {}) {
      const key = normalizeBindingPath(path, "");
      if (!key) return null;
      let scope = dataWireScopeForPath(owner, key);
      const optScopePath = normalizeBindingPath(opts.scopePath || "", "");
      if (optScopePath) {
        const parts = key === optScopePath ? [] : key.startsWith(optScopePath + ".") ? key.slice(optScopePath.length + 1).split(".").filter(Boolean) : [];
        if (parts.length && /^\d+$/.test(parts[0])) parts.shift();
        scope = { scopePath: optScopePath, itemPath: normalizeBindingPath(opts.itemPath || parts.join("."), "") };
      }
      const itemValue = value === undefined ? dataWirePathValue(owner, key) : value;
      const rolePath = scope.itemPath || key;
      const role = inferDataWireRole(rolePath, itemValue);
      return normalizeDataWire({
        id: uid("wire"),
        sourcePath: key,
        scopePath: scope.scopePath,
        itemPath: scope.itemPath,
        role,
        componentType: normalizeDataWireComponentType("", role),
        label: dataPathLabel(rolePath, role)
      });
    }

    function upsertDataWire(owner, wire) {
      const next = normalizeDataWire(wire);
      if (!owner || !next) return false;
      const wires = normalizeDataWires(owner.dataWires);
      const existingIndex = wires.findIndex(item => item.sourcePath === next.sourcePath && item.scopePath === next.scopePath && item.itemPath === next.itemPath);
      if (existingIndex >= 0) {
        wires[existingIndex] = { ...wires[existingIndex], ...next, id: wires[existingIndex].id };
        owner.dataWires = wires;
        return false;
      }
      owner.dataWires = [...wires, next];
      if (next.scopePath) owner.repeat = normalizeRepeatConfig({ path: next.scopePath, as: "item", index: "i", manual: true });
      return true;
    }

    function removeDataWire(owner, sourcePath) {
      const key = normalizeBindingPath(sourcePath, "");
      const before = normalizeDataWires(owner?.dataWires);
      const after = before.filter(wire => wire.sourcePath !== key);
      if (owner) owner.dataWires = after;
      return after.length !== before.length;
    }

    function dataWireDisplayValue(value) {
      if (value === null || value === undefined) return "";
      if (Array.isArray(value)) {
        const readable = value.filter(item => item !== null && item !== undefined && typeof item !== "object").map(String);
        return readable.length ? readable.join(", ") : JSON.stringify(value);
      }
      if (typeof value === "object") {
        for (const key of ["title", "name", "label", "headline", "description", "text", "value"]) {
          if (value[key] !== null && value[key] !== undefined && typeof value[key] !== "object") return String(value[key]);
        }
        return JSON.stringify(value);
      }
      return String(value);
    }

    function dataWireUrlValue(value) {
      const firstUsable = item => {
        if (typeof item === "string" && /^(https?:|data:image\/)/i.test(item.trim())) return item.trim();
        return "";
      };
      if (Array.isArray(value)) {
        for (const item of value) {
          const picked = dataWireUrlValue(item);
          if (picked) return picked;
        }
        return dataWireDisplayValue(value);
      }
      if (value && typeof value === "object") {
        for (const key of ["image", "images", "img", "thumbnail", "photo", "picture", "avatar", "icon", "url", "href", "link", "src"]) {
          const picked = dataWireUrlValue(value[key]);
          if (picked) return picked;
        }
      }
      return firstUsable(value) || dataWireDisplayValue(value);
    }

    function componentFromDataWire(owner, wire, alias = "item") {
      const value = dataWirePathValue(owner, wire.sourcePath);
      const label = wire.label || dataPathLabel(wire.itemPath || wire.sourcePath, wire.role || "Field");
      const text = dataWireDisplayValue(value);
      const url = dataWireUrlValue(value);
      const base = {
        id: wire.id + "_component",
        type: normalizeDataWireComponentType(wire.componentType, wire.role),
        text: "",
        url: "",
        variant: "",
        generatedFromDataWire: true,
        wireId: wire.id,
        dataPath: wire.itemPath || wire.sourcePath,
        dataRole: wire.role,
        dataLabel: label
      };
      if (base.type === "image") return { ...base, text: "", url };
      if (base.type === "heading") return { ...base, text };
      if (base.type === "link") return { ...base, text: text || label, url };
      if (base.type === "note") return { ...base, text };
      return { ...base, text: wire.role === "description" ? text : label + ": " + text, variant: wire.role === "description" ? "" : "field" };
    }

    function dataWireComponentsForState(owner, repeat = normalizeRepeatConfig(owner?.repeat)) {
      const repeatPath = normalizeBindingPath(repeat?.path || "", "");
      return normalizeDataWires(owner?.dataWires)
        .filter(wire => repeatPath ? wire.scopePath === repeatPath : !wire.scopePath)
        .map(wire => componentFromDataWire(owner, wire, repeat?.as || "item"));
    }

    function dataWireCandidatePaths(owner, extraPaths = []) {
      const map = new Map();
      const add = (path, source = "globalState", value = undefined) => {
        const clean = normalizeBindingPath(path, "");
        if (!clean || map.has(clean)) return;
        map.set(clean, { path: clean, source, value });
      };
      normalizeDataWires(owner?.dataWires).forEach(wire => add(wire.sourcePath, "mapped", dataWirePathValue(owner, wire.sourcePath)));
      normalizeSubscriptions(owner?.subscriptions).filter(path => path !== "*").forEach(path => add(path, "subscribed", jsonValueAtPath(latestRuntimeContext, path)));
      extraPaths.forEach(path => add(path, "current", dataWirePathValue(owner, path)));
      if (isPlainObject(latestRuntimeContext)) {
        Object.entries(latestRuntimeContext)
          .filter(([key]) => !isRuntimeBookkeepingPath(key))
          .forEach(([key, value]) => {
            add(key, "runtime", value);
            collectScalarDataLeaves(value, key).forEach(entry => {
              if (!isRuntimeBookkeepingPath(entry.path)) add(entry.path, "runtime", entry.value);
            });
          });
      }
      if (owner) {
        Object.entries(normalizeDataObject(owner.data)).forEach(([key, value]) => {
          add(key, "state data", value);
          collectScalarDataLeaves(value, key).forEach(entry => add(entry.path, "state data", entry.value));
        });
        const source = normalizeDataSource(owner.dataSource);
        if (String(source.url || "").trim()) {
          const target = normalizeContextPath(source.target, "fetch");
          const targetData = target + ".data";
          add(targetData, "fetch", dataWirePathValue(owner, targetData));
          const sample = repeatSampleForPath(targetData, owner);
          collectScalarDataLeaves(sample, targetData).forEach(entry => add(entry.path, "fetch sample", entry.value));
        }
        const repeat = normalizeRepeatConfig(owner.repeat);
        if (repeat.path) {
          add(repeat.path, "repeat", dataWirePathValue(owner, repeat.path));
          const sample = repeatSampleForPath(repeat.path, owner);
          collectScalarDataLeaves(sample, repeat.path).forEach(entry => add(entry.path, "repeat item", entry.value));
        }
      }
      return [...map.values()]
        .sort((a, b) => dataFieldScore({ path: b.path, value: b.value }, "image") - dataFieldScore({ path: a.path, value: a.value }, "image") || a.path.localeCompare(b.path))
        .slice(0, 160);
    }

    function updateDataWirePath(owner, wireId, nextPath) {
      const path = normalizeBindingPath(nextPath, "");
      if (!owner || !wireId || !path) return false;
      const wires = normalizeDataWires(owner.dataWires);
      const index = wires.findIndex(wire => wire.id === wireId);
      if (index < 0) return false;
      const current = wires[index];
      if (current.sourcePath === path) return false;
      const inferred = dataWireFromPath(owner, path, dataWirePathValue(owner, path));
      if (!inferred) return false;
      wires[index] = normalizeDataWire({
        ...inferred,
        id: current.id,
        role: current.role,
        componentType: normalizeDataWireComponentType(current.componentType, current.role),
        label: dataPathLabel(inferred.itemPath || inferred.sourcePath, current.role)
      });
      owner.dataWires = normalizeDataWires(wires);
      if (wires[index].scopePath) owner.repeat = normalizeRepeatConfig({ path: wires[index].scopePath, as: "item", index: "i", manual: true });
      return true;
    }


    function dataWiresFromRepeatSample(sample, scopePath) {
      const fields = pickDerivedRepeatFields(sample);
      const wires = [];
      const push = (field, role, componentType, label) => {
        const itemPath = normalizeBindingPath(field?.path || "", "");
        if (!itemPath) return;
        wires.push(normalizeDataWire({
          id: uid("wire"),
          sourcePath: scopePath + "." + itemPath,
          scopePath,
          itemPath,
          role,
          componentType,
          label: label || dataPathLabel(itemPath, role)
        }));
      };
      push(fields.image, "image", "image", "Image");
      push(fields.title, "title", "heading", "Title");
      push(fields.price, "price", "text", "Price");
      push(fields.description, "description", "text", "Description");
      (fields.extras || []).forEach(field => push(field, "field", "text", dataPathLabel(field.path)));
      return normalizeDataWires(wires);
    }

    function applyDerivedDataWires(owner, repeatPath, root = null, force = false) {
      const scopePath = normalizeBindingPath(repeatPath, "");

      if (!pendingCanvasMouse) return false;
      lastEmptyCanvasClick = {
        time: Date.now(),
        x: pendingCanvasMouse.clientX,
        y: pendingCanvasMouse.clientY

      pendingCanvasMouse = null;
      clearLongPress();
      clearSelection("selection:canvas");
      return true;
    }

    function cancelActiveCanvasGesture() {
      cancelQueuedCanvasMove();
      const dragToSave = dragging?.moved ? dragging.id : null;
      const hadSelectionBox = Boolean(boxSelecting);
      const hadGesture = Boolean(
        pendingCanvasMouse ||
        pendingCanvasTouch ||
        pendingEdgeTouch ||
        boxSelecting ||
        dragging ||
        connecting ||
        panning
      );
      if (!hadGesture) return false;
      clearLongPress();
      pendingCanvasMouse = null;
      pendingCanvasTouch = null;
      pendingEdgeTouch = null;
      activePointerId = null;
      dragging = null;
      connecting = null;
      connectingTargetId = null;
      panning = null;
      pinchZoom = null;
      if (hadSelectionBox) {

        selected = null;
      }

      stateExplorerEl.classList.remove("drag-over");

    function startPendingEdgeTouch(evt, t) {

      pendingEdgeTouch.moved = true;
      pendingEdgeTouch = null;
      clearLongPress();
      return true;
    }

    function finishPendingEdgeTouch(evt) {

      pendingEdgeTouch = null;
      clearLongPress();

    }

    function finishPendingCanvasTap(evt) {

        clearLongPress();
        clearSelection("selection:canvas");
        return true;
      }
      clearLongPress();
      pendingCanvasTouch = null;
      return false;
    }

    function updatePendingCanvasTouch(evt) {
      if (!pendingCanvasTouch || pendingCanvasTouch.pointerId !== evt.pointerId || boxSelecting) return false;
      const distance = Math.hypot(evt.clientX - pendingCanvasTouch.clientX, evt.clientY - pendingCanvasTouch.clientY);
      if (distance <= 7) return true;
      const start = pendingCanvasTouch;
      pendingCanvasTouch = null;
      start.moved = true;
      clearLongPress();
      startPanning(eventFromPoint(start, evt));

    }

    function trackTouchStart(evt) {

    function updatePinchZoom() {

      zoomAtViewportCenter(pinchZoom.scale * Math.pow(ratio, TOUCH_PINCH_ZOOM_RESPONSE));
      return true;
    }

    function selectedNodeIds() {
      return new Set((selected?.nodes || []).filter(id => {
        const node = byId(id);
        return node && !node.virtualProxy;
      }));
    }

    function selectedEdgeIds() {
      return new Set(selected?.edges || []);
    }

    function selectedNodeIdList() {
      return [...selectedNodeIds()].filter(id => byId(id) && isVisibleStateId(id));
    }

    function selectedEdgeIdList() {
      return [...selectedEdgeIds()].filter(id => {
        const edge = edgeById(id);
        return edge && transitionVisibleInCurrentContext(edge);
      });
    }

    function selectionFromParts(nodes, edges) {
      const nodeIds = [...new Set(nodes || [])].filter(id => {
        const node = byId(id);
        return node && !node.virtualProxy && isVisibleStateId(id);
      });
      const edgeIds = [...new Set(edges || [])].filter(id => {
        const edge = edgeById(id);
        return edge && transitionVisibleInCurrentContext(edge);
      });
      return nodeIds.length || edgeIds.length ? { nodes: nodeIds, edges: edgeIds } : null;
    }

    function singleSelectedNodeId() {
      const nodes = selectedNodeIdList();
      return nodes.length === 1 && selectedEdgeIdList().length === 0 ? nodes[0] : null;
    }

    function singleSelectedEdgeId() {
      const edges = selectedEdgeIdList();
      return edges.length === 1 && selectedNodeIdList().length === 0 ? edges[0] : null;
    }

    function setSingleSelection(kind, id, historyKey = null) {
      const previousNode = kind === "node" ? singleSelectedNodeId() : null;
      selected = kind === "node" ? selectionFromParts([id], []) : selectionFromParts([], [id]);
      saveSelection(historyKey);
      const singleNode = kind === "node" ? singleSelectedNodeId() : null;
      if (singleNode && singleNode !== previousNode) startAppAtState(singleNode, { preserveFocus: true, suppressLayerFollow: true });
    }

    function toggleSelection(kind, id) {
      const nodes = selectedNodeIdList();
      const edges = selectedEdgeIdList();
      const list = kind === "node" ? nodes : edges;
      const index = list.indexOf(id);
      if (index >= 0) list.splice(index, 1);
      else list.push(id);
      selected = selectionFromParts(nodes, edges);
      saveSelection();
      const singleNode = singleSelectedNodeId();
      if (singleNode) startAppAtState(singleNode, { preserveFocus: true, suppressLayerFollow: true });
    }

    function clearSelection(historyKey = null) {
      selected = null;
      showEmptyInspector();
      saveSelection(historyKey);
      draw();
    }

    function selectAllCurrentLayerItems() {
      const nodeIds = visibleStates()
        .filter(state => !state.virtualProxy)
        .map(state => state.id);
      const edgeIds = visibleTransitions().map(transition => transition.id);
      selected = selectionFromParts(nodeIds, edgeIds);
      showEmptyInspector();
      saveSelection("selection:all");
      draw();
      return Boolean(selected);
    }

    let selectionClipboard = null;

    function updateSelectionActions() {
      const ids = selectedNodeIdList();
      const edges = selectedEdgeIdList();
      const visible = ids.length > 0 || edges.length > 0;
      const expandGroupId = selectedExpandableGroupId();
      selectionActionsEl.hidden = !visible;
      selectionActionsEl.classList.toggle("visible", visible);
      btnSelectionCopy.disabled = !(ids.length || edges.length);
      btnSelectionCollapse.disabled = !ids.length && !edges.length;
      btnSelectionCollapse.textContent = expandGroupId ? "Expand" : "Collapse";
      if (visible) {
        const parts = [];
        if (ids.length) parts.push(ids.length === 1 ? "1 state" : `${ids.length} states`);
        if (edges.length) parts.push(edges.length === 1 ? "1 transition" : `${edges.length} transitions`);
        selectionCountEl.textContent = parts.join(" + ");
      }
    }

    function clipboardSelectionPayload() {
      const nodeIds = selectedNodeIdList();
      const edgeIds = selectedEdgeIdList();
      if (!nodeIds.length && !edgeIds.length) return null;
      return {
        sourceLayerId: currentLayerId,
        nodes: nodeIds.map(id => stateExportSnapshot(byId(id))).filter(Boolean),
        edges: edgeIds.map(id => {
          const edge = edgeById(id);
          if (!edge) return null;
          return {
            kind: "transition",
            ...transitionExportSnapshot(edge)
          };
        }).filter(Boolean)
      };
    }

    function duplicateSelectionBundle(payload) {
      const nodes = Array.isArray(payload?.nodes) ? payload.nodes : [];
      if (!nodes.length) return false;
      const offsetX = GRID_SIZE * 2;
      const offsetY = GRID_SIZE * 2;
      const nodeMap = new Map();
      const copies = [];
      for (const snapshot of nodes) {
        const copy = makeState(
          Number(snapshot.x || 0) + offsetX,
          Number(snapshot.y || 0) + offsetY,
          `${String(snapshot.title || snapshot.id || "State")} Copy`,
          currentLayerId
        );
        copy.components = cloneComponents(snapshot.components);
        copy.data = normalizeDataObject(snapshot.data);
        copy.dataSource = normalizeDataSource(snapshot.dataSource);
        copy.repeat = normalizeRepeatConfig(snapshot.repeat);
        copy.subscriptions = normalizeSubscriptions(snapshot.subscriptions);
        copy.boundary = normalizeBoundaryConfig(snapshot.boundary);
        copies.push(copy);
        nodeMap.set(String(snapshot.id), copy.id);
      }
      for (const copy of copies) {
        const original = nodes.find(item => nodeMap.get(String(item.id)) === copy.id);
        const originalParentId = String(original?.parentId || "");
        copy.parentId = nodeMap.get(originalParentId) || (currentLayerId && byId(currentLayerId) ? currentLayerId : null);
        copy.boundary.entryId = nodeMap.get(copy.boundary.entryId) || "";
        copy.boundary.exitId = nodeMap.get(copy.boundary.exitId) || "";
      }
      const copiedEdges = [];
      for (const edge of Array.isArray(payload?.edges) ? payload.edges : []) {
        const from = nodeMap.get(String(edge.from || ""));
        const to = nodeMap.get(String(edge.to || ""));
        if (!from || !to) continue;
        copiedEdges.push({
          id: uid("t"),
          from,
          to,
          label: String(edge.label || defaultTransitionLabel({ from, to })),
          condition: String(edge.condition || ""),
          set: normalizeDataObject(edge.set),
          groupEntryId: edge.groupEntryId ? (nodeMap.get(String(edge.groupEntryId)) || "") : "",
          groupExitId: edge.groupExitId ? (nodeMap.get(String(edge.groupExitId)) || "") : ""
        });
      }
      model.states.push(...copies);
      model.transitions.push(...copiedEdges);
      selected = selectionFromParts(copies.map(s => s.id), copiedEdges.map(t => t.id));
      saveModel();
      draw();
      return true;
    }

    function deleteSelectedItems() {
      if (!selected) return false;
      const ids = selectedNodeIdList();
      const edgeIds = [...new Set([...(selected.edges || []), ...selectedEdgeIdList()])];
      const removable = ids.filter(id => byId(id));
      const removeEdges = new Set(edgeIds);
      for (const edgeId of [...removeEdges]) {
        if (isBoundaryAnchorFlow(edgeId)) removeEdges.delete(edgeId);
      }
      const removedNodes = removable.length ? removeStatesById(removable) : false;
      if (!removedNodes && !removeEdges.size) {
        if (edgeIds.some(isBoundaryAnchorFlow)) {
          selected = null;
          showEmptyInspector();
          draw();
          return true;
        }
        return false;
      }
      if (removeEdges.size) {
        const boundaryIds = [];
        for (const edgeId of removeEdges) {
          if (deleteBoundaryFlowById(edgeId)) boundaryIds.push(edgeId);
        }
        model.transitions = model.transitions.filter(t => !removeEdges.has(t.id) && !boundaryIds.includes(t.id));
      }
      selected = null;
      showEmptyInspector();
      saveModel();
      draw();
      return true;
    }

    function deleteBoundaryFlowById(edgeId) {
      if (isBoundaryAnchorFlow(edgeId)) return false;
      const transition = model.transitions.find(t => t.id === edgeId);
      const flow = boundaryFlowInfoFromTransition(transition, edgeId);
      if (!flow) return false;
      const parent = boundaryParentFromFlow(flow);
      const side = flow.side;
      if (side === "input" || side === "output") clearBoundaryEndpoint(parent, side);
      else clearBoundaryRoute(parent);
      model.transitions = model.transitions.filter(item => {
        if (item.id === edgeId) return false;
        const itemFlow = boundaryFlowInfoFromTransition(item, item.id);
        return !(itemFlow && itemFlow.parentId === flow.parentId && itemFlow.side === side);
      });
      return true;
    }

    function deleteActiveSelection() {
      if (selected && deleteSelectedItems()) return true;
      if (inspectorEdgeId && deleteBoundaryFlowById(inspectorEdgeId)) {
        selected = null;
        showEmptyInspector();
        saveModel();
        draw();
        return true;
      }
      if (!inspectorEdgeId || !edgeById(inspectorEdgeId)) return false;
      selected = selectionFromParts([], [inspectorEdgeId]);
      return deleteSelectedItems();
    }

    function selectedExpandableGroupId() {
      const ids = selectedNodeIdList();
      if (ids.length !== 1 || selectedEdgeIdList().length) return null;
      const id = ids[0];
      return childStateCount(id) ? id : null;
    }

    function clearLongPress() {
      if (longPressTimer) clearTimeout(longPressTimer);
      longPressTimer = null;
    }

    function eventFromPoint(point, evt) {
      return {
        clientX: point.clientX,
        clientY: point.clientY,
        button: 0,
        preventDefault() { evt?.preventDefault?.(); },
        stopPropagation() { evt?.stopPropagation?.(); }
      };
    }

    function copySelectedNodes() {
      const payload = clipboardSelectionPayload();
      if (!payload) return;
      selectionClipboard = payload;
      if (!payload.nodes.length) {
        saveSelection();
        updateSelectionActions();
        return;
      }
      duplicateSelectionBundle(payload);
    }

    function pasteSelectionClipboard() {
      if (!selectionClipboard) return false;
      const payload = JSON.parse(JSON.stringify(selectionClipboard));
      return duplicateSelectionBundle(payload);
    }

    let titleMeasureContext = null;
    function measuredTextWidth(text) {
      try {
        titleMeasureContext = titleMeasureContext || document.createElement("canvas").getContext("2d");
        titleMeasureContext.font = '900 14px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
        return titleMeasureContext.measureText(String(text || "")).width;
      } catch (_) {
        return String(text || "").length * 8;
      }
    }

    function nodeWidth(s) {
      if (s?.virtualProxy) return GRID_SIZE * 3;
      const title = String(s?.title || s?.id || "State");
      return snapClampToGrid(Math.ceil(measuredTextWidth(title)) + NODE_TITLE_EXTRA_W, NODE_MIN_W, NODE_MAX_W);
    }

    const PORT_ANCHOR_Y = 24;
    const PORT_SLOT_GAP = 24;
    const PORT_BOTTOM_PAD = 24;

    function nodeHeight(s) {
      if (s?.virtualProxy) return GRID_SIZE * 2;
      try {
        const portCount = Math.max(
          orderedPortTransitions(s.id, "in").length,
          orderedPortTransitions(s.id, "out").length
        );
        return Math.max(NODE_H, PORT_ANCHOR_Y + PORT_SLOT_GAP * Math.max(1, portCount) + PORT_BOTTOM_PAD);
      } catch (_) {
        return NODE_H;
      }
    }

    function nodeAtWorldPoint(p) {
      const states = visibleStates();
      for (let i = states.length - 1; i >= 0; i--) {
        const s = states[i];
        if (s.virtualProxy) continue;
        if (p.x >= s.x && p.x <= s.x + nodeWidth(s) && p.y >= s.y && p.y <= s.y + nodeHeight(s)) return s;
      }
      return null;
    }

    function connectionTargetAtWorldPoint(p) {
      let best = null;
      let bestScore = Infinity;
      const states = visibleStates();
      for (let i = states.length - 1; i >= 0; i--) {
        const s = states[i];
        if (s.virtualProxy) {
          if (connecting?.from === s.id) continue;
          const portSide = s.virtualProxy.side === "input" ? "out" : "in";
          const port = nodeCenter(s, portSide);
          const dist = Math.hypot(p.x - port.x, p.y - port.y);
          const nearBoundaryPort =
            dist <= GRID_SIZE * 2.25 ||
            (p.x >= port.x - GRID_SIZE * 2 &&
              p.x <= port.x + GRID_SIZE * 2 &&
              p.y >= port.y - GRID_SIZE * 2 &&
              p.y <= port.y + GRID_SIZE * 2);
          if (nearBoundaryPort && dist < bestScore) {
            best = s;
            bestScore = dist;
          }
          continue;
        }
        const input = nodeCenter(s, "in");
        const dist = Math.hypot(p.x - input.x, p.y - input.y);
        const nearInput =
          p.x >= s.x - 56 &&
          p.x <= s.x + 54 &&
          p.y >= s.y - 8 &&
          p.y <= s.y + nodeHeight(s);
        const insideNode =
          s.id !== connecting?.from &&
          p.x >= s.x &&
          p.x <= s.x + nodeWidth(s) &&
          p.y >= s.y &&
          p.y <= s.y + nodeHeight(s);
        if ((nearInput || insideNode) && dist < bestScore) {
          best = s;
          bestScore = dist;
        }
      }
      return best;
    }

    function isEdgeDropTarget(evt) {
      return Boolean(evt.target?.closest?.("[data-edge-id], .edge, .hit, .edge-label, .edge-tip-hit"));
    }

    function updateSelectRect() {
      if (!boxSelecting) {
        selectRectEl.style.display = "none";
        return;
      }
      const r = mapEl.getBoundingClientRect();
      const x1 = boxSelecting.startX - r.left;
      const y1 = boxSelecting.startY - r.top;
      const x2 = boxSelecting.currentX - r.left;
      const y2 = boxSelecting.currentY - r.top;
      selectRectEl.style.left = Math.min(x1, x2) + "px";
      selectRectEl.style.top = Math.min(y1, y2) + "px";
      selectRectEl.style.width = Math.abs(x2 - x1) + "px";
      selectRectEl.style.height = Math.abs(y2 - y1) + "px";
      selectRectEl.style.display = boxSelecting.moved ? "block" : "none";
    }

    function nodesInSelection() {
      if (!boxSelecting) return [];
      const a = screenToWorldXY(boxSelecting.startX, boxSelecting.startY);
      const b = screenToWorldXY(boxSelecting.currentX, boxSelecting.currentY);
      const minX = Math.min(a.x, b.x);
      const maxX = Math.max(a.x, b.x);
      const minY = Math.min(a.y, b.y);
      const maxY = Math.max(a.y, b.y);
      return visibleStates()
        .filter(s => !s.virtualProxy && s.x < maxX && s.x + nodeWidth(s) > minX && s.y < maxY && s.y + nodeHeight(s) > minY)
        .map(s => s.id);
    }

    function startBoxSelect(evt) {
      stopRuntimeLayerFollow();
      evt.preventDefault();
      selected = null;
      boxSelecting = {
        startX: evt.clientX,
        startY: evt.clientY,
        currentX: evt.clientX,
        currentY: evt.clientY,
        moved: false
      };
      updateSelectRect();
      draw();
    }

    function cssEscapeValue(val) {
      return CSS.escape(val);
    }

    function nodeElement(stateId) {
      return nodesEl.querySelector(`.node[data-id="${cssEscapeValue(stateId)}"]`);
    }

    function updateNodeElementPosition(state) {
      const el = nodeElement(state.id);
      if (!el) return false;
      if (dragging?.id === state.id) {
        el.style.transform = `translate3d(${state.x - dragging.originalX}px, ${state.y - dragging.originalY}px, 0)`;
      } else {
        el.style.left = state.x + "px";
        el.style.top = state.y + "px";
        el.style.transform = "";
      }
      return true;
    }

    function updateLiveDraggedLayerGeometry(state) {
      updateLayerFrame(statesInLayer(currentLayerId));
      syncBoundaryProxies(currentLayerContainer(), statesInLayer(currentLayerId));
      const layerId = currentLayerId || null;
      for (const proxy of _virtualNodes.values()) {
        if (proxy.virtualProxy?.layerId !== layerId) continue;
        updateNodeElementPosition(proxy);
        updateSvgStatePortPositions(proxy);
      }
      if (state) updateSvgStatePortPositions(state);
    }

    function updateDraggedStateEdges(stateId) {
      _frameRoutes = computeFrameRoutes({
        metricName: "liveDragRouteBuilds",
        allowDenseGridSearch: false
      });
      for (const transition of visibleTransitions()) {
        const from = byId(transition.from);
        const to = byId(transition.to);
        if (!from || !to) continue;
        const pts = edgeRoutePoints(from, to, transition);
        updateTransitionElements(transition, pts);
      }
    }

    function updateTransitionElements(transition, routePoints) {
      const from = byId(transition.from);
      const to = byId(transition.to);
      if (!from || !to || !routePoints?.length) return;
      const pathD = pathFromPoints(routePoints);
      const arrowD = arrowPathForPoints(routePoints);
      const middle = midPointForRoute(routePoints);
      const startPin = routePoints[0];
      const endPin = routePoints[routePoints.length - 1];
      const tip = edgeTipHandlePointForRoute(routePoints);
      const selector = `[data-edge-id="${cssEscapeValue(transition.id)}"]`;
      for (const el of [...wiresEl.querySelectorAll(selector), ...getPortOverlay().querySelectorAll(selector)]) {
        if (el.matches("path.hit,path.edge")) el.setAttribute("d", pathD);
        else if (el.matches("path.edge-arrow")) el.setAttribute("d", arrowD);
        else if (el.matches("text.edge-label")) {
          el.setAttribute("x", String(middle.x));
          el.setAttribute("y", String(middle.y));
        } else if (el.matches("circle.edge-pin")) {
          if (el.dataset.edgePin === "out" || el.dataset.pin === "start") {
            el.setAttribute("cx", String(startPin.x));
            el.setAttribute("cy", String(startPin.y));
          } else {
            el.setAttribute("cx", String(endPin.x));
            el.setAttribute("cy", String(endPin.y));
          }
        } else if (el.matches("circle.edge-tip-hit")) {
          el.setAttribute("cx", String(tip.x));
          el.setAttribute("cy", String(tip.y));
        } else if (el.matches("rect.edge-tip-hit")) {
          el.setAttribute("x", String(tip.x - 12));
          el.setAttribute("y", String(tip.y - 12));
        }
      }
    }

    function edgeTipHandlePointForRoute(routePoints) {
      return polylinePoint(routePoints, 0.82);
    }

    function clampEdgeHandleToViewport(point, margin = 18) {
      if (!point || !mapEl || !camera.scale) return point;
      const rect = mapEl.getBoundingClientRect();
      if (!rect.width || !rect.height) return point;
      return {
        x: clamp(point.x, (margin - camera.x) / camera.scale, (rect.width - margin - camera.x) / camera.scale),
        y: clamp(point.y, (margin - camera.y) / camera.scale, (rect.height - margin - camera.y) / camera.scale)
      };
    }

    function midPointForRoute(routePoints) {
      return polylinePoint(routePoints, 0.5);
    }

    function shouldIgnoreMapWheel(evt) {
      const target = evt.target;
      if (target?.closest?.(".state-explorer, .inspector, input, textarea, select, button")) return true;
      if (!(evt.ctrlKey || evt.metaKey)) return true;
      return evt.shiftKey && Math.abs(evt.deltaX) > Math.abs(evt.deltaY);
    }

    function hasActiveCanvasMotion() {
      return Boolean(boxSelecting || dragging || connecting || panning);
    }

    function cancelQueuedCanvasMove() {
      if (canvasMoveFrame) cancelAnimationFrame(canvasMoveFrame);
      canvasMoveFrame = 0;
      queuedCanvasMoveEvent = null;
    }

    function flushQueuedCanvasMove(fallbackEvent = null) {
      const evt = queuedCanvasMoveEvent || fallbackEvent;
      cancelQueuedCanvasMove();
      if (evt && hasActiveCanvasMotion()) handleCanvasMove(evt);
    }

    function queueCanvasMove(evt) {
      if (!hasActiveCanvasMotion()) return;
      queuedCanvasMoveEvent = evt;
      if (canvasMoveFrame) return;
      canvasMoveFrame = requestAnimationFrame(() => {
        const queuedEvent = queuedCanvasMoveEvent;
        canvasMoveFrame = 0;
        queuedCanvasMoveEvent = null;
        if (queuedEvent && hasActiveCanvasMotion()) handleCanvasMove(queuedEvent);
      });
    }

    function groupEntryChild(parentId, transition = null) {
      const children = statesInLayer(parentId);
      return transition?.groupEntryId
        ? children.find(state => state.id === transition.groupEntryId) || null
        : null;
    }

    function groupExitChild(parentId, transition = null) {
      const children = statesInLayer(parentId);
      return transition?.groupExitId
        ? children.find(state => state.id === transition.groupExitId) || null
        : null;
    }

    async function expandSelectedGroup() {
      const groupId = selectedExpandableGroupId();
      const group = groupId ? byId(groupId) : null;
      if (!group) return false;
      const children = statesInLayer(group.id);
      if (!children.length) return false;
      const parentLayerId = group.parentId || null;
      const incomingGroupEdges = model.transitions.filter(t => t.to === group.id);
      const outgoingGroupEdges = model.transitions.filter(t => t.from === group.id);
      const invalidGroupEdges = [
        ...incomingGroupEdges.filter(t => !groupEntryChild(group.id, t)),
        ...outgoingGroupEdges.filter(t => !groupExitChild(group.id, t))
      ];
      if (invalidGroupEdges.length || model.initial === group.id) {
        await modalAlert("This group cannot be expanded losslessly because a group entry/exit is missing.", "Expand blocked");
        return false;
      }

      for (const t of model.transitions) {
        if (t.to === group.id) {
          const entry = groupEntryChild(group.id, t);
          t.to = entry.id;
          t.groupEntryId = "";
        }
        if (t.from === group.id) {
          const exit = groupExitChild(group.id, t);
          t.from = exit.id;
          t.groupExitId = "";
        }
      }

      for (const child of children) child.parentId = parentLayerId;
      model.states = model.states.filter(state => state.id !== group.id);
      model.transitions = model.transitions.filter(t => t.from !== group.id && t.to !== group.id);
      if (currentLayerId === group.id) currentLayerId = parentLayerId;
      selected = selectionFromParts(children.map(child => child.id), []);
      showEmptyInspector();
      normalizeModel(model);
      saveModel("state:expand");
      draw();
      return true;
    }

    async function collapseOrExpandSelectedNodes() {
      if (selectedExpandableGroupId()) {
        await expandSelectedGroup();
        return;
      }
      await collapseSelectedNodes();
    }

    async function collapseSelectedNodes() {
      const selectedIds = new Set(selectedNodeIdList());
      for (const edgeId of selectedEdgeIdList()) {
        const edge = edgeById(edgeId);
        if (!edge) continue;
