          setPreview.textContent = err.message || "Invalid JSON.";
          setPreview.classList.remove("empty");
        }
      };
      updateConditionPreview();
      updateSetPreview();
      label.oninput = () => {
        t.label = label.value || "Next";
        stateInspectorTitleEl.textContent = "Transition: " + (t.label || "Next");
        saveModel("edge:label:" + t.id);
        draw();
      };
      cond.oninput = () => { t.condition = cond.value; updateConditionPreview(); saveModel("edge:condition:" + t.id); draw(); };
      set.oninput = updateSetPreview;
      label.onblur = cond.onblur = set.onblur = () => { lastHistoryKey = null; };
      root.querySelector("#pFlip").onclick = () => {
        const tmp = t.from; t.from = t.to; t.to = tmp;
        saveModel();
        draw();
        showEdgeInspector(t, opts);
      };
      root.querySelector("#pDelete").onclick = () => {
        model.transitions = model.transitions.filter(e => e.id !== t.id);
        selected = null;
        showEmptyInspector();
        saveModel();
        draw();
      };
      setupEditorAccessibility(root, opts.focus !== false, { onCommit: showEmptyInspector });
    }

    function isEditableTarget(target) {
      return target?.closest?.("input, textarea, select, [contenteditable]");
    }

    function escapeHtml(text) {
      return String(text).replace(/[&<>"]/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[ch]));
    }

    function syncToApp(reset) {
      syncStateEl.textContent = reset ? "reset" : "live";
      if (reset) pendingAppStartStateId = null;
      const payload = {
        type: "STATE_BLUEPRINT_MODEL",
        model: JSON.parse(JSON.stringify(model)),
        reset: Boolean(reset),
        preserveFocus: !reset
      };
      try { frameEl.contentWindow.postMessage(payload, "*"); } catch (_) {}
      if (appWindow && !appWindow.closed) {
        try { appWindow.postMessage(payload, "*"); } catch (_) {}
      }
      setTimeout(() => { syncStateEl.textContent = "live"; }, 400);
    }

    function startAppAtState(id) {
      if (!byId(id)) return;
      currentAppState = id;
      pendingAppStartStateId = id;
      syncStateEl.textContent = "start";
      const payload = {
        type: "STATE_BLUEPRINT_MODEL",
        model: JSON.parse(JSON.stringify(model)),
        reset: true,
        startStateId: id
      };
      try { frameEl.contentWindow.postMessage(payload, "*"); } catch (_) {}
      if (appWindow && !appWindow.closed) {
        try { appWindow.postMessage(payload, "*"); } catch (_) {}
      }
      draw();
      setTimeout(() => { syncStateEl.textContent = "live"; }, 400);
    }

    function nextStateTitle() {
      let i = model.states.length + 1;
      const titles = new Set(model.states.map(s => String(s.title || "").toLowerCase()));
      while (titles.has(("State " + i).toLowerCase())) i++;
      return "State " + i;
    }

    function makeState(x, y, title, parentId = currentLayerId) {
      title = title || nextStateTitle();
      let base = normalizeId(title);
      let id = base;
      let i = 2;
      const ids = new Set(model.states.map(s => s.id));
      while (ids.has(id)) id = base + "_" + i++;
      const state = {
        id,
        title,
        body: "",
        components: [],
        data: {},
        parentId: parentId && byId(parentId) ? parentId : null,
        x,
        y
      };
      state.x = snapClampToGrid(x, WORLD_MIN_X, WORLD_MAX_X - nodeWidth(state));
      state.y = snapClampToGrid(y, WORLD_MIN_Y, WORLD_MAX_Y - NODE_H);
      return state;
    }

    function stateTemplateFromState(s) {
      const ids = descendantStateIds([s.id]);
      const childIds = [...ids].filter(id => id !== s.id);
      return {
        id: uid("tpl"),
        rootStateId: s.id,
        title: s.title || s.id,
        body: "",
        components: cloneComponents(s.components),
        data: normalizeDataObject(s.data),
        states: childIds.map(id => byId(id)).filter(Boolean).map(stateExportSnapshot),
        transitions: model.transitions
          .filter(transition => ids.has(transition.from) && ids.has(transition.to))
          .map(transitionExportSnapshot)
      };
    }

    function nextStateTemplateTitle() {
      let index = stateTemplates.length + 1;
      const titles = new Set(stateTemplates.map(template => String(template.title || "").toLowerCase()));
      while (titles.has(("State preset " + index).toLowerCase())) index++;
      return "State preset " + index;
    }

    function addBlankStateTemplate() {
      const template = {
        id: uid("tpl"),
        title: nextStateTemplateTitle(),
        body: "",
        components: [],
        data: {}
      };
      stateTemplates = [template, ...stateTemplates].slice(0, 40);
      editingTemplateId = template.id;
      stateExplorerCollapsed = false;
      saveStateTemplates("template:add:" + template.id);
      applyStateExplorerCollapsed();
      renderStateExplorer();
      showTemplateInspector(template, { selectTitle: true });
    }

    function addStateTemplateFromState(s) {
      const template = stateTemplateFromState(s);
      stateTemplates = [
        template,
        ...stateTemplates.filter(item => normalizeId(item.title) !== normalizeId(template.title))
      ].slice(0, 40);
      editingTemplateId = template.id;
      saveStateTemplates("template:add:" + template.id);
      stateExplorerCollapsed = false;
      applyStateExplorerCollapsed();
      renderStateExplorer();
      showTemplateInspector(template, { focus: false });
    }

    function updateTemplateFromSelectedState(templateId) {
      const selectedId = selectedNodeIdList()[0];
      const source = selectedId ? byId(selectedId) : null;
      if (!source) {
        modalAlert("Select a canvas state first, then update the preset from it.", "No state selected");
        return;
      }
      const snapshot = stateTemplateFromState(source);
      stateTemplates = stateTemplates.map(template => template.id === templateId ? { ...snapshot, id: template.id } : template);
      editingTemplateId = templateId;
      saveStateTemplates("template:update:" + templateId);
      renderStateExplorer();
      showTemplateInspector(stateTemplates.find(template => template.id === templateId), { focus: false });
    }

    async function deleteStateTemplate(templateId) {
      const template = stateTemplates.find(item => item.id === templateId);
      if (!template) return false;
      const ok = await modalConfirm(
        `Delete preset "${template.title || "State preset"}"? You can undo this if needed.`,
        "Delete preset",
        { confirmText: "Delete preset", danger: true }
      );
      if (!ok) return false;
      stateTemplates = stateTemplates.filter(template => template.id !== templateId);
      const deletedActiveTemplate = editingTemplateId === templateId;
      if (deletedActiveTemplate) editingTemplateId = null;
      saveStateTemplates("template:delete:" + templateId);
      renderStateExplorer();
      if (deletedActiveTemplate) showEmptyInspector();
      return true;
    }

    function addTemplateAtViewport(template) {
      const center = viewportCenterWorld();
      const instance = instantiateStateTemplate(template, center.x - nodeWidth(template) / 2, center.y - NODE_H / 2);
      model.states.push(...instance.states);
      model.transitions.push(...instance.transitions);
      selected = { type: "node", id: instance.root.id };
      saveModel();
      draw();
      showNodeInspector(instance.root, { forceOpen: true });
      startAppAtState(instance.root.id);
    }

    function addTemplateToCurrentLayer(template) {
      const position = currentLayerId
        ? nextChildPosition(currentLayerId)
        : viewportCenterWorld();
      const x = currentLayerId ? position.x : position.x - nodeWidth(template) / 2;
      const y = currentLayerId ? position.y : position.y - NODE_H / 2;
      const instance = instantiateStateTemplate(template, x, y, currentLayerId);
      model.states.push(...instance.states);
      model.transitions.push(...instance.transitions);
      selected = { type: "node", id: instance.root.id };
      saveModel("layer:add-template:" + (currentLayerId || "root"));
      draw();
      showNodeInspector(instance.root, { forceOpen: true });
      if (currentLayerId) syncToApp(false);
      else startAppAtState(instance.root.id);
      if (currentLayerId) fitView();
      return instance.root;
    }

    function makeStateFromTemplate(template, x, y, parentId = currentLayerId) {
      const s = makeState(x, y, template.title || nextStateTitle(), parentId);
      s.body = "";
      s.components = cloneComponents(template.components);
      s.data = normalizeDataObject(template.data);
      return s;
    }

    function instantiateStateTemplate(template, x, y, parentId = currentLayerId) {
      const root = makeStateFromTemplate(template, x, y, parentId);
      const rootSourceId = String(template.rootStateId || template.sourceStateId || template.id || root.id);
      const idMap = new Map([[rootSourceId, root.id], [String(template.id || ""), root.id]]);
      const states = [root];
      for (const child of snapshotTemplateStates(template)) {
        if (idMap.has(child.id)) continue;
        const sourceParentId = child.parentId || rootSourceId;
        const nextParentId = idMap.get(sourceParentId) || root.id;
        const next = makeState(child.x, child.y, child.title || nextStateTitle(), nextParentId);
        next.parentId = nextParentId;
        next.body = "";
        next.components = cloneComponents(child.components);
        next.data = normalizeDataObject(child.data);
        states.push(next);
        idMap.set(child.id, next.id);
      }
      const transitions = snapshotTemplateTransitions(template)
        .map(transition => {
          const from = idMap.get(transition.from);
          const to = idMap.get(transition.to);
          if (!from || !to) return null;
          return {
            id: uid("t"),
            from,
            to,
            label: transition.label || "Next",
            condition: transition.condition || "",
            set: normalizeDataObject(transition.set)
          };
        })
        .filter(Boolean);
      return { root, states, transitions };
    }

    function nextChildPosition(parentId) {
      const count = childStateCount(parentId);
      return {
        x: snapToGrid(120 + (count % 3) * GRID_SIZE * 10),
        y: snapToGrid(120 + Math.floor(count / 3) * GRID_SIZE * 6)
      };
    }

    function addTemplateInside(templateId, parentId, opts = {}) {
      const template = templateById(templateId);
      const parent = byId(parentId);
      if (!template || !parent) return null;
      const position = nextChildPosition(parent.id);
      const instance = instantiateStateTemplate(template, position.x, position.y, parent.id);
      model.states.push(...instance.states);
      model.transitions.push(...instance.transitions);
      currentLayerId = parent.id;
      selected = { type: "node", id: instance.root.id };
      saveModel("layer:add-child:" + parent.id);
      draw();
      showNodeInspector(instance.root, { forceOpen: true, selectTitle: Boolean(opts.selectTitle) });
      syncToApp(false);
      if (opts.fit !== false) fitView();
      return instance.root;
    }

    function addBlankStateInside(parentId, opts = {}) {
      const parent = byId(parentId);
      if (!parent) return null;
      const position = nextChildPosition(parent.id);
      const s = makeState(position.x, position.y, nextStateTitle(), parent.id);
      model.states.push(s);
      currentLayerId = parent.id;
      selected = { type: "node", id: s.id };
      saveModel("layer:add-child:" + parent.id);
      draw();
      showNodeInspector(s, { forceOpen: true, selectTitle: opts.selectTitle !== false });
      if (opts.fit !== false) fitView();
      return s;
    }

    function addTemplateAt(templateId, clientX, clientY) {
      const template = templateById(templateId);
      if (!template) return;
      const p = screenToWorldXY(clientX, clientY);
      const instance = instantiateStateTemplate(template, p.x - nodeWidth(template) / 2, p.y - NODE_H / 2);
      model.states.push(...instance.states);
      model.transitions.push(...instance.transitions);
      selected = { type: "node", id: instance.root.id };
      saveModel();
      draw();
      showNodeInspector(instance.root, { forceOpen: true });
      startAppAtState(instance.root.id);
    }

    function pointInElement(clientX, clientY, el) {
      const r = el.getBoundingClientRect();
      return clientX >= r.left && clientX <= r.right && clientY >= r.top && clientY <= r.bottom;
    }

    function renderStateExplorer() {
      stateExplorerListEl.innerHTML = "";
      const stopAction = evt => evt.stopPropagation();
      const appendSection = (label, items) => {
        const section = document.createElement("div");
        section.className = "state-explorer-section";
        const heading = document.createElement("div");
        heading.className = "state-explorer-label";
        heading.textContent = label;
        section.appendChild(heading);
        items.forEach(item => section.appendChild(item));
        stateExplorerListEl.appendChild(section);
      };
      const wireDraggableTemplate = (card, template) => {
        card.draggable = true;
        card.dataset.templateId = template.id;
        card.addEventListener("dragstart", evt => {
          evt.dataTransfer.effectAllowed = "copy";
          evt.dataTransfer.setData("text/state-template-id", template.id);
        });
      };
      const componentCards = builtinStateTemplates().map(template => {
        const card = document.createElement("div");
        card.className = "component-preset-card";
        card.innerHTML = `
          <div class="template-title"></div>
          <div class="template-body"></div>
          <div class="template-actions">
            <button class="template-use" type="button">+ ${escapeHtml(template.title)}</button>
            <button class="template-inside" type="button">Inside</button>
          </div>
        `;
        card.querySelector(".template-title").textContent = template.title;
        card.querySelector(".template-body").textContent = `${template.title} state preset`;
        card.querySelectorAll("button").forEach(button => {
          button.addEventListener("mousedown", stopAction);
          button.addEventListener("pointerdown", stopAction);
        });
        card.querySelector(".template-use").onclick = evt => {
          evt.stopPropagation();
          addTemplateToCurrentLayer(template);
        };
        const insideButton = card.querySelector(".template-inside");
        insideButton.title = "Add inside the selected state";
        insideButton.onclick = evt => {
          evt.stopPropagation();
          const target = selected?.type === "node" ? byId(selected.id) : null;
          if (!target) {
            void modalAlert("Select a state first, then add this preset inside it.", "No state selected");
            return;
          }
          addTemplateInside(template.id, target.id, { enter: true });
        };
        card.addEventListener("dblclick", evt => {
          if (evt.target.closest("button, input, textarea")) return;
          addTemplateToCurrentLayer(template);
        });
        wireDraggableTemplate(card, template);
        return card;
      });
      appendSection("Core", componentCards);

      const userItems = [];
      if (!stateTemplates.length) {
        const empty = document.createElement("div");
        empty.className = "state-template-empty";
        empty.textContent = "Drag a canvas state here, or use + Add preset for a custom state.";
        userItems.push(empty);
      }
      for (const template of stateTemplates) {
        const card = document.createElement("div");
        card.className = "state-template-card";
        if (editingTemplateId === template.id) card.classList.add("editing");
        card.innerHTML = `
          <div class="template-title"></div>
          <div class="template-body"></div>
          <div class="template-actions">
            <button class="template-use" type="button">Use</button>
            <button class="template-update" type="button">Update</button>
            <button class="template-delete danger" type="button">Delete</button>
          </div>
        `;
        card.querySelector(".template-title").textContent = template.title || "State preset";
        card.querySelector(".template-body").textContent = normalizeComponents(template.components).find(c => c.text)?.text || "Ready-to-use state";
        card.querySelectorAll("button").forEach(button => {
          button.addEventListener("mousedown", stopAction);
          button.addEventListener("pointerdown", stopAction);
        });
        card.querySelector(".template-use").onclick = evt => {
          evt.stopPropagation();
          addTemplateAtViewport(template);
        };
        card.querySelector(".template-update").onclick = evt => {
          evt.stopPropagation();
          updateTemplateFromSelectedState(template.id);
        };
        card.querySelector(".template-delete").onclick = evt => {
          evt.stopPropagation();
          void deleteStateTemplate(template.id);
        };
        card.addEventListener("click", evt => {
          if (evt.target.closest("button, input, textarea")) return;
          showTemplateInspector(template, { focus: false, saveSelection: true });
        });
        wireDraggableTemplate(card, template);
        card.addEventListener("dblclick", evt => {
          if (evt.target.closest("button, input, textarea")) return;
          addTemplateAtViewport(template);
        });
        userItems.push(card);
      }
      appendSection("Mine", userItems);
    }

    function addStateAt(x, y, showAtX, showAtY) {
      const title = nextStateTitle();
      const s = makeState(x - nodeWidth({ title }) / 2, y - NODE_H / 2, title);
      model.states.push(s);
      selected = { type: "node", id: s.id };
      saveModel();
      draw();
      showNodeInspector(s, { forceOpen: true, selectTitle: true });
    }

    function handleCanvasMove(evt) {
      if (boxSelecting) {
        boxSelecting.currentX = evt.clientX;
        boxSelecting.currentY = evt.clientY;
        boxSelecting.moved = Math.hypot(evt.clientX - boxSelecting.startX, evt.clientY - boxSelecting.startY) > 4;
        updateSelectRect();
        if (boxSelecting.moved) {
          const ids = nodesInSelection();
          selected = ids.length ? { type: "nodes", ids } : null;
          scheduleDraw();
        }
        return;
      }
      if (panning) {
        camera.x = panning.cameraX + (evt.clientX - panning.startX);
        camera.y = panning.cameraY + (evt.clientY - panning.startY);
        applyCamera();
        return;
      }
      if (dragging) {
        const s = byId(dragging.id);
        if (!s) return;
        dragging.moved = dragging.moved || Math.hypot(evt.clientX - dragging.startClientX, evt.clientY - dragging.startClientY) > 4;
        const p = screenToWorld(evt);
        s.x = snapClampToGrid(p.x - dragging.dx, WORLD_MIN_X, WORLD_MAX_X - nodeWidth(s));
        s.y = snapClampToGrid(p.y - dragging.dy, WORLD_MIN_Y, WORLD_MAX_Y - NODE_H);
        stateExplorerEl.classList.toggle("drag-over", pointInElement(evt.clientX, evt.clientY, stateExplorerEl));
        scheduleDraw();
        return;
      }
      if (connecting) {
        connecting.to = screenToWorld(evt);
        const target = connectionTargetAtWorldPoint(connecting.to);
        const nextTargetId = target?.id || null;
        if (nextTargetId !== connectingTargetId) connectingTargetId = nextTargetId;
        scheduleDraw();
      }
    }

    function handleCanvasEnd(evt) {
      if (boxSelecting) {
        if (boxSelecting.moved) {
          const ids = nodesInSelection();
          selected = ids.length ? { type: "nodes", ids } : null;
        } else {
          selected = null;
        }
        boxSelecting = null;
        updateSelectRect();
        saveSelection("selection:canvas");
        draw();
        return;
      }
      if (panning) {
        panning = null;
        mapEl.classList.remove("panning");
      }
      if (dragging) {
        const s = byId(dragging.id);
        const wasClick = !dragging.moved && Math.hypot(evt.clientX - dragging.startClientX, evt.clientY - dragging.startClientY) <= 4;
        const didMove = dragging.moved;
        const dragId = dragging.id;
        const shiftClick = dragging.shiftKey;
        const originalX = dragging.originalX;
        const originalY = dragging.originalY;
        dragging = null;
        mapEl.classList.remove("dragging-state");
        stateExplorerEl.classList.remove("drag-over");
        lastHistoryKey = null;
        if (wasClick && s) {
          if (shiftClick) {
            lastNodeClick = null;
            toggleSelection("node", s.id);
            draw();
            return;
          }
          const now = Date.now();
          setSingleSelection("node", s.id);
          lastNodeClick = { id: s.id, time: now, x: evt.clientX, y: evt.clientY };
          startAppAtState(s.id);
          showNodeInspector(s);
          return;
        }
        if (didMove) {
          lastNodeClick = null;
          if (s && pointInElement(evt.clientX, evt.clientY, stateExplorerEl)) {
            s.x = originalX;
            s.y = originalY;
            addStateTemplateFromState(s);
            draw();
            return;
          }
          saveModel("state:drag:" + dragId);
        }
      }
      if (connecting) {
        const dropPoint = screenToWorld(evt);
        const targetNode = connectingTargetId ? byId(connectingTargetId) : connectionTargetAtWorldPoint(dropPoint);
        const targetId = targetNode?.id;
        const wasRewire = Boolean(connecting.edgeId);
        if (targetId) {
          let t = connecting.edgeId ? model.transitions.find(item => item.id === connecting.edgeId) : null;
          const duplicate = transitionBetween(connecting.from, targetId, t?.id || null);
          if (duplicate) {
            if (t) {
              selected = { type: "edge", id: t.id };
              saveModel();
              connecting = null;
              connectingTargetId = null;
              mapEl.classList.remove("connecting");
              draw();
              return;
            }
            t = duplicate;
          } else if (t) {
            t.to = targetId;
          } else {
            t = { id: uid("t"), from: connecting.from, to: targetId, label: "Next", condition: "", set: {} };
            model.transitions.push(t);
          }
          selected = { type: "edge", id: t.id };
          saveModel();
          connecting = null;
          connectingTargetId = null;
          mapEl.classList.remove("connecting");
          draw();
          showEdgeInspector(t, { focus: !wasRewire, forceOpen: true });
          return;
        }
        if (isEdgeDropTarget(evt)) {
          connecting = null;
          connectingTargetId = null;
          mapEl.classList.remove("connecting");
          draw();
          return;
        }
        if (nodeAtWorldPoint(dropPoint)) {
          connecting = null;
          connectingTargetId = null;
          mapEl.classList.remove("connecting");
          draw();
          return;
        }
        if (!targetId) {
          const title = nextStateTitle();
          const s = makeState(dropPoint.x - nodeWidth({ title }) / 2, dropPoint.y - NODE_H / 2, title);
          let t = connecting.edgeId ? model.transitions.find(item => item.id === connecting.edgeId) : null;
          const duplicate = transitionBetween(connecting.from, s.id, t?.id || null);
          if (duplicate) {
            if (t) model.transitions = model.transitions.filter(item => item.id !== t.id);
            t = duplicate;
          } else if (t) {
            t.to = s.id;
          } else {
            t = { id: uid("t"), from: connecting.from, to: s.id, label: "Next", condition: "", set: {} };
            model.transitions.push(t);
          }
          model.states.push(s);
          selected = { type: "node", id: s.id };
          saveModel();
          connecting = null;
          connectingTargetId = null;
          mapEl.classList.remove("connecting");
          draw();
          if (!wasRewire) showNodeInspector(s, { selectTitle: true, forceOpen: true });
          return;
        }
        connecting = null;
        connectingTargetId = null;
        mapEl.classList.remove("connecting");
        draw();
      }
    }

    document.addEventListener("contextmenu", evt => evt.preventDefault());
    mapEl.addEventListener("wheel", evt => {
      if (evt.target?.closest?.(".state-explorer")) return;
      if (evt.ctrlKey || evt.metaKey) {
        evt.preventDefault();
        zoomByFactor(wheelZoomFactor(evt), evt.clientX, evt.clientY);
        return;
      }
    }, { passive: false });

    stateInspectorEl.addEventListener("wheel", evt => {
      evt.stopPropagation();
    }, { passive: true });

    mapEl.addEventListener("dblclick", evt => {
      const onEmpty = isEmptyCanvasTarget(evt.target);
      if (!onEmpty) return;
      const p = screenToWorld(evt);
      addStateAt(p.x, p.y, evt.clientX, evt.clientY);
    });

    mapEl.addEventListener("mousedown", evt => {
      if (Date.now() - lastTouchAt < 700) return;
      if (evt.button === 1 || evt.button === 2 || isSpaceDown) return startPanning(evt);
      if (isEmptyCanvasTarget(evt.target)) {
        if (evt.button !== 0) return;
        startPendingCanvasMouse(evt);
      }
    });

    mapEl.addEventListener("pointerdown", trackTouchStart, { capture: true, passive: false });

    mapEl.addEventListener("pointerdown", evt => {
      if (!isTouchPointer(evt) || !isEmptyCanvasTarget(evt.target)) return;
      evt.preventDefault();
      lastTouchAt = Date.now();
      if (pinchZoom) return;
      activePointerId = evt.pointerId;
      startPendingCanvasTouch(evt);
    }, { passive: false });

    window.addEventListener("mousemove", evt => {
      if (cancelStaleDesktopMouseGesture(evt)) return;
      if (updatePendingCanvasMouse(evt)) return;
      handleCanvasMove(evt);
    });

    window.addEventListener("mouseup", evt => {
      if (finishPendingCanvasMouse()) return;
      handleCanvasEnd(evt);
    });

    window.addEventListener("blur", () => {
      cancelActiveCanvasGesture();
    });

    document.addEventListener("mouseout", evt => {
      if (evt.relatedTarget || evt.buttons !== 1) return;
      cancelActiveCanvasGesture();
    });

    window.addEventListener("pointermove", evt => {
      if (!isTouchPointer(evt)) return;
      evt.preventDefault();
      rememberTouchPointer(evt);
      if (updatePinchZoom()) return;
      if (evt.pointerId !== activePointerId) return;
      if (updatePendingEdgeTouch(evt)) return;
      if (updatePendingCanvasTouch(evt)) return;
      handleCanvasMove(evt);
    }, { passive: false });

    window.addEventListener("pointerup", evt => {
      if (!isTouchPointer(evt)) return;
      evt.preventDefault();
      if (evt.pointerId === activePointerId) {
        if (finishPendingEdgeTouch(evt)) {
          activePointerId = null;
          forgetTouchPointer(evt);
          releaseTouchPointer(evt);
          return;
        }
        if (!finishPendingCanvasTap(evt)) handleCanvasEnd(evt);
        activePointerId = null;
      }
      clearLongPress();
      pendingCanvasTouch = null;
      pendingEdgeTouch = null;
      forgetTouchPointer(evt);
      releaseTouchPointer(evt);
    }, { passive: false });

    window.addEventListener("pointercancel", evt => {
      if (!isTouchPointer(evt)) return;
      clearLongPress();
      pendingCanvasTouch = null;
      pendingEdgeTouch = null;
      forgetTouchPointer(evt);
      releaseTouchPointer(evt);
      if (evt.pointerId !== activePointerId) return;
      cancelActiveCanvasGesture();
    });

    function handleKeyDown(evt) {
      const mod = evt.ctrlKey || evt.metaKey;
      const key = String(evt.key || "").toLowerCase();
      if (evt.altKey && evt.key === "ArrowLeft") {
        evt.preventDefault();
        evt.stopImmediatePropagation();
        exitCurrentLayer();
        return;
      }
      if (evt.altKey && evt.key === "ArrowRight" && selected?.type === "node") {
        evt.preventDefault();
        evt.stopImmediatePropagation();
        enterStateLayer(selected.id);
        return;
      }
      if (mod && evt.code === "Space") {
        evt.preventDefault();
        evt.stopImmediatePropagation();
        stateExplorerCollapsed = !stateExplorerCollapsed;
        applyStateExplorerCollapsed();
        return;
      }
      if (mod && (key === "z" || evt.code === "KeyZ")) {
        evt.preventDefault();
        evt.stopImmediatePropagation();
        if (evt.shiftKey) redoModel();
        else undoModel();
        return;
      }
      if (mod && (key === "y" || evt.code === "KeyY")) {
        evt.preventDefault();
        evt.stopImmediatePropagation();
        redoModel();
        return;
      }
      if (mod && (key === "s" || evt.code === "KeyS")) {
        evt.preventDefault();
        evt.stopImmediatePropagation();
        saveDefinitionFile();
        return;
      }
      if (mod && (key === "o" || evt.code === "KeyO")) {
        evt.preventDefault();
        evt.stopImmediatePropagation();
        requestLoadBlueprintFile();
        return;
      }
      if (evt.key === "Delete" && selected && deleteSelectedItems()) {
        evt.preventDefault();
        evt.stopImmediatePropagation();
        return;
      }
      if (isEditableTarget(evt.target)) return;
      if (evt.code === "Space") {
        isSpaceDown = true;
        mapEl.classList.add("panning");
        evt.preventDefault();
      }
      if (evt.key === "Backspace" && selected && deleteSelectedItems()) {
        evt.preventDefault();
        evt.stopImmediatePropagation();
      }
    }

    function handleBeforeInput(evt) {
      if (evt.inputType !== "historyUndo" && evt.inputType !== "historyRedo") return;
      evt.preventDefault();
      evt.stopImmediatePropagation();
      if (evt.inputType === "historyUndo") undoModel();
      else redoModel();
    }

    document.addEventListener("keydown", handleKeyDown, { capture: true });
    document.addEventListener("beforeinput", handleBeforeInput, { capture: true });

    window.addEventListener("keyup", evt => {
      if (evt.code === "Space") {
        isSpaceDown = false;
        if (!panning) mapEl.classList.remove("panning");
      }
    });

    window.addEventListener("message", evt => {
      const data = evt.data || {};
      if (data.type === "STATE_BLUEPRINT_SHORTCUT") {
        if (data.action === "save") saveDefinitionFile();
        if (data.action === "load") requestLoadBlueprintFile();
        return;
      }
      if (data.type !== "STATE_BLUEPRINT_RUNTIME_STATE") return;
      currentAppState = data.current || null;
      if (pendingAppStartStateId === currentAppState) pendingAppStartStateId = null;
      lastAppTransitionId = data.transitionId || null;
      draw();
      if (lastAppTransitionId) {
        const id = lastAppTransitionId;
        setTimeout(() => {
          if (lastAppTransitionId === id) {
            lastAppTransitionId = null;
            draw();
          }
        }, 900);
      }
    });

    function loadEditorModel(nextModel, shouldFit = true) {
      model = normalizeModel(nextModel);
      selected = null;
      dragging = null;
      connecting = null;
      connectingTargetId = null;
      boxSelecting = null;
      currentAppState = null;
      lastAppTransitionId = null;
      hoveredEdgeId = null;
      showEmptyInspector();
      updateSelectRect();
      initHistory();
      saveModel();
      if (shouldFit) fitView();
      draw();
      syncToApp(true);
    }

    document.getElementById("btnNew").onclick = async () => {
      const ok = await modalConfirm("Canvas wirklich neu und leer starten?", "New canvas", {
        confirmText: "Neu starten",
        danger: true
      });
      if (!ok) return;
      loadEditorModel(blankModel(), true);
    };
    document.getElementById("btnSave").onclick = saveDefinitionFile;
    document.getElementById("btnLoad").onclick = requestLoadBlueprintFile;
    document.getElementById("btnExport").onclick = exportHtmlFile;
    fileLoadEl.onchange = () => loadBlueprintFile(fileLoadEl.files?.[0]);
    document.getElementById("btnUndo").onclick = undoModel;
    document.getElementById("btnRedo").onclick = redoModel;
    btnSelectionCopy.onclick = copySelectedNodes;
    btnSelectionDelete.onclick = deleteSelectedNodes;
    btnToggleInspector.onclick = () => {
      inspectorCollapsed = !inspectorCollapsed;
      applyInspectorCollapsed();
    };
    document.getElementById("btnFit").onclick = fitView;
    document.getElementById("btnResetView").onclick = resetView;
    document.getElementById("btnRun").onclick = () => syncToApp(true);
    document.getElementById("btnOpen").onclick = () => {
      appWindow = window.open(APP_URL, "state_blueprint_app", "width=480,height=760");
      setTimeout(() => syncToApp(true), 300);
    };
    document.getElementById("btnReset").onclick = async () => {
      const ok = await modalConfirm("Demo-Modell wirklich resetten?", "Demo reset", {
        confirmText: "Reset",
        danger: true
      });
      if (!ok) return;
      loadEditorModel(demoModel(), true);
    };
    btnTogglePreview.onclick = () => {
      togglePreviewCollapsed();
    };
    mobileTabEls.forEach(button => {
      button.onclick = () => setMobileWorkspaceView(button.dataset.mobileView);
    });
    btnToggleStateExplorer.onclick = () => {
      stateExplorerCollapsed = !stateExplorerCollapsed;
      applyStateExplorerCollapsed();
    };
    btnAddStateTemplate.onclick = () => addBlankStateTemplate();

    stateExplorerEl.addEventListener("dragenter", evt => {
      evt.preventDefault();
      stateExplorerEl.classList.add("drag-over");
    });
    stateExplorerEl.addEventListener("dragover", evt => {
      evt.preventDefault();
      stateExplorerEl.classList.add("drag-over");
    });
    stateExplorerEl.addEventListener("dragleave", evt => {
      if (!stateExplorerEl.contains(evt.relatedTarget)) stateExplorerEl.classList.remove("drag-over");
    });
    stateExplorerEl.addEventListener("drop", evt => {
      evt.preventDefault();
      stateExplorerEl.classList.remove("drag-over");
    });

    mapEl.addEventListener("dragover", evt => {
      if (!evt.dataTransfer.types.includes("text/state-template-id")) return;
      evt.preventDefault();
      evt.dataTransfer.dropEffect = "copy";
    });
    mapEl.addEventListener("drop", evt => {
      const templateId = evt.dataTransfer.getData("text/state-template-id");
      if (!templateId) return;
      evt.preventDefault();
      addTemplateAt(templateId, evt.clientX, evt.clientY);
    });

    frameEl.addEventListener("load", () => {
      persistModel(false);
      if (pendingAppStartStateId && byId(pendingAppStartStateId)) startAppAtState(pendingAppStartStateId);
      else syncToApp(true);
    });
    frameEl.src = APP_URL;

    worldEl.style.width = WORLD_W + "px";
    worldEl.style.height = WORLD_H + "px";
    wiresEl.setAttribute("viewBox", `${WORLD_MIN_X} ${WORLD_MIN_Y} ${WORLD_W} ${WORLD_H}`);
    wiresEl.style.left = WORLD_MIN_X + "px";
    wiresEl.style.top = WORLD_MIN_Y + "px";
    wiresEl.style.width = WORLD_W + "px";
    wiresEl.style.height = WORLD_H + "px";

    normalizeModel(model);
    initHistory();
    applyPreviewCollapsed();
    applyInspectorCollapsed();
    applyMobileWorkspaceView();
    applyStateExplorerCollapsed();
    renderStateExplorer();
    persistStateTemplates();
    applyCamera();
    initMapRenderer();
    persistModel();
    draw();
    setTimeout(fitView, 50);
  </script>
</body>
</html>
