        </div>
        <div class="field"><label>Condition</label><input id="pCond" list="pCondDataList" placeholder="accepted, amount >= 10, !blocked"><datalist id="pCondDataList"></datalist></div>
        <div id="pCondPreview" class="condition-preview"></div>
        <div class="field"><label>Set data</label><textarea id="pSet" spellcheck="false" placeholder='{"name":"Ada"}'></textarea></div>
        <div id="pSetPreview" class="condition-preview empty"></div>
        <div class="small">Condition unmet zeigt Validierung. State-Wechsel passieren nur ueber sichtbare Transition-Linien.</div>
        <div class="row" style="margin-top:10px">
          <button id="pDelete" class="danger">Delete</button>
        </div>
      `;
      const label = root.querySelector("#pLabel");
      const triggerType = root.querySelector("#pTriggerType");
      const triggerEvent = root.querySelector("#pTriggerEvent");
      const triggerEventList = root.querySelector("#pTriggerEventList");
      const transitionKeyGrid = root.querySelector("#pTransitionKeyGrid");
      const triggerTimer = root.querySelector("#pTriggerTimer");
      const cond = root.querySelector("#pCond");
      const condDataList = root.querySelector("#pCondDataList");
      const condPreview = root.querySelector("#pCondPreview");
      const set = root.querySelector("#pSet");
      const setPreview = root.querySelector("#pSetPreview");
      label.value = transitionDisplayLabel(t);
      triggerType.value = normalizeTransitionTriggerType(t);
      triggerEvent.value = t.triggerEvent || "";
      triggerTimer.value = String(normalizeTransitionTimerMs(t.timerMs));
      const triggerSuggestions = new Set(["*", "state.current", defaultTransitionEvent(t), "button.next.clicked"]);
      const sourceState = byId(t.from);
      normalizeSubscriptions(sourceState?.subscriptions).forEach(path => { triggerSuggestions.add(path); if (path !== "*") triggerSuggestions.add("change." + path); });
      conditionDataSuggestions(t).forEach(item => { triggerSuggestions.add(item.path); if (item.path !== "*") triggerSuggestions.add("change." + item.path); });
      triggerEventList.innerHTML = Array.from(triggerSuggestions).filter(Boolean).map(value => "<option value=\"" + escapeHtml(value) + "\"></option>").join("");
      cond.value = t.condition || "";
      set.value = JSON.stringify(normalizeDataObject(t.set), null, 2);
      const currentTriggerPath = () => {
        if (normalizeTransitionTriggerType({ triggerType: triggerType.value }) !== "change") return "";
        const event = normalizeTransitionEvent(triggerEvent.value || "");
        if (!event) return "*";
        return event.startsWith("change.") ? event.slice("change.".length) : event;
      };
      const transitionBusLabel = item => {
        const path = String(item?.path || "");
        if (path === "*") return "Any listened key";
        if (path === "state.current") return "Current state";
        return dataPathLabel(path, "Value");
      };
      const transitionBusMeta = item => `${item.source || "globalState"} / ${item.type || "value"}`;
      const transitionBusSuggestions = () => {
        const seen = new Set();
        const add = item => {
          const path = normalizeBindingPath(item?.path || "", "");
          if (!path || isRuntimeBookkeepingPath(path) || /(?:^|\.)\d+(?:\.|$)/.test(path) || seen.has(path)) return null;
          seen.add(path);
          return { ...item, path };
        };
        const items = [{ path: "*", source: "source state", type: "change" }];
        conditionDataSuggestions(t).forEach(item => {
          const added = add(item);
          if (added) items.push(added);
        });
        return items.slice(0, 28);
      };
      const applyConditionPath = path => {
        const key = normalizeBindingPath(path, "");
        if (!key) return;
        const current = String(cond.value || "").trim();
        if (!current) cond.value = key;
        else if (!new RegExp("(^|[^A-Za-z0-9_.])" + key.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + "([^A-Za-z0-9_.]|$)").test(current)) {
          cond.value = current + " && " + key;
        }
        t.condition = cond.value;
        updateConditionPreview();
        saveModel("edge:condition:" + t.id);
        draw();
      };
      const renderTransitionKeyGrid = () => {
        if (!transitionKeyGrid) return;
        transitionKeyGrid.innerHTML = "";
        const currentPath = currentTriggerPath();
        const conditionText = String(cond.value || "");
        const suggestions = transitionBusSuggestions();
        if (!suggestions.length) {
          const empty = document.createElement("div");
          empty.className = "condition-preview empty";
          empty.textContent = "Add state data or listen to bus keys on the source state.";
          transitionKeyGrid.appendChild(empty);
          return;
        }
        for (const item of suggestions) {
          const path = String(item.path || "");
          const isAny = path === "*";
          const activeTrigger = currentPath === path;
          const activeCondition = !isAny && new RegExp("(^|[^A-Za-z0-9_.])" + path.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + "([^A-Za-z0-9_.]|$)").test(conditionText);
          const card = document.createElement("div");
          card.className = "global-state-key-card" + (activeTrigger ? " active" : "");
          card.dataset.path = path;
          card.title = path;
          const title = document.createElement("div");
          title.className = "global-state-key-title";
          title.textContent = transitionBusLabel(item);
          const pathLine = document.createElement("div");
          pathLine.className = "global-state-key-path";
          pathLine.textContent = path;
          const meta = document.createElement("div");
          meta.className = "global-state-key-meta";
          meta.textContent = transitionBusMeta(item);
          const actions = document.createElement("div");
          actions.className = "global-state-key-actions";
          const onChange = document.createElement("button");
          onChange.type = "button";
          onChange.className = activeTrigger ? "active" : "";
          onChange.textContent = activeTrigger ? "On change" : "Use change";
          onChange.title = isAny ? "Fire when any listened key changes" : "Fire when " + path + " changes";
          onChange.onclick = evt => {
            evt.preventDefault();
            triggerType.value = "change";
            triggerEvent.value = isAny ? "" : "change." + path;
            persistTrigger();
            renderTransitionKeyGrid();
          };
          const condition = document.createElement("button");
          condition.type = "button";
          condition.className = activeCondition ? "active" : "";
          condition.textContent = activeCondition ? "Filter set" : "Condition";
          condition.disabled = isAny;
          condition.title = "Use " + path + " in this transition condition";
          condition.onclick = evt => {
            evt.preventDefault();
            applyConditionPath(path);
          };
          actions.append(onChange, condition);
          card.append(title, pathLine, meta, actions);
          transitionKeyGrid.appendChild(card);
        }
      };
      const updateConditionPreview = () => {
        const summary = conditionInputSummary(cond.value);
        const suggestions = conditionDataSuggestions(t);
        renderConditionSuggestions(condDataList, suggestions);
        const dataSummary = suggestions.length
          ? `Data: ${suggestions.slice(0, 8).map(item => item.path).join(", ")}${suggestions.length > 8 ? " ..." : ""}`
          : "No state data paths available.";
        condPreview.textContent = `${summary} · ${dataSummary}`;
        condPreview.classList.toggle("empty", summary === "No inputs. Always available." && !suggestions.length);
        renderTransitionKeyGrid();
      };
      const updateSetPreview = () => {
        try {
          const parsed = JSON.parse(set.value || "{}");
          if (!isPlainObject(parsed)) throw new Error("Set data must be a JSON object.");
          t.set = normalizeDataObject(parsed);
          setPreview.textContent = Object.keys(t.set).length ? "Data will be merged before entering the target state." : "No data changes.";
          setPreview.classList.toggle("empty", !Object.keys(t.set).length);
          saveEditorState("edge:set:" + t.id, true);
        } catch (err) {
          setPreview.textContent = err.message || "Invalid JSON.";
          setPreview.classList.remove("empty");
        }
      };
      updateConditionPreview();
      updateSetPreview();
      function persistTrigger() {
        const nextType = normalizeTransitionTriggerType({ triggerType: triggerType.value });
        t.triggerType = nextType;
        t.triggerEvent = normalizeTransitionEvent(triggerEvent.value || (nextType === "change" ? "" : defaultTransitionEvent(t)));
        t.timerMs = normalizeTransitionTimerMs(triggerTimer.value);
        saveModel("edge:trigger:" + t.id);
        scheduleSync();
        renderTransitionKeyGrid();
      }
      triggerType.oninput = () => { if (triggerType.value === "change" && /^button\./.test(triggerEvent.value)) triggerEvent.value = ""; persistTrigger(); };
      triggerEvent.oninput = persistTrigger;
      triggerTimer.oninput = persistTrigger;
      label.oninput = () => {
        t.label = label.value || defaultTransitionLabel(t);
        stateInspectorTitleEl.textContent = "Transition: " + transitionDisplayLabel(t);
        saveModel("edge:label:" + t.id);
        draw();
      };
      cond.oninput = () => { t.condition = cond.value; updateConditionPreview(); saveModel("edge:condition:" + t.id); draw(); };
      set.oninput = updateSetPreview;
      set.addEventListener("input", updateSetPreview);
      set.addEventListener("change", updateSetPreview);
      let lastSetValue = set.value;
      const pollSetPreview = () => {
        if (!document.contains(set)) return;
        if (set.value !== lastSetValue) {
          lastSetValue = set.value;
          updateSetPreview();
        }
        requestAnimationFrame(pollSetPreview);
      };
      requestAnimationFrame(pollSetPreview);
      label.onblur = cond.onblur = set.onblur = () => { lastHistoryKey = null; };
      root.querySelector("#pDelete").onclick = () => {
        selected = selectionFromParts([], [t.id]);
        deleteSelectedItems();
      };
      const focusEditor = opts.focus === true;
      if (focusEditor) allowInspectorProgrammaticFocusUntil = Date.now() + 400;
      transitionInspectorKeyboardEditing = focusEditor;
      setupEditorAccessibility(root, focusEditor, {
        onCommit: () => {
          showEmptyInspector();
          focusCanvasForSelection();
        },
        selectFirstInput: focusEditor
      });
      if (!focusEditor) keepCanvasFocusAfterTransitionSelect(t.id);
    }

    function isEditableTarget(target) {
      return target?.closest?.("input, textarea, select, [contenteditable]");
    }

    function focusCanvasForSelection() {
      mapEl.focus({ preventScroll: true });
    }

    function eventTargetsCanvasForDelete(evt) {
      const target = evt.target;
      if (isEditableTarget(target)) return false;
      if (target?.closest?.(".state-explorer, .inspector, .modal-backdrop, button, input, textarea, select, [contenteditable]")) return false;
      const active = document.activeElement;
      if (active && active !== document.body && active !== mapEl && !mapEl.contains(active)) return false;
      return target === mapEl || mapEl.contains(target) || active === mapEl || mapEl.contains(active);
    }

    function keepCanvasFocusAfterTransitionSelect(edgeId) {
      const focusCanvas = () => {
        if (inspectorEdgeId !== edgeId) return;
        const active = document.activeElement;
        if (active && stateInspectorBodyEl.contains(active) && isEditableTarget(active)) active.blur();
        focusCanvasForSelection();
      };
      focusCanvas();
      requestAnimationFrame(focusCanvas);
      setTimeout(focusCanvas, 0);
      setTimeout(focusCanvas, 90);
    }

    stateInspectorBodyEl.addEventListener("pointerdown", () => {
      lastInspectorPointerDownAt = Date.now();
    }, { capture: true });

    stateInspectorBodyEl.addEventListener("focusin", evt => {
      if (!stateInspectorEl.classList.contains("transition-inspector")) return;
      if (!isEditableTarget(evt.target)) return;
      if (transitionInspectorKeyboardEditing) return;
      if (Date.now() < allowInspectorProgrammaticFocusUntil) return;
      if (Date.now() - lastInspectorPointerDownAt < 300) return;
      evt.target.blur();
      focusCanvasForSelection();
    }, { capture: true });

    function escapeHtml(text) {
      return String(text).replace(/[&<>"]/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[ch]));
    }

    function snapshotModelForRuntime() {
      const snap = normalizeModel(JSON.parse(JSON.stringify(model)));
      snap.transitions.forEach(t => {
        const source = projectedTransitionSource(t);
        const layerId = t.from ? stateParentId(byId(t.from)) : null;
        const index = Math.max(0, transitionsInLayer(layerId).findIndex(item => item.id === source?.id));
        t._runtimeHue = (195 + index * 137.508) % 360;
      });
      return snap;
    }

    function appFrameContainsGeneratedApp() {
      if (!frameEl.contentWindow) return false;
      try {
        return frameEl.contentWindow.location.href === APP_URL;
      } catch (_) {
        return false;
      }
    }

    function reloadAppFrame(payload = null, opts = {}) {
      if (payload) pendingFramePayload = payload;
      else if (opts.preserveCurrent && currentAppState && byId(currentAppState)) {
        pendingAppStartStateId = currentAppState;
        pendingAppStartSuppressLayerFollow = false;
      }
      appFrameReady = false;
      frameEl.src = APP_URL;
    }

    function postRuntimePayload(payload) {
      if (appFrameReady && frameEl.contentWindow) {
        if (!appFrameContainsGeneratedApp()) {
          reloadAppFrame(payload);
        } else {
          try {
            frameEl.contentWindow.postMessage(payload, "*");
            pendingFramePayload = null;
          } catch (_) {
            pendingFramePayload = payload;
          }
        }
      } else {
        pendingFramePayload = payload;
      }
      if (appWindow && !appWindow.closed) {
        try { appWindow.postMessage(payload, "*"); } catch (_) {}
      }
    }

    function syncToApp(reset) {
      syncStateEl.textContent = reset ? "reset" : "live";
      if (reset) {
        pendingAppStartStateId = null;
        pendingAppStartSuppressLayerFollow = false;
      }
      const payload = {
        type: "STATE_BLUEPRINT_MODEL",
        model: snapshotModelForRuntime(),
        reset: Boolean(reset),
        preserveFocus: !reset
      };
      postRuntimePayload(payload);
      setTimeout(() => { syncStateEl.textContent = "live"; }, 400);
    }

    function startAppAtState(id, opts = {}) {
      if (!byId(id)) return;
      runtimeLayerFollowEnabled = Boolean(opts.allowLayerFollow);
      if (opts.suppressLayerFollow) suppressRuntimeLayerFollowUntil = Date.now() + 1200;
      currentAppState = id;
      pendingAppStartStateId = id;
      pendingAppStartSuppressLayerFollow = Boolean(opts.suppressLayerFollow);
      syncStateEl.textContent = "start";
      const payload = {
        type: "STATE_BLUEPRINT_MODEL",
        model: snapshotModelForRuntime(),
        reset: true,
        startStateId: id,
        preserveFocus: Boolean(opts.preserveFocus)
      };
      postRuntimePayload(payload);
      draw();
      setTimeout(() => { syncStateEl.textContent = "live"; }, 400);
    }

    function safeExternalAppUrl(url) {
      const raw = String(url || "").trim();
      if (!raw) return "";
      try {
        const parsed = new URL(raw);
        return parsed.protocol === "http:" || parsed.protocol === "https:" ? parsed.href : "";
      } catch (_) {
        return "";
      }
    }

    function openPreviewExternalUrl(url) {
      const href = safeExternalAppUrl(url);
      if (!href) return;
      try { window.open(href, "_blank", "noopener,noreferrer"); } catch (_) {}
    }

    function nextStateTitle() {
      let i = model.states.length + 1;
      const titles = new Set(model.states.map(s => String(s.title || "").toLowerCase()));
      while (titles.has(("State " + i).toLowerCase())) i++;
      return "State " + i;
    }

    function makeState(x, y, title, parentId = currentLayerId) {
      title = title || nextStateTitle();
      let base = normalizeId(title);
      let id = base;
      let i = 2;
      const ids = new Set(model.states.map(s => s.id));
      while (ids.has(id)) id = base + "_" + i++;
      const state = {
        id,
        title,
        renderMode: "state",
        components: [],
        data: {},
        dataSource: normalizeDataSource(null),
        repeat: normalizeRepeatConfig(null),
        dataWires: [],
        boundary: normalizeBoundaryConfig(null),
        parentId: parentId && byId(parentId) ? parentId : null,
        x,
        y
      };
      state.x = snapClampToGrid(x, WORLD_MIN_X, WORLD_MAX_X - nodeWidth(state));
      state.y = snapClampToGrid(y, WORLD_MIN_Y, WORLD_MAX_Y - NODE_H);
      return state;
    }

    function stateTemplateFromState(s) {
      const ids = descendantStateIds([s.id]);
      const childIds = [...ids].filter(id => id !== s.id);
      return {
        id: uid("tpl"),
        rootStateId: s.id,
        title: s.title || s.id,
        renderMode: normalizeStateRenderMode(s.renderMode),
        components: cloneComponents(s.components),
        data: normalizeDataObject(s.data),
        dataSource: normalizeDataSource(s.dataSource),
        repeat: normalizeRepeatConfig(s.repeat),
        subscriptions: normalizeSubscriptions(s.subscriptions),
        boundary: normalizeBoundaryConfig(s.boundary),
        states: childIds.map(id => byId(id)).filter(Boolean).map(stateExportSnapshot),
        transitions: model.transitions
          .filter(transition => ids.has(transition.from) && ids.has(transition.to))
          .map(transitionExportSnapshot)
      };
    }

    function nextStateTemplateTitle() {
      let index = stateTemplates.length + 1;
      const titles = new Set(stateTemplates.map(template => String(template.title || "").toLowerCase()));
      while (titles.has(("State preset " + index).toLowerCase())) index++;
      return "State preset " + index;
    }

    function addBlankStateTemplate() {
      const template = {
        id: uid("tpl"),
        title: nextStateTemplateTitle(),
        renderMode: "state",
        components: [],
        data: {},
        dataSource: normalizeDataSource(null),
        repeat: normalizeRepeatConfig(null)
      };
      stateTemplates = [template, ...stateTemplates].slice(0, 40);
      editingTemplateId = template.id;
      stateExplorerCollapsed = false;
      saveStateTemplates("template:add:" + template.id);
      applyStateExplorerCollapsed();
      renderStateExplorer();
      showTemplateInspector(template, { selectTitle: true });
    }

    function addStateTemplateFromState(s) {
      const template = stateTemplateFromState(s);
      stateTemplates = [
        template,
        ...stateTemplates.filter(item => normalizeId(item.title) !== normalizeId(template.title))
      ].slice(0, 40);
      editingTemplateId = template.id;
      saveStateTemplates("template:add:" + template.id);
      stateExplorerCollapsed = false;
      applyStateExplorerCollapsed();
      renderStateExplorer();
      showTemplateInspector(template, { focus: false });
    }

    function updateTemplateFromSelectedState(templateId) {
      const selectedId = selectedNodeIdList()[0];
      const source = selectedId ? byId(selectedId) : null;
      if (!source) {
        modalAlert("Select a canvas state first, then update the preset from it.", "No state selected");
        return;
      }
      const snapshot = stateTemplateFromState(source);
      stateTemplates = stateTemplates.map(template => template.id === templateId ? { ...snapshot, id: template.id } : template);
      editingTemplateId = templateId;
      saveStateTemplates("template:update:" + templateId);
      renderStateExplorer();
      showTemplateInspector(stateTemplates.find(template => template.id === templateId), { focus: false });
    }

    async function deleteStateTemplate(templateId) {
      const template = stateTemplates.find(item => item.id === templateId);
      if (!template) return false;
      const ok = await modalConfirm(
        `Delete preset "${template.title || "State preset"}"? You can undo this if needed.`,
        "Delete preset",
        { confirmText: "Delete preset", danger: true }
      );
      if (!ok) return false;
      stateTemplates = stateTemplates.filter(template => template.id !== templateId);
      const deletedActiveTemplate = editingTemplateId === templateId;
      if (deletedActiveTemplate) editingTemplateId = null;
      saveStateTemplates("template:delete:" + templateId);
      renderStateExplorer();
      if (deletedActiveTemplate) showEmptyInspector();
      return true;
    }

    function addTemplateAtViewport(template) {
      const center = viewportCenterWorld();
      const instance = instantiateStateTemplate(template, center.x - nodeWidth(template) / 2, center.y - NODE_H / 2);
      model.states.push(...instance.states);
      model.transitions.push(...instance.transitions);
      selected = selectionFromParts([instance.root.id], []);
      saveModel();
      draw();
      showNodeInspector(instance.root, { forceOpen: true });
      startAppAtState(instance.root.id);
    }

    function addTemplateToCurrentLayer(template) {
      const position = currentLayerId
        ? nextChildPosition(currentLayerId)
        : viewportCenterWorld();
      const x = currentLayerId ? position.x : position.x - nodeWidth(template) / 2;
      const y = currentLayerId ? position.y : position.y - NODE_H / 2;
      const instance = instantiateStateTemplate(template, x, y, currentLayerId);
      model.states.push(...instance.states);
      model.transitions.push(...instance.transitions);
      if (currentLayerId) wireFirstChildToBoundary(byId(currentLayerId), instance.root);
      selected = selectionFromParts([instance.root.id], []);
      saveModel("layer:add-template:" + (currentLayerId || "root"));
      draw();
      showNodeInspector(instance.root, { forceOpen: true });
      if (currentLayerId) syncToApp(false);
      else startAppAtState(instance.root.id);
      return instance.root;
    }

    function stateDataScope(state) {
      return `states.${normalizeId(state?.id || state?.title || "state")}`;
    }

    function expandStateScopedPath(path, state) {
      const text = String(path || "").trim();
      if (!text) return "";
      if (text === "$state") return stateDataScope(state);
      if (text.startsWith("$state.")) return stateDataScope(state) + text.slice("$state".length);
      return text;
    }

    function expandStateScopedText(value, state) {
      return String(value || "").replace(/\$state(?=\.|\b)/g, stateDataScope(state));
    }

    function expandStateScopedValue(value, state) {
      if (typeof value === "string") return expandStateScopedText(value, state);
      if (Array.isArray(value)) return value.map(item => expandStateScopedValue(item, state));
      if (!isPlainObject(value)) return value;
      return Object.fromEntries(Object.entries(value).map(([key, item]) => [key, expandStateScopedValue(item, state)]));
    }

    function expandStateScopedDataObject(data, state) {
      const out = {};
      for (const [key, value] of Object.entries(normalizeDataObject(data))) {
        const scopedKey = expandStateScopedPath(key, state);
        const cleanKey = normalizeBindingPath(scopedKey, "");
        if (cleanKey) out[cleanKey] = expandStateScopedValue(value, state);
      }
      return out;
    }

    function expandStateScopedComponent(component, state) {
      const next = { ...component };
      if (next.dataPath) next.dataPath = normalizeBindingPath(expandStateScopedPath(next.dataPath, state), "");
      if (next.text) next.text = expandStateScopedText(next.text, state);
      if (next.url) next.url = expandStateScopedText(next.url, state);
      if (next.type === "list") {
        next.items = normalizeListItems(next.items, next.text).map(item => ({
          ...item,
          text: expandStateScopedText(item.text, state),
          url: expandStateScopedText(item.url, state)
        }));
      }
      return next;
    }

    function applyStateScopedTemplateBindings(state) {
      state.data = expandStateScopedDataObject(state.data, state);
      state.components = normalizeComponents(state.components).map(component => expandStateScopedComponent(component, state));
    }

    function makeStateFromTemplate(template, x, y, parentId = currentLayerId) {
      const s = makeState(x, y, template.title || nextStateTitle(), parentId);
      s.renderMode = normalizeStateRenderMode(template.renderMode);
      s.components = cloneComponents(template.components);
      s.data = normalizeDataObject(template.data);
      s.dataSource = normalizeDataSource(template.dataSource);
      s.repeat = normalizeRepeatConfig(template.repeat);
      s.dataWires = normalizeDataWires(template.dataWires);
      s.subscriptions = normalizeSubscriptions(template.subscriptions);
      s.boundary = normalizeBoundaryConfig(template.boundary);
      applyStateScopedTemplateBindings(s);
      return s;
    }

    function instantiateStateTemplate(template, x, y, parentId = currentLayerId) {
      const root = makeStateFromTemplate(template, x, y, parentId);
      const rootSourceId = String(template.rootStateId || template.id || root.id);
      const idMap = new Map([[rootSourceId, root.id], [String(template.id || ""), root.id]]);
      const states = [root];
      for (const child of snapshotTemplateStates(template)) {
        if (idMap.has(child.id)) continue;
        const sourceParentId = child.parentId || rootSourceId;
        const nextParentId = idMap.get(sourceParentId) || root.id;
        const next = makeState(child.x, child.y, child.title || nextStateTitle(), nextParentId);
        next.parentId = nextParentId;
        next.renderMode = normalizeStateRenderMode(child.renderMode);
        next.components = cloneComponents(child.components);
        next.data = normalizeDataObject(child.data);
        next.dataSource = normalizeDataSource(child.dataSource);
        next.repeat = normalizeRepeatConfig(child.repeat);
        next.dataWires = normalizeDataWires(child.dataWires);
        next.subscriptions = normalizeSubscriptions(child.subscriptions);
        next.boundary = normalizeBoundaryConfig(child.boundary);
        applyStateScopedTemplateBindings(next);
        states.push(next);
        idMap.set(child.id, next.id);
      }
      for (const state of states) {
        state.boundary = normalizeBoundaryConfig(state.boundary);
        state.boundary.entryId = idMap.get(state.boundary.entryId) || "";
        state.boundary.exitId = idMap.get(state.boundary.exitId) || "";
      }
      const transitions = snapshotTemplateTransitions(template)
        .map(transition => {
          const from = idMap.get(transition.from);
          const to = idMap.get(transition.to);
          if (!from || !to) return null;
          return {
            id: uid("t"),
            from,
            to,
            label: transition.label || defaultTransitionLabel({ from, to }),
            condition: transition.condition || "",
            triggerType: normalizeTransitionTriggerType(transition),
            triggerEvent: normalizeTransitionEvent(transition.triggerEvent || defaultTransitionEvent(transition)),
            timerMs: normalizeTransitionTimerMs(transition.timerMs),
            set: normalizeDataObject(transition.set),
            groupEntryId: transition.groupEntryId ? (idMap.get(transition.groupEntryId) || "") : "",
            groupExitId: transition.groupExitId ? (idMap.get(transition.groupExitId) || "") : ""
          };
        })
        .filter(Boolean);
      return { root, states, transitions };
    }

    function nextChildPosition(parentId) {
      const count = childStateCount(parentId);
      return {
        x: snapToGrid(120 + (count % 3) * GRID_SIZE * 10),
        y: snapToGrid(120 + Math.floor(count / 3) * GRID_SIZE * 6)
      };
    }

    function addTemplateInside(templateId, parentId, opts = {}) {
      const template = templateById(templateId);
      const parent = byId(parentId);
      if (!template || !parent) return null;
      const position = nextChildPosition(parent.id);
      const instance = instantiateStateTemplate(template, position.x, position.y, parent.id);
      model.states.push(...instance.states);
      model.transitions.push(...instance.transitions);
      wireFirstChildToBoundary(parent, instance.root);
      selected = selectionFromParts([parent.id], []);
      saveModel("layer:add-child:" + parent.id);
      draw();
      showNodeInspector(parent, {
        forceOpen: true,
        manualOpen: true,
        selectTitle: Boolean(opts.selectTitle)
      });
      syncToApp(false);
      return instance.root;
    }

    function addBlankStateInside(parentId, opts = {}) {
      const parent = byId(parentId);
      if (!parent) return null;
      const position = nextChildPosition(parent.id);
      const s = makeState(position.x, position.y, nextStateTitle(), parent.id);
      model.states.push(s);
      wireFirstChildToBoundary(parent, s);
      selected = selectionFromParts([parent.id], []);
      saveModel("layer:add-child:" + parent.id);
      draw();
      showNodeInspector(parent, {
        forceOpen: true,
        manualOpen: true,
        selectTitle: Boolean(opts.selectTitle)
      });
      return s;
    }

    function addTemplateAt(templateId, clientX, clientY) {
      const template = templateById(templateId);
      if (!template) return;
      const p = screenToWorldXY(clientX, clientY);
      const instance = instantiateStateTemplate(template, p.x - nodeWidth(template) / 2, p.y - NODE_H / 2);
      model.states.push(...instance.states);
      model.transitions.push(...instance.transitions);
      selected = selectionFromParts([instance.root.id], []);
      saveModel();
      draw();
      showNodeInspector(instance.root, { forceOpen: true });
      startAppAtState(instance.root.id);
    }

    function templateCardDescription(template) {
      const explicit = String(template?.description || "").trim();
      if (explicit) return explicit;
      const component = normalizeComponents(template?.components).find(item => item.text);
      if (component?.text) return component.text.split(/\r?\n/).map(line => line.trim()).filter(Boolean).slice(0, 2).join(" - ");
      return "Ready-to-use state";
    }

    function pointInElement(clientX, clientY, el) {
      const r = el.getBoundingClientRect();
      return clientX >= r.left && clientX <= r.right && clientY >= r.top && clientY <= r.bottom;
    }

    function hasTemplateDrag(evt) {
      if (draggingTemplateId && templateById(draggingTemplateId)) return true;
      const types = evt.dataTransfer?.types;
      if (!types) return false;
      if (typeof types.includes === "function") return types.includes("text/state-template-id");
      if (typeof types.contains === "function") return types.contains("text/state-template-id");
      return Array.from(types).includes("text/state-template-id");
    }

    function templateIdFromDrag(evt) {
      const explicit = evt.dataTransfer?.getData?.("text/state-template-id") || "";
      if (explicit) return explicit;
      return draggingTemplateId && templateById(draggingTemplateId) ? draggingTemplateId : "";
    }

    function clearTemplateDragState() {
      draggingTemplateId = "";
      templateDragOverStateId = "";
      document.querySelectorAll(".node").forEach(el => el.classList.remove("inner-drop-target"));
    }

    function renderStateExplorer() {
      stateExplorerListEl.innerHTML = "";
      const stopAction = evt => evt.stopPropagation();
      const appendSection = (kind, items) => {
        const section = document.createElement("div");
        section.className = `state-explorer-section ${kind}`;
        section.dataset.templateGroup = kind;
        items.forEach(item => section.appendChild(item));
        stateExplorerListEl.appendChild(section);
      };
      const wireDraggableTemplate = (card, template) => {
        card.draggable = true;
        card.dataset.templateId = template.id;
        card.addEventListener("dragstart", evt => {
          evt.stopPropagation();
          draggingTemplateId = template.id;
          evt.dataTransfer.effectAllowed = "copy";
          evt.dataTransfer.setData("text/state-template-id", template.id);
          evt.dataTransfer.setData("text/plain", template.title || template.id);
        });
        card.addEventListener("dragend", () => {
          clearTemplateDragState();
        });
      };
      const componentCards = builtinStateTemplates().map(template => {
        const card = document.createElement("div");
        card.className = "component-preset-card";
        card.dataset.templateKind = "core";
        card.innerHTML = `
          <div class="template-title"></div>
          <div class="template-body"></div>
          <div class="template-actions">
            <button class="template-use" type="button" aria-label="Add ${escapeHtml(template.title)}" title="${escapeHtml(template.title)}">+ Add</button>
          </div>
        `;
        card.querySelector(".template-title").textContent = template.title;
        card.querySelector(".template-body").textContent = templateCardDescription(template);
        card.querySelectorAll("button").forEach(button => {
          button.addEventListener("mousedown", stopAction);
          button.addEventListener("pointerdown", stopAction);
        });
        card.querySelector(".template-use").onclick = evt => {
          evt.stopPropagation();
          addTemplateToCurrentLayer(template);
        };
        card.addEventListener("dblclick", evt => {
          if (evt.target.closest("button, input, textarea")) return;
          addTemplateToCurrentLayer(template);
        });
        wireDraggableTemplate(card, template);
        return card;
      });
      appendSection("core", componentCards);

      const userItems = [];
      if (!stateTemplates.length) {
        const empty = document.createElement("div");
        empty.className = "state-template-empty";
        empty.textContent = "Drag a canvas state here, or use + Add preset for a custom state.";
        userItems.push(empty);
      }
      for (const template of stateTemplates) {
        const card = document.createElement("div");
        card.className = "state-template-card";
        card.dataset.templateKind = "user";
        if (editingTemplateId === template.id) card.classList.add("editing");
        card.innerHTML = `
          <div class="template-title"></div>
          <div class="template-body"></div>
          <div class="template-actions">
            <button class="template-use" type="button">Use</button>
            <button class="template-update" type="button">Update</button>
            <button class="template-delete danger" type="button">Delete</button>
          </div>
        `;
        card.querySelector(".template-title").textContent = template.title || "State preset";
        card.querySelector(".template-body").textContent = templateCardDescription(template);
        card.querySelectorAll("button").forEach(button => {
          button.addEventListener("mousedown", stopAction);
          button.addEventListener("pointerdown", stopAction);
        });
        card.querySelector(".template-use").onclick = evt => {
          evt.stopPropagation();
          addTemplateAtViewport(template);
        };
        card.querySelector(".template-update").onclick = evt => {
          evt.stopPropagation();
          updateTemplateFromSelectedState(template.id);
        };
        card.querySelector(".template-delete").onclick = evt => {
          evt.stopPropagation();
          void deleteStateTemplate(template.id);
        };
        card.addEventListener("click", evt => {
          if (evt.target.closest("button, input, textarea")) return;
          showTemplateInspector(template, { focus: false, saveSelection: true });
        });
        wireDraggableTemplate(card, template);
        card.addEventListener("dblclick", evt => {
          if (evt.target.closest("button, input, textarea")) return;
          addTemplateAtViewport(template);
        });
        userItems.push(card);
      }
      appendSection("user", userItems);
    }

    function addStateAt(x, y, showAtX, showAtY) {
      const layerBeforeCreate = currentLayerId && byId(currentLayerId) ? currentLayerId : null;
      const title = nextStateTitle();
      const s = makeState(x - nodeWidth({ title }) / 2, y - NODE_H / 2, title, layerBeforeCreate);
      model.states.push(s);
      if (layerBeforeCreate) wireFirstChildToBoundary(byId(layerBeforeCreate), s);
      selected = selectionFromParts([s.id], []);
      lastCreatedStateId = s.id;
      lastCreatedStateTime = Date.now();
      lastTouchNodeTap = null;
      suppressRuntimeLayerFollowUntil = Date.now() + 1200;
      saveModel();
      currentLayerId = layerBeforeCreate && byId(layerBeforeCreate) ? layerBeforeCreate : null;
      draw();
      showNodeInspector(s, { focus: false, forceOpen: true });
    }

    function handleCanvasMove(evt) {
      if (boxSelecting) {
        boxSelecting.currentX = evt.clientX;
        boxSelecting.currentY = evt.clientY;

    function runtimePulseEase(t) {

    function applyRuntimeEdgePulseStyle(el, pulse, now) {
      const elapsed = Math.max(0, now - (pulse.started || now));
      const progress = clamp(elapsed / RUNTIME_EDGE_PULSE_MS, 0, 1);
      const eased = runtimePulseEase(progress);
      el.dataset.runtimePulseToken = pulse.token;
      el.classList.add("runtime", "runtime-pulse");
      if (el.classList.contains("edge")) {
        const dashTravel = 144;
        const pulseWidth = 4 + (1 - eased) * 4.5;
        const glow = 7 + Math.sin(progress * Math.PI) * 13;
        el.style.strokeDasharray = "22 14";
        el.style.strokeDashoffset = String((-dashTravel * progress).toFixed(2));
        el.style.strokeWidth = pulseWidth.toFixed(2);

        el.style.opacity = "1";
      } else if (el.classList.contains("edge-arrow")) {
        const glow = 7 + Math.sin(progress * Math.PI) * 13;
        el.style.filter = `drop-shadow(0 0 ${glow.toFixed(1)}px var(--edge-color, #5f8dbc))`;
        el.style.opacity = "1";

    function applyRuntimeEdgePulses(now = performance.now()) {
      if (!(activeRuntimeEdgePulses instanceof Map)) activeRuntimeEdgePulses = new Map();
      for (const [id, pulse] of [...activeRuntimeEdgePulses]) {

          if (lastAppTransitionId === id) lastAppTransitionId = null;
          if (pulse) cleanupRuntimeEdgePulse(id, pulse.token);
          continue;

        for (const el of runtimeEdgePulseElements(id)) applyRuntimeEdgePulseStyle(el, pulse, now);

    function pulseRuntimeTransition(edgeId) {

      if (!id) return;
      const token = String(++runtimePulseSerial);
      if (!(activeRuntimeEdgePulses instanceof Map)) activeRuntimeEdgePulses = new Map();
      const started = performance.now();
      cleanupRuntimeEdgePulse(id);
      activeRuntimeEdgePulses.set(id, {
        token,
        started,
        until: started + RUNTIME_EDGE_PULSE_MS
      });
      applyRuntimeEdgePulses(started);
      scheduleRuntimeEdgePulses();
    }

    function runtimeStatePulseDuration(mode) {
      return mode === "exit" ? RUNTIME_STATE_EXIT_PULSE_MS : RUNTIME_STATE_ENTER_PULSE_MS;
    }

    function runtimeStatePulseClass(mode) {
      return mode === "exit" ? "runtime-exit" : "runtime-enter";
    }

    function runtimeStatePulseKey(id, mode, portSide) {
      return `${id}:${mode}:${portSide || ""}`;
    }

    function runtimeStatePulseElements(id, portSide) {
      const elements = [];
      const node = nodesEl.querySelector(`.node[data-id="${cssEscapeValue(id)}"]`);
      if (node) elements.push(node);
      return elements;
    }

    function cleanupRuntimeStatePulse(id, token, pulseClass, portSide) {
      for (const el of runtimeStatePulseElements(id, portSide)) {
        if (el.dataset.runtimeStatePulseToken !== token) continue;
        el.classList.remove(pulseClass);
        el.style.animationDelay = "";
        delete el.dataset.runtimeStatePulseToken;
      }
    }

    function applyRuntimeStatePulses() {
      if (!(activeRuntimeStatePulses instanceof Map)) activeRuntimeStatePulses = new Map();
      const now = performance.now();
      for (const [key, pulse] of [...activeRuntimeStatePulses]) {
        if (!pulse || pulse.until <= now) {
          activeRuntimeStatePulses.delete(key);
          if (pulse) cleanupRuntimeStatePulse(pulse.id, pulse.token, pulse.pulseClass, pulse.portSide);
          continue;
        }
        const duration = runtimeStatePulseDuration(pulse.mode);
        const elapsed = Math.max(0, Math.min(duration, now - (pulse.started || now)));
        for (const el of runtimeStatePulseElements(pulse.id, pulse.portSide)) {
          if (el.dataset.runtimeStatePulseToken === pulse.token && el.classList.contains(pulse.pulseClass)) continue;
          el.classList.remove("runtime-enter", "runtime-exit");
          el.style.animationDelay = elapsed ? `-${elapsed}ms` : "";
          void el.getBoundingClientRect();
          el.dataset.runtimeStatePulseToken = pulse.token;
          el.classList.add("runtime", pulse.pulseClass);
        }
      }
    }

    function pulseRuntimeState(stateId, mode = "enter", portSide = null) {
      const id = String(stateId || "");
      if (!id) return;
      const pulseClass = runtimeStatePulseClass(mode);
      const token = String(++runtimePulseSerial);
      if (!(activeRuntimeStatePulses instanceof Map)) activeRuntimeStatePulses = new Map();
      const started = performance.now();
      const key = runtimeStatePulseKey(id, mode, portSide);
      activeRuntimeStatePulses.set(key, {
        id,
        mode,
        portSide,
        pulseClass,
        token,
        started,
        until: started + runtimeStatePulseDuration(mode)
      });
      requestAnimationFrame(() => {
        applyRuntimeStatePulses();
        setTimeout(() => {
          const pulse = activeRuntimeStatePulses.get(key);
          if (pulse?.token !== token) return;
          activeRuntimeStatePulses.delete(key);
          cleanupRuntimeStatePulse(id, token, pulseClass, portSide);
        }, runtimeStatePulseDuration(mode) + 80);
      });
    }

    window.addEventListener("message", evt => {
      const data = evt.data || {};
      if (data.type === "STATE_BLUEPRINT_SHORTCUT") {
        if (data.action === "save") saveDefinitionFile();
        if (data.action === "load") requestLoadBlueprintFile();
        return;
      }
      if (data.type === "STATE_BLUEPRINT_OPEN_URL") {
        openPreviewExternalUrl(data.url);
        return;
      }
      if (data.type !== "STATE_BLUEPRINT_RUNTIME_STATE") return;
      const previousAppState = currentAppState;
      currentAppState = data.current || null;
      latestRuntimeContext = isPlainObject(data.context) ? JSON.parse(JSON.stringify(data.context)) : {};
      if (typeof refreshInspectorGlobalStateTree === "function") refreshInspectorGlobalStateTree();
      const stateChanged = previousAppState !== currentAppState;
      const pendingStartId = pendingAppStartStateId;
      const pendingStartResolvedToDescendant = Boolean(pendingStartId && currentAppState && isDescendant(pendingStartId, currentAppState));
      const pendingStartResolved = Boolean(pendingAppStartStateId === currentAppState || pendingStartResolvedToDescendant);
      const suppressPendingStartFollow = Boolean(pendingAppStartSuppressLayerFollow && pendingStartResolved);
      if (pendingStartResolved) {
        pendingAppStartStateId = null;
        pendingAppStartSuppressLayerFollow = false;
      }
      lastAppTransitionId = data.transitionId || null;
      const runtimeState = byId(currentAppState);
      const shouldFollowRuntimeState = Boolean(runtimeState && !suppressPendingStartFollow && (lastAppTransitionId || pendingStartResolvedToDescendant || (previousAppState && stateChanged)));
      if (shouldFollowRuntimeState) {
        runtimeLayerFollowEnabled = true;
        suppressRuntimeLayerFollowUntil = 0;
      }
      const allowRuntimeLayerFollow = runtimeLayerFollowEnabled && Date.now() >= suppressRuntimeLayerFollowUntil;
      const runtimeLayerId = runtimeState?.parentId || null;
      if (allowRuntimeLayerFollow && runtimeState) {
        if (currentLayerId !== runtimeLayerId) {
          navigateToLayer(runtimeLayerId, "layer:runtime", { fit: true, persist: false });
        }
        selected = selectionFromParts([runtimeState.id], []);
        updateSelectRect();
      }
      draw();
      if (allowRuntimeLayerFollow && runtimeState && shouldFollowRuntimeState) {
        showNodeInspector(runtimeState, {
          focus: false,
          forceOpen: !inspectorCollapsedByUser,
          manualOpen: false,
          pulse: inspectorCollapsedByUser
        });
      }
      if (stateChanged) {
        if (previousAppState) pulseRuntimeState(previousAppState, "exit", "output");
        if (currentAppState) pulseRuntimeState(currentAppState, "enter", "input");
      } else if (currentAppState && lastAppTransitionId) {
        pulseRuntimeState(currentAppState, "exit", "output");
        pulseRuntimeState(currentAppState, "enter", "input");
      }
      if (lastAppTransitionId) {
        pulseRuntimeTransition(lastAppTransitionId);
      }
    });

    window.addEventListener("beforeunload", () => {
      persistModel(false);
    });

    function loadEditorModel(nextModel, shouldFit = true) {
      cancelQueuedCanvasMove();
      model = normalizeModel(nextModel);
      selected = null;
      dragging = null;
      connecting = null;
      connectingTargetId = null;
      boxSelecting = null;
      panning = null;
      pendingCanvasMouse = null;
      pendingCanvasTouch = null;
      pendingEdgeTouch = null;
      clearLongPress();
      currentLayerId = null;
      currentAppState = null;
      pendingAppStartStateId = null;
      pendingAppStartSuppressLayerFollow = false;
      lastAppTransitionId = null;
      hoveredEdgeId = null;
      if (runtimeEdgePulseFrame) cancelAnimationFrame(runtimeEdgePulseFrame);
      runtimeEdgePulseFrame = 0;
      activeRuntimeEdgePulses = new Map();
      runtimeLayerFollowEnabled = false;
      suppressLayerEnterUntil = 0;
      suppressExplicitLayerEnterUntil = 0;
      suppressRuntimeLayerFollowUntil = Date.now() + 1200;
      _virtualNodes.clear();
      mapEl.classList.remove("connecting", "panning", "dragging-state");
      stateExplorerEl.classList.remove("drag-over");
      document.querySelectorAll(".node").forEach(el => el.classList.remove("inner-drop-target"));
      showEmptyInspector();
      updateSelectRect();
      if (shouldFit) fitView();
      draw();
      initHistory();
      persistModel();
      syncToApp(true);
    }

    document.getElementById("btnNew").onclick = async () => {
      const ok = await modalConfirm("Canvas wirklich neu und leer starten?", "New canvas", {
        confirmText: "Neu starten",
        danger: true
      });
      if (!ok) return;
      loadEditorModel(starterModel(), true);
    };
    
    document.getElementById("btnDemo").onclick = async () => {
      const ok = await modalConfirm("Demo Flow laden? Aktueller Canvas wird überschrieben.", "Load Demo", {
        confirmText: "Demo laden",
        danger: true
      });
      if (!ok) return;
      loadEditorModel(starterModel(), true);
    };
    document.getElementById("btnSave").onclick = saveDefinitionFile;
    document.getElementById("btnLoad").onclick = requestLoadBlueprintFile;
    document.getElementById("btnExport").onclick = exportHtmlFile;
    fileLoadEl.onchange = () => loadBlueprintFile(fileLoadEl.files?.[0]);
    document.getElementById("btnUndo").onclick = undoModel;
    document.getElementById("btnRedo").onclick = redoModel;
    btnSelectionCopy.onclick = copySelectedNodes;
    btnSelectionCollapse.onclick = collapseOrExpandSelectedNodes;
    btnSelectionDelete.onclick = deleteSelectedItems;
    btnToggleInspector.onclick = () => {
      inspectorCollapsed = !inspectorCollapsed;
      inspectorCollapsedByUser = inspectorCollapsed;
      applyInspectorCollapsed();
    };
    document.getElementById("btnFit").onclick = fitView;
    document.getElementById("btnResetView").onclick = resetView;
    document.getElementById("btnRun").onclick = () => {
      runtimeLayerFollowEnabled = true;
      syncToApp(true);
    };
    document.getElementById("btnOpen").onclick = () => {
      appWindow = window.open(APP_URL, "state_blueprint_app", "width=480,height=760");
      setTimeout(() => syncToApp(true), 300);
    };
    document.getElementById("btnReset").onclick = async () => {
      const ok = await modalConfirm("Canvas wirklich neu und leer starten?", "Reset canvas", {
        confirmText: "Reset",
        danger: true
      });
      if (!ok) return;
      loadEditorModel(starterModel(), true);
    };
    btnTogglePreview.onclick = () => {
      togglePreviewCollapsed();
    };
    mobileTabEls.forEach(button => {
      button.onclick = () => setMobileWorkspaceView(button.dataset.mobileView);
    });
    btnToggleStateExplorer.onclick = () => {
      stateExplorerCollapsed = !stateExplorerCollapsed;
      applyStateExplorerCollapsed();
    };
    btnAddStateTemplate.onclick = () => addBlankStateTemplate();

    stateExplorerEl.addEventListener("dragenter", evt => {
      evt.preventDefault();
      stateExplorerEl.classList.add("drag-over");
    });
    stateExplorerEl.addEventListener("dragover", evt => {
      evt.preventDefault();
      stateExplorerEl.classList.add("drag-over");
    });
    stateExplorerEl.addEventListener("dragleave", evt => {
      if (!stateExplorerEl.contains(evt.relatedTarget)) stateExplorerEl.classList.remove("drag-over");
    });
    stateExplorerEl.addEventListener("drop", evt => {
      evt.preventDefault();
      clearTemplateDragState();
      stateExplorerEl.classList.remove("drag-over");
    });
    document.addEventListener("dragend", () => {
      clearTemplateDragState();
    }, { capture: true });

    function isTemplateCanvasDrop(evt) {
      if (!hasTemplateDrag(evt)) return false;
      if (!pointInElement(evt.clientX, evt.clientY, mapEl)) return false;
      if (evt.target?.closest?.(".node, .inner-state-dropzone")) return false;
      return true;
    }

    document.addEventListener("dragover", evt => {
      if (!isTemplateCanvasDrop(evt)) return;
      evt.preventDefault();
      evt.dataTransfer.dropEffect = "copy";
    }, { capture: true });

    document.addEventListener("drop", evt => {
      if (!isTemplateCanvasDrop(evt)) return;
      const templateId = templateIdFromDrag(evt);
      if (!templateId) return;
      evt.preventDefault();
      evt.stopPropagation();
      addTemplateAt(templateId, evt.clientX, evt.clientY);
      clearTemplateDragState();
    }, { capture: true });

    mapEl.addEventListener("dragover", evt => {
      if (!hasTemplateDrag(evt)) return;
      evt.preventDefault();
      evt.dataTransfer.dropEffect = "copy";
    });
    mapEl.addEventListener("drop", evt => {
      const templateId = templateIdFromDrag(evt);
      if (!templateId) return;
      evt.preventDefault();
      addTemplateAt(templateId, evt.clientX, evt.clientY);
      clearTemplateDragState();
    });



    window.__stateNativeDragBlocked = true;
    document.addEventListener("dragstart", evt => {
      if (evt.target?.closest?.(".state-template-card, .component-preset-card, [data-template-id], .component-drag-handle, .data-wire-row.draggable")) return;
      if (evt.target?.closest?.(".map, .node, .wires, svg, img, .preview, .inspector, .component-editor")) {
        evt.preventDefault();
        evt.stopPropagation();
      }
    }, { capture: true });

    frameEl.addEventListener("load", () => {
      if (!appFrameContainsGeneratedApp()) {
        reloadAppFrame(null, { preserveCurrent: true });
        return;
      }
      appFrameReady = true;
      if (pendingFramePayload) {
        const payload = pendingFramePayload;
        pendingFramePayload = null;
        postRuntimePayload(payload);
      } else if (pendingAppStartStateId && byId(pendingAppStartStateId)) startAppAtState(pendingAppStartStateId);
      else syncToApp(true);
    });
    frameEl.src = APP_URL;

    worldEl.style.width = WORLD_W + "px";
    worldEl.style.height = WORLD_H + "px";
    wiresEl.setAttribute("viewBox", `${WORLD_MIN_X} ${WORLD_MIN_Y} ${WORLD_W} ${WORLD_H}`);
    wiresEl.style.left = WORLD_MIN_X + "px";
    wiresEl.style.top = WORLD_MIN_Y + "px";
    wiresEl.style.width = WORLD_W + "px";
    wiresEl.style.height = WORLD_H + "px";

    normalizeModel(model);
    applyPreviewCollapsed();
    applyInspectorCollapsed({ persist: false });
    applyMobileWorkspaceView();
    applyStateExplorerCollapsed();
    renderStateExplorer();
    persistStateTemplates();
    applyCamera();
    draw();
    initHistory();
    persistModel(false);
    setTimeout(fitView, 50);
  



  </script>


</body></html>
