<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>State Blueprint Tool</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%2307111f'/%3E%3Cpath d='M18 20h18a8 8 0 0 1 0 16H28a8 8 0 0 0 0 16h18' fill='none' stroke='%2338bdf8' stroke-width='6' stroke-linecap='round'/%3E%3Ccircle cx='18' cy='20' r='7' fill='%23a78bfa'/%3E%3Ccircle cx='46' cy='52' r='7' fill='%2334d399'/%3E%3C/svg%3E" />
  <style>
    :root {
      --bg: #07111f;
      --panel: #0b1729;
      --line: #1f3b5c;
      --text: #e5f0ff;
      --muted: #8eb2dc;
      --accent: #38bdf8;
      --accent2: #a78bfa;
      --selected: #f59e0b;
      --danger: #fb7185;
      --ok: #34d399;
      --node: #102642;
      --node2: #17365b;
      --runtime: #22c55e;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      height: 100%;
      height: 100dvh;
      overflow: hidden;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }

    .topbar {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      padding: 8px 10px;
      background: #050b14;
      border-bottom: 1px solid #18314d;
      min-width: 0;
      -webkit-overflow-scrolling: touch;
    }

    .brand {
      font-weight: 900;
      letter-spacing: .02em;
      margin-right: 6px;
    }

    button,
    .topbar-menu summary {
      flex: 0 0 auto;
      border: 1px solid #275078;
      color: var(--text);
      background: #0d1d31;
      border-radius: 999px;
      padding: 7px 11px;
      cursor: pointer;
      font-weight: 750;
      font-size: 13px;
      min-height: 34px;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    button:hover,
    .topbar-menu summary:hover { border-color: var(--accent); }
    button.danger:hover { border-color: var(--danger); color: #fecdd3; }
    button:disabled {
      opacity: .45;
      cursor: not-allowed;
      border-color: #1d3552;
    }

    .topbar-menu {
      position: relative;
      flex: 0 0 auto;
    }

    .topbar-menu summary {
      list-style: none;
      user-select: none;
    }

    .topbar-menu summary::-webkit-details-marker {
      display: none;
    }

    .topbar-menu-panel {
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      z-index: 160;
      display: grid;
      gap: 7px;
      min-width: 158px;
      padding: 8px;
      border: 1px solid #234766;
      border-radius: 16px;
      background: #071321;
      box-shadow: 0 18px 50px rgba(0,0,0,.34), inset 0 1px 0 rgba(255,255,255,.04);
    }

    .topbar-menu:not([open]) .topbar-menu-panel {
      display: none;
    }

    .topbar-menu-panel button {
      width: 100%;
      text-align: left;
    }

    .status {
      margin-left: auto;
      color: #bbf7d0;
      border: 1px solid rgba(34,197,94,.35);
      background: rgba(34,197,94,.08);
      border-radius: 999px;
      padding: 6px 10px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      min-width: 120px;
      text-align: center;
    }

    .workspace {
      display: grid;
      grid-template-columns: clamp(280px, 22vw, 360px) minmax(360px, 1fr) clamp(320px, 30vw, 420px);
      min-height: 0;
      min-width: 0;
      transition: grid-template-columns .18s ease, grid-template-rows .18s ease;
    }

    .workspace.preview-collapsed {
      grid-template-columns: clamp(280px, 22vw, 360px) minmax(360px, 1fr) 86px;
    }

    .workspace.inspector-collapsed {
      grid-template-columns: 46px minmax(360px, 1fr) clamp(320px, 30vw, 420px);
    }

    .workspace.inspector-collapsed.preview-collapsed {
      grid-template-columns: 46px minmax(360px, 1fr) 86px;
    }

    .inspector {
      min-width: 0;
      max-width: 100%;
      border-right: 1px solid #18314d;
      display: grid;
      grid-template-rows: 42px minmax(0, 1fr);
      background: #050b14;
      overflow: hidden;
    }

    .inspector.template-inspector {
      border-right-color: rgba(245,158,11,.42);
      background:
        radial-gradient(circle at 18% 0%, rgba(245,158,11,.12), transparent 28%),
        #050b14;
    }

    .inspector.transition-inspector {
      border-right-color: rgba(56,189,248,.42);
      background:
        radial-gradient(circle at 18% 0%, rgba(56,189,248,.12), transparent 28%),
        #050b14;
    }

    .inspector-title {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      padding: 0 8px 0 10px;
      border-bottom: 1px solid #18314d;
      color: #bfdbfe;
      font-size: 13px;
      font-weight: 900;
    }

    .inspector.template-inspector .inspector-title {
      border-bottom-color: rgba(245,158,11,.34);
      color: #fde68a;
    }

    .inspector.transition-inspector .inspector-title {
      border-bottom-color: rgba(56,189,248,.34);
      color: #bae6fd;
    }

    .inspector-title-text {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .inspector-body {
      min-height: 0;
      overflow: auto;
      overscroll-behavior: contain;
      scrollbar-color: #315f8c #071321;
      scrollbar-width: thin;
      padding: 12px;
    }

    .inspector-empty {
      display: grid;
      gap: 10px;
      align-content: start;
      min-height: 100%;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .inspector-empty strong {
      color: #dbeafe;
      font-size: 14px;
    }

    .workspace.inspector-collapsed .inspector {
      grid-template-rows: 42px;
    }

    .workspace.inspector-collapsed .inspector-title {
      justify-content: center;
      padding: 0;
    }

    .workspace.inspector-collapsed .inspector-title-text,
    .workspace.inspector-collapsed .inspector-body {
      display: none;
    }

    .workspace.inspector-collapsed .inspector.inspector-pulse {
      animation: inspectorPulse .58s ease-out;
    }

    @keyframes inspectorPulse {
      0% {
        border-right-color: #18314d;
        box-shadow: inset -1px 0 0 rgba(56,189,248,0);
        background-color: #050b14;
      }
      42% {
        border-right-color: rgba(56,189,248,.95);
        box-shadow:
          inset -4px 0 0 rgba(56,189,248,.82),
          0 0 0 3px rgba(56,189,248,.18);
        background-color: #07182a;
      }
      100% {
        border-right-color: #18314d;
        box-shadow: inset -1px 0 0 rgba(56,189,248,0);
        background-color: #050b14;
      }
    }

    .map {
      position: relative;
      min-width: 0;
      overflow: hidden;
      background:
        linear-gradient(to right, rgba(56,189,248,.08) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(56,189,248,.08) 1px, transparent 1px),
        radial-gradient(circle at 40% 30%, rgba(56,189,248,.10), transparent 35%),
        var(--bg);
      background-size: 24px 24px, 24px 24px, 100% 100%, 100% 100%;
      cursor: default;
      touch-action: none;
      overscroll-behavior: contain;
    }

    .map.panning { cursor: grabbing; }
    .map.connecting { cursor: crosshair; }
    .map.connecting .edge,
    .map.connecting .edge-label {
      opacity: .38;
    }

    .layer-nav { display: none; }

    .map-canvas,
    .map-scene {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .map-canvas {
      z-index: 0;
      display: block;
      pointer-events: none;
    }

    .map-canvas[hidden] {
      display: none;
    }

    .map-scene {
      z-index: 1;
      overflow: hidden;
      transform-origin: 0 0;
    }

    #world {
      position: absolute;
      left: 0;
      top: 0;
      width: 5000px;
      height: 4000px;
      transform-origin: 0 0;
    }

    .layer-frame {
      position: absolute;
      display: none;
      z-index: 3;
      pointer-events: none;
      border: 2px dashed rgba(245,158,11,.62);
      border-radius: 22px;
      background:
        linear-gradient(135deg, rgba(245,158,11,.08), transparent 42%),
        rgba(2,6,23,.1);
      box-shadow: inset 0 0 0 1px rgba(245,158,11,.18), 0 20px 50px rgba(0,0,0,.18);
    }

    .layer-hud {
      position: absolute;
      z-index: 35;
      left: 12px;
      top: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      pointer-events: auto;
    }

    .layer-hud[hidden] { display: none; }

    .layer-back {
      min-height: 34px;
      padding: 7px 12px;
      border-color: rgba(125,211,252,.42);
      background: #071321;
      color: #bae6fd;
      box-shadow: 0 10px 24px rgba(0,0,0,.3);
    }

    .layer-frame-label,
    .layer-frame-hint {
      padding: 5px 10px;
      border: 1px solid rgba(245,158,11,.42);
      border-radius: 999px;
      background: #071321;
      color: #fde68a;
      font-size: 12px;
      font-weight: 950;
      white-space: nowrap;
    }

    .layer-frame-hint {
      border-color: rgba(125,211,252,.26);
      color: #bae6fd;
      background: rgba(7,19,33,.9);
      font-size: 11px;
      font-weight: 850;
    }

    .layer-boundary {
      position: absolute;
      top: 50%;
      display: grid;
      gap: 7px;
      min-width: 132px;
      max-width: 188px;
      padding: 9px;
      border: 1px solid rgba(125,211,252,.34);
      border-radius: 16px;
      background: rgba(3,7,18,.9);
      box-shadow: 0 14px 32px rgba(0,0,0,.34), inset 0 1px 0 rgba(255,255,255,.05);
      transform: translateY(-50%);
      pointer-events: none;
    }

    .layer-boundary-input {
      left: 18px;
      justify-items: start;
    }

    .layer-boundary-output {
      right: 18px;
      justify-items: end;
      text-align: right;
    }

    .layer-boundary-title {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: #e0f2fe;
      font-size: 12px;
      font-weight: 950;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .layer-boundary-plug {
      width: 18px;
      height: 18px;
      border: 2px solid #07111f;
      border-radius: 999px;
      background: #38bdf8;
      box-shadow: 0 0 0 4px rgba(56,189,248,.18);
    }

    .layer-boundary-output .layer-boundary-plug {
      background: #f59e0b;
      box-shadow: 0 0 0 4px rgba(245,158,11,.18);
    }

    .layer-boundary-count {
      color: #93c5fd;
      font-size: 11px;
      font-weight: 850;
    }

    .layer-boundary-list {
      display: grid;
      gap: 5px;
      width: 100%;
    }

    .layer-boundary-wire {
      display: flex;
      align-items: center;
      gap: 7px;
      min-width: 0;
      color: #dbeafe;
      font-size: 11px;
      font-weight: 850;
      line-height: 1.2;
    }

    .layer-boundary-output .layer-boundary-wire {
      justify-content: flex-end;
    }

    .layer-boundary-dot {
      flex: 0 0 auto;
      width: 10px;
      height: 10px;
      border: 2px solid #07111f;
      border-radius: 999px;
      background: var(--edge-color, #38bdf8);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--edge-color, #38bdf8) 22%, transparent);
    }

    .layer-boundary-wire span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .layer-boundary-empty {
      opacity: .66;
    }

    .map.dragging-state #world {
      z-index: 25;
    }

    #wires {
      position: absolute;
      left: 0;
      top: 0;
      width: 5000px;
      height: 4000px;
      z-index: 1;
      pointer-events: none;
      overflow: visible;
    }

    #wires .edge,
    #wires .edge-label,
    #wires .hit,
    #wires .edge-tip-hit {
      pointer-events: auto;
    }

    #nodes {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    .edge {
      fill: none;
      stroke: var(--edge-color, #5f8dbc);
      stroke-width: 2.2;
    }

    .edge.selected {
      stroke: var(--selected);
      stroke-width: 3.7;
      filter: drop-shadow(0 0 8px rgba(245,158,11,.34));
    }
    .edge.hovered {
      stroke: var(--edge-color, #5f8dbc);
      stroke-width: 3.4;
      filter: drop-shadow(0 0 8px var(--edge-color, #5f8dbc));
    }
    .hit:hover + .edge,
    .edge:hover {
      stroke: var(--edge-color, #5f8dbc);
      stroke-width: 3.4;
      filter: drop-shadow(0 0 8px var(--edge-color, #5f8dbc));
    }
    .edge.runtime { stroke: var(--runtime); stroke-width: 4; animation: edgePulse .85s ease-out; }

    .edge-pin {
      fill: var(--edge-color, #5f8dbc);
      stroke: #07111f;
      stroke-width: 2.2;
      pointer-events: none;
      filter: drop-shadow(0 0 4px rgba(15,23,42,.45));
    }

    .edge-pin.selected {
      fill: var(--edge-color, #5f8dbc);
      stroke: var(--selected);
      stroke-width: 3;
    }

    .edge-pin.hovered {
      fill: var(--edge-color, #5f8dbc);
      stroke: var(--edge-color, #5f8dbc);
      stroke-width: 3;
      filter: drop-shadow(0 0 8px var(--edge-color, #5f8dbc));
    }

    @keyframes edgePulse {
      0% { stroke-width: 8; filter: drop-shadow(0 0 10px rgba(34,197,94,.75)); }
      100% { stroke-width: 4; filter: none; }
    }

    .temp-edge {
      fill: none;
      stroke: var(--accent);
      stroke-width: 2.6;
      stroke-dasharray: 6 5;
    }

    .hit {
      fill: none;
      stroke: transparent;
      stroke-width: 24;
      cursor: pointer;
      pointer-events: stroke;
    }

    .edge-tip-hit {
      fill: rgba(56,189,248,.01);
      stroke: transparent;
      stroke-width: 2;
      cursor: grab;
      touch-action: none;
    }

    .edge-tip-hit:hover,
    .edge-tip-hit.hovered {
      fill: color-mix(in srgb, var(--edge-color, #5f8dbc) 22%, transparent);
      stroke: var(--edge-color, #5f8dbc);
      filter: drop-shadow(0 0 8px var(--edge-color, #5f8dbc));
    }

    .edge-tip-hit:active {
      cursor: grabbing;
    }

    .edge-label {
      font-size: 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      fill: #dbeafe;
      paint-order: stroke;
      stroke: #07111f;
      stroke-width: 5px;
      cursor: pointer;
      user-select: none;
    }

    .edge-label.hovered {
      fill: var(--edge-color, #ffffff);
      stroke-width: 6px;
    }
    .edge-label.selected {
      fill: #fde68a;
      stroke-width: 6px;
    }
    .hit:hover + .edge + .edge-label,
    .edge:hover + .edge-label,
    .edge-label:hover {
      fill: var(--edge-color, #ffffff);
      stroke-width: 6px;
    }

    .node {
      position: absolute;
      min-width: 168px;
      min-height: 96px;
      border: 1px solid #5f8dbc;
      background: #12345a;
      border-radius: 10px;
      box-shadow: 0 8px 18px rgba(0,0,0,.28), inset 0 1px 0 rgba(255,255,255,.1);
      cursor: grab;
      user-select: none;
      pointer-events: auto;
      -webkit-font-smoothing: auto;
      text-rendering: optimizeLegibility;
    }

    .node:active { cursor: grabbing; }
    .node.selected {
      border-color: var(--selected);
      outline: 2px solid var(--selected);
      outline-offset: 2px;
      box-shadow: 0 0 0 5px rgba(245,158,11,.16), 0 8px 18px rgba(0,0,0,.28), inset 0 1px 0 rgba(255,255,255,.1);
    }
    .node.active {
      border-color: var(--runtime);
      outline: 3px solid rgba(34,197,94,.72);
      outline-offset: 3px;
      box-shadow: 0 0 0 6px rgba(34,197,94,.14), 0 10px 24px rgba(0,0,0,.34);
    }
    .node.active.selected {
      border-color: var(--selected);
      outline: 2px solid var(--selected);
      box-shadow:
        0 0 0 5px rgba(245,158,11,.22),
        0 0 0 10px rgba(34,197,94,.16),
        0 10px 24px rgba(0,0,0,.34);
    }

    .node.inner-drop-target {
      border-color: #fde68a;
      outline: 2px dashed rgba(245,158,11,.88);
      outline-offset: 5px;
      box-shadow: 0 0 0 7px rgba(245,158,11,.18), 0 10px 24px rgba(0,0,0,.34);
    }

    .node .title {
      padding: 10px 72px 3px 12px;
      font-weight: 900;
      color: white;
      font-size: 14px;
      line-height: 1.18;
      white-space: nowrap;
    }

    .node .body {
      padding: 0 42px 12px 12px;
      color: #d8e9ff;
      font-size: 12px;
      line-height: 1.32;
      max-height: 36px;
      overflow: hidden;
    }

    .node-edit {
      position: absolute;
      right: 7px;
      bottom: 7px;
      width: 28px;
      height: 28px;
      min-height: 28px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255,255,255,.22);
      border-radius: 999px;
      padding: 0;
      background: rgba(15,23,42,.72);
      color: #e0f2fe;
      font-size: 15px;
      line-height: 1;
      box-shadow: 0 4px 12px rgba(0,0,0,.22);
      cursor: pointer;
      touch-action: manipulation;
    }

    .node-layer-actions {
      position: absolute;
      right: 7px;
      top: 7px;
      display: flex;
      gap: 5px;
      z-index: 3;
    }

    .node-open,
    .node-enter {
      min-width: 52px;
      height: 28px;
      min-height: 28px;
      display: none;
      place-items: center;
      border: 1px solid rgba(245,158,11,.36);
      border-radius: 999px;
      padding: 0;
      background: rgba(245,158,11,.14);
      color: #fde68a;
      font-size: 11px;
      line-height: 1;
      box-shadow: 0 4px 12px rgba(0,0,0,.22);
      cursor: pointer;
      touch-action: manipulation;
    }

    .node-edit:hover,
    .node-edit:focus-visible,
    .node-open:hover,
    .node-open:focus-visible,
    .node-enter:hover,
    .node-enter:focus-visible {
      background: var(--accent);
      color: #04111d;
      outline: none;
      transform: translateY(-1px);
    }

    .badge, .live-badge, .layer-badge {
      position: absolute;
      right: 8px;
      border-radius: 999px;
      font-size: 10px;
      padding: 3px 6px;
      font-weight: 950;
      display: none;
    }

    .badge { top: 8px; color: #04111d; background: var(--ok); }
    .live-badge { top: 31px; color: #052e16; background: #86efac; }
    .layer-badge { left: 10px; right: auto; bottom: 8px; color: #451a03; background: #fde68a; }
    .node.initial .badge { display: block; }
    .node.active .live-badge { display: block; }
    .node .node-open { display: grid; }
    .node.has-children .layer-badge { display: block; }

    .port {
      position: absolute;
      width: 16px;
      height: 16px;
      border-radius: 999px;
      border: 2px solid #06121f;
      background: var(--accent);
      right: -8px;
      top: 50%;
      transform: translateY(-50%);
      box-shadow: 0 0 0 3px rgba(56,189,248,.18);
      cursor: cell;
      touch-action: none;
    }

    .input-port {
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 999px;
      border: 2px solid #06121f;
      left: -7px;
      top: 50%;
      transform: translateY(-50%);
      background: #94a3b8;
      box-shadow: 0 0 0 3px rgba(148,163,184,.16);
      cursor: default;
    }

    .input-port::before {
      content: "";
      position: absolute;
      left: -24px;
      top: -24px;
      width: 58px;
      height: 58px;
      border-radius: 999px;
    }

    .map.connecting .node .input-port {
      background: #dbeafe;
      box-shadow: 0 0 0 8px rgba(56,189,248,.13);
    }

    .map.connecting .node .input-port::before {
      background: rgba(56,189,248,.06);
      outline: 1px dashed rgba(56,189,248,.34);
      outline-offset: -8px;
    }

    .node.drop-target {
      border-color: var(--accent);
      transform: translateY(-1px);
      box-shadow: 0 0 0 5px rgba(56,189,248,.25), 0 14px 30px rgba(0,0,0,.38);
    }

    .node.drop-target .input-port {
      width: 22px;
      height: 22px;
      left: -12px;
      background: var(--accent);
      box-shadow: 0 0 0 7px rgba(56,189,248,.24), 0 0 18px rgba(56,189,248,.75);
    }

    .preview {
      min-width: 0;
      max-width: 100%;
      border-left: 1px solid #18314d;
      display: grid;
      grid-template-rows: 42px 1fr;
      background: #030712;
      overflow: hidden;
    }

    .preview-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 0 8px 0 10px;
      border-bottom: 1px solid #18314d;
      color: #bfdbfe;
      font-size: 13px;
      font-weight: 800;
      min-width: 0;
      overflow: hidden;
    }

    .preview-title-text {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .preview-title-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      margin-left: auto;
      min-width: 0;
      flex: 0 0 auto;
    }

    .preview-toggle {
      width: 34px;
      height: 34px;
      min-width: 34px;
      min-height: 34px;
      border-radius: 8px;
      padding: 0;
      display: grid;
      place-items: center;
      font-size: 16px;
      line-height: 1;
    }

    .workspace.preview-collapsed .preview {
      grid-template-rows: 42px;
    }

    .workspace.preview-collapsed .preview-title {
      justify-content: center;
      padding: 0;
      overflow: visible;
    }

    .workspace.preview-collapsed .preview-title-text,
    .workspace.preview-collapsed #syncState,
    .workspace.preview-collapsed iframe {
      display: none;
    }

    .workspace.preview-collapsed .preview-title-actions {
      margin-left: 0;
      gap: 4px;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: white;
    }

    .state-editor-root h3 { margin: 0 0 10px; font-size: 14px; }
    .field { margin: 8px 0; }
    .field label {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 4px;
    }

    input, textarea, select {
      width: 100%;
      color: var(--text);
      background: #091827;
      border: 1px solid #294c72;
      border-radius: 9px;
      padding: 8px;
      font: inherit;
      min-height: 40px;
    }

    textarea { resize: vertical; min-height: 62px; }
    .row { display: flex; gap: 8px; align-items: center; }
    .row button { flex: 1; }
    .small { font-size: 12px; color: var(--muted); line-height: 1.35; }
    .component-toolbar {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 7px;
      margin: 8px 0;
    }
    .component-toolbar button {
      min-height: 34px;
      padding: 7px 8px;
      font-size: 12px;
    }
    .component-list {
      display: grid;
      gap: 8px;
      margin-top: 8px;
      max-height: none;
      overflow: visible !important;
      scrollbar-width: none;
      padding-right: 0;
    }
    .component-list::-webkit-scrollbar { display: none; }
    .component-editor {
      padding: 9px;
      border: 1px solid #244766;
      border-radius: 10px;
      background: #081726;
    }
    .component-editor-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 7px;
      color: #dbeafe;
      font-size: 12px;
      font-weight: 900;
    }
    .component-editor-head button {
      min-height: 28px;
      padding: 4px 8px;
      font-size: 11px;
    }
    .list-item-editor {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 6px;
      margin-top: 6px;
    }
    .list-item-editor button {
      min-height: 40px;
      padding: 6px 9px;
    }
    .component-add-item {
      width: 100%;
      margin-top: 7px;
      min-height: 34px;
    }
    .condition-preview {
      margin: -2px 0 10px;
      color: #bfdbfe;
      font-size: 12px;
      line-height: 1.35;
    }
    .condition-preview.empty { color: var(--muted); }

    .inner-state-panel {
      display: grid;
      gap: 8px;
      margin: 10px 0 12px;
      padding: 10px;
      border: 1px solid rgba(245,158,11,.28);
      border-radius: 13px;
      background: rgba(245,158,11,.07);
    }

    .inner-state-panel-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: #fde68a;
      font-size: 12px;
      font-weight: 950;
    }

    .inner-state-dropzone {
      display: grid;
      place-items: center;
      min-height: 58px;
      padding: 10px;
      border: 1px dashed rgba(245,158,11,.5);
      border-radius: 12px;
      color: #fcd34d;
      background: rgba(5,11,20,.36);
      text-align: center;
      font-size: 12px;
      line-height: 1.35;
    }

    .inner-state-dropzone.drag-over {
      border-color: #fde68a;
      background: rgba(245,158,11,.16);
      box-shadow: 0 0 0 4px rgba(245,158,11,.12);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: grid;
      place-items: center;
      padding: 18px;
      background: rgba(2, 6, 23, .68);
    }

    .modal-backdrop[hidden] { display: none; }

    .modal {
      width: min(420px, 100%);
      border: 1px solid #315f8c;
      border-radius: 16px;
      background: #071321;
      box-shadow: 0 24px 70px rgba(0,0,0,.58);
      padding: 18px;
    }

    .modal h2 {
      margin: 0 0 8px;
      font-size: 16px;
      line-height: 1.2;
    }

    .modal p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      white-space: pre-wrap;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 18px;
    }

    .modal-actions .primary {
      border-color: var(--accent);
      background: #123152;
    }

    .modal-actions .danger {
      border-color: var(--danger);
      color: #fecdd3;
      background: #331120;
    }

    .select-rect {
      position: absolute;
      z-index: 18;
      border: 1px solid rgba(167,139,250,.95);
      background: rgba(167,139,250,.14);
      pointer-events: none;
      display: none;
    }

    .selection-actions {
      position: absolute;
      left: 50%;
      bottom: 14px;
      z-index: 24;
      display: none;
      align-items: center;
      gap: 8px;
      padding: 8px;
      border: 1px solid rgba(148,163,184,.24);
      border-radius: 999px;
      background: rgba(3,7,18,.82);
      backdrop-filter: blur(10px);
      box-shadow: 0 14px 34px rgba(0,0,0,.34);
      transform: translateX(-50%);
    }

    .selection-actions.visible { display: flex; }

    .selection-count {
      min-width: 64px;
      padding: 0 8px;
      color: #dbeafe;
      font-size: 12px;
      font-weight: 850;
      text-align: center;
      white-space: nowrap;
    }

    .selection-actions button {
      min-height: 36px;
      padding: 7px 12px;
    }

    .state-explorer {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 12px;
      z-index: 20;
      display: grid;
      grid-template-rows: 38px minmax(0, 1fr);
      height: 152px;
      border: 1px solid rgba(56,189,248,.22);
      border-radius: 14px;
      background: rgba(3,7,18,.86);
      box-shadow: 0 18px 45px rgba(0,0,0,.38);
      backdrop-filter: blur(12px);
      overflow: hidden;
      transition: height .16s ease, opacity .16s ease;
    }

    .state-explorer.collapsed {
      height: 38px;
      opacity: .92;
    }

    .state-explorer.drag-over {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(56,189,248,.16), 0 18px 45px rgba(0,0,0,.38);
    }

    .state-explorer-title {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      padding: 0 8px 0 12px;
      border-bottom: 1px solid rgba(56,189,248,.14);
      color: #dbeafe;
      font-size: 12px;
      font-weight: 900;
      user-select: none;
    }

    .state-explorer-add {
      height: 30px;
      min-height: 30px;
      border-radius: 8px;
      padding: 0 9px;
      font-size: 12px;
    }

    .state-explorer-title span:first-child {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .state-explorer-hint {
      margin-left: auto;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      white-space: nowrap;
    }

    .state-explorer-toggle {
      width: 30px;
      height: 30px;
      min-width: 30px;
      min-height: 30px;
      border-radius: 8px;
      padding: 0;
    }

    .state-explorer-list {
      display: flex;
      gap: 8px;
      min-width: 0;
      overflow-x: auto;
      padding: 10px 12px 12px;
    }

    .state-explorer.collapsed .state-explorer-list {
      display: none;
    }

    .state-explorer-section {
      flex: 0 0 auto;
      display: flex;
      align-items: stretch;
      gap: 8px;
    }

    .state-explorer-label {
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      min-width: 34px;
      border: 1px solid #1d3956;
      border-radius: 12px;
      background: #06111f;
      color: var(--muted);
      font-size: 10px;
      font-weight: 950;
      letter-spacing: .1em;
      text-transform: uppercase;
      writing-mode: vertical-rl;
      transform: rotate(180deg);
    }

    .state-template-card,
    .component-preset-card {
      flex: 0 0 214px;
      display: grid;
      gap: 5px;
      align-content: start;
      min-height: 86px;
      border: 1px solid #244766;
      border-radius: 12px;
      background: #081726;
      padding: 9px;
      color: #dbeafe;
      cursor: grab;
      user-select: none;
    }

    .component-preset-card {
      flex-basis: 164px;
      border-color: #365b7a;
      background:
        linear-gradient(135deg, rgba(56,189,248,.12), transparent 42%),
        #071827;
    }

    .state-template-card.editing {
      border-color: var(--selected);
      box-shadow: 0 0 0 3px rgba(245,158,11,.16);
    }

    .state-template-card:active,
    .component-preset-card:active {
      cursor: grabbing;
    }

    .state-template-card .template-title,
    .component-preset-card .template-title {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
      font-weight: 900;
    }

    .state-template-card .template-body,
    .component-preset-card .template-body {
      display: -webkit-box;
      overflow: hidden;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.3;
    }

    .template-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 3px;
    }

    .template-actions button {
      min-height: 27px;
      padding: 4px 7px;
      border-radius: 8px;
      font-size: 11px;
    }

    .state-template-empty {
      display: flex;
      align-items: center;
      min-width: 210px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .component-empty {
      border: 1px dashed #244766;
      border-radius: 12px;
      padding: 10px;
      color: var(--muted);
      background: #06111f;
      font-size: 12px;
      line-height: 1.4;
    }

    .template-mode-note {
      display: grid;
      gap: 4px;
      margin: 0 0 10px;
      padding: 10px;
      border: 1px solid rgba(245,158,11,.34);
      border-radius: 12px;
      background: rgba(245,158,11,.09);
      color: #fde68a;
      font-size: 12px;
      line-height: 1.35;
    }

    .template-mode-note strong {
      color: #fff7ed;
      font-size: 13px;
    }

    .mobile-tabs {
      display: none;
    }

    @media (max-width: 1100px) {
      .workspace { grid-template-columns: minmax(260px, 34vw) minmax(0, 1fr); grid-template-rows: 1fr 45vh; }
      .workspace.preview-collapsed { grid-template-columns: minmax(260px, 34vw) minmax(0, 1fr); grid-template-rows: 1fr 42px; }
      .workspace.inspector-collapsed { grid-template-columns: 46px minmax(0, 1fr); }
      .preview { grid-column: 1 / -1; }
      .preview { border-left: 0; border-top: 1px solid #18314d; }
      .inspector { border-right: 1px solid #18314d; }
      .status { display: none; }
      .topbar {
        flex-wrap: nowrap;
        overflow-x: auto;
        white-space: nowrap;
      }
    }

    @media (max-width: 720px) {
      body {
        grid-template-rows: auto minmax(0, 1fr) auto;
      }

      .topbar {
        gap: 7px;
        padding: calc(7px + env(safe-area-inset-top)) 10px 7px;
        overflow-x: auto;
        scrollbar-width: none;
      }

      .topbar::-webkit-scrollbar { display: none; }

      .brand {
        position: sticky;
        left: 0;
        z-index: 2;
        padding-right: 6px;
        background: #050b14;
      }

      button {
        min-height: 44px;
        padding: 10px 13px;
        font-size: 14px;
      }

      .workspace {
        position: relative;
        grid-template-columns: 1fr;
        grid-template-rows: minmax(0, 1fr);
      }

      .workspace.preview-collapsed,
      .workspace.inspector-collapsed,
      .workspace.inspector-collapsed.preview-collapsed {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(0, 1fr);
      }

      .inspector,
      .map,
      .preview {
        grid-column: 1;
        grid-row: 1;
        min-height: 0;
      }

      .workspace.mobile-canvas-active .inspector,
      .workspace.mobile-canvas-active .preview,
      .workspace.mobile-edit-active .map,
      .workspace.mobile-edit-active .preview,
      .workspace.mobile-app-active .inspector,
      .workspace.mobile-app-active .map {
        display: none;
      }

      .inspector {
        grid-template-rows: 48px minmax(0, 1fr);
        border-right: 0;
        border-bottom: 0;
      }

      .inspector-title {
        min-height: 48px;
        padding: 0 10px;
      }

      .preview {
        grid-template-rows: 48px minmax(0, 1fr);
        grid-column: 1;
        border-left: 0;
        border-top: 0;
      }

      .preview-title {
        min-height: 48px;
        padding: 0 10px;
      }

      .preview-toggle {
        width: 40px;
        height: 40px;
      }

      .workspace.preview-collapsed .preview,
      .workspace.inspector-collapsed .inspector {
        grid-template-rows: 48px minmax(0, 1fr);
      }

      .workspace.preview-collapsed iframe,
      .workspace.inspector-collapsed .inspector-body {
        display: block;
      }

      .workspace.inspector-collapsed .inspector-title-text,
      .workspace.preview-collapsed .preview-title-text,
      .workspace.preview-collapsed #syncState {
        display: inline;
      }

      .workspace.preview-collapsed .preview-title-actions {
        flex-direction: row;
        align-items: center;
      }

      .mobile-tabs {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
        padding: 8px max(10px, env(safe-area-inset-right)) max(8px, env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-left));
        border-top: 1px solid #18314d;
        background: rgba(5,11,20,.96);
      }

      .mobile-tabs button {
        min-width: 0;
        min-height: 44px;
        border-radius: 14px;
        color: #bfdbfe;
        background: #0a1728;
      }

      .mobile-tabs button.active {
        border-color: var(--accent);
        color: #04111d;
        background: linear-gradient(135deg, #7dd3fc, var(--accent));
        box-shadow: 0 0 0 3px rgba(56,189,248,.16);
      }

      .node {
        border-radius: 12px;
      }

      .node .title {
        font-size: 15px;
        padding-top: 11px;
      }

      .port {
        width: 28px;
        height: 28px;
        right: -14px;
        border-width: 3px;
      }

      .input-port {
        width: 22px;
        height: 22px;
        left: -12px;
        border-width: 3px;
      }

      .state-explorer {
        left: 8px;
        right: 8px;
        bottom: 8px;
        height: 132px;
      }

      .state-template-card {
        flex-basis: 170px;
      }

      input, textarea {
        min-height: 46px;
        font-size: 16px;
        border-radius: 12px;
      }

      textarea {
        min-height: 92px;
      }

      .row {
        gap: 10px;
      }

      .selection-actions {
        left: max(10px, env(safe-area-inset-left));
        right: max(10px, env(safe-area-inset-right));
        bottom: max(12px, env(safe-area-inset-bottom));
        justify-content: center;
        transform: none;
      }

      .modal-backdrop {
        align-items: end;
        padding: 12px max(12px, env(safe-area-inset-right)) max(12px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));
      }

      .modal {
        width: 100%;
        border-radius: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="brand">State Blueprint</div>
    <button id="btnNew">New</button>
    <button id="btnSave">Save</button>
    <button id="btnLoad">Load</button>
    <button id="btnExport">Export HTML</button>
    <button id="btnUndo" title="Undo">Undo</button>
    <button id="btnRedo" title="Redo">Redo</button>
    <button id="btnFit">Fit</button>
    <button id="btnRun">Reset App</button>
    <details class="topbar-menu" id="topbarMore">
      <summary>More</summary>
      <div class="topbar-menu-panel">
        <button id="btnResetView">Reset View</button>
        <button id="btnReset" class="danger">Demo reset</button>
      </div>
    </details>
    <div class="status" id="runtimeState">app: —</div>
  </div>
  <input id="fileLoad" type="file" accept="application/json,.json,.state.json" hidden>
  <div id="modalBackdrop" class="modal-backdrop" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" aria-describedby="modalMessage">
      <h2 id="modalTitle"></h2>
      <p id="modalMessage"></p>
      <div class="modal-actions">
        <button id="modalCancel" type="button"></button>
        <button id="modalConfirm" type="button" class="primary"></button>
      </div>
    </div>
  </div>

  <div class="workspace" id="workspace">
    <aside class="inspector" id="stateInspector">
      <div class="inspector-title">
        <span class="inspector-title-text" id="stateInspectorTitle">State Inspector</span>
        <button id="btnToggleInspector" class="preview-toggle" type="button" title="Collapse state inspector" aria-label="Collapse state inspector">&lt;</button>
      </div>
      <div id="stateInspectorBody" class="inspector-body state-editor-root">
        <div class="inspector-empty">
          <strong>No state selected</strong>
        </div>
      </div>
    </aside>
    <main id="map" class="map">
      <div id="layerHud" class="layer-hud" hidden>
        <button id="layerBack" class="layer-back" type="button" aria-label="Back to containing state">Back</button>
        <span id="layerFrameLabel" class="layer-frame-label"></span>
        <span class="layer-frame-hint">flow in/out</span>
      </div>
      <div id="layerNav" class="layer-nav" aria-hidden="true"></div>
      <canvas id="mapCanvas" class="map-canvas" layoutsubtree hidden aria-hidden="true"></canvas>
      <div id="mapScene" class="map-scene">
        <div id="world">
          <div id="layerFrame" class="layer-frame">
            <div id="layerBoundaryInput" class="layer-boundary layer-boundary-input" data-layer-boundary="input"></div>
            <div id="layerBoundaryOutput" class="layer-boundary layer-boundary-output" data-layer-boundary="output"></div>
          </div>
          <svg id="wires" viewBox="0 0 5000 4000">
            <defs>
              <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
                <path d="M0,0 L0,12 L12,6 z" fill="context-stroke"></path>
              </marker>
            </defs>
          </svg>
          <div id="nodes"></div>
        </div>
      </div>
      <div id="selectRect" class="select-rect"></div>
      <div id="selectionActions" class="selection-actions" hidden>
        <span id="selectionCount" class="selection-count"></span>
        <button id="btnSelectionCopy" type="button">Copy</button>
        <button id="btnSelectionDelete" type="button" class="danger">Delete</button>
      </div>
      <div id="stateExplorer" class="state-explorer">
        <div class="state-explorer-title">
          <span>State Explorer</span>
          <span class="state-explorer-hint">drag states here · Ctrl+Space</span>
          <button id="btnAddStateTemplate" class="state-explorer-add" type="button" title="Add empty preset">+ Add preset</button>
          <button id="btnToggleStateExplorer" class="state-explorer-toggle" type="button" title="Toggle state explorer" aria-label="Toggle state explorer">⌄</button>
        </div>
        <div id="stateExplorerList" class="state-explorer-list"></div>
      </div>
    </main>

    <aside class="preview">
      <div class="preview-title">
        <span class="preview-title-text">Generated App</span>
        <span class="preview-title-actions">
          <span id="syncState">live</span>
          <button id="btnOpen" class="preview-toggle" type="button" title="Open app in separate window" aria-label="Open app in separate window">↗</button>
          <button id="btnTogglePreview" class="preview-toggle" type="button" title="Collapse app preview" aria-label="Collapse app preview">&gt;</button>
        </span>
      </div>
      <iframe id="appFrame" title="Generated App"></iframe>
    </aside>
  </div>
  <nav id="mobileTabs" class="mobile-tabs" aria-label="Mobile workspace views">
    <button type="button" data-mobile-view="canvas" class="active" aria-pressed="true">Canvas</button>
    <button type="button" data-mobile-view="edit" aria-pressed="false">Edit</button>
    <button type="button" data-mobile-view="app" aria-pressed="false">App</button>
  </nav>

  <script>
    const STORAGE_KEY = "stateBlueprintHotLinked.model.v2";
    const STATE_EXPLORER_KEY = STORAGE_KEY + ".stateExplorer";
    const UI_STATE_KEY = STORAGE_KEY + ".ui";
    const LEGACY_PREVIEW_COLLAPSED_KEY = STORAGE_KEY + ".previewCollapsed";
    const DEFINITION_KIND = "state-blueprint-definition";
    const DEFINITION_SCHEMA_VERSION = 2;
    const COMPONENT_EXPORT_KIND = "state-blueprint-component";
    const COMPONENT_EXPORT_SCHEMA_VERSION = 1;

    function uid(prefix) {

    function clamp(n, min, max) { return Math.max(min, Math.min(max, n)); }

    function snapToGrid(value) {
      return Math.round(value / GRID_SIZE) * GRID_SIZE;
    }

    function ceilToGrid(value) {
      return Math.ceil(value / GRID_SIZE) * GRID_SIZE;
    }

    function floorToGrid(value) {
      return Math.floor(value / GRID_SIZE) * GRID_SIZE;
    }

    function snapClampToGrid(value, min, max) {
      const gridMin = ceilToGrid(min);
      const gridMax = floorToGrid(max);
      if (gridMin > gridMax) return clamp(snapToGrid(value), min, max);
      return clamp(snapToGrid(value), gridMin, gridMax);
    }

    function snapPointToGrid(point) {
      return { x: snapToGrid(point.x), y: snapToGrid(point.y) };
    }

      modalConfirmEl.classList.toggle("danger", Boolean(danger));
      modalCancelEl.hidden = !cancelText;
      modalCancelEl.textContent = cancelText || "";
      modalBackdropEl.hidden = false;
      return new Promise(resolve => {
        modalResolve = resolve;
        requestAnimationFrame(() => modalConfirmEl.focus());
      });

    function normalizeSelection(value = selected) {
      if (!value || typeof value !== "object") return null;
      const stateIds = new Set(model.states.map(s => s.id));
      const edgeIds = new Set(model.transitions.map(t => t.id));
      if (value.type === "node" && stateIds.has(value.id) && isCurrentLayerState(value.id)) return { type: "node", id: value.id };
      if (value.type === "edge" && edgeIds.has(value.id) && transitionInLayer(model.transitions.find(t => t.id === value.id))) return { type: "edge", id: value.id };
      if (value.type === "nodes") {
        const ids = [...new Set(value.ids || [])].filter(id => stateIds.has(id) && isCurrentLayerState(id));
        return ids.length ? { type: "nodes", ids } : null;
      }
      if (value.type === "items") {
        const nodes = [...new Set(value.nodes || [])].filter(id => stateIds.has(id) && isCurrentLayerState(id));
        const edges = [...new Set(value.edges || [])].filter(id => edgeIds.has(id) && transitionInLayer(model.transitions.find(t => t.id === id)));
        return selectionFromParts(nodes, edges);
      }
      return null;
    }

    function parseEditorSnapshot(snapshot) {
      const data = JSON.parse(snapshot);
      if (data && typeof data === "object" && "model" in data) {
        const templates = snapshotStateTemplates("stateTemplates" in data ? data.stateTemplates : stateTemplates);
        const templateIds = new Set(templates.map(template => template.id));
        return {
          model: data.model,
          selected: data.selected || null,
          currentLayerId: data.currentLayerId || null,
          stateTemplates: templates,
          editingTemplateId: templateIds.has(data.editingTemplateId) ? data.editingTemplateId : null

    function updateHistoryButtons() {

      if (undo) undo.disabled = !undoStack.length;
      if (redo) redo.disabled = !redoStack.length;

    function initHistory() {
      historyCurrent = editorSnapshot();
      undoStack = [];
      redoStack = [];
      lastHistoryKey = null;
      updateHistoryButtons();

    function saveEditorState(historyKey = null, sync = true) {
      selected = normalizeSelection();
      const next = editorSnapshot();
      if (next === historyCurrent) {
        persistModel(sync);
        persistStateTemplates();
        return;
      }
      if (!historyCurrent) {
        historyCurrent = next;
      } else if (historyKey && historyKey === lastHistoryKey && undoStack.length) {
        // Continuous edits such as typing or dragging remain one deterministic undo step.
      } else {
        undoStack.push(historyCurrent);
        if (undoStack.length > 100) undoStack.shift();
      }
      redoStack = [];
      historyCurrent = next;
      lastHistoryKey = historyKey;
      persistModel(sync);
      persistStateTemplates();
      updateHistoryButtons();
    }

    function saveModel(historyKey = null) {
      saveEditorState(historyKey, true);
    }

    function saveSelection(historyKey = null) {

    function restoreHistorySnapshot(snapshot) {
      const restored = parseEditorSnapshot(snapshot);
      model = normalizeModel(restored.model);
      currentLayerId = byId(restored.currentLayerId) ? restored.currentLayerId : null;
      selected = normalizeSelection(restored.selected);
      stateTemplates = snapshotStateTemplates(restored.stateTemplates);
      editingTemplateId = restored.editingTemplateId;
      historyCurrent = editorSnapshot();
      connecting = null;
      connectingTargetId = null;
      dragging = null;
      boxSelecting = null;
      updateSelectRect();
      persistModel();
      persistStateTemplates();
      draw();
      renderStateExplorer();
      const template = editingTemplateId ? stateTemplates.find(item => item.id === editingTemplateId) : null;
      if (template) showTemplateInspector(template, { focus: false });
      else refreshInspectorForSelection();
      updateHistoryButtons();
    }

    function undoModel() {
      if (!undoStack.length) return;
      const current = editorSnapshot();
      const previous = undoStack.pop();
      redoStack.push(current);
      lastHistoryKey = null;
      restoreHistorySnapshot(previous);
    }

    function redoModel() {
      if (!redoStack.length) return;
      const current = editorSnapshot();
      const next = redoStack.pop();
      undoStack.push(current);
      lastHistoryKey = null;
      restoreHistorySnapshot(next);
    }

    function definitionPayload() {
      const definition = {
        kind: DEFINITION_KIND,
        schemaVersion: DEFINITION_SCHEMA_VERSION,
        app: "State Blueprint",
        savedAt: new Date().toISOString(),
        model: modelDefinitionSnapshot(),
        stateTemplates: snapshotStateTemplates(),
        camera: {
          x: Number(camera.x),
          y: Number(camera.y),
          scale: Number(camera.scale)
        },
        previewCollapsed: Boolean(previewCollapsed)
      };
      return validateBlueprintDefinition(definition);
    }

    function isPlainObject(value) {
      return Boolean(value) && typeof value === "object" && !Array.isArray(value);
    }

    function assertPlainObject(value, path) {
      if (!isPlainObject(value)) throw new Error(`${path} must be an object.`);
    }

    function assertString(value, path, { allowEmpty = false } = {}) {
      if (typeof value !== "string") throw new Error(`${path} must be a string.`);
      if (!allowEmpty && !value.trim()) throw new Error(`${path} must not be empty.`);
      return value;
    }

    function assertFiniteNumber(value, path) {
      if (typeof value !== "number" || !Number.isFinite(value)) throw new Error(`${path} must be a finite number.`);
      return value;
    }

    function assertNoNullish(value, path = "definition") {
      if (value === null || value === undefined) throw new Error(`${path} must not be null or undefined.`);
      if (Array.isArray(value)) {
        value.forEach((item, index) => assertNoNullish(item, `${path}[${index}]`));
        return;
      }
      if (!isPlainObject(value)) return;
      for (const [key, item] of Object.entries(value)) {
        assertNoNullish(item, `${path}.${key}`);
      }
    }

    function validateComponents(value, path) {
      if (value === undefined) return [];
      if (!Array.isArray(value)) throw new Error(`${path} must be an array.`);
      return value.map((component, index) => {
        const itemPath = `${path}[${index}]`;
        assertPlainObject(component, itemPath);
        const type = assertString(component.type, `${itemPath}.type`);
        if (!["heading", "text", "image", "list", "link", "note", "divider"].includes(type)) throw new Error(`${itemPath}.type is not supported.`);
        return {
          id: assertString(component.id, `${itemPath}.id`),
          type,
          text: assertString(component.text, `${itemPath}.text`, { allowEmpty: true }),
          url: "url" in component ? assertString(component.url, `${itemPath}.url`, { allowEmpty: true }) : ""
        };
      });
    }

    function validateDataObject(value, path) {
      if (value === undefined) return {};
      assertPlainObject(value, path);
      assertNoNullish(value, path);
      return JSON.parse(JSON.stringify(value));
    }

    function validateModelDefinition(source) {
      assertPlainObject(source, "definition.model");
      if (source.version !== DEFINITION_SCHEMA_VERSION) throw new Error("definition.model.version must be 2.");
      assertString(source.name, "definition.model.name");
      assertString(source.initial, "definition.model.initial");
      if (!Array.isArray(source.states) || !source.states.length) throw new Error("definition.model.states must be a non-empty array.");
      if (!Array.isArray(source.transitions)) throw new Error("definition.model.transitions must be an array.");

      const ids = new Set();
      const states = source.states.map((state, index) => {
        const path = `definition.model.states[${index}]`;
        assertPlainObject(state, path);
        const id = assertString(state.id, `${path}.id`);
        if (ids.has(id)) throw new Error(`${path}.id must be unique.`);
        ids.add(id);
        const body = "body" in state ? assertString(state.body, `${path}.body`, { allowEmpty: true }) : "";
        const parentId = "parentId" in state ? assertString(state.parentId, `${path}.parentId`, { allowEmpty: true }) : "";
        return {
          id,
          title: assertString(state.title, `${path}.title`),
          body: "",
          components: migrateBodyToComponents(body, validateComponents(state.components, `${path}.components`)),
          data: validateDataObject(state.data, `${path}.data`),
          parentId: parentId || null,
          x: assertFiniteNumber(state.x, `${path}.x`),
          y: assertFiniteNumber(state.y, `${path}.y`)
        };
      });

      if (!ids.has(source.initial)) throw new Error("definition.model.initial must reference an existing state.");
      for (const state of states) {
        if (state.parentId && (!ids.has(state.parentId) || state.parentId === state.id)) {
          throw new Error(`definition.model.states.${state.id}.parentId must reference another state.`);
        }
      }

      const transitionIds = new Set();
      const transitionPairs = new Set();
      const transitions = source.transitions.map((transition, index) => {
        const path = `definition.model.transitions[${index}]`;
        assertPlainObject(transition, path);
        const id = assertString(transition.id, `${path}.id`);
        if (transitionIds.has(id)) throw new Error(`${path}.id must be unique.`);
        transitionIds.add(id);
        const from = assertString(transition.from, `${path}.from`);
        const to = assertString(transition.to, `${path}.to`);
        if (!ids.has(from)) throw new Error(`${path}.from must reference an existing state.`);
        if (!ids.has(to)) throw new Error(`${path}.to must reference an existing state.`);
        const fromState = states.find(state => state.id === from);
        const toState = states.find(state => state.id === to);
        if ((fromState?.parentId || null) !== (toState?.parentId || null)) throw new Error(`${path} must stay inside one canvas.`);
        const pair = transitionKey(from, to);
        if (transitionPairs.has(pair)) throw new Error(`${path} duplicates an existing transition from ${from} to ${to}.`);
        transitionPairs.add(pair);
        return {
          id,
          from,
          to,
          label: assertString(transition.label, `${path}.label`),
          condition: assertString(transition.condition, `${path}.condition`, { allowEmpty: true }),
          set: validateDataObject(transition.set, `${path}.set`)
        };
      });

      return {
        version: DEFINITION_SCHEMA_VERSION,
        name: source.name,
        initial: source.initial,
        states,
        transitions
      };
    }

    function validateStateTemplatesDefinition(value, path = "definition.stateTemplates") {
      if (value === undefined) return [];
      if (!Array.isArray(value)) throw new Error(`${path} must be an array.`);
      return value.slice(0, 40).map((template, index) => {
        const itemPath = `${path}[${index}]`;
        assertPlainObject(template, itemPath);
        const id = assertString(template.id, `${itemPath}.id`);
        const body = "body" in template ? assertString(template.body, `${itemPath}.body`, { allowEmpty: true }) : "";
        const rootStateId = "rootStateId" in template ? assertString(template.rootStateId, `${itemPath}.rootStateId`, { allowEmpty: true }) : id;
        const stateIds = new Set([rootStateId || id]);
        const states = (Array.isArray(template.states) ? template.states : []).slice(0, 120).map((state, stateIndex) => {
          const statePath = `${itemPath}.states[${stateIndex}]`;
          assertPlainObject(state, statePath);
          const stateId = assertString(state.id, `${statePath}.id`);
          if (stateIds.has(stateId)) throw new Error(`${statePath}.id must be unique inside the preset.`);
          stateIds.add(stateId);
          const stateBody = "body" in state ? assertString(state.body, `${statePath}.body`, { allowEmpty: true }) : "";
          const parentId = "parentId" in state ? assertString(state.parentId, `${statePath}.parentId`, { allowEmpty: true }) : "";
          return {
            id: stateId,
            title: assertString(state.title, `${statePath}.title`),
            body: "",
            components: migrateBodyToComponents(stateBody, validateComponents(state.components, `${statePath}.components`)),
            data: validateDataObject(state.data, `${statePath}.data`),
            parentId: parentId || rootStateId || id,
            x: assertFiniteNumber(state.x, `${statePath}.x`),
            y: assertFiniteNumber(state.y, `${statePath}.y`)
          };
        });
        for (const state of states) {
          if (!stateIds.has(state.parentId)) throw new Error(`${itemPath}.states.${state.id}.parentId must reference another preset state.`);
        }
        const transitions = (Array.isArray(template.transitions) ? template.transitions : []).slice(0, 160).map((transition, transitionIndex) => {
          const transitionPath = `${itemPath}.transitions[${transitionIndex}]`;
          assertPlainObject(transition, transitionPath);
          const from = assertString(transition.from, `${transitionPath}.from`);
          const to = assertString(transition.to, `${transitionPath}.to`);
          if (!stateIds.has(from)) throw new Error(`${transitionPath}.from must reference a preset state.`);
          if (!stateIds.has(to)) throw new Error(`${transitionPath}.to must reference a preset state.`);
          return {
            id: assertString(transition.id, `${transitionPath}.id`),
            from,
            to,
            label: assertString(transition.label, `${transitionPath}.label`),
            condition: assertString(transition.condition, `${transitionPath}.condition`, { allowEmpty: true }),
            set: validateDataObject(transition.set, `${transitionPath}.set`)
          };
        });
        return {
          id,
          title: assertString(template.title, `${itemPath}.title`),
          body: "",
          components: migrateBodyToComponents(body, validateComponents(template.components, `${itemPath}.components`)),
          data: validateDataObject(template.data, `${itemPath}.data`),
          rootStateId: rootStateId || id,
          states,
          transitions
        };
      });
    }

    function validateBlueprintDefinition(data) {
      assertNoNullish(data);
      assertPlainObject(data, "definition");
      if (data.kind !== DEFINITION_KIND) throw new Error(`definition.kind must be "${DEFINITION_KIND}".`);
      if (data.schemaVersion !== DEFINITION_SCHEMA_VERSION) throw new Error("definition.schemaVersion must be 2.");
      assertString(data.app, "definition.app");
      assertString(data.savedAt, "definition.savedAt");

      const validated = {
        kind: DEFINITION_KIND,
        schemaVersion: DEFINITION_SCHEMA_VERSION,
        app: data.app,
        savedAt: data.savedAt,
        model: validateModelDefinition(data.model),
        stateTemplates: validateStateTemplatesDefinition(data.stateTemplates),
        camera: { x: 32, y: 32, scale: 1 },
        previewCollapsed: false
      };

      if ("camera" in data) {
        assertPlainObject(data.camera, "definition.camera");
        validated.camera = {
          x: assertFiniteNumber(data.camera.x, "definition.camera.x"),
          y: assertFiniteNumber(data.camera.y, "definition.camera.y"),
          scale: clamp(assertFiniteNumber(data.camera.scale, "definition.camera.scale"), 0.25, 2.4)
        };
      }
      if ("previewCollapsed" in data) {
        if (typeof data.previewCollapsed !== "boolean") throw new Error("definition.previewCollapsed must be a boolean.");
        validated.previewCollapsed = data.previewCollapsed;
      }
      return validated;
    }

    function jsLiteral(value) {
      return JSON.stringify(value)
        .replace(/</g, "\\u003c")
        .replace(/>/g, "\\u003e")
        .replace(/&/g, "\\u0026")
        .replace(/\u2028/g, "\\u2028")
        .replace(/\u2029/g, "\\u2029");
    }

    function buildStandaloneAppHtml(appHtml, payload) {
      const modelLiteral = jsLiteral(payload.model);
      const exportedAtLiteral = jsLiteral(payload.savedAt);
      const bootstrap = [
        "    const IS_STANDALONE_EXPORT = true;",
        "    const EXPORTED_STATE_BLUEPRINT = " + modelLiteral + ";",
        "    const EXPORTED_STATE_BLUEPRINT_SAVED_AT = " + exportedAtLiteral + ";",
        "",
        "    let model = normalizeModel(JSON.parse(JSON.stringify(EXPORTED_STATE_BLUEPRINT)));"
      ].join("\n");
      let html = appHtml
        .replace(/<title>[\s\S]*?<\/title>/, `<title>${escapeHtml(payload.model.name || "Generated State App")}</title>`)
        .replace(/    let model = loadModel\(\) \|\| demoModel\(\);/, bootstrap)
        .replace(/    function saveModel\(\) \{\n      try \{ localStorage\.setItem\(STORAGE_KEY, JSON\.stringify\(model\)\); \} catch \(_\) \{\}\n    \}/,
          "    function saveModel() {}")
        .replace(/      saveModel\(\);\n      const oldContext = context;/,
          "      const oldContext = context;")
        .replace(/    window\.addEventListener\("message", evt => \{/, "    if (!IS_STANDALONE_EXPORT) window.addEventListener(\"message\", evt => {")
        .replace(/    window\.addEventListener\("storage", evt => \{/, "    if (!IS_STANDALONE_EXPORT) window.addEventListener(\"storage\", evt => {");
      if (!html.includes("EXPORTED_STATE_BLUEPRINT")) {
        throw new Error("Could not prepare standalone app export.");
      }
      return html;
    }

    function downloadTextFile(text, filename, type) {
      const blob = new Blob([text], { type });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(a.href), 1000);
    }

    function stateExportSnapshot(s) {
      const snapshot = {
        id: String(s.id),
        title: String(s.title || s.id),
        body: "",
        components: normalizeComponents(s.components || []),
        data: normalizeDataObject(s.data),
        x: Number(s.x || 0),
        y: Number(s.y || 0)
      };
      if (s.parentId) snapshot.parentId = String(s.parentId);
      return snapshot;
    }

    function transitionExportSnapshot(t) {
      return {
        id: String(t.id || uid("t")),
        from: String(t.from || ""),
        to: String(t.to || ""),
        label: String(t.label || "Next"),
        condition: String(t.condition || ""),
        set: normalizeDataObject(t.set)
      };
    }

    function componentExportPayload(type, payload) {
      return {
        kind: COMPONENT_EXPORT_KIND,
        schemaVersion: COMPONENT_EXPORT_SCHEMA_VERSION,
        app: "State Blueprint",
        exportedAt: new Date().toISOString(),
        component: {
          type,
          ...payload
        }
      };
    }

    function exportStateComponentFile(s) {
      const snapshot = stateExportSnapshot(s);
      const payload = componentExportPayload("state", { state: snapshot });
      const stamp = new Date().toISOString().replace(/[:.]/g, "-");
      downloadTextFile(
        JSON.stringify(payload, null, 2) + "\n",
        `${normalizeId(snapshot.title || snapshot.id)}-${stamp}.state-component.json`,
        "application/json"
      );
    }

    function exportTemplateComponentFile(template) {
      const snapshot = snapshotStateTemplates([template])[0];
      const payload = componentExportPayload("preset", { template: snapshot });
      const stamp = new Date().toISOString().replace(/[:.]/g, "-");
      downloadTextFile(
        JSON.stringify(payload, null, 2) + "\n",
        `${normalizeId(snapshot.title || snapshot.id)}-${stamp}.state-component.json`,
        "application/json"
      );
    }

    function saveDefinitionFile() {
      persistModel(false);
      persistStateTemplates();
      saveCamera();
      saveUiState();
      const definition = definitionPayload();
      const stamp = new Date().toISOString().replace(/[:.]/g, "-");
      const text = JSON.stringify(definition, null, 2) + "\n";
      downloadTextFile(text, `${normalizeId(model.name || "state-app")}-${stamp}.state.json`, "application/json");
    }

    async function exportHtmlFile() {
      persistModel(false);
      persistStateTemplates();
      saveCamera();
      saveUiState();
      const payload = definitionPayload();
      let text;
      try {
        const appHtml = typeof APP_HTML === "string" ? APP_HTML : await (await fetch(APP_URL, { cache: "no-store" })).text();
        text = buildStandaloneAppHtml(appHtml, payload);
      } catch (err) {
        await modalAlert(err?.message || "Could not export standalone app.", "Export failed");
        return;
      }
      const stamp = new Date().toISOString().replace(/[:.]/g, "-");
      downloadTextFile(text, `${normalizeId(model.name || "state-app")}-${stamp}.html`, "text/html");
    }

    function requestLoadBlueprintFile() {
      fileLoadEl.value = "";
      fileLoadEl.click();
    }

    function importBlueprintDefinition(definition) {
      const data = validateBlueprintDefinition(definition);
      model = normalizeModel(JSON.parse(JSON.stringify(data.model)));
      stateTemplates = snapshotStateTemplates(data.stateTemplates);
      camera = { ...data.camera };
      previewCollapsed = data.previewCollapsed;
      selected = null;
      editingTemplateId = null;
      dragging = null;
      connecting = null;
      connectingTargetId = null;
      boxSelecting = null;
      currentLayerId = null;
      currentAppState = null;
      lastAppTransitionId = null;
      hoveredEdgeId = null;
      showEmptyInspector();
      updateSelectRect();
      initHistory();
      applyPreviewCollapsed();
      applyCamera();
      persistModel();
      persistStateTemplates();
      renderStateExplorer();
      draw();
      syncToApp(true);
    }

    function parseBlueprintDefinitionText(text) {
      let data;
      try {
        data = JSON.parse(text);
      } catch (_) {
        throw new Error("Load expects a formal .state.json definition. Use Export HTML only for the runnable app.");
      }
      return validateBlueprintDefinition(data);
    }

    function loadBlueprintFile(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = async () => {
        try {
          importBlueprintDefinition(parseBlueprintDefinitionText(String(reader.result || "")));
        } catch (err) {
          await modalAlert(err?.message || "Could not load blueprint definition.", "Load failed");
        }
      };
      reader.readAsText(file);
    }

    function scheduleSync(reset) {
      clearTimeout(syncTimer);
      if (reset) return syncToApp(true);
      syncTimer = setTimeout(() => syncToApp(false), 40);
    }

    function normalizeId(text) {
      return String(text || "state")
        .trim()
        .toLowerCase()
        .replace(/[^a-z0-9_]+/g, "_")
        .replace(/^_+|_+$/g, "") || "state";
    }

    function normalizeComponents(components) {
      const allowed = new Set(["heading", "text", "image", "list", "link", "note", "divider"]);
      return (Array.isArray(components) ? components : [])
        .filter(component => component && typeof component === "object" && allowed.has(component.type))
        .slice(0, 24)
        .map(component => ({
          id: component.id || uid("c"),
          type: component.type,
          text: String(component.text || ""),
          url: String(component.url || "")
        }));
    }

    function migrateBodyToComponents(body, components) {
      const text = String(body || "");
      const normalized = normalizeComponents(components);
      if (!text.trim()) return normalized;
      if (normalized.some(component => component.type === "text" && component.text === text)) return normalized;
      return [{ id: uid("c"), type: "text", text, url: "" }, ...normalized].slice(0, 24);
    }

    function normalizeDataObject(value) {
      if (!isPlainObject(value)) return {};
      return JSON.parse(JSON.stringify(value));
    }

    function cloneComponents(components) {
      return normalizeComponents(components).map(component => ({
        id: uid("c"),
        type: component.type,
        text: component.text,
        url: component.url || ""
      }));
    }

    function normalizeModel(m) {
      m.version = 2;
      m.name = m.name || "State App";
      m.states = Array.isArray(m.states) ? m.states : [];
      m.transitions = Array.isArray(m.transitions) ? m.transitions : [];
      if (!m.states.length) {
        m.states.push({ id: "start", title: "Start", body: "", components: [{ id: uid("c"), type: "text", text: "First screen", url: "" }], x: 100, y: 100 });
      }
      const used = new Set();
      for (const s of m.states) {
        let id = normalizeId(s.id || s.title);
        const base = id;
        let i = 2;
        while (used.has(id)) id = base + "_" + i++;
        used.add(id);
        s.id = id;
        s.title = s.title || s.id;
        s.components = migrateBodyToComponents(s.body, s.components);
        s.body = "";
        s.data = normalizeDataObject(s.data);
        s.x = snapClampToGrid(Number.isFinite(s.x) ? s.x : 100, WORLD_MIN_X, WORLD_MAX_X - nodeWidth(s));
        s.y = snapClampToGrid(Number.isFinite(s.y) ? s.y : 100, WORLD_MIN_Y, WORLD_MAX_Y - NODE_H);
      }
      const ids = new Set(m.states.map(s => s.id));
      for (const s of m.states) {
        s.parentId = typeof s.parentId === "string" && ids.has(s.parentId) && s.parentId !== s.id ? s.parentId : null;
      }
      for (const s of m.states) {
        const seenParents = new Set([s.id]);
        let parent = byModelId(m, s.parentId);
        while (parent) {
          if (seenParents.has(parent.id)) {
            s.parentId = null;
            break;
          }
          seenParents.add(parent.id);
          parent = byModelId(m, parent.parentId);
        }
      }
      const pairs = new Set();
      m.transitions = m.transitions.filter(t => {
        if (!ids.has(t.from) || !ids.has(t.to)) return false;
        const fromState = byModelId(m, t.from);
        const toState = byModelId(m, t.to);
        if (stateParentId(fromState) !== stateParentId(toState)) return false;
        const pair = transitionKey(t.from, t.to);
        if (pairs.has(pair)) return false;
        pairs.add(pair);
        return true;
      });
      for (const t of m.transitions) {
        t.id = t.id || uid("t");
        t.label = t.label || t.event || "Next";
        t.condition = t.condition || "";
        t.set = normalizeDataObject(t.set);
      }
      if (!ids.has(m.initial)) m.initial = m.states[0].id;
      if (currentAppState && !ids.has(currentAppState)) currentAppState = null;
      if (currentLayerId && !ids.has(currentLayerId)) currentLayerId = null;
      return m;
    }

    function byModelId(sourceModel, id) {
      return sourceModel?.states?.find?.(s => s.id === id) || null;
    }

    function byId(id) { return model.states.find(s => s.id === id); }

    function stateParentId(state) {
      return state?.parentId || null;
    }

    function statesInLayer(layerId = currentLayerId) {
      const id = layerId || null;
      return model.states.filter(state => stateParentId(state) === id);
    }

    function visibleStates() {
      return statesInLayer(currentLayerId);
    }

    function transitionInLayer(transition, layerId = currentLayerId) {
      const from = byId(transition?.from);
      const to = byId(transition?.to);
      return Boolean(from && to && stateParentId(from) === stateParentId(to) && stateParentId(from) === (layerId || null));
    }

    function transitionsInLayer(layerId = currentLayerId) {
      return model.transitions.filter(transition => transitionInLayer(transition, layerId));
    }

    function visibleTransitions() {
      return transitionsInLayer(currentLayerId);
    }

    function childStateCount(parentId) {
      return statesInLayer(parentId).length;
    }

    function descendantStateIds(parentIds) {
      const pending = [...parentIds];
      const out = new Set(parentIds);
      while (pending.length) {
        const parentId = pending.pop();
        for (const child of statesInLayer(parentId)) {
          if (out.has(child.id)) continue;
          out.add(child.id);
          pending.push(child.id);
        }
      }
      return out;
    }

    function removeStatesById(ids) {
      const removeSet = descendantStateIds(ids);
      if (!removeSet.size || model.states.length - removeSet.size < 1) return false;
      const currentLayerRemoved = currentLayerId && removeSet.has(currentLayerId);
      const currentParent = byId(currentLayerId)?.parentId || null;
      model.states = model.states.filter(state => !removeSet.has(state.id));
      model.transitions = model.transitions.filter(transition => !removeSet.has(transition.from) && !removeSet.has(transition.to));
      if (removeSet.has(model.initial)) model.initial = statesInLayer(null)[0]?.id || model.states[0]?.id || "";
      if (currentLayerRemoved) currentLayerId = currentParent && byId(currentParent) ? currentParent : null;
      return true;
    }

    function stateLayerPath(layerId = currentLayerId) {
      const path = [];
      let state = byId(layerId);
      const guard = new Set();
      while (state && !guard.has(state.id)) {
        path.unshift(state);
        guard.add(state.id);
        state = byId(state.parentId);
      }
      return path;
    }

    function isCurrentLayerState(id) {
      const state = byId(id);
      return Boolean(state && stateParentId(state) === (currentLayerId || null));
    }

    function navigateToLayer(layerId, historyKey = "layer:navigate") {
      const nextLayerId = layerId && byId(layerId) ? layerId : null;
      if (currentLayerId === nextLayerId) return;
      currentLayerId = nextLayerId;
      selected = null;
      connecting = null;
      connectingTargetId = null;
      dragging = null;
      boxSelecting = null;
      showEmptyInspector();
      updateSelectRect();
      saveSelection(historyKey + ":" + (nextLayerId || "root"));
      fitView();
      draw();
    }

    function enterStateLayer(stateId) {
      if (!byId(stateId)) return;
      navigateToLayer(stateId, "layer:enter");
    }

    function exitCurrentLayer() {
      const parent = byId(currentLayerId)?.parentId || null;
      navigateToLayer(parent, "layer:exit");
    }

    function transitionKey(from, to) {
      return `${from}\u0000${to}`;
    }

    function transitionBetween(from, to, excludeId = null) {
      return model.transitions.find(t => t.from === from && t.to === to && t.id !== excludeId);
    }

    function screenToWorldXY(clientX, clientY) {
      const r = mapEl.getBoundingClientRect();
      return {
        x: (clientX - r.left - camera.x) / camera.scale,
        y: (clientY - r.top - camera.y) / camera.scale
      };
    }

    function screenToWorld(evt) { return screenToWorldXY(evt.clientX, evt.clientY); }

    function isTouchPointer(evt) {
      return evt.pointerType && evt.pointerType !== "mouse";
    }

    function isEmptyCanvasTarget(target) {
      return target === mapEl || target === mapCanvasEl || target === mapSceneEl || target === worldEl || target === wiresEl || target === nodesEl;
    }

    function isTouchUiTarget(target) {
      return Boolean(target?.closest?.(".state-explorer, .inspector, input, textarea, select, button"));
    }

    function captureTouchPointer(evt) {
      try { mapEl.setPointerCapture(evt.pointerId); } catch (_) {}
    }

    function releaseTouchPointer(evt) {
      try {
        if (mapEl.hasPointerCapture?.(evt.pointerId)) mapEl.releasePointerCapture(evt.pointerId);
      } catch (_) {}
    }

    function rememberTouchPointer(evt) {
      if (!isTouchPointer(evt)) return;
      touchPointers.set(evt.pointerId, { x: evt.clientX, y: evt.clientY });
    }

    function forgetTouchPointer(evt) {
      if (!isTouchPointer(evt)) return;
      touchPointers.delete(evt.pointerId);
      if (touchPointers.size < 2) pinchZoom = null;
    }

    function distanceBetweenTouches() {
      const points = [...touchPointers.values()];
      if (points.length < 2) return 0;
      return Math.hypot(points[0].x - points[1].x, points[0].y - points[1].y);
    }

    function beginPinchZoom() {
      const distance = distanceBetweenTouches();
      if (!distance) return;
      clearLongPress();
      pendingCanvasTouch = null;
      pendingCanvasMouse = null;
      pendingEdgeTouch = null;
      pinchZoom = { distance, scale: camera.scale };
      activePointerId = null;
      dragging = null;
      connecting = null;
      connectingTargetId = null;
      panning = null;
      boxSelecting = null;
      pendingCanvasMouse = null;
      mapEl.classList.remove("connecting", "panning", "dragging-state");
      updateSelectRect();
    }

    function startPendingCanvasTouch(evt) {
      clearLongPress();
      pendingCanvasTouch = {
        pointerId: evt.pointerId,
        clientX: evt.clientX,
        clientY: evt.clientY,
        moved: false,
        longPressed: false
      };
      longPressTimer = setTimeout(() => {
        if (!pendingCanvasTouch || pendingCanvasTouch.pointerId !== evt.pointerId || pinchZoom || touchPointers.size > 1) return;
        pendingCanvasTouch.longPressed = true;
        panning = null;
        mapEl.classList.remove("panning");
        startBoxSelect(eventFromPoint(pendingCanvasTouch, evt));
      }, 430);
    }

    function startPendingCanvasMouse(evt) {
      clearLongPress();
      evt.preventDefault();
      evt.stopPropagation();
      pendingCanvasMouse = {
        clientX: evt.clientX,
        clientY: evt.clientY,
        moved: false
      };
      longPressTimer = setTimeout(() => {
        if (!pendingCanvasMouse || pendingCanvasMouse.moved) return;
        pendingCanvasMouse = null;
        panning = null;
        mapEl.classList.remove("panning");
        startBoxSelect(evt);
      }, 360);
    }

    function updatePendingCanvasMouse(evt) {
      if (!pendingCanvasMouse || boxSelecting) return false;
      const distance = Math.hypot(evt.clientX - pendingCanvasMouse.clientX, evt.clientY - pendingCanvasMouse.clientY);
      if (distance <= 7) return true;
      const start = pendingCanvasMouse;
      pendingCanvasMouse = null;
      start.moved = true;
      clearLongPress();
      startPanning(eventFromPoint(start, evt));
      handleCanvasMove(evt);
      return true;
    }

    function finishPendingCanvasMouse() {
      if (!pendingCanvasMouse) return false;
      pendingCanvasMouse = null;
      clearLongPress();
      clearSelection("selection:canvas");
      return true;
    }

    function cancelCanvasMouseSelection() {
      const hadCanvasMouseGesture = Boolean(pendingCanvasMouse || boxSelecting);
      clearLongPress();
      pendingCanvasMouse = null;
      if (!hadCanvasMouseGesture) return false;
      if (boxSelecting) {
        boxSelecting = null;
        selected = null;
        saveSelection("selection:canvas");
      }
      updateSelectRect();
      draw();
      return true;
    }

    function cancelActiveCanvasGesture() {
      const dragToSave = dragging?.moved ? dragging.id : null;
      const hadSelectionBox = Boolean(boxSelecting);
      const hadGesture = Boolean(
        pendingCanvasMouse ||
        pendingCanvasTouch ||
        pendingEdgeTouch ||
        boxSelecting ||
        dragging ||
        connecting ||
        panning
      );
      if (!hadGesture) return false;
      clearLongPress();
      pendingCanvasMouse = null;
      pendingCanvasTouch = null;
      pendingEdgeTouch = null;
      activePointerId = null;
      dragging = null;
      connecting = null;
      connectingTargetId = null;
      panning = null;
      pinchZoom = null;
      if (hadSelectionBox) {
        boxSelecting = null;
        selected = null;
      }
      mapEl.classList.remove("connecting", "panning", "dragging-state");
