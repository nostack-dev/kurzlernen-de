    }

    function bindDataSourceEditor(owner, root, persistOwner, historyPrefix = "state") {
      const url = root.querySelector("#pDataSourceUrl");
      const target = root.querySelector("#pDataSourceTarget");
      const select = root.querySelector("#pDataSourceSelect");
      const preview = root.querySelector("#pDataSourcePreview");
      const inspect = root.querySelector("#pDataSourceInspect");
      const status = root.querySelector("#pFetchStatus");
      if (!url || !target || !select || !preview) return;
      owner.dataSource = normalizeDataSource(owner.dataSource);
      url.value = owner.dataSource.url;
      target.value = owner.dataSource.target;
      select.value = owner.dataSource.select;
      let inspectTimer = 0;
      let inspectToken = 0;
      const update = (persist = true) => {
        const previous = normalizeDataSource(owner.dataSource);
        const next = normalizeDataSource({
          ...owner.dataSource,
          url: url.value,
          target: target.value,
          select: select.value
        });
        const sourceChanged = dataSourceSignature(previous) !== dataSourceSignature(next);
        owner.dataSource = next;
        if (sourceChanged) {
          resetEditorDataSourceContext(previous.target);
          resetEditorDataSourceContext(next.target, { status: "source-changed" });
          if (typeof refreshInspectorGlobalStateTree === "function") refreshInspectorGlobalStateTree();
        }
        preview.textContent = dataSourcePreviewText(next, target.value, select.value);
        preview.classList.toggle("empty", !String(next.url || "").trim());
        if (status) {
          const hasSource = Boolean(String(next.url || "").trim());
          status.textContent = hasSource ? `Fetch: ${next.target}.data` : "Fetch: off";
          status.classList.toggle("active", hasSource);
        }
        if (persist) persistOwner(`${historyPrefix}:data-source`);
        scheduleInspect();
      };
      const scheduleInspect = () => {
        if (!inspect || inspect.hidden) return;
        clearTimeout(inspectTimer);
        if (!url.value.trim()) {
          inspect.textContent = "Enter a JSON endpoint or paste JSON to inspect arrays and fields.";
          inspect.classList.add("empty");
          return;
        }
        inspect.textContent = "Inspecting JSON...";
        inspect.classList.remove("empty");
        const token = ++inspectToken;
        inspectTimer = setTimeout(() => inspectJsonEndpoint(owner, root, persistOwner, token, () => inspectToken, historyPrefix), 350);
      };
      url.oninput = target.oninput = select.oninput = () => update(true);
      url.onblur = target.onblur = select.onblur = () => { lastHistoryKey = null; };
      update(false);
    }

    function dataPathLabel(path, fallback = "Value") {
      const parts = String(path || "").split(".").filter(Boolean).filter(part => !/^\d+$/.test(part));
      const raw = parts.pop() || fallback;
      const spaced = raw
        .replace(/([a-z0-9])([A-Z])/g, "$1 $2")
        .replace(/[_-]+/g, " ")
        .trim();
      return (spaced || fallback).replace(/^./, ch => ch.toUpperCase());
    }

    function isScalarDataValue(value) {
      return value == null || ["string", "number", "boolean"].includes(typeof value);
    }

    function collectScalarDataLeaves(value, prefix = "", out = [], depth = 0) {
      if (depth > 7 || out.length > 80) return out;
      if (Array.isArray(value)) {
        if (!value.length) return out;
        const sample = value.find(item => item && typeof item === "object") ?? value[0];
        const childPrefix = prefix ? prefix + ".0" : "";
        collectScalarDataLeaves(sample, childPrefix, out, depth + 1);
        return out;
      }
      if (isScalarDataValue(value)) {
        if (prefix) out.push({ path: prefix, value });
        return out;
      }
      if (!value || typeof value !== "object") return out;
      Object.entries(value).slice(0, 50).forEach(([key, child]) => {
        collectScalarDataLeaves(child, prefix ? prefix + "." + key : key, out, depth + 1);
      });
      return out;
    }

    function columnarRepeatEntries(value) {
      if (!isPlainObject(value)) return [];
      const groups = new Map();
      Object.entries(value).forEach(([key, child]) => {
        if (!Array.isArray(child) || !child.length) return;
        const scalarCount = child.filter(item => isScalarDataValue(item)).length;
        if (!scalarCount) return;
        const group = groups.get(child.length) || [];
        group.push({ key, value: child });
        groups.set(child.length, group);
      });
      return [...groups.values()]
        .filter(group => group.length >= 2)
        .sort((a, b) => b.length - a.length || (b[0]?.value.length || 0) - (a[0]?.value.length || 0))[0] || [];
    }

    function isColumnarRepeatObject(value) {
      return columnarRepeatEntries(value).length >= 2;
    }

    function columnarRepeatItem(value, index = 0) {
      const item = {};
      columnarRepeatEntries(value).forEach(entry => {
        item[entry.key] = entry.value[index];
      });
      return item;
    }

    function columnarRepeatItems(value) {
      const entries = columnarRepeatEntries(value);
      const length = entries[0]?.value.length || 0;
      return Array.from({ length }, (_, index) => columnarRepeatItem(value, index));
    }

    function repeatValueItems(value) {
      if (Array.isArray(value)) return value;
      if (isColumnarRepeatObject(value)) return columnarRepeatItems(value);
      return null;
    }

    function repeatValueSample(value) {
      const items = repeatValueItems(value);
      if (items) return items.find(item => item && typeof item === "object") ?? items[0] ?? null;
      return value;
    }

    function looksLikeImagePath(path) {
      return /\b(image|images|img|thumbnail|thumb|photo|picture|avatar|cover|poster|logo|icon|media|src)\b/i.test(String(path || ""));
    }

    function looksLikeImageValue(value) {
      const text = String(value || "").trim();
      if (!text) return false;
      if (/^data:image\//i.test(text)) return true;
      if (/\.(png|jpe?g|gif|webp|avif|svg)(?:[?#].*)?$/i.test(text)) return true;
      return /^https?:\/\//i.test(text) && /\b(image|img|photo|thumb|cover|avatar|cdn|cloudinary|unsplash|picsum)\b/i.test(text);
    }

    function imagePathSpecificityScore(path) {
      const parts = String(path || "").split(".").filter(Boolean);
      const first = parts[0] || "";
      const last = parts[parts.length - 1] || "";
      const parents = parts.slice(0, -1).join(".");
      let score = 0;
      if (parts.length <= 2) score += 80;
      else score -= Math.min(90, (parts.length - 2) * 26);
      if (/^(image|images|thumbnail|thumb|photo|photos|picture|pictures|poster|cover|avatar|media)$/i.test(first)) score += 70;
      if (/^(images|photos|pictures|media)$/i.test(first) && /^\d+$/.test(last)) score += 35;
      if (/\b(category|categories|brand|manufacturer|vendor|seller|author|owner|user|profile|meta|metadata|source)\b/i.test(parents)) score -= 75;
      if (/^(image|thumbnail|thumb|photo|picture|poster|cover|avatar)$/i.test(last)) score += 18;
      return score;
    }

    function dataFieldScore(entry, kind) {
      const path = String(entry?.path || "");
      const name = path.split(".").pop() || path;
      const value = entry?.value;
      const text = String(value ?? "");
      let score = 0;
      if (kind === "image") {
        if (looksLikeImagePath(path)) score += 70 + imagePathSpecificityScore(path);
        if (looksLikeImageValue(value)) score += 90;
      } else if (kind === "title") {
        if (/\b(title|name|label|headline|heading|product|subject|caption|time|date|day|hour)\b/i.test(name)) score += 80;
        if (/\b(slug|id|uuid|url|image|description|desc|body|content)\b/i.test(name)) score -= 45;
        if (typeof value === "string" && text.length > 0 && text.length <= 72) score += 18;
      } else if (kind === "price") {
        if (/\b(price|amount|cost|total|value|rate|fee|salary|budget|balance|temperature|humidity|probability|speed|elevation|interval|code|count)\b/i.test(name)) score += 80;
        if (typeof value === "number" || /^\s*[$€£]?\s*\d+(?:[.,]\d+)?\s*[$€£]?\s*$/.test(text)) score += 24;
      } else if (kind === "description") {
        if (/\b(description|desc|summary|body|text|content|details|about|bio)\b/i.test(name)) score += 85;
        if (typeof value === "string" && text.length >= 60) score += 24;
        if (/\b(id|uuid|slug|url|image|price|amount)\b/i.test(name)) score -= 35;
      } else if (kind === "extra") {
        if (/\b(id|uuid|url|image|description|desc|body|content)\b/i.test(name)) score -= 40;
        if (typeof value === "string" && text.length > 0 && text.length <= 48) score += 22;
        if (typeof value === "number" || typeof value === "boolean") score += 18;
        if (/\b(category|brand|type|status|rating|stock|count|temperature|humidity|precipitation|weather|wind|apparent)\b/i.test(path)) score += 24;
      }
      return score;
    }

    function bestDataLeaf(leaves, kind, used = new Set()) {
      return leaves
        .filter(entry => entry?.path && !used.has(entry.path))
        .map(entry => ({ entry, score: dataFieldScore(entry, kind) }))
        .filter(item => item.score > 0)
        .sort((a, b) => b.score - a.score || a.entry.path.localeCompare(b.entry.path))[0]?.entry || null;
    }

    function pickDerivedRepeatFields(sample) {
      const leaves = collectScalarDataLeaves(sample).filter(entry => entry.path);
      const used = new Set();
      const image = bestDataLeaf(leaves, "image", used);
      if (image) used.add(image.path);
      const title = bestDataLeaf(leaves, "title", used);
      if (title) used.add(title.path);
      const price = bestDataLeaf(leaves, "price", used);
      if (price) used.add(price.path);
      const description = bestDataLeaf(leaves, "description", used);
      if (description) used.add(description.path);
      const extras = leaves
        .filter(entry => !used.has(entry.path))
        .map(entry => ({ entry, score: dataFieldScore(entry, "extra") }))
        .filter(item => item.score > 0)
        .sort((a, b) => b.score - a.score || a.entry.path.localeCompare(b.entry.path))
        .slice(0, 2)
        .map(item => item.entry);
      return { image, title, price, description, extras };
    }

    function repeatComponentMeta(path, role, fallback = "Value") {
      const cleanPath = normalizeBindingPath(path || "", "");
      return {
        generatedFromRepeat: true,
        dataPath: cleanPath,
        dataRole: String(role || "").slice(0, 40),
        dataLabel: dataPathLabel(cleanPath, fallback)
      };
    }

    function componentForDataField(path, value, alias = "item") {
      const label = dataPathLabel(path, "Value");
      const text = dataWireDisplayValue(value);
      const url = dataWireUrlValue(value);
      if (looksLikeImagePath(path) || looksLikeImageValue(value)) {
        return { id: uid("c"), type: "image", text: "", url, ...repeatComponentMeta(path, "image", "Image") };
      }
      if (dataFieldScore({ path, value }, "title") >= 70) {
        return { id: uid("c"), type: "heading", text, url: "", ...repeatComponentMeta(path, "title", "Title") };
      }
      return { id: uid("c"), type: "text", text: label + ": " + text, variant: "field", url: "", ...repeatComponentMeta(path, "field", label) };
    }

    function derivedRepeatComponents(sample, alias = "item") {
      const fields = pickDerivedRepeatFields(sample || {});
      const components = [];
      if (fields.image) {
        components.push({
          id: uid("c"),
          type: "image",
          text: fields.title ? dataWireDisplayValue(fields.title.value) : "",
          url: dataWireUrlValue(fields.image.value),
          ...repeatComponentMeta(fields.image.path, "image", "Image")
        });
      }
      if (fields.title) {
        components.push({ id: uid("c"), type: "heading", text: dataWireDisplayValue(fields.title.value), url: "", ...repeatComponentMeta(fields.title.path, "title", "Title") });
      }
      if (fields.price) {
        components.push({
          id: uid("c"),
          type: "text",
          text: dataPathLabel(fields.price.path, "Price") + ": " + dataWireDisplayValue(fields.price.value),
          variant: "field",
          url: "",
          ...repeatComponentMeta(fields.price.path, "price", "Price")
        });
      }
      if (fields.description) {
        components.push({ id: uid("c"), type: "text", text: dataWireDisplayValue(fields.description.value), url: "", ...repeatComponentMeta(fields.description.path, "description", "Description") });
      }
      for (const extra of fields.extras) {
        components.push({
          id: uid("c"),
          type: "text",
          text: dataPathLabel(extra.path, "Value") + ": " + dataWireDisplayValue(extra.value),
          variant: "field",
          url: "",
          ...repeatComponentMeta(extra.path, "field", "Value")
        });
      }
      if (!components.length) {
        components.push({ id: uid("c"), type: "text", text: dataWireDisplayValue(sample) || "Item", variant: "field", url: "", generatedFromRepeat: true, dataRole: "item", dataLabel: "Item" });
      }
      return components;
    }


    function repeatSampleForPath(path, owner = null) {
      const key = normalizeContextPath(path, "");
      if (!key) return null;
      const sources = [];
      if (isPlainObject(latestRuntimeContext)) sources.push(latestRuntimeContext);
      if (owner) sources.push(normalizeDataObject(owner.data));
      for (const state of model.states || []) sources.push(normalizeDataObject(state.data));
      for (const source of sources) {
        const value = jsonValueAtPath(source, key);
        if (value !== undefined) return repeatValueSample(value);
      }
      if (key.endsWith(".data")) {
        return { title: "Item title", description: "Readable description.", image: "https://example.com/image.jpg", value: 1 };
      }
      return null;
    }

    function repeatCandidateDataScore(sample) {
      if (!sample || typeof sample !== "object") return 0;
      const fields = pickDerivedRepeatFields(sample);
      let score = 0;
      if (fields.image) score += 34;
      if (fields.title) score += 28;
      if (fields.description) score += 18;
      if (fields.price) score += 12;
      score += Math.min(18, fields.extras.length * 6);
      return score;
    }

    function collectRepeatArrayCandidates(value, prefix, out = [], depth = 0, source = "data") {
      if (!prefix || depth > 5 || out.length > 120) return out;
      if (Array.isArray(value)) {
        const sample = repeatValueSample(value);
        let score = 20;
        if (sample && typeof sample === "object") score += 60;
        score += repeatCandidateDataScore(sample);
        if (/\b(data|items|products|results|rows|list|entries)\b/i.test(prefix)) score += 30;
        if (/\.data$/i.test(prefix)) score += 50;
        out.push({ path: prefix, source, score, assumed: false });
        if (sample && typeof sample === "object") {
          Object.entries(sample).slice(0, 30).forEach(([key, child]) => {
            collectRepeatArrayCandidates(child, prefix + "." + key, out, depth + 1, source);
          });
        }
        return out;
      }
      if (!value || typeof value !== "object") return out;
      if (isColumnarRepeatObject(value)) {
        const sample = columnarRepeatItem(value, 0);
        let score = 95 + repeatCandidateDataScore(sample);
        if (/\b(hourly|daily|weekly|monthly|series|timeline|forecast|history|measurements|metrics|rows|table|data)\b/i.test(prefix)) score += 45;
        out.push({ path: prefix, source: source + " columnar data", score, assumed: false });
      }
      Object.entries(value).slice(0, 40).forEach(([key, child]) => {
        collectRepeatArrayCandidates(child, prefix ? prefix + "." + key : key, out, depth + 1, source);
      });
      return out;
    }

    function repeatCandidatesForOwner(owner) {
      const candidates = [];
      if (!owner) return candidates;
      const source = normalizeDataSource(owner.dataSource);
      const target = normalizeContextPath(source.target, "fetch");
      const hasDataSource = Boolean(String(source.url || "").trim());
      if (hasDataSource && isPlainObject(latestRuntimeContext)) {
        Object.entries(latestRuntimeContext)
          .filter(([key]) => !isRuntimeBookkeepingPath(key))
          .forEach(([key, value]) => collectRepeatArrayCandidates(value, key, candidates, 0, "runtime"));
      }
      Object.entries(normalizeDataObject(owner.data)).forEach(([key, value]) => collectRepeatArrayCandidates(value, key, candidates, 0, "state"));
      if (hasDataSource) {
        for (const state of model.states || []) {
          if (state === owner) continue;
          Object.entries(normalizeDataObject(state.data)).forEach(([key, value]) => collectRepeatArrayCandidates(value, key, candidates, 0, state.title || state.id || "state"));
        }
      }
      const current = normalizeRepeatConfig(owner.repeat).path;
      if (current) candidates.push({ path: current, source: "current", score: 1000, assumed: false });
      if (hasDataSource) candidates.push({ path: `${target}.data`, source: "fetch response assumption", score: 35, assumed: true });
      const seen = new Set();
      return candidates
        .filter(item => normalizeContextPath(item.path, ""))
        .filter(item => {
          if (seen.has(item.path)) return false;
          seen.add(item.path);
          return true;
        })
        .sort((a, b) => b.score - a.score || a.path.localeCompare(b.path));
    }

    function isGeneratedRepeatComponent(component, repeatPath = "") {
      return Boolean(component?.generatedFromRepeat);
    }

    function shouldReplaceRepeatComponents(components, repeatPath = "") {
      const normalized = normalizeComponents(components);
      return !normalized.length || normalized.every(component => isGeneratedRepeatComponent(component, repeatPath));
    }

    function applyDerivedRepeatComponents(owner, repeatPath, root = null, force = false) {
      return false;
    }

    function bindRepeatEditor(owner, root, persistOwner, historyPrefix = "state") {
      const path = root.querySelector("#pRepeatPath");
      const as = root.querySelector("#pRepeatAs");
      const index = root.querySelector("#pRepeatIndex");
      const preview = root.querySelector("#pRepeatPreview");
      const status = root.querySelector("#pRepeatStatus");
      if (!path || !as || !index || !preview) return;
      owner.repeat = normalizeRepeatConfig(owner.repeat);
      as.value = "item";
      index.value = "i";
      const field = path.closest(".field");
      if (field) field.hidden = false;
      let previousRepeatPath = normalizeContextPath(owner.repeat.path, "");
      const fillOptions = selectedPath => {
        const candidates = repeatCandidatesForOwner(owner);
        const selected = normalizeContextPath(selectedPath, "");
        path.innerHTML = "";
        const empty = document.createElement("option");
        empty.value = "";
        empty.textContent = "No repeated list";
        path.appendChild(empty);
        candidates.slice(0, 60).forEach((candidate, index) => {
          const option = document.createElement("option");
          option.value = candidate.path;
          const prefix = candidate.source === "current" ? "Current" : "Candidate";
          const suffix = candidate.assumed ? "assumption" : candidate.source;
          option.textContent = `${prefix}: ${candidate.path} (${suffix})`;
          path.appendChild(option);
        });
        if (selected && !candidates.some(candidate => candidate.path === selected)) {
          const option = document.createElement("option");
          option.value = selected;
          option.textContent = `Manual: ${selected}`;
          path.appendChild(option);
        }
        path.value = selected;
      };
      const update = (persist = true) => {
        const oldPath = previousRepeatPath;
        const currentRepeat = normalizeRepeatConfig(owner.repeat);
        owner.repeat = currentRepeat.path
          ? normalizeRepeatConfig({ path: currentRepeat.path, as: currentRepeat.as, index: currentRepeat.index, manual: currentRepeat.manual })
          : normalizeRepeatConfig(null);
        fillOptions(owner.repeat.path);
        as.value = owner.repeat.as;
        index.value = owner.repeat.index;
        const mode = owner.repeat.manual ? "Manual repeat path" : "Repeat path";
        preview.textContent = owner.repeat.path
          ? `${mode}: ${owner.repeat.path}. Render rows read each item through globalState.`
          : "Choose a repeated list from global state or a fetched JSON array.";
        preview.hidden = false;
        preview.className = "condition-preview compact-repeat-preview" + (owner.repeat.path ? " ok" : " empty");
        if (status) {
          status.textContent = owner.repeat.path ? `Repeat: ${owner.repeat.path}` : "Repeat: off";
          status.classList.toggle("active", Boolean(owner.repeat.path));
        }
        if (owner.repeat.path && owner.repeat.path !== oldPath) {
          applyDerivedRepeatComponents(owner, owner.repeat.path, root, false);
        }
        previousRepeatPath = normalizeContextPath(owner.repeat.path, "");
        if (persist && owner.repeat.path !== oldPath) {
          persistOwner(`${historyPrefix}:repeat`);
          scheduleSync(false);
        }
      };
      path.onchange = () => {
        owner.repeat = path.value
          ? normalizeRepeatConfig({ path: path.value, as: "item", index: "i", manual: true })
          : normalizeRepeatConfig(null);
        previousRepeatPath = "";
        update(true);
      };
      const persistAlias = () => {
        const currentRepeat = normalizeRepeatConfig(owner.repeat);
        if (!currentRepeat.path) return;
        owner.repeat = normalizeRepeatConfig({ ...currentRepeat, as: as.value, index: index.value, manual: true });
        previousRepeatPath = "";
        update(true);
      };
      as.oninput = persistAlias;
      index.oninput = persistAlias;
      path.onblur = () => { lastHistoryKey = null; };
      update(false);
    }

    function safeEditorFetchUrl(url) {
      const raw = String(url || "").trim();
      if (!raw) return "";
      try {
        const parsed = new URL(raw, window.location.href);
        return /^https?:$/i.test(parsed.protocol) ? parsed.href : "";
      } catch (_) {
        return "";
      }
    }

    async function inspectJsonEndpoint(owner, root, persistOwner, token, latestToken, historyPrefix = "state") {
      const inspect = root.querySelector("#pDataSourceInspect");
      const urlInput = root.querySelector("#pDataSourceUrl");
      if (!inspect || !urlInput || token !== latestToken()) return;
      const trimmed = urlInput.value.trim();
      if (trimmed.startsWith("{") || trimmed.startsWith("[")) {
        try {
          const json = JSON.parse(trimmed);
          if (token !== latestToken()) return;
          renderJsonInspect(owner, root, persistOwner, json, {
            status: "parsed",
            contentType: "application/json"
          }, { historyPrefix });
        } catch (err) {
          if (token !== latestToken()) return;
          inspect.textContent = "Pasted string is not valid JSON: " + err.message;
          inspect.classList.remove("empty");
        }
        return;
      }
      const requestUrl = safeEditorFetchUrl(urlInput.value);
      if (!requestUrl) {
        inspect.textContent = "Endpoint must be http(s), relative URL, or raw JSON.";
        inspect.classList.remove("empty");
        return;
      }
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), 5000);
      try {
        const response = await fetch(requestUrl, {
          headers: { Accept: "application/json" },
          cache: "no-store",
          credentials: "same-origin",
          signal: controller.signal
        });
        const contentType = response.headers.get("content-type") || "";
        const json = await response.json();
        if (token !== latestToken()) return;
        renderJsonInspect(owner, root, persistOwner, json, {
          status: response.status,
          contentType
        }, { historyPrefix });
      } catch (err) {
        if (token !== latestToken()) return;
        inspect.textContent = (err?.name === "AbortError")
          ? "Inspect timed out. The app will still try at runtime."
          : "Could not inspect JSON. Check CORS, URL, or whether the endpoint returns JSON.";
        inspect.classList.remove("empty");
      } finally {
        clearTimeout(timer);
      }
    }

    async function detectDataSourcePreviewJson(root) {
      const inspect = root.querySelector("#pDataSourceInspect");
      const urlInput = root.querySelector("#pDataSourceUrl");
      const raw = String(urlInput?.value || "").trim();
      if (!raw) return null;
      const mayWriteInspectError = () => String(urlInput?.value || "").trim() === raw && !inspect?.querySelector(".json-inspect-title");
      if (raw.startsWith("{") || raw.startsWith("[")) {
        try {
          return JSON.parse(raw);
        } catch (err) {
          if (inspect && mayWriteInspectError()) {
            inspect.textContent = "Pasted string is not valid JSON: " + err.message;
            inspect.classList.remove("empty");
          }
          return null;
        }
      }
      const requestUrl = safeEditorFetchUrl(raw);
      if (!requestUrl) {
        if (inspect && mayWriteInspectError()) {
          inspect.textContent = "Endpoint must be http(s), relative URL, or raw JSON.";
          inspect.classList.remove("empty");
        }
        return null;
      }
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), 5000);
      try {
        const response = await fetch(requestUrl, {
          headers: { Accept: "application/json" },
          cache: "no-store",
          credentials: "same-origin",
          signal: controller.signal
        });
        return await response.json();
      } catch (err) {
        if (inspect && mayWriteInspectError()) {
          inspect.textContent = (err?.name === "AbortError")
            ? "Preview timed out. The app will still try at runtime."
            : "Could not preview JSON. Check CORS, URL, or whether the endpoint returns JSON.";
          inspect.classList.remove("empty");
        }
        return null;
      } finally {
        clearTimeout(timer);
      }
    }

    function jsonValueAtPath(value, path) {
      const parts = String(path || "").split(".").filter(Boolean);
      let current = value;
      for (const part of parts) {
        if (current === null || current === undefined || typeof current !== "object" || !(part in current)) return undefined;
        current = current[part];
      }
      return current;
    }

    function collectArrayPaths(value, prefix = "", out = [], depth = 0) {
      if (out.length > 24 || depth > 5) return out;
      if (Array.isArray(value)) {
        out.push({ path: prefix, count: value.length });
        if (value.length) collectArrayPaths(value[0], prefix, out, depth + 1);
        return out;
      }
      if (!isPlainObject(value)) return out;
      for (const [key, child] of Object.entries(value).slice(0, 24)) {
        const path = prefix ? `${prefix}.${key}` : key;
        collectArrayPaths(child, path, out, depth + 1);
      }
      return out;
    }

    function collectLeafPaths(value, prefix = "", out = [], depth = 0) {
      if (out.length > 30 || depth > 5) return out;
      if (Array.isArray(value)) {
        if (value.length) collectLeafPaths(value[0], prefix, out, depth + 1);
        return out;
      }
      if (isPlainObject(value)) {
        for (const [key, child] of Object.entries(value).slice(0, 24)) {
          const path = prefix ? `${prefix}.${key}` : key;
          collectLeafPaths(child, path, out, depth + 1);
        }
        return out;
      }
      if (prefix) out.push(prefix);
      return out;
    }

    function renderJsonInspect(owner, root, persistOwner, json, meta = {}, opts = {}) {
      const inspect = root.querySelector("#pDataSourceInspect");
      const select = root.querySelector("#pDataSourceSelect");
      const target = root.querySelector("#pDataSourceTarget");
      const ownerRoot = opts.ownerRoot || root;
      const ownerTarget = ownerRoot.querySelector("#pDataSourceTarget");
      const ownerSelect = ownerRoot.querySelector("#pDataSourceSelect");
      if (!inspect || !select || !target) return;
      const historyPrefix = opts.historyPrefix || "state";
      const maxRows = 140;
      const rootIsArray = Array.isArray(json);
      const sample = rootIsArray ? (json[0] === undefined ? null : json[0]) : json;
      let rows = 0;
      inspect.innerHTML = "";
      inspect.classList.remove("empty");

      const targetName = () => normalizeContextPath(target.value || ownerTarget?.value || owner.dataSource?.target || "fetch", "fetch");
      const setSelectedPath = path => {
        const cleanPath = normalizeBindingPath(path || "", "");
        const cleanTarget = targetName();
        const nextSource = normalizeDataSource({
          ...normalizeDataSource(owner.dataSource),
          target: cleanTarget,
          select: cleanPath
        });
        owner.dataSource = nextSource;
        target.value = nextSource.target;
        select.value = cleanPath;
        if (ownerTarget) ownerTarget.value = nextSource.target;
        if (ownerSelect) ownerSelect.value = cleanPath;
        persistOwner(`${historyPrefix}:data-source`);
        return nextSource;
      };
      const refreshDataViews = () => {
        if (typeof refreshInspectorGlobalStateTree === "function") refreshInspectorGlobalStateTree();
        bindRepeatEditor(owner, ownerRoot, persistOwner, historyPrefix);
        renderComponentEditors(owner, null, ownerRoot);
      };
      const applySelectedJsonToEditorBus = source => {
        const selected = source.select ? jsonValueAtPath(json, source.select) : json;
        applyEditorDataSourceResult(source.target, {
          status: "preview",
          loading: false,
          done: true,
          ok: true,
          data: selected === undefined ? null : selected,
          error: "",
          statusCode: Number(meta.status) || 0,
          count: Array.isArray(selected) ? selected.length : (selected === null || selected === undefined ? 0 : 1),
          url: source.url
        });
      };
      const selectedFromSource = normalizeDataSource({
        ...normalizeDataSource(owner.dataSource),
        target: target.value || ownerTarget?.value || owner.dataSource?.target,
        select: select.value || ownerSelect?.value || owner.dataSource?.select
      });
      const selectedJson = selectedFromSource.select ? jsonValueAtPath(json, selectedFromSource.select) : json;
      applyEditorDataSourceResult(targetName(), {
        status: "preview",
        loading: false,
        done: true,
        ok: true,
        data: selectedJson === undefined ? null : selectedJson,
        error: "",
        statusCode: Number(meta.status) || 0,
        count: Array.isArray(selectedJson) ? selectedJson.length : (selectedJson === null || selectedJson === undefined ? 0 : 1),
        url: selectedFromSource.url
      });
      const shortValue = value => {
        if (Array.isArray(value)) return "Array[" + value.length + "]";
        if (value && typeof value === "object") return "Object{" + Object.keys(value).length + "}";
        const text = JSON.stringify(value);
        if (!text) return String(value);
        return text.length > 82 ? text.slice(0, 79) + "..." : text;
      };
      const pathLabel = path => path || "response";
      const isImageValue = (path, value) => {
        if (Array.isArray(value)) value = value[0];
        return typeof value === "string" && (/^https?:\/\/.*\.(png|jpe?g|gif|webp|svg)(\?|#|$)/i.test(value) || /(^|\.)(image|images|img|photo|picture|thumbnail|avatar|icon)(\.|$)/i.test(path));
      };
      const isLinkValue = value => typeof value === "string" && /^https?:\/\//i.test(value);
      const targetDataPath = () => targetName() + ".data";
      const selectedJsonRootPath = () => normalizeBindingPath(select.value || ownerSelect?.value || owner.dataSource?.select || "", "");
      const relativeToSelectedPath = path => {
        const cleanPath = normalizeBindingPath(path || "", "");
        const selectedPath = selectedJsonRootPath();
        if (!selectedPath) return cleanPath;
        if (cleanPath === selectedPath) return "";
        return cleanPath.startsWith(selectedPath + ".") ? cleanPath.slice(selectedPath.length + 1) : cleanPath;
      };
      const arrayItemKind = path => {
        const value = path ? jsonValueAtPath(json, path) : json;
        const first = Array.isArray(value) ? value[0] : undefined;
        return first && typeof first === "object" ? "object" : "value";
      };
      const arrayContextForPath = path => {
        const cleanPath = normalizeBindingPath(path || "", "");
        const candidates = arrayPaths
          .map(item => normalizeBindingPath(item.path || "", ""))
          .filter(arrayPath => (arrayPath || rootIsArray) && (!arrayPath || cleanPath === arrayPath || cleanPath.startsWith(arrayPath + ".")));
        return candidates.find(arrayPath => arrayItemKind(arrayPath) === "object") ?? candidates[0] ?? null;
      };
      const dataWireButtonLabel = (path, value) => {
        const role = inferDataWireRole(path, value);
        if (role === "image") return "Show image";
        if (role === "link") return "Show link";
        if (role === "title") return "Show heading";
        if (role === "price") return "Show price";
        return "Show text";
      };
      const repeatPathForJsonArray = actionPath => {
        const cleanPath = relativeToSelectedPath(actionPath || "");
        return targetDataPath() + (cleanPath ? "." + cleanPath : "");
      };
      const itemPathForArrayContext = (path, arrayPath) => {
        const cleanPath = relativeToSelectedPath(path || "");
        const cleanArrayPath = relativeToSelectedPath(arrayPath || "");
        if (!cleanArrayPath) return cleanPath;
        return cleanPath === cleanArrayPath ? "" : normalizeBindingPath(cleanPath.slice(cleanArrayPath.length + 1), "");
      };
      const addJsonFieldToRender = (path, value) => {
        const originalPath = normalizeBindingPath(path || "", "");
        const cleanPath = relativeToSelectedPath(path || "");
        if (!cleanPath) return false;
        const arrayPath = arrayContextForPath(originalPath);
        const scopePath = arrayPath === null ? "" : repeatPathForJsonArray(arrayPath);
        const itemPath = arrayPath === null ? "" : itemPathForArrayContext(originalPath, arrayPath);
        const sourcePath = scopePath
          ? scopePath + (itemPath ? "." + itemPath : "")
          : targetDataPath() + "." + cleanPath;
        const wire = dataWireFromPath(owner, sourcePath, value, { scopePath, itemPath });
        if (!wire) return false;
        if (scopePath) owner.repeat = normalizeRepeatConfig({ path: scopePath, as: "item", index: "i", manual: true });
        const added = upsertDataWire(owner, wire);
        persistOwner(`${historyPrefix}:data-wire-render`);
        refreshDataViews();
        renderJsonInspect(owner, root, persistOwner, json, meta, opts);
        return added;
      };
      const repeatJsonArray = actionPath => {
        const source = setSelectedPath(actionPath);
        applySelectedJsonToEditorBus(source);
        const repeatPath = `${source.target}.data`;
        owner.repeat = normalizeRepeatConfig({ path: repeatPath, as: "item", index: "i", manual: true });
        applyDerivedDataWires(owner, repeatPath, ownerRoot, true);
        persistOwner(`${historyPrefix}:repeat`);
        refreshDataViews();
        renderJsonInspect(owner, root, persistOwner, json, meta, opts);
      };
      const title = document.createElement("div");
      title.className = "json-inspect-title";
      const statusText = meta.status ? "JSON " + meta.status : "JSON";
      title.textContent = statusText + " · " + (rootIsArray ? "Response array: " + json.length + " items" : "Response");
      inspect.appendChild(title);
      const metaLine = document.createElement("div");
      metaLine.className = "fetch-json-meta";
      metaLine.innerHTML = "<span>Choose a list to repeat, or show a field directly in Render.</span><span>Fetch writes into globalState; Render reads from that same state.</span>";
      inspect.appendChild(metaLine);

      const arrayPaths = collectArrayPaths(json)
        .filter(item => item.path || rootIsArray)
        .slice(0, 8);
      if (arrayPaths.length) {
        const actions = document.createElement("div");
        actions.className = "fetch-json-actions";
        arrayPaths.forEach(item => {
          const actionPath = item.path || "";
          const actionLabel = actionPath.split(".").filter(Boolean).pop() || "response";
          const row = document.createElement("div");
          row.className = "fetch-json-meta";
          const label = document.createElement("span");
          label.textContent = `${actionPath || "response"} · ${item.count} items`;
          const buttons = document.createElement("span");
          const useButton = document.createElement("button");
          useButton.type = "button";
          useButton.textContent = "Use as data";
          useButton.title = "Use " + (actionPath || "response") + " as fetch.data";
          useButton.onclick = () => {
            const source = setSelectedPath(actionPath);
            applySelectedJsonToEditorBus(source);
            refreshDataViews();
            renderJsonInspect(owner, root, persistOwner, json, meta, opts);
          };
          const repeatButton = document.createElement("button");
          repeatButton.type = "button";
          repeatButton.textContent = "Repeat list";
          repeatButton.title = "Render one row per item in " + (actionPath || "response");
          repeatButton.onclick = () => repeatJsonArray(actionPath);
          buttons.append(useButton, repeatButton);
          row.append(label, buttons);
          actions.appendChild(row);
        });
        inspect.appendChild(actions);
      }

      const tree = document.createElement("div");
      tree.className = "fetch-json-tree";
      inspect.appendChild(tree);
      const appendLine = (depth, label, path, value, fromRootArrayItem) => {
        if (rows >= maxRows) return;
        rows += 1;
        const line = document.createElement("div");
        line.className = "fetch-json-line";
        line.style.marginLeft = Math.min(depth * 14, 70) + "px";
        const code = document.createElement("div");
        code.className = "fetch-json-code";
        code.innerHTML = "<span class=\"fetch-json-path\">" + escapeHtml(pathLabel(path)) + "</span> <span>" + escapeHtml(label) + "</span> <span class=\"fetch-json-value\">" + escapeHtml(shortValue(value)) + "</span>";
        line.append(code);
        const arrayPath = Array.isArray(value) ? normalizeBindingPath(path || "", "") : "";
        const canRepeat = Array.isArray(value) && (arrayPath || rootIsArray);
        const canRender = path && !Array.isArray(value) && !(value && typeof value === "object");
        if (canRepeat || canRender) {
          const pick = document.createElement("button");
          pick.type = "button";
          pick.className = "fetch-json-pick";
          pick.textContent = canRepeat ? "Repeat list" : dataWireButtonLabel(path, value);
          pick.title = canRepeat
            ? "Render one row per item in " + (path || "response")
            : "Add " + path + " to Render";
          pick.onclick = evt => {
            evt.preventDefault();
            evt.stopPropagation();
            if (canRepeat) repeatJsonArray(arrayPath);
            else addJsonFieldToRender(path, value);
          };
          line.appendChild(pick);
        }
        tree.appendChild(line);
      };
      const walk = (value, basePath, depth, fromRootArrayItem) => {
        if (rows >= maxRows) return;
        if (Array.isArray(value)) {
          appendLine(depth, "[]", basePath, value, fromRootArrayItem);
          const first = value[0];
          if (first && typeof first === "object") walk(first, basePath, depth + 1, false);
          else if (first !== undefined) appendLine(depth + 1, "0:", basePath ? basePath + ".0" : "0", first, fromRootArrayItem);
          return;
        }
        if (value && typeof value === "object") {
          Object.keys(value).slice(0, 80).forEach(key => {
            const childPath = basePath ? basePath + "." + key : key;
            const child = value[key];
            appendLine(depth, key + ":", childPath, child, fromRootArrayItem);
            if (child && typeof child === "object") walk(child, childPath, depth + 1, fromRootArrayItem);
          });
          return;
        }
        appendLine(depth, "value", basePath, value, fromRootArrayItem);
      };

      appendLine(0, rootIsArray ? "whole array" : "whole response", "", json, rootIsArray);
      if (rootIsArray) {
        if (sample && typeof sample === "object") walk(sample, "", 1, true);
        else if (sample !== null) appendLine(1, "0:", "0", sample, true);
      } else {
        walk(json, "", 1, false);
      }
      if (rows >= maxRows) {
        const more = document.createElement("div");
        more.className = "small";
        more.textContent = "Response is large, showing the first " + maxRows + " paths.";
        inspect.appendChild(more);
      }
      refreshDataViews();
    }

    function conditionInputSummary(condition) {
      const inputs = inferConditionInputs(condition);
      if (!inputs.length) return "No inputs. Always available.";
      return "Inputs: " + inputs.map(input => `${input.name}:${input.type}`).join(", ");
    }

    function inferConditionInputs(condition) {
      const map = new Map();
      const upsert = (name, type = "boolean") => {
        const key = String(name || "");
        if (!key || ["true", "false", "and", "or", "null", "undefined", "always"].includes(key.toLowerCase())) return;
        const previous = map.get(key);
        const rank = { boolean: 0, int: 1, float: 2, text: 3 };
        const nextType = rank[type] > rank[previous?.type || "boolean"] ? type : previous?.type || type;
        map.set(key, { name: key, type: nextType });
      };
      const source = String(condition || "");
      const searchable = source.replace(/(["'])(?:\\.|(?!\1)[\s\S])*?\1/g, "");
      for (const name of searchable.match(/[a-zA-Z_][a-zA-Z0-9_]*(?:\.[a-zA-Z_][a-zA-Z0-9_]*)*/g) || []) upsert(name);
      for (const numeric of searchable.matchAll(/([a-zA-Z_][a-zA-Z0-9_]*(?:\.[a-zA-Z_][a-zA-Z0-9_]*)*)\s*(==|!=|>=|<=|>|<)\s*(-?\d+(?:\.\d+)?)/g)) {
        upsert(numeric[1], numeric[3].includes(".") ? "float" : "int");
      }
      for (const quoted of source.matchAll(/([a-zA-Z_][a-zA-Z0-9_]*(?:\.[a-zA-Z_][a-zA-Z0-9_]*)*)\s*(==|!=)\s*(['"])(.*?)\3/g)) {
        upsert(quoted[1], "text");
      }
      return [...map.values()].sort((a, b) => a.name.localeCompare(b.name));
    }

    function valueTypeLabel(value) {
      if (Array.isArray(value)) return "array";
      if (value === null) return "null";
      return typeof value;
    }

    function conditionScopeStates(t) {
      const states = [];
      const seen = new Set();
      const add = state => {
        if (!state || seen.has(state.id)) return;
        seen.add(state.id);
        states.push(state);
      };
      add(byId(t.from));
      add(byId(t.to));
      for (let parent = byId(byId(t.from)?.parentId); parent; parent = byId(parent.parentId)) add(parent);
      return states;
    }

    function collectDataPathSuggestions(value, prefix, sourceLabel, out, depth = 0) {
      if (!prefix || out.length > 80 || depth > 5) return out;
      if (Array.isArray(value)) {
        out.push({ path: prefix, source: sourceLabel, type: "array" });
        if (value.length) {
          const sample = value.find(item => item && typeof item === "object") ?? value[0];
          const childPrefix = sample == null || ["string", "number", "boolean"].includes(typeof sample) ? prefix + ".0" : prefix;
          collectDataPathSuggestions(sample, childPrefix, sourceLabel + " item", out, depth + 1);
        }
        return out;
      }
      if (!isPlainObject(value)) {
        out.push({ path: prefix, source: sourceLabel, type: valueTypeLabel(value) });
        return out;
      }
      out.push({ path: prefix, source: sourceLabel, type: "object" });
      for (const [key, child] of Object.entries(value).slice(0, 32)) {
        collectDataPathSuggestions(child, `${prefix}.${key}`, sourceLabel, out, depth + 1);
      }
      return out;
    }

    function conditionDataSuggestions(t) {
      const suggestions = [];
      const seen = new Set();
      const add = (path, source, type = "value") => {
        const key = String(path || "").trim();
        if (!key || seen.has(key)) return;
        seen.add(key);
        suggestions.push({ path: key, source, type });
      };
      const addKnownStateData = (state, label) => {
        for (const [key, value] of Object.entries(normalizeDataObject(state.data))) {
          collectDataPathSuggestions(value, key, label, suggestions);
        }
        const source = normalizeDataSource(state.dataSource);
        if (String(source.url || "").trim()) {
          const target = normalizeContextPath(source.target, "fetch");
          add(`${target}.status`, `${label} data source`, "number");
          add(`${target}.ok`, `${label} data source`, "boolean");
          add(`${target}.error`, `${label} data source`, "text");
          add(`${target}.data`, `${label} data source`, "value");
        }
        const repeat = normalizeRepeatConfig(state.repeat);
        if (repeat.path) {
          add(repeat.as, `${label} repeat item`, "object");
          add(`${repeat.as}.field`, `${label} repeat item`, "value");
          add(repeat.index, `${label} repeat index`, "number");
        }
      };
      add("state.current", "runtime", "text");
      let includeKnownGlobalState = false;
      for (const state of conditionScopeStates(t)) {
        const label = state.id === t.from ? "from state" : state.id === t.to ? "target state" : "parent state";
        for (const path of normalizeSubscriptions(state.subscriptions)) {
          if (path === "*") {
            includeKnownGlobalState = true;
          } else {
            add(path, `${label} subscription`, "value");
          }
        }
        addKnownStateData(state, label);
      }
      if (includeKnownGlobalState) {
        for (const state of model.states || []) {
          addKnownStateData(state, `global ${state.title || state.id}`);
        }
        for (const transition of model.transitions || []) {
          for (const [key, value] of Object.entries(normalizeDataObject(transition.set))) {
            collectDataPathSuggestions(value, key, `transition ${transition.label || transition.id} set data`, suggestions);
          }
        }
      }
      return suggestions.sort((a, b) => a.path.localeCompare(b.path));
    }

    function renderConditionSuggestions(datalist, suggestions) {
      datalist.innerHTML = "";
      for (const item of suggestions.slice(0, 80)) {
        const option = document.createElement("option");
        option.value = item.path;
        option.label = `${item.source} · ${item.type}`;
        datalist.appendChild(option);
      }
    }

    function showEdgeInspector(t, opts = {}) {

      stateInspectorEl.classList.remove("template-inspector");

      stateInspectorTitleEl.textContent = "Transition: " + transitionDisplayLabel(t);
      if (wasEditingTemplate) renderStateExplorer();
      root.innerHTML = `
