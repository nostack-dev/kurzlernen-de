      stateExplorerEl.classList.remove("drag-over");
      updateSelectRect();
      if (hadSelectionBox) {
        saveSelection("selection:canvas");
        draw();
      }
      else if (dragToSave) saveModel("state:drag:" + dragToSave);
      else draw();
      return true;
    }

    function cancelStaleDesktopMouseGesture(evt) {
      if (Date.now() - lastTouchAt < 700) return false;
      if (activePointerId !== null || pendingCanvasTouch || pendingEdgeTouch || touchPointers.size) return false;
      if (evt.buttons !== 0) return false;
      const hasDesktopGesture = Boolean(pendingCanvasMouse || boxSelecting || dragging || connecting || panning);
      if (!hasDesktopGesture) return false;
      return cancelActiveCanvasGesture();
    }

    function startPendingEdgeTouch(evt, t) {
      clearLongPress();
      pendingEdgeTouch = {
        pointerId: evt.pointerId,
        transitionId: t.id,
        clientX: evt.clientX,
        clientY: evt.clientY
      };
      longPressTimer = setTimeout(() => {
        if (!pendingEdgeTouch || pendingEdgeTouch.pointerId !== evt.pointerId || pinchZoom || touchPointers.size > 1) return;
        const edge = model.transitions.find(item => item.id === pendingEdgeTouch.transitionId);
        pendingEdgeTouch = null;
        if (edge) startEdgeRewire(eventFromPoint({ clientX: evt.clientX, clientY: evt.clientY }, evt), edge);
      }, 430);
    }

    function updatePendingEdgeTouch(evt) {
      if (!pendingEdgeTouch || pendingEdgeTouch.pointerId !== evt.pointerId) return false;
      const distance = Math.hypot(evt.clientX - pendingEdgeTouch.clientX, evt.clientY - pendingEdgeTouch.clientY);
      if (distance <= 10) return true;
      pendingEdgeTouch = null;
      clearLongPress();
      return false;
    }

    function finishPendingEdgeTouch(evt) {
      if (!pendingEdgeTouch || pendingEdgeTouch.pointerId !== evt.pointerId) return false;
      const edgeId = pendingEdgeTouch.transitionId;
      pendingEdgeTouch = null;
      clearLongPress();
      if (Date.now() >= suppressEdgeClickUntil) selectEdge(edgeId, evt.clientX, evt.clientY);
      return true;
    }

    function finishPendingCanvasTap(evt) {
      if (!pendingCanvasTouch) return false;
      const pending = pendingCanvasTouch;
      clearLongPress();
      pendingCanvasTouch = null;
      if (pending.moved || pending.longPressed) return false;
      const recentTap = lastCanvasTap &&
        Date.now() - lastCanvasTap.time < 360 &&
        Math.hypot(evt.clientX - lastCanvasTap.x, evt.clientY - lastCanvasTap.y) < 28;
      if (recentTap) {
        lastCanvasTap = null;
        const p = screenToWorld(evt);
        addStateAt(p.x, p.y, evt.clientX, evt.clientY);
      } else {
        lastCanvasTap = { time: Date.now(), x: evt.clientX, y: evt.clientY };
        clearSelection("selection:canvas");
      }
      return true;
    }

    function updatePendingCanvasTouch(evt) {
      if (!pendingCanvasTouch || pendingCanvasTouch.pointerId !== evt.pointerId || boxSelecting) return false;
      const distance = Math.hypot(evt.clientX - pendingCanvasTouch.clientX, evt.clientY - pendingCanvasTouch.clientY);
      if (distance <= 10) return true;
      pendingCanvasTouch.moved = true;
      clearLongPress();
      if (!panning) startPanning(eventFromPoint(pendingCanvasTouch, evt));
      return false;
    }

    function trackTouchStart(evt) {
      if (!isTouchPointer(evt) || isTouchUiTarget(evt.target)) return;
      evt.preventDefault();
      captureTouchPointer(evt);
      rememberTouchPointer(evt);
      lastTouchAt = Date.now();
      if (touchPointers.size >= 2) beginPinchZoom();
    }

    function updatePinchZoom() {
      if (!pinchZoom || touchPointers.size < 2) return false;
      const distance = distanceBetweenTouches();
      if (!distance) return false;
      zoomAtViewportCenter(pinchZoom.scale * (distance / pinchZoom.distance));
      return true;
    }

    function selectedNodeIds() {
      if (selected?.type === "node") return new Set([selected.id]);
      if (selected?.type === "nodes") return new Set(selected.ids || []);
      if (selected?.type === "items") return new Set(selected.nodes || []);
      return new Set();
    }

    function selectedEdgeIds() {
      if (selected?.type === "edge") return new Set([selected.id]);
      if (selected?.type === "items") return new Set(selected.edges || []);
      return new Set();
    }

    function selectedNodeIdList() {
      return [...selectedNodeIds()].filter(id => byId(id) && isCurrentLayerState(id));
    }

    function selectedEdgeIdList() {
      return [...selectedEdgeIds()].filter(id => model.transitions.some(t => t.id === id && transitionInLayer(t)));
    }

    function selectionFromParts(nodes, edges) {
      const nodeIds = [...new Set(nodes || [])].filter(id => byId(id) && isCurrentLayerState(id));
      const edgeIds = [...new Set(edges || [])].filter(id => model.transitions.some(t => t.id === id && transitionInLayer(t)));
      if (nodeIds.length === 1 && edgeIds.length === 0) return { type: "node", id: nodeIds[0] };
      if (nodeIds.length > 1 && edgeIds.length === 0) return { type: "nodes", ids: nodeIds };
      if (nodeIds.length === 0 && edgeIds.length === 1) return { type: "edge", id: edgeIds[0] };
      if (nodeIds.length || edgeIds.length) return { type: "items", nodes: nodeIds, edges: edgeIds };
      return null;
    }

    function setSingleSelection(kind, id, historyKey = null) {
      selected = kind === "node" ? { type: "node", id } : { type: "edge", id };
      saveSelection(historyKey);
    }

    function toggleSelection(kind, id) {
      const nodes = selectedNodeIdList();
      const edges = selectedEdgeIdList();
      const list = kind === "node" ? nodes : edges;
      const index = list.indexOf(id);
      if (index >= 0) list.splice(index, 1);
      else list.push(id);
      selected = selectionFromParts(nodes, edges);
      saveSelection();
    }

    function clearSelection(historyKey = null) {
      selected = null;
      showEmptyInspector();
      saveSelection(historyKey);
      draw();
    }

    function updateSelectionActions() {
      const ids = selectedNodeIdList();
      const visible = ids.length > 0 && (selected?.type === "nodes" || selected?.type === "items");
      selectionActionsEl.hidden = !visible;
      selectionActionsEl.classList.toggle("visible", visible);
      if (visible) selectionCountEl.textContent = ids.length === 1 ? "1 state" : `${ids.length} states`;
    }

    function deleteSelectedItems() {
      if (!selected) return false;
      const ids = selectedNodeIdList();
      const edgeIds = selectedEdgeIdList();
      const removable = ids.filter(id => byId(id));
      const removeEdges = new Set(edgeIds);
      const removedNodes = removable.length ? removeStatesById(removable) : false;
      if (!removedNodes && !removeEdges.size) return false;
      if (!removedNodes) {
        model.transitions = model.transitions.filter(t => !removeEdges.has(t.id));
      } else if (removeEdges.size) {
        model.transitions = model.transitions.filter(t => !removeEdges.has(t.id));
      }
      selected = null;
      showEmptyInspector();
      saveModel();
      draw();
      return true;
    }

    function clearLongPress() {
      if (longPressTimer) clearTimeout(longPressTimer);
      longPressTimer = null;
    }

    function eventFromPoint(point, evt) {
      return {
        clientX: point.clientX,
        clientY: point.clientY,
        button: 0,
        preventDefault() { evt?.preventDefault?.(); },
        stopPropagation() { evt?.stopPropagation?.(); }
      };
    }

    function deleteSelectedNodes() {
      const ids = selectedNodeIdList();
      if (!ids.length || !removeStatesById(ids)) return;
      selected = null;
      showEmptyInspector();
      saveModel();
      draw();
    }

    function copySelectedNodes() {
      const ids = selectedNodeIdList();
      if (!ids.length) return;
      const selectedSet = new Set(ids);
      const idMap = new Map();
      const copies = [];
      for (const original of model.states.filter(s => selectedSet.has(s.id))) {
        const copy = makeState(original.x + GRID_SIZE * 2, original.y + GRID_SIZE * 2, `${original.title || original.id} Copy`);
        copy.components = cloneComponents(original.components);
        copy.data = normalizeDataObject(original.data);
        idMap.set(original.id, copy.id);
        copies.push(copy);
      }
      const copiedTransitions = model.transitions
        .filter(t => idMap.has(t.from) && idMap.has(t.to))
        .map(t => ({
          id: uid("t"),
          from: idMap.get(t.from),
          to: idMap.get(t.to),
          label: t.label || "Next",
          condition: t.condition || "",
          set: normalizeDataObject(t.set)
        }));
      model.states.push(...copies);
      model.transitions.push(...copiedTransitions);
      selected = { type: "nodes", ids: copies.map(s => s.id) };
      saveModel();
      draw();
    }

    let titleMeasureContext = null;
    function measuredTextWidth(text) {
      try {
        titleMeasureContext = titleMeasureContext || document.createElement("canvas").getContext("2d");
        titleMeasureContext.font = '900 14px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
        return titleMeasureContext.measureText(String(text || "")).width;
      } catch (_) {
        return String(text || "").length * 8;
      }
    }

    function nodeWidth(s) {
      const title = String(s?.title || s?.id || "State");
      return snapClampToGrid(Math.ceil(measuredTextWidth(title)) + NODE_TITLE_EXTRA_W, NODE_MIN_W, NODE_MAX_W);
    }

    function nodeAtWorldPoint(p) {
      const states = visibleStates();
      for (let i = states.length - 1; i >= 0; i--) {
        const s = states[i];
        if (p.x >= s.x && p.x <= s.x + nodeWidth(s) && p.y >= s.y && p.y <= s.y + NODE_H) return s;
      }
      return null;
    }

    function connectionTargetAtWorldPoint(p) {
      let best = null;
      let bestScore = Infinity;
      const states = visibleStates();
      for (let i = states.length - 1; i >= 0; i--) {
        const s = states[i];
        const input = nodeCenter(s, "in");
        const dist = Math.hypot(p.x - input.x, p.y - input.y);
        const nearInput =
          p.x >= s.x - 56 &&
          p.x <= s.x + 54 &&
          p.y >= s.y - 8 &&
          p.y <= s.y + 96;
        const insideNode =
          s.id !== connecting?.from &&
          p.x >= s.x &&
          p.x <= s.x + nodeWidth(s) &&
          p.y >= s.y &&
          p.y <= s.y + NODE_H;
        if ((nearInput || insideNode) && dist < bestScore) {
          best = s;
          bestScore = dist;
        }
      }
      return best;
    }

    function isEdgeDropTarget(evt) {
      return Boolean(evt.target?.closest?.("[data-edge-id], .edge, .hit, .edge-label, .edge-tip-hit"));
    }

    function updateSelectRect() {
      if (!boxSelecting) {
        selectRectEl.style.display = "none";
        return;
      }
      const r = mapEl.getBoundingClientRect();
      const x1 = boxSelecting.startX - r.left;
      const y1 = boxSelecting.startY - r.top;
      const x2 = boxSelecting.currentX - r.left;
      const y2 = boxSelecting.currentY - r.top;
      selectRectEl.style.left = Math.min(x1, x2) + "px";
      selectRectEl.style.top = Math.min(y1, y2) + "px";
      selectRectEl.style.width = Math.abs(x2 - x1) + "px";
      selectRectEl.style.height = Math.abs(y2 - y1) + "px";
      selectRectEl.style.display = boxSelecting.moved ? "block" : "none";
    }

    function nodesInSelection() {
      if (!boxSelecting) return [];
      const a = screenToWorldXY(boxSelecting.startX, boxSelecting.startY);
      const b = screenToWorldXY(boxSelecting.currentX, boxSelecting.currentY);
      const minX = Math.min(a.x, b.x);
      const maxX = Math.max(a.x, b.x);
      const minY = Math.min(a.y, b.y);
      const maxY = Math.max(a.y, b.y);
      return visibleStates()
        .filter(s => s.x < maxX && s.x + nodeWidth(s) > minX && s.y < maxY && s.y + NODE_H > minY)
        .map(s => s.id);
    }

    function startBoxSelect(evt) {
      evt.preventDefault();
      selected = null;
      boxSelecting = {
        startX: evt.clientX,
        startY: evt.clientY,
        currentX: evt.clientX,
        currentY: evt.clientY,
        moved: false
      };
      updateSelectRect();
      draw();
    }

    function applyCamera() {
      camera.scale = clampScale(camera.scale);
      const tx = Math.round(camera.x);
      const ty = Math.round(camera.y);
      worldEl.style.transform = `translate(${tx}px, ${ty}px) scale(${camera.scale})`;
      const grid = 24 * camera.scale;
      mapEl.style.backgroundSize = `${grid}px ${grid}px, ${grid}px ${grid}px, 100% 100%, 100% 100%`;
      mapEl.style.backgroundPosition = `${tx % grid}px ${ty % grid}px, ${tx % grid}px ${ty % grid}px, 0 0, 0 0`;
      scheduleCameraSave();
      requestMapCanvasPaint();
    }

    function clampScale(value) {
      return clamp(value, 0.25, 2.4);
    }

    function crispScale(value) {
      return Math.round(clampScale(value) * 100) / 100;
    }

    function mapCanvasContext() {
      if (!mapCanvasEl?.getContext) return null;
      try {
        return mapCanvasEl.getContext("2d", { alpha: true, desynchronized: true });
      } catch (_) {
        return null;
      }
    }

    function resizeMapCanvas() {
      if (!htmlCanvasRenderer) return;
      const rect = mapEl.getBoundingClientRect();
      const dpr = Math.max(1, window.devicePixelRatio || 1);
      const width = Math.max(1, Math.round(rect.width * dpr));
      const height = Math.max(1, Math.round(rect.height * dpr));
      if (mapCanvasEl.width !== width) mapCanvasEl.width = width;
      if (mapCanvasEl.height !== height) mapCanvasEl.height = height;
      requestMapCanvasPaint();
    }

    function fallbackMapRenderer() {
      if (htmlCanvasRenderer?.frame) cancelAnimationFrame(htmlCanvasRenderer.frame);
      htmlCanvasRenderer?.resizeObserver?.disconnect();
      if (htmlCanvasRenderer?.paintHandler) {
        mapCanvasEl.removeEventListener("paint", htmlCanvasRenderer.paintHandler);
      }
      htmlCanvasRenderer = null;
      mapEl.classList.remove("html-canvas-renderer");
      mapEl.dataset.canvasRenderer = "dom";
      mapCanvasEl.hidden = true;
      mapCanvasEl.dataset.drawn = "false";
      mapSceneEl.style.transform = "";
      if (mapSceneEl.parentElement !== mapEl) mapEl.insertBefore(mapSceneEl, selectRectEl);
    }

    function drawMapCanvasFrame() {
      if (!htmlCanvasRenderer) return;
      const ctx = htmlCanvasRenderer.ctx;
      try {
        if (typeof ctx.reset === "function") ctx.reset();
        else if (typeof ctx.setTransform === "function") ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.clearRect(0, 0, mapCanvasEl.width, mapCanvasEl.height);
        const transform = ctx.drawElementImage(mapSceneEl, 0, 0);
        if (transform?.toString) mapSceneEl.style.transform = transform.toString();
        mapCanvasEl.dataset.drawn = "true";
      } catch (error) {
        console.warn("HTML-in-Canvas renderer disabled; falling back to DOM/SVG.", error);
        fallbackMapRenderer();
      }
    }

    function requestMapCanvasPaint() {
      if (!htmlCanvasRenderer || htmlCanvasRenderer.frame) return;
      htmlCanvasRenderer.frame = requestAnimationFrame(() => {
        if (!htmlCanvasRenderer) return;
        htmlCanvasRenderer.frame = 0;
        if (typeof mapCanvasEl.requestPaint === "function") mapCanvasEl.requestPaint();
        else drawMapCanvasFrame();
      });
    }

    function initMapRenderer() {
      const ctx = mapCanvasContext();
      if (!ctx || typeof ctx.drawElementImage !== "function") {
        fallbackMapRenderer();
        return;
      }

      const paintHandler = () => drawMapCanvasFrame();
      htmlCanvasRenderer = {
        ctx,
        frame: 0,
        paintHandler,
        resizeObserver: null
      };
      mapCanvasEl.hidden = false;
      mapCanvasEl.setAttribute("layoutsubtree", "");
      mapCanvasEl.appendChild(mapSceneEl);
      mapEl.classList.add("html-canvas-renderer");
      mapEl.dataset.canvasRenderer = "html-in-canvas";
      mapCanvasEl.addEventListener("paint", paintHandler);
      if (typeof ResizeObserver === "function") {
        htmlCanvasRenderer.resizeObserver = new ResizeObserver(resizeMapCanvas);
        htmlCanvasRenderer.resizeObserver.observe(mapEl);
      }
      window.addEventListener("resize", resizeMapCanvas);
      resizeMapCanvas();
    }

    function wheelDeltaPixels(evt) {
      const modeScale = evt.deltaMode === WheelEvent.DOM_DELTA_LINE ? 16 : evt.deltaMode === WheelEvent.DOM_DELTA_PAGE ? 240 : 1;
      return evt.deltaY * modeScale;
    }

    function wheelZoomFactor(evt) {
      const deltaY = clamp(wheelDeltaPixels(evt), -640, 640);
      return Math.pow(2, -deltaY / 420);
    }

    function zoomAtClientPoint(clientX, clientY, nextScale) {
      const r = mapEl.getBoundingClientRect();
      const before = screenToWorldXY(clientX, clientY);
      camera.scale = clampScale(nextScale);
      camera.x = clientX - r.left - before.x * camera.scale;
      camera.y = clientY - r.top - before.y * camera.scale;
      applyCamera();
    }

    function zoomAtViewportCenter(nextScale) {
      const r = mapEl.getBoundingClientRect();
      zoomAtClientPoint(r.left + r.width / 2, r.top + r.height / 2, nextScale);
    }

    function zoomByFactor(factor, clientX = null, clientY = null) {
      if (clientX === null || clientY === null) {
        zoomAtViewportCenter(camera.scale * factor);
        return;
      }
      zoomAtClientPoint(clientX, clientY, camera.scale * factor);
    }

    function viewportCenterWorld() {
      const r = mapEl.getBoundingClientRect();
      return {
        x: (r.width / 2 - camera.x) / camera.scale,
        y: (r.height / 2 - camera.y) / camera.scale
      };
    }

    function keepViewportCenteredOn(worldPoint) {
      const r = mapEl.getBoundingClientRect();
      camera.x = Math.round(r.width / 2 - worldPoint.x * camera.scale);
      camera.y = Math.round(r.height / 2 - worldPoint.y * camera.scale);
      applyCamera();
    }

    function togglePreviewCollapsed() {
      const center = viewportCenterWorld();
      previewCollapsed = !previewCollapsed;
      applyPreviewCollapsed();
      requestAnimationFrame(() => keepViewportCenteredOn(center));
      setTimeout(() => keepViewportCenteredOn(center), 210);
    }

    function resetView() {
      camera = { x: 32, y: 32, scale: 1 };
      applyCamera();
    }

    function fitView() {
      const states = visibleStates();
      if (!states.length) return resetView();
      const r = mapEl.getBoundingClientRect();
      const minX = Math.min(...states.map(s => s.x));
      const minY = Math.min(...states.map(s => s.y));
      const maxX = Math.max(...states.map(s => s.x + nodeWidth(s)));
      const maxY = Math.max(...states.map(s => s.y + NODE_H));
      const w = Math.max(1, maxX - minX);
      const h = Math.max(1, maxY - minY);
      const pad = 120;
      const rawScale = Math.min(r.width / (w + pad * 2), r.height / (h + pad * 2));
      const scale = rawScale >= 0.92 ? 1 : crispScale(rawScale);
      camera.scale = scale;
      camera.x = Math.round((r.width - w * scale) / 2 - minX * scale);
      camera.y = Math.round((r.height - h * scale) / 2 - minY * scale);
      applyCamera();
    }

    function startPanning(evt) {
      evt.preventDefault();
      evt.stopPropagation();
      panning = { startX: evt.clientX, startY: evt.clientY, cameraX: camera.x, cameraY: camera.y };
      mapEl.classList.add("panning");
    }

    function startNodeDrag(evt, s) {
      evt.stopPropagation();
      if (!evt.shiftKey) selected = { type: "node", id: s.id };
      const p = screenToWorld(evt);
      dragging = {
        id: s.id,
        shiftKey: Boolean(evt.shiftKey),
        originalX: s.x,
        originalY: s.y,
        dx: p.x - s.x,
        dy: p.y - s.y,
        startClientX: evt.clientX,
        startClientY: evt.clientY,
        moved: false
      };
      mapEl.classList.add("dragging-state");
      draw();
    }

    function startConnection(evt, s) {
      evt.stopPropagation();
      const p = screenToWorld(evt);
      connecting = { from: s.id, to: p };
      connectingTargetId = null;
      mapEl.classList.add("connecting");
      draw();
    }

    function startEdgeRewire(evt, t) {
      evt.preventDefault();
      evt.stopPropagation();
      const from = byId(t.from);
      if (!from) return;
      connecting = { from: t.from, to: screenToWorld(evt), edgeId: t.id };
      connectingTargetId = null;
      selected = { type: "edge", id: t.id };
      suppressEdgeClickUntil = Date.now() + 650;
      mapEl.classList.add("connecting");
      draw();
    }

    function nodeCenter(s, side) {
      const width = nodeWidth(s);
      const centerY = s.y + NODE_H / 2;
      if (side === "out") return { x: s.x + width, y: centerY };
      if (side === "in") return { x: s.x, y: centerY };
      return { x: s.x + width / 2, y: centerY };
    }

    function edgeColor(transition, layerId = currentLayerId) {
      const index = Math.max(0, transitionsInLayer(layerId).findIndex(item => item.id === transition?.id));
      const hue = (195 + index * 137.508) % 360;
      return `hsl(${hue.toFixed(1)} 84% 62%)`;
    }

    function edgePath(from, to, transition = null) {
      return pathFromPoints(edgeRoutePoints(from, to, transition));
    }

    function pathFromPoints(points) {
      const compact = [];
      for (const point of points.map(snapPointToGrid)) {
        const previous = compact[compact.length - 1];
        if (!previous || previous.x !== point.x || previous.y !== point.y) compact.push(point);
      }
      return compact.map((point, index) => `${index ? "L" : "M"} ${point.x} ${point.y}`).join(" ");
    }

    function compactRoutePoints(points) {
      const compact = [];
      for (const point of points.map(snapPointToGrid)) {
        const previous = compact[compact.length - 1];
        if (!previous || previous.x !== point.x || previous.y !== point.y) compact.push(point);
      }
      const straightened = [];
      for (const point of compact) {
        const previous = straightened[straightened.length - 1];
        const beforePrevious = straightened[straightened.length - 2];
        if (previous && beforePrevious &&
          ((beforePrevious.x === previous.x && previous.x === point.x) ||
            (beforePrevious.y === previous.y && previous.y === point.y))) {
          straightened[straightened.length - 1] = point;
        } else {
          straightened.push(point);
        }
      }
      return straightened;
    }

    function edgeLaneSortValue(transition, side) {
      const neighbor = byId(side === "out" ? transition.to : transition.from);
      return {
        y: neighbor?.y ?? 0,
        x: neighbor?.x ?? 0,
        label: String(transition.label || ""),
        id: String(transition.id || "")
      };
    }

    function compareEdgeLane(a, b, side) {
      const av = edgeLaneSortValue(a, side);
      const bv = edgeLaneSortValue(b, side);
      return av.y - bv.y ||
        av.x - bv.x ||
        av.label.localeCompare(bv.label) ||
        av.id.localeCompare(bv.id);
    }

    function orderedPortTransitions(stateId, side) {
      return visibleTransitions()
        .filter(transition => side === "out" ? transition.from === stateId : transition.to === stateId)
        .slice()
        .sort((a, b) => compareEdgeLane(a, b, side));
    }

    function edgePortPoint(state, side, transition = null) {
      if (!transition) return nodeCenter(state, side);
      const transitions = orderedPortTransitions(state.id, side);
      const index = Math.max(0, transitions.findIndex(item => item.id === transition.id));
      const slot = index - Math.floor((transitions.length - 1) / 2);
      const y = snapToGrid(state.y + NODE_H / 2 + slot * GRID_SIZE);
      if (side === "out") return { x: state.x + nodeWidth(state), y };
      if (side === "in") return { x: state.x, y };
      return nodeCenter(state, side);
    }

    function doglegRoutePoints(from, to, transition = null) {
      const a = edgePortPoint(from, "out", transition);
      const b = edgePortPoint(to, "in", transition);
      if (from.id === to.id) {
        const loopTop = snapToGrid(from.y - GRID_SIZE * 3);
        return [
          a,
          { x: a.x + GRID_SIZE * 2, y: a.y },
          { x: a.x + GRID_SIZE * 2, y: loopTop },
          { x: b.x - GRID_SIZE * 2, y: loopTop },
          { x: b.x - GRID_SIZE * 2, y: b.y },
          b
        ];
      }

      const canRouteBetweenNodes = b.x - a.x >= GRID_SIZE * 4;
      if (canRouteBetweenNodes) {
        const outX = a.x + GRID_SIZE * 2;
        const inX = b.x - GRID_SIZE * 2;
        let laneY = snapToGrid((a.y + b.y) / 2);
        if (laneY === a.y || laneY === b.y) {
          const direction = b.y >= a.y ? 1 : -1;
          laneY = snapToGrid(a.y + direction * GRID_SIZE * 2);
          if (laneY === b.y) laneY = snapToGrid(laneY + direction * GRID_SIZE * 2);
        }
        return [
          a,
          { x: outX, y: a.y },
          { x: outX, y: laneY },
          { x: inX, y: laneY },
          { x: inX, y: b.y },
          b
        ];
      }

      const laneY = snapToGrid(Math.min(from.y, to.y) - GRID_SIZE * 2);
      return [
        a,
        { x: a.x + GRID_SIZE * 2, y: a.y },
        { x: a.x + GRID_SIZE * 2, y: laneY },
        { x: b.x - GRID_SIZE * 2, y: laneY },
        { x: b.x - GRID_SIZE * 2, y: b.y },
        b
      ];
    }

    function directRoutePoints(from, to, transition = null) {
      if (from.id === to.id) return null;
      const a = edgePortPoint(from, "out", transition);
      const b = edgePortPoint(to, "in", transition);
      if (a.y !== b.y || b.x <= a.x) return null;
      const direct = [a, b];
      return routeIntersectsBlockingState(direct, transition || { from: from.id, to: to.id }, GRID_SIZE / 2) ? null : direct;
    }

    function segmentIntersectsBox(a, b, box) {
      if (a.x === b.x) {
        if (a.x <= box.x1 || a.x >= box.x2) return false;
        return Math.max(Math.min(a.y, b.y), box.y1) < Math.min(Math.max(a.y, b.y), box.y2);
      }
      if (a.y === b.y) {
        if (a.y <= box.y1 || a.y >= box.y2) return false;
        return Math.max(Math.min(a.x, b.x), box.x1) < Math.min(Math.max(a.x, b.x), box.x2);
      }
      return false;
    }

    function stateBox(state, margin = 0) {
      return {
        id: state.id,
        x1: state.x - margin,
        y1: state.y - margin,
        x2: state.x + nodeWidth(state) + margin,
        y2: state.y + NODE_H + margin
      };
    }

    function routeBlockingBoxes(transition, margin = 0) {
      return visibleStates()
        .filter(state => state.id !== transition?.from && state.id !== transition?.to)
        .map(state => stateBox(state, margin));
    }

    function routeIntersectsBlockingState(points, transition, margin = 0) {
      const boxes = routeBlockingBoxes(transition, margin);
      for (let i = 1; i < points.length; i++) {
        const a = snapPointToGrid(points[i - 1]);
        const b = snapPointToGrid(points[i]);
        if (boxes.some(box => segmentIntersectsBox(a, b, box))) return true;
      }
      return false;
    }

    function pointInBox(point, box) {
      return point.x > box.x1 && point.x < box.x2 && point.y > box.y1 && point.y < box.y2;
    }

    function routeSearchBounds(start, goal) {
      const boxes = visibleStates().map(state => stateBox(state, GRID_SIZE * 6));
      const xs = [start.x, goal.x];
      const ys = [start.y, goal.y];
      for (const box of boxes) {
        xs.push(box.x1, box.x2);
        ys.push(box.y1, box.y2);
      }
      return {
        minX: snapToGrid(Math.max(WORLD_MIN_X, Math.min(...xs) - GRID_SIZE * 4)),
        maxX: snapToGrid(Math.min(WORLD_MAX_X, Math.max(...xs) + GRID_SIZE * 4)),
        minY: snapToGrid(Math.max(WORLD_MIN_Y, Math.min(...ys) - GRID_SIZE * 4)),
        maxY: snapToGrid(Math.min(WORLD_MAX_Y, Math.max(...ys) + GRID_SIZE * 4))
      };
    }

    function obstacleAvoidingRoutePoints(from, to, transition = null) {
      const start = snapPointToGrid(edgePortPoint(from, "out", transition));
      const goal = snapPointToGrid(edgePortPoint(to, "in", transition));
      const bounds = routeSearchBounds(start, goal);
      const obstacles = visibleStates().map(state =>
        stateBox(state, state.id === from.id || state.id === to.id ? 0 : GRID_SIZE)
      );
      const key = point => `${point.x},${point.y}`;
      const startKey = key(start);
      const goalKey = key(goal);
      const blocked = point => {
        const pointKey = key(point);
        if (pointKey === startKey || pointKey === goalKey) return false;
        return obstacles.some(box => pointInBox(point, box));
      };
      const heuristic = point => Math.abs(point.x - goal.x) + Math.abs(point.y - goal.y);
      const open = [start];
      const cameFrom = new Map();
      const gScore = new Map([[startKey, 0]]);
      const fScore = new Map([[startKey, heuristic(start)]]);
      const closed = new Set();

      for (let guard = 0; open.length && guard < 24000; guard++) {
        let bestIndex = 0;
        for (let i = 1; i < open.length; i++) {
          if ((fScore.get(key(open[i])) ?? Infinity) < (fScore.get(key(open[bestIndex])) ?? Infinity)) bestIndex = i;
        }
        const current = open.splice(bestIndex, 1)[0];
        const currentKey = key(current);
        if (currentKey === goalKey) {
          const path = [current];
          let walkKey = currentKey;
          while (cameFrom.has(walkKey)) {
            const previous = cameFrom.get(walkKey);
            path.unshift(previous);
            walkKey = key(previous);
          }
          return compactRoutePoints(path);
        }
        closed.add(currentKey);
        const neighbors = [
          { x: current.x + GRID_SIZE, y: current.y },
          { x: current.x - GRID_SIZE, y: current.y },
          { x: current.x, y: current.y + GRID_SIZE },
          { x: current.x, y: current.y - GRID_SIZE }
        ];
        for (const neighbor of neighbors) {
          if (neighbor.x < bounds.minX || neighbor.x > bounds.maxX || neighbor.y < bounds.minY || neighbor.y > bounds.maxY) continue;
          if (blocked(neighbor)) continue;
          const neighborKey = key(neighbor);
          if (closed.has(neighborKey)) continue;
          const tentative = (gScore.get(currentKey) ?? Infinity) + GRID_SIZE;
          if (tentative >= (gScore.get(neighborKey) ?? Infinity)) continue;
          cameFrom.set(neighborKey, current);
          gScore.set(neighborKey, tentative);
          fScore.set(neighborKey, tentative + heuristic(neighbor));
          if (!open.some(point => key(point) === neighborKey)) open.push(neighbor);
        }
      }
      return null;
    }

    function baseEdgeRoutePoints(from, to, transition = null) {
      const direct = directRoutePoints(from, to, transition);
      if (direct) return direct;
      const dogleg = doglegRoutePoints(from, to, transition);
      if (!routeIntersectsBlockingState(dogleg, transition || { from: from.id, to: to.id })) return dogleg;
      return obstacleAvoidingRoutePoints(from, to, transition) || dogleg;
    }

    function routeSegments(points) {
      const compact = points.map(snapPointToGrid);
      const segments = [];
      for (let i = 1; i < compact.length; i++) {
        const a = compact[i - 1];
        const b = compact[i];
        if (a.x === b.x && a.y === b.y) continue;
        const vertical = a.x === b.x;
        const horizontal = a.y === b.y;
        if (!vertical && !horizontal) continue;
        segments.push({
          index: i,
          orientation: vertical ? "vertical" : "horizontal",
          coordinate: vertical ? a.x : a.y,
          min: vertical ? Math.min(a.y, b.y) : Math.min(a.x, b.x),
          max: vertical ? Math.max(a.y, b.y) : Math.max(a.x, b.x),
          laneable: i > 1 && i < compact.length - 1
        });
      }
      return segments;
    }

    function routeSegmentsOverlap(a, b) {
      return a.orientation === b.orientation &&
        a.coordinate === b.coordinate &&
        Math.max(a.min, b.min) < Math.min(a.max, b.max);
    }

    function laneSlot(index) {
      if (index <= 0) return 0;
      return index % 2 ? Math.ceil(index / 2) : -index / 2;
    }

    let edgeRouteCache = null;

    function edgeOrder(transitionId) {
      const index = model.transitions.findIndex(item => item.id === transitionId);
      return index < 0 ? Number.MAX_SAFE_INTEGER : index;
    }

    function routeSegmentRecords(routes) {
      const records = [];
      for (const [transitionId, points] of routes) {
        for (const segment of routeSegments(points)) {
          records.push({ ...segment, transitionId });
        }
      }
      return records;
    }

    function overlappingRouteGroups(routes) {
      const buckets = new Map();
      for (const segment of routeSegmentRecords(routes)) {
        if (!segment.laneable) continue;
        const key = `${segment.orientation}:${segment.coordinate}`;
        if (!buckets.has(key)) buckets.set(key, []);
        buckets.get(key).push(segment);
      }

      const groups = [];
      for (const bucket of buckets.values()) {
        const sorted = bucket
          .slice()
          .sort((a, b) => a.min - b.min || a.max - b.max || edgeOrder(a.transitionId) - edgeOrder(b.transitionId));
        let group = [];
        let groupMax = -Infinity;
        for (const segment of sorted) {
          if (!group.length || segment.min < groupMax) {
            group.push(segment);
            groupMax = Math.max(groupMax, segment.max);
          } else {
            if (new Set(group.map(item => item.transitionId)).size > 1) groups.push(group);
            group = [segment];
            groupMax = segment.max;
          }
        }
        if (new Set(group.map(item => item.transitionId)).size > 1) groups.push(group);
      }
      return groups;
    }

    function applySegmentLane(points, segment, coordinate) {
      const routed = points.map(point => ({ ...point }));
      if (segment.orientation === "vertical") {
        routed[segment.index - 1].x = coordinate;
        routed[segment.index].x = coordinate;
      } else {
        routed[segment.index - 1].y = coordinate;
        routed[segment.index].y = coordinate;
      }
      return routed;
    }

    function safeLaneCoordinate(points, segment, slotIndex) {
      const transition = model.transitions.find(item => item.id === segment.transitionId);
      for (let attempt = 0; attempt < 12; attempt++) {
        const coordinate = segment.coordinate + laneSlot(slotIndex + attempt) * GRID_SIZE;
        const candidate = applySegmentLane(points, segment, coordinate);
        if (!routeIntersectsBlockingState(candidate, transition, GRID_SIZE / 2)) return coordinate;
      }
      return segment.coordinate + laneSlot(slotIndex) * GRID_SIZE;
    }

    function resolveRouteOverlaps(routes) {
      let current = new Map([...routes].map(([id, points]) => [id, points.map(point => ({ ...point }))]));
      for (let pass = 0; pass < 8; pass++) {
        const groups = overlappingRouteGroups(current);
        if (!groups.length) break;
        const adjustments = new Map();
        for (const group of groups) {
          const ordered = group
            .slice()
            .sort((a, b) => edgeOrder(a.transitionId) - edgeOrder(b.transitionId) || a.index - b.index);
          const hasFixedLane = ordered.some(segment => !segment.laneable);
          ordered.forEach((segment, index) => {
            if (!segment.laneable) return;
            const slotIndex = hasFixedLane ? index + 1 : index;
            const coordinate = safeLaneCoordinate(current.get(segment.transitionId), segment, slotIndex);
            adjustments.set(`${segment.transitionId}:${segment.index}`, { segment, coordinate });
          });
        }
        if (!adjustments.size) break;
        current = new Map(current);
        for (const { segment, coordinate } of adjustments.values()) {
          current.set(segment.transitionId, applySegmentLane(current.get(segment.transitionId), segment, coordinate));
        }
      }
      for (const [id, points] of current) {
        const transition = model.transitions.find(item => item.id === id);
        if (!transition || !routeIntersectsBlockingState(points, transition)) continue;
        const from = byId(transition.from);
        const to = byId(transition.to);
        const rerouted = from && to ? obstacleAvoidingRoutePoints(from, to, transition) : null;
        if (rerouted) current.set(id, rerouted);
      }
      return current;
    }

    function buildEdgeRouteCache() {
      const routes = new Map();
      for (const transition of visibleTransitions()) {
        const from = byId(transition.from);
        const to = byId(transition.to);
        if (from && to) routes.set(transition.id, baseEdgeRoutePoints(from, to, transition));
      }
      return resolveRouteOverlaps(routes);
    }

    function edgeRoutePoints(from, to, transition = null) {
      if (!transition) return baseEdgeRoutePoints(from, to, transition);
      if (!edgeRouteCache) edgeRouteCache = buildEdgeRouteCache();
      return edgeRouteCache.get(transition.id) || baseEdgeRoutePoints(from, to, transition);
    }

    function polylinePoint(points, ratio) {
      const compact = points.map(snapPointToGrid).filter((point, index, list) => {
        const previous = list[index - 1];
        return !previous || previous.x !== point.x || previous.y !== point.y;
      });
      const lengths = [];
      let total = 0;
      for (let i = 1; i < compact.length; i++) {
        const length = Math.hypot(compact[i].x - compact[i - 1].x, compact[i].y - compact[i - 1].y);
        lengths.push(length);
        total += length;
      }
      if (!total) return compact[0] || { x: 0, y: 0 };
      let remaining = total * clamp(ratio, 0, 1);
      for (let i = 1; i < compact.length; i++) {
        const length = lengths[i - 1];
        if (remaining <= length) {
          const start = compact[i - 1];
          const end = compact[i];
          const t = length ? remaining / length : 0;
          return snapPointToGrid({
            x: start.x + (end.x - start.x) * t,
            y: start.y + (end.y - start.y) * t
          });
        }
        remaining -= length;
      }
      return compact[compact.length - 1];
    }

    function edgeTipHandlePoint(from, to, transition = null) {
      return polylinePoint(edgeRoutePoints(from, to, transition), 0.82);
    }

    function statePreviewText(s) {
      const firstText = normalizeComponents(s.components).find(component => component.text.trim());
      return firstText?.text || "";
    }

    function midPoint(from, to, transition = null) {
      const point = polylinePoint(edgeRoutePoints(from, to, transition), 0.5);
      return { x: point.x, y: point.y - 10 };
    }

    function attachEdgeInteractions(el, t, canRewire = false) {
      el.addEventListener("mousedown", evt => {
        if (canRewire && evt.button === 0) startEdgeRewire(evt, t);
      });
      el.addEventListener("pointerdown", evt => {
        if (!canRewire || !isTouchPointer(evt)) return;
        evt.preventDefault();
        evt.stopPropagation();
        lastTouchAt = Date.now();
        activePointerId = evt.pointerId;
        startPendingEdgeTouch(evt, t);
      });
      el.addEventListener("click", evt => {
        evt.stopPropagation();
        if (Date.now() < suppressEdgeClickUntil) return;
        if (evt.shiftKey) {
          toggleSelection("edge", t.id);
          refreshInspectorForSelection();
          draw();
          return;
        }
        selectEdge(t.id, evt.clientX, evt.clientY);
      });
      el.addEventListener("mouseenter", () => setEdgeHover(t.id, true));
      el.addEventListener("mouseleave", () => setEdgeHover(t.id, false));
    }

    function appendEdgeHit(hit) {
      const defs = wiresEl.querySelector("defs");
      wiresEl.insertBefore(hit, defs?.nextSibling || wiresEl.firstChild);
    }

    function renderLayerNavigation() {
      layerNavEl.innerHTML = "";
      layerNavEl.hidden = true;
    }

    function parentBoundaryTransitions(parent, side) {
      if (!parent) return [];
      const parentLayerId = parent.parentId || null;
      return transitionsInLayer(parentLayerId)
        .filter(transition => side === "input" ? transition.to === parent.id : transition.from === parent.id)
        .sort((a, b) => {
          const aOther = byId(side === "input" ? a.from : a.to);
          const bOther = byId(side === "input" ? b.from : b.to);
          return (aOther?.y ?? 0) - (bOther?.y ?? 0) ||
            (aOther?.x ?? 0) - (bOther?.x ?? 0) ||
            String(a.label || "").localeCompare(String(b.label || "")) ||
            String(a.id || "").localeCompare(String(b.id || ""));
        });
    }

    function boundaryWireLabel(transition, side) {
      const other = byId(side === "input" ? transition.from : transition.to);
      const name = other?.title || other?.id || "outside";
      return side === "input" ? `from ${name}` : `to ${name}`;
    }

    function renderLayerBoundary(el, label, transitions, side, parentLayerId) {
      el.classList.toggle("layer-boundary-empty", transitions.length === 0);
      const count = transitions.length === 1 ? "1 wire" : `${transitions.length} wires`;
      const titleMarkup = side === "input"
        ? `<span class="layer-boundary-plug" aria-hidden="true"></span><span>${label}</span>`
        : `<span>${label}</span><span class="layer-boundary-plug" aria-hidden="true"></span>`;
      const wires = transitions.length
        ? transitions.map(transition => `
            <div class="layer-boundary-wire" data-edge-id="${escapeHtml(transition.id)}" style="--edge-color: ${edgeColor(transition, parentLayerId)}">
              <span class="layer-boundary-dot" data-edge-id="${escapeHtml(transition.id)}" aria-hidden="true"></span>
              <span title="${escapeHtml(boundaryWireLabel(transition, side))}">${escapeHtml(boundaryWireLabel(transition, side))}</span>
            </div>
          `).join("")
        : `<div class="layer-boundary-wire"><span class="layer-boundary-dot" aria-hidden="true"></span><span>not connected yet</span></div>`;
      el.innerHTML = `
        <div class="layer-boundary-title">${titleMarkup}</div>
        <div class="layer-boundary-count">${count}</div>
        <div class="layer-boundary-list">${wires}</div>
      `;
    }

    function renderLayerBoundaries(parent) {
      const parentLayerId = parent?.parentId || null;
      renderLayerBoundary(layerBoundaryInputEl, "Input", parentBoundaryTransitions(parent, "input"), "input", parentLayerId);
      renderLayerBoundary(layerBoundaryOutputEl, "Output", parentBoundaryTransitions(parent, "output"), "output", parentLayerId);
    }

    function updateLayerFrame(states) {
      const parent = byId(currentLayerId);
      if (!parent) {
        layerFrameEl.style.display = "none";
        layerHudEl.hidden = true;
        renderLayerBoundaries(null);
        return;
      }
      const padX = GRID_SIZE * 9;
      const padY = GRID_SIZE * 4;
      const fallbackCenter = viewportCenterWorld();
      const minX = states.length ? Math.min(...states.map(state => state.x)) : fallbackCenter.x - GRID_SIZE * 8;
      const minY = states.length ? Math.min(...states.map(state => state.y)) : fallbackCenter.y - GRID_SIZE * 5;
      const maxX = states.length ? Math.max(...states.map(state => state.x + nodeWidth(state))) : fallbackCenter.x + GRID_SIZE * 8;
      const maxY = states.length ? Math.max(...states.map(state => state.y + NODE_H)) : fallbackCenter.y + GRID_SIZE * 5;
      layerFrameEl.style.display = "block";
      layerFrameEl.style.left = snapToGrid(minX - padX) + "px";
      layerFrameEl.style.top = snapToGrid(minY - padY) + "px";
      layerFrameEl.style.width = snapToGrid(maxX - minX + padX * 2) + "px";
      layerFrameEl.style.height = snapToGrid(maxY - minY + padY * 2) + "px";
      layerHudEl.hidden = false;
      layerFrameLabelEl.textContent = `Inside ${parent.title || parent.id}`;
      renderLayerBoundaries(parent);
    }

    function draw() {
      if (drawFrame) {
        cancelAnimationFrame(drawFrame);
        drawFrame = 0;
      }
      normalizeModel(model);
      selected = normalizeSelection();
      const states = visibleStates();
      const transitions = visibleTransitions();
      renderLayerNavigation();
      updateLayerFrame(states);
      edgeRouteCache = buildEdgeRouteCache();
      const nodeSelection = selectedNodeIds();
      const edgeSelection = selectedEdgeIds();
      nodesEl.innerHTML = "";
      wiresEl.querySelectorAll(".edge,.hit,.edge-label,.edge-tip-hit,.edge-pin,.temp-edge").forEach(el => el.remove());
      const edgeTipHits = [];
      runtimeStateEl.textContent = "app: " + (currentAppState || "—");

      for (const t of transitions) {
        if (connecting?.edgeId === t.id) continue;
        const from = byId(t.from);
        const to = byId(t.to);
        if (!from || !to) continue;
        const routePoints = edgeRoutePoints(from, to, t);
        const pathD = pathFromPoints(routePoints);
        const edgeStyle = `--edge-color: ${edgeColor(t)}`;

        const hit = svgEl("path", { d: pathD, class: "hit", style: edgeStyle, "data-edge-id": t.id });
        attachEdgeInteractions(hit, t);
        appendEdgeHit(hit);

        const classes = ["edge"];
        if (edgeSelection.has(t.id)) classes.push("selected");
        if (hoveredEdgeId === t.id) classes.push("hovered");
        if (lastAppTransitionId === t.id) classes.push("runtime");
        const path = svgEl("path", { d: pathD, class: classes.join(" "), style: edgeStyle, "marker-end": "url(#arrow)", "data-edge-id": t.id });
        attachEdgeInteractions(path, t);
        wiresEl.appendChild(path);

        const m = midPoint(from, to, t);
        const labelClasses = ["edge-label"];
        if (edgeSelection.has(t.id)) labelClasses.push("selected");
        if (hoveredEdgeId === t.id) labelClasses.push("hovered");
        const label = svgEl("text", { x: m.x, y: m.y, class: labelClasses.join(" "), style: edgeStyle, "text-anchor": "middle", "data-edge-id": t.id });
        label.textContent = t.label + (t.condition ? `  [${t.condition}]` : "");
        attachEdgeInteractions(label, t);
        wiresEl.appendChild(label);

        const pinClasses = ["edge-pin"];
        if (edgeSelection.has(t.id)) pinClasses.push("selected");
        if (hoveredEdgeId === t.id) pinClasses.push("hovered");
        const startPin = routePoints[0];
        const endPin = routePoints[routePoints.length - 1];
        wiresEl.appendChild(svgEl("circle", {
          cx: startPin.x,
          cy: startPin.y,
          r: 5,
          class: pinClasses.join(" "),
          style: edgeStyle,
          "data-edge-id": t.id,
          "data-edge-pin": "out"
        }));
        wiresEl.appendChild(svgEl("circle", {
          cx: endPin.x,
          cy: endPin.y,
          r: 5,
          class: pinClasses.join(" "),
          style: edgeStyle,
          "data-edge-id": t.id,
          "data-edge-pin": "in"
        }));

        const tip = edgeTipHandlePoint(from, to, t);
        const tipClasses = ["edge-tip-hit"];
        if (edgeSelection.has(t.id)) tipClasses.push("hovered");
        if (hoveredEdgeId === t.id) tipClasses.push("hovered");
        const tipHit = svgEl("circle", {
          cx: tip.x,
          cy: tip.y,
          r: 13,
          class: tipClasses.join(" "),
          style: edgeStyle,
          "data-edge-id": t.id,
          "data-edge-tip": "to"
        });
        attachEdgeInteractions(tipHit, t, true);
        edgeTipHits.push(tipHit);
      }

      for (const tipHit of edgeTipHits) wiresEl.appendChild(tipHit);

      if (connecting) {
        const from = byId(connecting.from);
        const target = connectingTargetId ? byId(connectingTargetId) : null;
        if (target) {
          wiresEl.appendChild(svgEl("path", { d: edgePath(from, target), class: "temp-edge" }));
        } else {
          const a = nodeCenter(from, "out");
          const b = snapPointToGrid(connecting.to);
          wiresEl.appendChild(svgEl("path", {
            d: pathFromPoints([
              a,
              { x: a.x + GRID_SIZE * 2, y: a.y },
              { x: a.x + GRID_SIZE * 2, y: b.y },
              b
            ]),
            class: "temp-edge"
          }));
        }
      }

      for (const s of states) {
        const el = document.createElement("div");
        const classes = ["node"];
        if (s.id === model.initial) classes.push("initial");
        if (connecting?.from === s.id) classes.push("connect-source");
        if (nodeSelection.has(s.id)) classes.push("selected");
        if (currentAppState === s.id) classes.push("active");
        if (connectingTargetId === s.id) classes.push("drop-target");
        const innerCount = childStateCount(s.id);
        if (innerCount) classes.push("has-children");
        el.className = classes.join(" ");
        el.style.left = s.x + "px";
        el.style.top = s.y + "px";
        el.style.width = nodeWidth(s) + "px";
        el.style.height = NODE_H + "px";
        el.dataset.id = s.id;
        el.innerHTML = `
          <div class="input-port"></div>
          <div class="port" title="drag to connect"></div>
          <div class="badge">INITIAL</div>
          <div class="live-badge">LIVE</div>
          <div class="layer-badge"></div>
          <div class="title"></div>
          <div class="body"></div>
          <div class="node-layer-actions">
            <button class="node-open node-enter" type="button" title="Open this state canvas" aria-label="Open this state canvas">Open</button>
          </div>
          <button class="node-edit" type="button" title="Edit state" aria-label="Edit state">⚙</button>
        `;
        el.querySelector(".title").textContent = s.title || s.id;
        el.querySelector(".body").textContent = statePreviewText(s);
        el.querySelector(".layer-badge").textContent = innerCount === 1 ? "1 state" : `${innerCount} states`;
        const enterButton = el.querySelector(".node-open");
        enterButton.addEventListener("mousedown", evt => evt.stopPropagation());
        enterButton.addEventListener("pointerdown", evt => {
          evt.stopPropagation();
          if (!isTouchPointer(evt)) return;
          evt.preventDefault();
          enterStateLayer(s.id);
        });
        enterButton.addEventListener("click", evt => {
          evt.preventDefault();
          evt.stopPropagation();
          enterStateLayer(s.id);
        });
        const editButton = el.querySelector(".node-edit");
        editButton.addEventListener("mousedown", evt => {
          evt.stopPropagation();
        });
        editButton.addEventListener("pointerdown", evt => {
          evt.stopPropagation();
          if (!isTouchPointer(evt)) return;
          evt.preventDefault();
          lastTouchAt = Date.now();
          setSingleSelection("node", s.id);
          draw();
          showNodeInspector(s, { forceOpen: true });
        });
        editButton.addEventListener("click", evt => {
          evt.preventDefault();
          evt.stopPropagation();
          if (Date.now() - lastTouchAt < 700) return;
          setSingleSelection("node", s.id);
          draw();
          showNodeInspector(s, { forceOpen: true });
        });

        el.addEventListener("mousedown", evt => {
          if (Date.now() - lastTouchAt < 700) return;
          if (evt.target.closest(".port, .node-edit, .node-open, .node-enter")) return;
          if (evt.button === 1 || evt.button === 2 || isSpaceDown) return startPanning(evt);
          if (evt.button !== 0) return;
          startNodeDrag(evt, s);
        });

        el.addEventListener("pointerdown", evt => {
          if (!isTouchPointer(evt) || evt.target.closest(".port, .node-edit, .node-open, .node-enter")) return;
          evt.preventDefault();
          lastTouchAt = Date.now();
          if (pinchZoom) return;
          activePointerId = evt.pointerId;
          startNodeDrag(evt, s);
        });

        el.addEventListener("dblclick", evt => {
          evt.preventDefault();
          evt.stopPropagation();
          enterStateLayer(s.id);
        });

        el.addEventListener("dragover", evt => {
          if (!evt.dataTransfer.types.includes("text/state-template-id")) return;
          evt.preventDefault();
          evt.dataTransfer.dropEffect = "copy";
          el.classList.add("inner-drop-target");
        });
        el.addEventListener("dragleave", evt => {
          if (!el.contains(evt.relatedTarget)) el.classList.remove("inner-drop-target");
        });
        el.addEventListener("drop", evt => {
          const templateId = evt.dataTransfer.getData("text/state-template-id");
          if (!templateId) return;
          evt.preventDefault();
          evt.stopPropagation();
          el.classList.remove("inner-drop-target");
          addTemplateInside(templateId, s.id, { enter: true });
        });

        el.querySelector(".port").addEventListener("mousedown", evt => {
          if (Date.now() - lastTouchAt < 700) return;
          if (evt.button !== 0) return;
          startConnection(evt, s);
        });

        el.querySelector(".port").addEventListener("pointerdown", evt => {
          if (!isTouchPointer(evt)) return;
          evt.preventDefault();
          lastTouchAt = Date.now();
          if (pinchZoom) return;
          activePointerId = evt.pointerId;
          startConnection(evt, s);
        });

        nodesEl.appendChild(el);
      }
      updateSelectionActions();
      requestMapCanvasPaint();
    }

    function scheduleDraw() {
      if (drawFrame) return;
      drawFrame = requestAnimationFrame(() => {
        drawFrame = 0;
        draw();
      });
    }

    function svgEl(name, attrs) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", name);
      for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
      return el;
    }

    function setEdgeHover(id, on) {
      hoveredEdgeId = on ? id : hoveredEdgeId === id ? null : hoveredEdgeId;
      wiresEl.querySelectorAll(`[data-edge-id="${id}"]`).forEach(el => el.classList.toggle("hovered", on));
    }

    function selectEdge(id, x, y) {
      const edge = model.transitions.find(t => t.id === id);
      if (!edge) return;
      setSingleSelection("edge", id);
      draw();
      showEdgeInspector(edge);
    }

    function setupEditorAccessibility(root = stateInspectorBodyEl, focusFirstInput = true, opts = {}) {
      const focusables = [...root.querySelectorAll("input, textarea, select, button")];
      focusables.forEach(el => { el.tabIndex = 0; });
      root.onkeydown = evt => {
        if (evt.key !== "Enter" || evt.isComposing || evt.shiftKey || evt.altKey || evt.ctrlKey || evt.metaKey) return;
        const target = evt.target;
        if (!target?.matches?.("input:not([type='button']):not([type='submit']):not([type='checkbox']):not([type='radio']), select")) return;
        evt.preventDefault();
        evt.stopPropagation();
        lastHistoryKey = null;
        opts.onCommit?.();
      };
      const firstInput = root.querySelector("input, textarea, select");
      if (firstInput && focusFirstInput) {
        const focusFirst = () => {
          const active = document.activeElement;
          const rootAlreadyFocused = active && active !== document.body && root.contains(active);
          const rootVisible = !workspaceEl.classList.contains("inspector-collapsed") || root !== stateInspectorBodyEl;
          if (rootVisible && document.contains(firstInput) && !rootAlreadyFocused) {
            firstInput.focus({ preventScroll: true });
            if (opts.selectFirstInput && typeof firstInput.select === "function") firstInput.select();
          }
        };
        requestAnimationFrame(focusFirst);
        setTimeout(focusFirst, 80);
      }
    }

    function defaultComponentText(type) {
      if (type === "heading") return "Section title";
      if (type === "note") return "Helpful note";
      if (type === "list") return "First item\nSecond item";
      if (type === "link") return "Open link";
      if (type === "text") return "Text";
      return "";
    }

    function componentTitle(type) {
      if (type === "heading") return "Heading";
      if (type === "image") return "Image";
      if (type === "list") return "List";
      if (type === "link") return "Link";
      if (type === "note") return "Note";
      if (type === "divider") return "Divider";
      return "Text";
    }

    function componentPresetTypes() {
      return ["heading", "text", "image", "list", "link", "note", "divider"];
    }

    function builtinStateTemplates() {
      return componentPresetTypes().map(type => ({
        id: `builtin_component_${type}`,
        title: componentTitle(type),
        body: "",
        components: [{ id: `builtin_${type}`, type, text: defaultComponentText(type), url: defaultComponentUrl(type) }],
        data: {},
        builtIn: true
      }));
    }

    function templateById(templateId) {
      return stateTemplates.find(item => item.id === templateId) ||
        builtinStateTemplates().find(item => item.id === templateId) ||
        null;
    }

    function defaultComponentUrl(type) {
      if (type === "image") return "https://";
      if (type === "link") return "https://";
      return "";
    }

    function bindImmediateButton(button, fn) {
      let pointerHandledAt = 0;
      button.addEventListener("pointerdown", evt => {
        evt.preventDefault();
        evt.stopPropagation();
        pointerHandledAt = Date.now();
        fn();
      });
      button.addEventListener("click", evt => {
        evt.preventDefault();
        evt.stopPropagation();
        if (Date.now() - pointerHandledAt < 350) return;
        fn();
      });
    }

    function renderComponentEditors(s, focusRequest = null, root = stateInspectorBodyEl, options = {}) {
      const list = root.querySelector("#pComponents");
      if (!list) return;
      s.components = normalizeComponents(s.components);
      list.innerHTML = "";
      const persistOwner = options.persistOwner || (historyKey => {
        saveModel(historyKey);
        draw();
      });
      const rerender = request => renderComponentEditors(s, request, root, options);
      const saveComponent = component => {
        if (!options.skipLiveStateSync) {
          const liveState = byId(s.id);
          const liveComponent = liveState?.components?.find(item => item.id === component.id);
          if (liveComponent) {
            liveComponent.text = component.text || "";
            liveComponent.url = component.url || "";
          }
        }
        persistOwner("state:component:" + component.id);
      };
      if (!s.components.length) {
        const empty = document.createElement("div");
        empty.className = "component-empty";
        empty.textContent = "No direct content on this state. Use the State Explorer presets as child states when this state should contain Text, Heading, Image, List, Link, Note, or Divider.";
        list.appendChild(empty);
        return;
      }
      for (const component of s.components) {
        const item = document.createElement("div");
        item.className = "component-editor";
        const head = document.createElement("div");
        head.className = "component-editor-head";
        const label = document.createElement("span");
        label.textContent = componentTitle(component.type);
        const remove = document.createElement("button");
        remove.type = "button";
        remove.className = "danger";
        remove.textContent = "Delete";
        bindImmediateButton(remove, () => {
          s.components = s.components.filter(item => item.id !== component.id);
          persistOwner("state:components:" + s.id);
          rerender(null);
        });
        head.append(label, remove);
        item.appendChild(head);
        if (component.type !== "divider") {
          if (component.type === "list") {
            const field = document.createElement("div");
            field.className = "field";
            const fieldLabel = document.createElement("label");
            fieldLabel.textContent = "Items";
            field.appendChild(fieldLabel);
            const items = component.text.split(/\r?\n/);
            const normalizedItems = items.length ? items : [""];
            const writeItems = nextItems => {
              component.text = nextItems.join("\n");
              saveComponent(component);
            };
            normalizedItems.forEach((value, index) => {
              const row = document.createElement("div");
              row.className = "list-item-editor";
              const input = document.createElement("input");
              input.value = value;
              input.placeholder = "List item";
              input.dataset.componentId = component.id;
              input.dataset.listIndex = String(index);
              input.oninput = () => {
                const next = component.text ? component.text.split(/\r?\n/) : [];
                while (next.length <= index) next.push("");
                next[index] = input.value;
                writeItems(next);
              };
              input.onblur = () => { lastHistoryKey = null; draw(); };
              const del = document.createElement("button");
              del.type = "button";
              del.className = "danger";
              del.textContent = "-";
              bindImmediateButton(del, () => {
                const next = component.text.split(/\r?\n/);
                next.splice(index, 1);
                writeItems(next.length ? next : [""]);
                rerender({ componentId: component.id, listIndex: Math.max(0, index - 1) });
              });
              row.append(input, del);
              field.appendChild(row);
            });
            const add = document.createElement("button");
            add.type = "button";
            add.className = "component-add-item";
            add.textContent = "+ Item";
            bindImmediateButton(add, () => {
              const next = component.text ? component.text.split(/\r?\n/) : [];
              next.push("");
              writeItems(next);
              rerender({ componentId: component.id, listIndex: next.length - 1 });
            });
            field.appendChild(add);
            item.appendChild(field);
          } else {
            const field = document.createElement("div");
            field.className = "field";
            const fieldLabel = document.createElement("label");
            fieldLabel.textContent = component.type === "image" ? "Alt text" : component.type === "link" ? "Label" : "Text";
            const input = component.type === "heading" || component.type === "link" || component.type === "image" ? document.createElement("input") : document.createElement("textarea");
            input.value = component.text || "";
            input.oninput = () => {
              component.text = input.value;
              saveComponent(component);
            };
            input.onblur = () => { lastHistoryKey = null; draw(); };
            field.append(fieldLabel, input);
            item.appendChild(field);
          }
        }
        if (component.type === "image" || component.type === "link") {
          const field = document.createElement("div");
          field.className = "field";
          const fieldLabel = document.createElement("label");
          fieldLabel.textContent = component.type === "image" ? "Image URL" : "URL";
          const input = document.createElement("input");
          input.value = component.url || "";
          input.placeholder = "https://...";
          input.oninput = () => {
            component.url = input.value;
            saveComponent(component);
          };
          input.onblur = () => { lastHistoryKey = null; draw(); };
          field.append(fieldLabel, input);
          item.appendChild(field);
        }
        list.appendChild(item);
      }
      if (focusRequest) {
        const focusAddedInput = () => {
          const selector = `input[data-component-id="${CSS.escape(focusRequest.componentId)}"][data-list-index="${focusRequest.listIndex}"]`;
          const input = list.querySelector(selector);
          if (!input) return;
          input.focus({ preventScroll: true });
          input.scrollIntoView({ block: "nearest", inline: "nearest" });
        };
        requestAnimationFrame(focusAddedInput);
        setTimeout(focusAddedInput, 60);
        setTimeout(focusAddedInput, 160);
      }
    }

    function showEmptyInspector() {
      inspectorStateId = null;
      inspectorEdgeId = null;
      const wasEditingTemplate = Boolean(editingTemplateId);
      editingTemplateId = null;
      stateInspectorEl.classList.remove("template-inspector", "transition-inspector");
      stateInspectorTitleEl.textContent = "State Inspector";
      stateInspectorBodyEl.innerHTML = `
        <div class="inspector-empty">
          <strong>No state selected</strong>
        </div>
      `;
      if (wasEditingTemplate) renderStateExplorer();
    }

    function refreshInspectorForSelection() {
      const state = selected?.type === "node" ? byId(selected.id) : null;
      const edge = selected?.type === "edge" ? model.transitions.find(t => t.id === selected.id) : null;
      if (state) showNodeInspector(state, { focus: false });
      else if (edge) showEdgeInspector(edge, { focus: false });
      else showEmptyInspector();
    }

    function showNodeInspector(s, opts = {}) {
      const root = stateInspectorBodyEl;
      const wasEditingTemplate = Boolean(editingTemplateId);
      editingTemplateId = null;
      inspectorEdgeId = null;
      stateInspectorEl.classList.remove("template-inspector", "transition-inspector");
      revealInspectorForProperties(opts);
      inspectorStateId = s.id;
      stateInspectorTitleEl.textContent = s.title || s.id;
      if (wasEditingTemplate) renderStateExplorer();
      root.innerHTML = `
        <h3>State</h3>
        <div class="field"><label>Title</label><input id="pTitle"></div>
        <div class="field"><label>Data defaults</label><textarea id="pData" spellcheck="false" placeholder='{"name":"Ada"}'></textarea></div>
        <div id="pDataPreview" class="condition-preview empty"></div>
        <div class="small">State content</div>
        <div id="pComponents" class="component-list"></div>
        <div class="inner-state-panel">
          <div class="inner-state-panel-title">
            <span>Inside this state</span>
            <span id="pInnerCount"></span>
          </div>
          <div id="pInnerDropZone" class="inner-state-dropzone">Drop a State Explorer preset here to place it inside this state. Components are states too.</div>
          <div class="row">
            <button id="pEnterLayer" type="button">Open canvas</button>
            <button id="pAddInside" type="button">+ State inside</button>
          </div>
        </div>
        <div class="small">State id: <b>${escapeHtml(s.id)}</b></div>
        <div class="row" style="margin-top:10px">
          <button id="pInitial">Set initial</button>
          <button id="pDuplicate">Duplicate</button>
          <button id="pExportState">Export component</button>
        </div>
        <div class="row" style="margin-top:8px">
          <button id="pDelete" class="danger">Delete</button>
        </div>
      `;
      const title = root.querySelector("#pTitle");
      const data = root.querySelector("#pData");
      const dataPreview = root.querySelector("#pDataPreview");
      title.value = s.title || "";
      data.value = JSON.stringify(normalizeDataObject(s.data), null, 2);
      root.querySelector("#pInnerCount").textContent = childStateCount(s.id) === 1 ? "1 state" : `${childStateCount(s.id)} states`;
      const innerDropZone = root.querySelector("#pInnerDropZone");
      innerDropZone.addEventListener("dragover", evt => {
        if (!evt.dataTransfer.types.includes("text/state-template-id")) return;
        evt.preventDefault();
        evt.dataTransfer.dropEffect = "copy";
        innerDropZone.classList.add("drag-over");
      });
      innerDropZone.addEventListener("dragleave", evt => {
        if (!innerDropZone.contains(evt.relatedTarget)) innerDropZone.classList.remove("drag-over");
      });
      innerDropZone.addEventListener("drop", evt => {
        const templateId = evt.dataTransfer.getData("text/state-template-id");
        if (!templateId) return;
        evt.preventDefault();
        innerDropZone.classList.remove("drag-over");
        addTemplateInside(templateId, s.id, { enter: true });
      });
      const updateDataPreview = () => {
        try {
          const parsed = JSON.parse(data.value || "{}");
          if (!isPlainObject(parsed)) throw new Error("Data must be a JSON object.");
          s.data = normalizeDataObject(parsed);
          dataPreview.textContent = Object.keys(s.data).length ? "Data saved. Use {{key}} in text fields." : "No data defaults.";
          dataPreview.classList.toggle("empty", !Object.keys(s.data).length);
          saveModel("state:data:" + s.id);
          scheduleSync(false);
        } catch (err) {
          dataPreview.textContent = err.message || "Invalid JSON.";
          dataPreview.classList.remove("empty");
        }
      };
      title.oninput = () => {
        s.title = title.value;
        stateInspectorTitleEl.textContent = s.title || s.id;
        saveModel("state:title:" + s.id);
        draw();
      };
      data.oninput = updateDataPreview;
      updateDataPreview();
      title.onblur = data.onblur = () => { lastHistoryKey = null; };
      renderComponentEditors(s, null, root);
      root.querySelector("#pEnterLayer").onclick = () => enterStateLayer(s.id);
      root.querySelector("#pAddInside").onclick = () => addBlankStateInside(s.id, { selectTitle: true });
      root.querySelector("#pInitial").onclick = () => {
        model.initial = s.id;
        saveModel();
        draw();
      };
      root.querySelector("#pDuplicate").onclick = () => {
        const copy = makeState(s.x + GRID_SIZE * 2, s.y + GRID_SIZE * 5, (s.title || s.id) + " Copy");
        copy.components = cloneComponents(s.components);
        copy.data = normalizeDataObject(s.data);
        model.states.push(copy);
        selected = { type: "node", id: copy.id };
        saveModel();
        draw();
        showNodeInspector(copy, { forceOpen: true });
      };
      root.querySelector("#pExportState").onclick = () => exportStateComponentFile(s);
      root.querySelector("#pDelete").onclick = () => {
        if (!removeStatesById([s.id])) return;
        selected = null;
        showEmptyInspector();
        saveModel();
        draw();
      };
      setupEditorAccessibility(root, opts.focus !== false, {
        onCommit: showEmptyInspector,
        selectFirstInput: Boolean(opts.selectTitle)
      });
    }

    function showTemplateInspector(template, opts = {}) {
      const root = stateInspectorBodyEl;
      if (!template) return showEmptyInspector();
      selected = null;
      draw();
      inspectorCollapsed = false;
      applyInspectorCollapsed();
      inspectorStateId = null;
      inspectorEdgeId = null;
      editingTemplateId = template.id;
      if (opts.saveSelection) saveSelection("template:select:" + template.id);
      stateInspectorEl.classList.remove("transition-inspector");
      stateInspectorEl.classList.add("template-inspector");
      stateInspectorTitleEl.textContent = "Preset: " + (template.title || "State preset");
      root.innerHTML = `
        <h3>Reusable State Component</h3>
        <div class="template-mode-note">
          <strong>Preset properties</strong>
          <span>Edits here change the reusable preset only. Existing canvas states stay unchanged; new states created from this preset use this snapshot.</span>
        </div>
        <div class="field"><label>Preset title</label><input id="pTitle"></div>
        <div class="field"><label>Data defaults</label><textarea id="pData" spellcheck="false" placeholder='{"name":"Ada"}'></textarea></div>
        <div id="pDataPreview" class="condition-preview empty"></div>
        <div class="small">Preset state content</div>
        <div id="pComponents" class="component-list"></div>
        <div class="component-empty">To compose reusable content, place State Explorer presets on the canvas, edit them as states, then drag the result back into the explorer.</div>
        <div class="small">Preset id: <b>${escapeHtml(template.id)}</b></div>
        <div class="row" style="margin-top:10px">
          <button id="pTemplateUse">Use on canvas</button>
          <button id="pTemplateExport">Export component</button>
          <button id="pTemplateDelete" class="danger">Delete preset</button>
        </div>
      `;
      const title = root.querySelector("#pTitle");
      const data = root.querySelector("#pData");
      const dataPreview = root.querySelector("#pDataPreview");
      const persistTemplate = (historyKey = "template:" + template.id) => {
        saveStateTemplates(historyKey);
        renderStateExplorer();
      };
      title.value = template.title || "";
      data.value = JSON.stringify(normalizeDataObject(template.data), null, 2);
      const updateDataPreview = (persist = true) => {
        try {
          const parsed = JSON.parse(data.value || "{}");
          if (!isPlainObject(parsed)) throw new Error("Data must be a JSON object.");
          template.data = normalizeDataObject(parsed);
          dataPreview.textContent = Object.keys(template.data).length ? "Preset data saved. Use {{key}} in text fields." : "No data defaults.";
          dataPreview.classList.toggle("empty", !Object.keys(template.data).length);
          if (persist) persistTemplate("template:data:" + template.id);
        } catch (err) {
          dataPreview.textContent = err.message || "Invalid JSON.";
          dataPreview.classList.remove("empty");
        }
      };
      title.oninput = () => {
        template.title = title.value || "State preset";
        stateInspectorTitleEl.textContent = "Preset: " + template.title;
        persistTemplate("template:title:" + template.id);
      };
      data.oninput = () => updateDataPreview(true);
      updateDataPreview(false);
      title.onblur = data.onblur = () => { lastHistoryKey = null; };
      const componentOptions = {
        persistOwner: historyKey => persistTemplate("template:" + template.id + ":" + (historyKey || "components")),
        skipLiveStateSync: true
      };
      renderComponentEditors(template, null, root, componentOptions);
      root.querySelector("#pTemplateUse").onclick = () => addTemplateAtViewport(template);
      root.querySelector("#pTemplateExport").onclick = () => exportTemplateComponentFile(template);
      root.querySelector("#pTemplateDelete").onclick = () => { void deleteStateTemplate(template.id); };
      renderStateExplorer();
      setupEditorAccessibility(root, opts.focus !== false, {
        onCommit: showEmptyInspector,
        selectFirstInput: Boolean(opts.selectTitle)
      });
    }

    function conditionInputSummary(condition) {
      const inputs = inferConditionInputs(condition);
      if (!inputs.length) return "No inputs. Always available.";
      return "Inputs: " + inputs.map(input => `${input.name}:${input.type}`).join(", ");
    }

    function inferConditionInputs(condition) {
      const map = new Map();
      const upsert = (name, type = "boolean") => {
        const key = String(name || "");
        if (!key || ["true", "false", "and", "or", "null", "undefined", "always"].includes(key.toLowerCase())) return;
        const previous = map.get(key);
        const rank = { boolean: 0, int: 1, float: 2, text: 3 };
        const nextType = rank[type] > rank[previous?.type || "boolean"] ? type : previous?.type || type;
        map.set(key, { name: key, type: nextType });
      };
      const source = String(condition || "");
      const searchable = source.replace(/(["'])(?:\\.|(?!\1)[\s\S])*?\1/g, "");
      for (const name of searchable.match(/[a-zA-Z_][a-zA-Z0-9_]*/g) || []) upsert(name);
      for (const numeric of searchable.matchAll(/([a-zA-Z_][a-zA-Z0-9_]*)\s*(==|!=|>=|<=|>|<)\s*(-?\d+(?:\.\d+)?)/g)) {
        upsert(numeric[1], numeric[3].includes(".") ? "float" : "int");
      }
      for (const quoted of source.matchAll(/([a-zA-Z_][a-zA-Z0-9_]*)\s*(==|!=)\s*(['"])(.*?)\3/g)) {
        upsert(quoted[1], "text");
      }
      return [...map.values()].sort((a, b) => a.name.localeCompare(b.name));
    }

    function showEdgeInspector(t, opts = {}) {
      const root = stateInspectorBodyEl;
      const from = byId(t.from);
      const to = byId(t.to);
      const wasEditingTemplate = Boolean(editingTemplateId);
      editingTemplateId = null;
      inspectorStateId = null;
      inspectorEdgeId = t.id;
      revealInspectorForProperties(opts);
      stateInspectorEl.classList.remove("template-inspector");
      stateInspectorEl.classList.add("transition-inspector");
      stateInspectorTitleEl.textContent = "Transition: " + (t.label || "Next");
      if (wasEditingTemplate) renderStateExplorer();
      root.innerHTML = `
        <h3>Transition / Button</h3>
        <div class="small"><b>${escapeHtml(from?.title || t.from)}</b> → <b>${escapeHtml(to?.title || t.to)}</b></div>
        <div class="field"><label>Button label</label><input id="pLabel"></div>
        <div class="field"><label>Condition</label><input id="pCond" placeholder="accepted, amount >= 10, !blocked"></div>
        <div id="pCondPreview" class="condition-preview"></div>
        <div class="field"><label>Set data</label><textarea id="pSet" spellcheck="false" placeholder='{"name":"Ada"}'></textarea></div>
        <div id="pSetPreview" class="condition-preview empty"></div>
        <div class="small">Condition unmet zeigt Validierung. State-Wechsel passieren nur ueber sichtbare Transition-Linien.</div>
        <div class="row" style="margin-top:10px">
          <button id="pFlip">Flip</button>
          <button id="pDelete" class="danger">Delete</button>
        </div>
      `;
      const label = root.querySelector("#pLabel");
      const cond = root.querySelector("#pCond");
      const condPreview = root.querySelector("#pCondPreview");
      const set = root.querySelector("#pSet");
      const setPreview = root.querySelector("#pSetPreview");
      label.value = t.label || "Next";
      cond.value = t.condition || "";
      set.value = JSON.stringify(normalizeDataObject(t.set), null, 2);
      const updateConditionPreview = () => {
        const summary = conditionInputSummary(cond.value);
        condPreview.textContent = summary;
        condPreview.classList.toggle("empty", summary === "No inputs. Always available.");
      };
      const updateSetPreview = () => {
        try {
          const parsed = JSON.parse(set.value || "{}");
          if (!isPlainObject(parsed)) throw new Error("Set data must be a JSON object.");
          t.set = normalizeDataObject(parsed);
          setPreview.textContent = Object.keys(t.set).length ? "Data will be merged before entering the target state." : "No data changes.";
          setPreview.classList.toggle("empty", !Object.keys(t.set).length);
          saveModel("edge:set:" + t.id);
        } catch (err) {
