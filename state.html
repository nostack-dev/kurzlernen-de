<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>State Blueprint Tool</title>
  <style>
    :root {
      --bg: #07111f;
      --panel: #0b1729;
      --line: #1f3b5c;
      --text: #e5f0ff;
      --muted: #8eb2dc;
      --accent: #38bdf8;
      --accent2: #a78bfa;
      --danger: #fb7185;
      --ok: #34d399;
      --node: #102642;
      --node2: #17365b;
      --runtime: #22c55e;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body {
      display: grid;
      grid-template-rows: 56px 1fr;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: #050b14;
      border-bottom: 1px solid #18314d;
      white-space: nowrap;
    }

    .brand {
      font-weight: 900;
      letter-spacing: .02em;
      margin-right: 6px;
    }

    button {
      border: 1px solid #275078;
      color: var(--text);
      background: #0d1d31;
      border-radius: 999px;
      padding: 7px 11px;
      cursor: pointer;
      font-weight: 750;
      font-size: 13px;
    }

    button:hover { border-color: var(--accent); }
    button.danger:hover { border-color: var(--danger); color: #fecdd3; }
    button:disabled {
      opacity: .45;
      cursor: not-allowed;
      border-color: #1d3552;
    }

    .status {
      margin-left: auto;
      color: #bbf7d0;
      border: 1px solid rgba(34,197,94,.35);
      background: rgba(34,197,94,.08);
      border-radius: 999px;
      padding: 6px 10px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      min-width: 120px;
      text-align: center;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(520px, 1fr) 390px;
      min-height: 0;
    }

    .workspace.preview-collapsed {
      grid-template-columns: minmax(520px, 1fr) 44px;
    }

    .map {
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(to right, rgba(56,189,248,.08) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(56,189,248,.08) 1px, transparent 1px),
        radial-gradient(circle at 40% 30%, rgba(56,189,248,.10), transparent 35%),
        var(--bg);
      background-size: 24px 24px, 24px 24px, 100% 100%, 100% 100%;
      cursor: default;
    }

    .map.panning { cursor: grabbing; }
    .map.connecting { cursor: crosshair; }

    #world {
      position: absolute;
      left: 0;
      top: 0;
      width: 5000px;
      height: 4000px;
      transform-origin: 0 0;
    }

    #wires {
      position: absolute;
      left: 0;
      top: 0;
      width: 5000px;
      height: 4000px;
      pointer-events: none;
      overflow: visible;
    }

    #wires .edge,
    #wires .edge-label,
    #wires .hit {
      pointer-events: auto;
    }

    #nodes {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .edge {
      fill: none;
      stroke: #5f8dbc;
      stroke-width: 2.2;
    }

    .edge.selected { stroke: var(--accent2); stroke-width: 3.5; }
    .edge.hovered {
      stroke: var(--accent);
      stroke-width: 3.4;
      filter: drop-shadow(0 0 8px rgba(56,189,248,.5));
    }
    .hit:hover + .edge,
    .edge:hover {
      stroke: var(--accent);
      stroke-width: 3.4;
      filter: drop-shadow(0 0 8px rgba(56,189,248,.5));
    }
    .edge.runtime { stroke: var(--runtime); stroke-width: 4; animation: edgePulse .85s ease-out; }

    @keyframes edgePulse {
      0% { stroke-width: 8; filter: drop-shadow(0 0 10px rgba(34,197,94,.75)); }
      100% { stroke-width: 4; filter: none; }
    }

    .temp-edge {
      fill: none;
      stroke: var(--accent);
      stroke-width: 2.6;
      stroke-dasharray: 6 5;
    }

    .hit {
      fill: none;
      stroke: transparent;
      stroke-width: 18;
      cursor: pointer;
      pointer-events: stroke;
    }

    .edge-label {
      font-size: 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      fill: #dbeafe;
      paint-order: stroke;
      stroke: #07111f;
      stroke-width: 5px;
      cursor: pointer;
      user-select: none;
    }

    .edge-label.hovered {
      fill: #ffffff;
      stroke-width: 6px;
    }
    .hit:hover + .edge + .edge-label,
    .edge:hover + .edge-label,
    .edge-label:hover {
      fill: #ffffff;
      stroke-width: 6px;
    }

    .node {
      position: absolute;
      width: 168px;
      min-height: 86px;
      border: 1px solid #5f8dbc;
      background: #12345a;
      border-radius: 10px;
      box-shadow: 0 8px 18px rgba(0,0,0,.28), inset 0 1px 0 rgba(255,255,255,.1);
      cursor: grab;
      user-select: none;
      pointer-events: auto;
      -webkit-font-smoothing: auto;
      text-rendering: optimizeLegibility;
    }

    .node:active { cursor: grabbing; }
    .node.selected { outline: 2px solid var(--accent2); outline-offset: 2px; }
    .node.active {
      border-color: var(--runtime);
      outline: 3px solid rgba(34,197,94,.72);
      outline-offset: 3px;
      box-shadow: 0 0 0 6px rgba(34,197,94,.14), 0 10px 24px rgba(0,0,0,.34);
    }

    .node .title {
      padding: 10px 36px 3px 12px;
      font-weight: 900;
      color: white;
      font-size: 14px;
      line-height: 1.18;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .node .body {
      padding: 0 12px 12px;
      color: #d8e9ff;
      font-size: 12px;
      line-height: 1.32;
      max-height: 36px;
      overflow: hidden;
    }

    .badge, .live-badge {
      position: absolute;
      right: 8px;
      border-radius: 999px;
      font-size: 10px;
      padding: 3px 6px;
      font-weight: 950;
      display: none;
    }

    .badge { top: 8px; color: #04111d; background: var(--ok); }
    .live-badge { top: 31px; color: #052e16; background: #86efac; }
    .node.initial .badge { display: block; }
    .node.active .live-badge { display: block; }

    .port {
      position: absolute;
      width: 16px;
      height: 16px;
      border-radius: 999px;
      border: 2px solid #06121f;
      background: var(--accent);
      right: -8px;
      top: 50%;
      transform: translateY(-50%);
      box-shadow: 0 0 0 3px rgba(56,189,248,.18);
      cursor: cell;
    }

    .input-port {
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 999px;
      border: 2px solid #06121f;
      left: -7px;
      top: 50%;
      transform: translateY(-50%);
      background: #94a3b8;
      box-shadow: 0 0 0 3px rgba(148,163,184,.16);
      cursor: default;
    }

    .preview {
      min-width: 0;
      border-left: 1px solid #18314d;
      display: grid;
      grid-template-rows: 42px 1fr;
      background: #030712;
    }

    .preview-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 0 8px 0 10px;
      border-bottom: 1px solid #18314d;
      color: #bfdbfe;
      font-size: 13px;
      font-weight: 800;
    }

    .preview-title-text {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .preview-title-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
    }

    .preview-toggle {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      padding: 0;
      display: grid;
      place-items: center;
      font-size: 16px;
      line-height: 1;
    }

    .workspace.preview-collapsed .preview {
      grid-template-rows: 42px;
    }

    .workspace.preview-collapsed .preview-title {
      justify-content: center;
      padding: 0;
    }

    .workspace.preview-collapsed .preview-title-text,
    .workspace.preview-collapsed #syncState,
    .workspace.preview-collapsed iframe {
      display: none;
    }

    .workspace.preview-collapsed .preview-title-actions {
      margin-left: 0;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: white;
    }

    .popover {
      position: absolute;
      z-index: 30;
      width: 292px;
      max-height: calc(100% - 24px);
      overflow: auto;
      padding: 12px;
      background: #06111f;
      border: 1px solid #335f8c;
      border-radius: 14px;
      box-shadow: 0 20px 50px rgba(0,0,0,.5);
    }

    .popover h3 { margin: 0 0 10px; font-size: 14px; }
    .field { margin: 8px 0; }
    .field label {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 4px;
    }

    input, textarea {
      width: 100%;
      color: var(--text);
      background: #091827;
      border: 1px solid #294c72;
      border-radius: 9px;
      padding: 8px;
      font: inherit;
    }

    textarea { resize: vertical; min-height: 62px; }
    .row { display: flex; gap: 8px; align-items: center; }
    .row button { flex: 1; }
    .small { font-size: 12px; color: var(--muted); line-height: 1.35; }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: grid;
      place-items: center;
      padding: 18px;
      background: rgba(2, 6, 23, .68);
    }

    .modal-backdrop[hidden] { display: none; }

    .modal {
      width: min(420px, 100%);
      border: 1px solid #315f8c;
      border-radius: 16px;
      background: #071321;
      box-shadow: 0 24px 70px rgba(0,0,0,.58);
      padding: 18px;
    }

    .modal h2 {
      margin: 0 0 8px;
      font-size: 16px;
      line-height: 1.2;
    }

    .modal p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      white-space: pre-wrap;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 18px;
    }

    .modal-actions .primary {
      border-color: var(--accent);
      background: #123152;
    }

    .modal-actions .danger {
      border-color: var(--danger);
      color: #fecdd3;
      background: #331120;
    }

    .help {
      position: absolute;
      left: 14px;
      bottom: 14px;
      z-index: 10;
      color: rgba(229,240,255,.68);
      background: rgba(3,7,18,.55);
      border: 1px solid rgba(148,163,184,.18);
      backdrop-filter: blur(6px);
      border-radius: 12px;
      padding: 9px 11px;
      font-size: 12px;
      line-height: 1.4;
      pointer-events: none;
    }

    .help b { color: white; }

    .select-rect {
      position: absolute;
      z-index: 18;
      border: 1px solid rgba(167,139,250,.95);
      background: rgba(167,139,250,.14);
      pointer-events: none;
      display: none;
    }

    @media (max-width: 900px) {
      .workspace { grid-template-columns: 1fr; grid-template-rows: 1fr 45vh; }
      .workspace.preview-collapsed { grid-template-columns: 1fr; grid-template-rows: 1fr 42px; }
      .preview { border-left: 0; border-top: 1px solid #18314d; }
      .status { display: none; }
      .topbar { overflow-x: auto; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="brand">State Blueprint</div>
    <button id="btnNew">New</button>
    <button id="btnSave">Save</button>
    <button id="btnLoad">Load</button>
    <button id="btnExport">Export HTML</button>
    <button id="btnUndo" title="Undo">Undo</button>
    <button id="btnRedo" title="Redo">Redo</button>
    <button id="btnFit">Fit</button>
    <button id="btnResetView">Reset View</button>
    <button id="btnRun">Reset App</button>
    <button id="btnReset" class="danger">Demo reset</button>
    <div class="status" id="runtimeState">app: —</div>
  </div>
  <input id="fileLoad" type="file" accept="application/json,.json,.state.json" hidden>
  <div id="modalBackdrop" class="modal-backdrop" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <h2 id="modalTitle"></h2>
      <p id="modalMessage"></p>
      <div class="modal-actions">
        <button id="modalCancel" type="button"></button>
        <button id="modalConfirm" type="button" class="primary"></button>
      </div>
    </div>
  </div>

  <div class="workspace" id="workspace">
    <main id="map" class="map">
      <div id="world">
        <svg id="wires" viewBox="0 0 5000 4000">
          <defs>
            <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
              <path d="M0,0 L0,12 L12,6 z" fill="#5f8dbc"></path>
            </marker>
          </defs>
        </svg>
        <div id="nodes"></div>
      </div>
      <div id="popover" class="popover" hidden></div>
      <div id="selectRect" class="select-rect"></div>
      <div class="help">
        <b>Navigation:</b> Mousewheel zoom · right/middle drag pan · Space+drag pan<br>
        <b>Edit:</b> double-click empty canvas · drag blue dot to another node or empty canvas · click node/edge
      </div>
    </main>

    <aside class="preview">
      <div class="preview-title">
        <span class="preview-title-text">Generated App</span>
        <span class="preview-title-actions">
          <span id="syncState">live</span>
          <button id="btnOpen" class="preview-toggle" type="button" title="Open app in separate window" aria-label="Open app in separate window">↗</button>
          <button id="btnTogglePreview" class="preview-toggle" type="button" title="Collapse app preview" aria-label="Collapse app preview">&gt;</button>
        </span>
      </div>
      <iframe id="appFrame" title="Generated App"></iframe>
    </aside>
  </div>

  <script>
    const STORAGE_KEY = "stateBlueprintHotLinked.model.v2";
    const DEFINITION_KIND = "state-blueprint-definition";
    const DEFINITION_SCHEMA_VERSION = 2;
    const APP_HTML = "\u003c!doctype html\u003e\n\u003chtml lang=\"de\"\u003e\n\u003chead\u003e\n  \u003cmeta charset=\"utf-8\" /\u003e\n  \u003cmeta name=\"viewport\" content=\"width=device-width, initial-scale=1\" /\u003e\n  \u003ctitle\u003eGenerated State App\u003c/title\u003e\n  \u003cstyle\u003e\n    :root {\n      --bg: #f7f8fb;\n      --card: #ffffff;\n      --text: #111827;\n      --muted: #6b7280;\n      --line: #e5e7eb;\n      --primary: #2563eb;\n      --primary2: #1d4ed8;\n    }\n\n    * { box-sizing: border-box; }\n\n    html, body {\n      margin: 0;\n      min-height: 100%;\n      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, \"Segoe UI\", sans-serif;\n      background: var(--bg);\n      color: var(--text);\n    }\n\n    body {\n      display: grid;\n      place-items: start center;\n      padding: 22px;\n    }\n\n    .app { width: min(620px, 100%); }\n\n    .top {\n      display: flex;\n      align-items: center;\n      justify-content: space-between;\n      gap: 12px;\n      margin-bottom: 12px;\n    }\n\n    .title {\n      font-size: 14px;\n      font-weight: 900;\n      color: var(--muted);\n      text-transform: uppercase;\n      letter-spacing: .08em;\n    }\n\n    .state-pill {\n      border: 1px solid var(--line);\n      border-radius: 999px;\n      padding: 6px 10px;\n      background: white;\n      color: var(--muted);\n      font-size: 12px;\n      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;\n    }\n\n    .screen {\n      background: var(--card);\n      border: 1px solid var(--line);\n      border-radius: 22px;\n      box-shadow: 0 20px 50px rgba(15,23,42,.08);\n      padding: 28px;\n    }\n\n    h1 {\n      margin: 0 0 8px;\n      font-size: clamp(28px, 5vw, 48px);\n      letter-spacing: -.04em;\n    }\n\n    .body {\n      color: var(--muted);\n      line-height: 1.55;\n      min-height: 44px;\n      margin-bottom: 24px;\n      font-size: 16px;\n    }\n\n    .controls {\n      margin: 18px 0;\n      padding: 14px;\n      background: #f9fafb;\n      border: 1px solid var(--line);\n      border-radius: 16px;\n    }\n\n    .controls h2 {\n      margin: 0 0 8px;\n      font-size: 13px;\n      color: var(--muted);\n      text-transform: uppercase;\n      letter-spacing: .08em;\n    }\n\n    .field {\n      display: flex;\n      align-items: center;\n      justify-content: space-between;\n      gap: 12px;\n      padding: 7px 0;\n      border-top: 1px solid #edf0f4;\n    }\n\n    .field:first-of-type { border-top: 0; }\n    .field label { font-weight: 700; }\n    input[type=\"text\"].typed-input { width: 130px; padding: 7px; border: 1px solid #cbd5e1; border-radius: 9px; }\n    input.invalid { border-color: #fb7185; outline: 2px solid rgba(251,113,133,.18); }\n    input[type=\"checkbox\"] { transform: scale(1.2); }\n\n    .actions {\n      display: flex;\n      flex-wrap: wrap;\n      gap: 10px;\n      margin-top: 18px;\n    }\n\n    .action {\n      display: flex;\n      flex-direction: column;\n      align-items: flex-start;\n      gap: 5px;\n      max-width: 100%;\n    }\n\n    .condition-note {\n      max-width: min(320px, 100%);\n      color: var(--muted);\n      font-size: 12px;\n      line-height: 1.25;\n      overflow-wrap: anywhere;\n    }\n\n    .condition-note code {\n      color: #111827;\n      background: #eef2ff;\n      border: 1px solid #dbe4ff;\n      border-radius: 6px;\n      padding: 1px 5px;\n      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;\n      font-size: 11px;\n    }\n\n    button {\n      border: 0;\n      border-radius: 999px;\n      padding: 12px 16px;\n      background: var(--primary);\n      color: white;\n      font-weight: 900;\n      cursor: pointer;\n    }\n\n    button:hover { background: var(--primary2); }\n    button:disabled {\n      cursor: not-allowed;\n      background: #cbd5e1;\n      color: #64748b;\n    }\n\n    .empty {\n      padding: 18px;\n      border: 1px dashed #cbd5e1;\n      border-radius: 16px;\n      color: var(--muted);\n    }\n\n    .log {\n      margin-top: 14px;\n      color: var(--muted);\n      font-size: 12px;\n      max-height: 110px;\n      overflow: auto;\n    }\n  \u003c/style\u003e\n\u003c/head\u003e\n\u003cbody\u003e\n  \u003cmain class=\"app\"\u003e\n    \u003cdiv class=\"top\"\u003e\n      \u003cdiv class=\"title\" id=\"appName\"\u003eGenerated App\u003c/div\u003e\n      \u003cdiv class=\"state-pill\" id=\"statePill\"\u003e—\u003c/div\u003e\n    \u003c/div\u003e\n    \u003csection class=\"screen\" id=\"screen\"\u003e\u003c/section\u003e\n    \u003cdiv class=\"log\" id=\"log\"\u003e\u003c/div\u003e\n  \u003c/main\u003e\n\n  \u003cscript\u003e\n    const STORAGE_KEY = \"stateBlueprintHotLinked.model.v2\";\n\n    let model = loadModel() || demoModel();\n    let current = model.initial;\n    let context = defaultContext(model);\n    let logLines = [];\n    let transitionToNotify = null;\n\n    function demoModel() {\n      return {\n        version: 2,\n        name: \"Login \u0026 Email Verification\",\n        initial: \"landing\",\n        states: [\n          { id: \"landing\", title: \"Welcome\", body: \"Existing users sign in. New users create an account.\", x: 80, y: 180 },\n          { id: \"login_form\", title: \"Login\", body: \"Email and password form.\", x: 330, y: 80 },\n          { id: \"signup_form\", title: \"Sign up\", body: \"Collect email, password, and terms acceptance.\", x: 330, y: 300 },\n          { id: \"verify_email\", title: \"Verify email\", body: \"User clicks the confirmation link from their inbox.\", x: 600, y: 300 },\n          { id: \"dashboard\", title: \"Dashboard\", body: \"Authenticated app area.\", x: 865, y: 180 },\n          { id: \"error\", title: \"Error\", body: \"Show a clear error and let the user retry.\", x: 600, y: 80 }\n        ],\n        transitions: [\n          { id: \"t_login\", from: \"landing\", to: \"login_form\", label: \"Log in\", condition: \"\" },\n          { id: \"t_signup\", from: \"landing\", to: \"signup_form\", label: \"Create account\", condition: \"\" },\n          { id: \"t_login_success\", from: \"login_form\", to: \"dashboard\", label: \"Submit login\", condition: \"email == \\\"user@example.com\\\" \u0026\u0026 password == \\\"secret123\\\"\" },\n          { id: \"t_login_fail\", from: \"login_form\", to: \"error\", label: \"Fail\", condition: \"\" },\n          { id: \"t_signup_submit\", from: \"signup_form\", to: \"verify_email\", label: \"Submit signup\", condition: \"accepted_terms \u0026\u0026 email == \\\"user@example.com\\\"\" },\n          { id: \"t_signup_fail\", from: \"signup_form\", to: \"error\", label: \"Fail\", condition: \"\" },\n          { id: \"t_verify\", from: \"verify_email\", to: \"dashboard\", label: \"Confirm email\", condition: \"email_verified\" },\n          { id: \"t_verify_fail\", from: \"verify_email\", to: \"error\", label: \"Fail\", condition: \"\" },\n          { id: \"t_retry\", from: \"error\", to: \"landing\", label: \"Retry\", condition: \"\" },\n          { id: \"t_logout\", from: \"dashboard\", to: \"landing\", label: \"Log out\", condition: \"\" }\n        ]\n      };\n    }\n\n    function loadModel() {\n      try {\n        const text = localStorage.getItem(STORAGE_KEY);\n        return text ? normalizeModel(JSON.parse(text)) : null;\n      } catch (_) { return null; }\n    }\n\n    function saveModel() {\n      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(model)); } catch (_) {}\n    }\n\n    function normalizeModel(m) {\n      m.version = 2;\n      m.name = m.name || \"Generated App\";\n      m.states = Array.isArray(m.states) ? m.states : [];\n      m.transitions = Array.isArray(m.transitions) ? m.transitions : [];\n      if (!m.states.length) m.states.push({ id: \"start\", title: \"Start\", body: \"\" });\n      const ids = new Set(m.states.map(s =\u003e s.id));\n      m.transitions = m.transitions.filter(t =\u003e ids.has(t.from) \u0026\u0026 ids.has(     modalBackdropEl.addEventListener("keydown", evt => {
      if (evt.key === "Escape") {
        evt.preventDefault();
        closeModal(false);
      }
      if (evt.key === "Enter") {
        evt.preventDefault();
        closeModal(true);
      }
    });

    function loadModel() {
      try {
        const text = localStorage.getItem(STORAGE_KEY);
        if (!text) return null;
        return normalizeModel(JSON.parse(text));
      } catch (_) { return null; }
    }

    function loadCamera() {
      try {
        const text = localStorage.getItem(STORAGE_KEY + ".camera");
        return text ? JSON.parse(text) : null;
      } catch (_) { return null; }
    }

    function saveCamera() {
      try { localStorage.setItem(STORAGE_KEY + ".camera", JSON.stringify(camera)); } catch (_) {}
    }

    function loadPreviewCollapsed() {
      try { return localStorage.getItem(STORAGE_KEY + ".previewCollapsed") === "true"; } catch (_) { return false; }
    }

    function savePreviewCollapsed() {
      try { localStorage.setItem(STORAGE_KEY + ".previewCollapsed", String(previewCollapsed)); } catch (_) {}
    }

    function applyPreviewCollapsed() {
      workspaceEl.classList.toggle("preview-collapsed", previewCollapsed);
      btnTogglePreview.textContent = previewCollapsed ? "<" : ">";
      btnTogglePreview.title = previewCollapsed ? "Expand app preview" : "Collapse app preview";
      btnTogglePreview.setAttribute("aria-label", btnTogglePreview.title);
      savePreviewCollapsed();
      requestAnimationFrame(() => {
        applyCamera();
        draw();
      });
    }

    function modelSnapshot() {
      normalizeModel(model);
      return JSON.stringify(model);
    }

    function persistModel(sync = true) {
      localStorage.setItem(STORAGE_KEY, modelSnapshot());
      if (sync) scheduleSync(false);
    }

    function updateHistoryButtons() {
      const undo = document.getElementById("btnUndo");
      const redo = document.getElementById("btnRedo");
      if (undo) undo.disabled = !undoStack.length;
      if (redo) redo.disabled = !redoStack.length;
    }

    function initHistory() {
      historyCurrent = modelSnapshot();
      undoStack = [];
      redoStack = [];
      lastHistoryKey = null;
      updateHistoryButtons();
    }

    function saveModel(historyKey = null) {
      const next = modelSnapshot();
      if (next === historyCurrent) {
        persistModel();
        return;
      }
      if (!historyCurrent) {
        historyCurrent = next;
      } else if (historyKey && historyKey === lastHistoryKey && undoStack.length) {
        // Continuous edits such as typing or dragging remain one deterministic undo step.
      } else {
        undoStack.push(historyCurrent);
        if (undoStack.length > 100) undoStack.shift();
      }
      redoStack = [];
      historyCurrent = next;
      lastHistoryKey = historyKey;
      persistModel();
      updateHistoryButtons();
    }

    function restoreHistorySnapshot(snapshot) {
      model = normalizeModel(JSON.parse(snapshot));
      historyCurrent = modelSnapshot();
      selected = null;
      connecting = null;
      dragging = null;
      boxSelecting = null;
      hidePopover();
      updateSelectRect();
      persistModel();
      draw();
      updateHistoryButtons();
    }

    function undoModel() {
      if (!undoStack.length) return;
      const current = modelSnapshot();
      const previous = undoStack.pop();
      redoStack.push(current);
      lastHistoryKey = null;
      restoreHistorySnapshot(previous);
    }

    function redoModel() {
      if (!redoStack.length) return;
      const current = modelSnapshot();
      const next = redoStack.pop();
      undoStack.push(current);
      lastHistoryKey = null;
      restoreHistorySnapshot(next);
    }

    function definitionPayload() {
      const definition = {
        kind: DEFINITION_KIND,
        schemaVersion: DEFINITION_SCHEMA_VERSION,
        app: "State Blueprint",
        savedAt: new Date().toISOString(),
        model: JSON.parse(modelSnapshot()),
        camera: {
          x: Number(camera.x),
          y: Number(camera.y),
          scale: Number(camera.scale)
        },
        previewCollapsed: Boolean(previewCollapsed)
      };
      return validateBlueprintDefinition(definition);
    }

    function isPlainObject(value) {
      return Boolean(value) && typeof value === "object" && !Array.isArray(value);
    }

    function assertPlainObject(value, path) {
      if (!isPlainObject(value)) throw new Error(`${path} must be an object.`);
    }

    function assertString(value, path, { allowEmpty = false } = {}) {
      if (typeof value !== "string") throw new Error(`${path} must be a string.`);
      if (!allowEmpty && !value.trim()) throw new Error(`${path} must not be empty.`);
      return value;
    }

    function assertFiniteNumber(value, path) {
      if (typeof value !== "number" || !Number.isFinite(value)) throw new Error(`${path} must be a finite number.`);
      return value;
    }

    function assertNoNullish(value, path = "definition") {
      if (value === null || value === undefined) throw new Error(`${path} must not be null or undefined.`);
      if (Array.isArray(value)) {
        value.forEach((item, index) => assertNoNullish(item, `${path}[${index}]`));
        return;
      }
      if (!isPlainObject(value)) return;
      for (const [key, item] of Object.entries(value)) {
        assertNoNullish(item, `${path}.${key}`);
      }
    }

    function validateModelDefinition(source) {
      assertPlainObject(source, "definition.model");
      if (source.version !== DEFINITION_SCHEMA_VERSION) throw new Error("definition.model.version must be 2.");
      assertString(source.name, "definition.model.name");
      assertString(source.initial, "definition.model.initial");
      if (!Array.isArray(source.states) || !source.states.length) throw new Error("definition.model.states must be a non-empty array.");
      if (!Array.isArray(source.transitions)) throw new Error("definition.model.transitions must be an array.");

      const ids = new Set();
      const states = source.states.map((state, index) => {
        const path = `definition.model.states[${index}]`;
        assertPlainObject(state, path);
        const id = assertString(state.id, `${path}.id`);
        if (ids.has(id)) throw new Error(`${path}.id must be unique.`);
        ids.add(id);
        return {
          id,
          title: assertString(state.title, `${path}.title`),
          body: assertString(state.body, `${path}.body`, { allowEmpty: true }),
          x: assertFiniteNumber(state.x, `${path}.x`),
          y: assertFiniteNumber(state.y, `${path}.y`)
        };
      });

      if (!ids.has(source.initial)) throw new Error("definition.model.initial must reference an existing state.");

      const transitionIds = new Set();
      const transitions = source.transitions.map((transition, index) => {
        const path = `definition.model.transitions[${index}]`;
        assertPlainObject(transition, path);
        const id = assertString(transition.id, `${path}.id`);
        if (transitionIds.has(id)) throw new Error(`${path}.id must be unique.`);
        transitionIds.add(id);
        const from = assertString(transition.from, `${path}.from`);
        const to = assertString(transition.to, `${path}.to`);
        if (!ids.has(from)) throw new Error(`${path}.from must reference an existing state.`);
        if (!ids.has(to)) throw new Error(`${path}.to must reference an existing state.`);
        return {
          id,
          from,
          to,
          label: assertString(transition.label, `${path}.label`),
          condition: assertString(transition.condition, `${path}.condition`, { allowEmpty: true })
        };
      });

      return {
        version: DEFINITION_SCHEMA_VERSION,
        name: source.name,
        initial: source.initial,
        states,
        transitions
      };
    }

    function validateBlueprintDefinition(data) {
      assertNoNullish(data);
      assertPlainObject(data, "definition");
      if (data.kind !== DEFINITION_KIND) throw new Error(`definition.kind must be "${DEFINITION_KIND}".`);
      if (data.schemaVersion !== DEFINITION_SCHEMA_VERSION) throw new Error("definition.schemaVersion must be 2.");
      assertString(data.app, "definition.app");
      assertString(data.savedAt, "definition.savedAt");

      const validated = {
        kind: DEFINITION_KIND,
        schemaVersion: DEFINITION_SCHEMA_VERSION,
        app: data.app,
        savedAt: data.savedAt,
        model: validateModelDefinition(data.model),
        camera: { x: 32, y: 32, scale: 1 },
        previewCollapsed: false
      };

      if ("camera" in data) {
        assertPlainObject(data.camera, "definition.camera");
        validated.camera = {
          x: assertFiniteNumber(data.camera.x, "definition.camera.x"),
          y: assertFiniteNumber(data.camera.y, "definition.camera.y"),
          scale: clamp(assertFiniteNumber(data.camera.scale, "definition.camera.scale"), 0.25, 2.4)
        };
      }
      if ("previewCollapsed" in data) {
        if (typeof data.previewCollapsed !== "boolean") throw new Error("definition.previewCollapsed must be a boolean.");
        validated.previewCollapsed = data.previewCollapsed;
      }
      return validated;
    }

    function jsLiteral(value) {
      return JSON.stringify(value)
        .replace(/</g, "\\u003c")
        .replace(/>/g, "\\u003e")
        .replace(/&/g, "\\u0026")
        .replace(/\u2028/g, "\\u2028")
        .replace(/\u2029/g, "\\u2029");
    }

    function buildStandaloneAppHtml(appHtml, payload) {
      const modelLiteral = jsLiteral(payload.model);
      const exportedAtLiteral = jsLiteral(payload.savedAt);
      const bootstrap = [
        "    const IS_STANDALONE_EXPORT = true;",
        "    const EXPORTED_STATE_BLUEPRINT = " + modelLiteral + ";",
        "    const EXPORTED_STATE_BLUEPRINT_SAVED_AT = " + exportedAtLiteral + ";",
        "",
        "    let model = normalizeModel(JSON.parse(JSON.stringify(EXPORTED_STATE_BLUEPRINT)));"
      ].join("\n");
      let html = appHtml
        .replace(/<title>[\s\S]*?<\/title>/, `<title>${escapeHtml(payload.model.name || "Generated State App")}</title>`)
        .replace(/    let model = loadModel\(\) \|\| demoModel\(\);/, bootstrap)
        .replace(/    function saveModel\(\) \{\n      try \{ localStorage\.setItem\(STORAGE_KEY, JSON\.stringify\(model\)\); \} catch \(_\) \{\}\n    \}/,
          "    function saveModel() {}")
        .replace(/      saveModel\(\);\n      const oldContext = context;/,
          "      const oldContext = context;")
        .replace(/    window\.addEventListener\("message", evt => \{/, "    if (!IS_STANDALONE_EXPORT) window.addEventListener(\"message\", evt => {")
        .replace(/    window\.addEventListener\("storage", evt => \{/, "    if (!IS_STANDALONE_EXPORT) window.addEventListener(\"storage\", evt => {");
      if (!html.includes("EXPORTED_STATE_BLUEPRINT")) {
        throw new Error("Could not prepare standalone app export.");
      }
      return html;
    }

    function downloadTextFile(text, filename, type) {
      const blob = new Blob([text], { type });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(a.href), 1000);
    }

    function saveDefinitionFile() {
      persistModel(false);
      saveCamera();
      savePreviewCollapsed();
      const definition = definitionPayload();
      const stamp = new Date().toISOString().replace(/[:.]/g, "-");
      const text = JSON.stringify(definition, null, 2) + "\n";
      downloadTextFile(text, `${normalizeId(model.name || "state-app")}-${stamp}.state.json`, "application/json");
    }

    async function exportHtmlFile() {
      persistModel(false);
      saveCamera();
      savePreviewCollapsed();
      const payload = definitionPayload();
      let text;
      try {
        const appHtml = typeof APP_HTML === "string" ? APP_HTML : await (await fetch(APP_URL, { cache: "no-store" })).text();
        text = buildStandaloneAppHtml(appHtml, payload);
      } catch (err) {
        await modalAlert(err?.message || "Could not export standalone app.", "Export failed");
        return;
      }
      const stamp = new Date().toISOString().replace(/[:.]/g, "-");
      downloadTextFile(text, `${normalizeId(model.name || "state-app")}-${stamp}.html`, "text/html");
    }

    function requestLoadBlueprintFile() {
      fileLoadEl.value = "";
      fileLoadEl.click();
    }

    function importBlueprintDefinition(definition) {
      const data = validateBlueprintDefinition(definition);
      model = normalizeModel(JSON.parse(JSON.stringify(data.model)));
      camera = { ...data.camera };
      previewCollapsed = data.previewCollapsed;
      selected = null;
      dragging = null;
      connecting = null;
      boxSelecting = null;
      currentAppState = null;
      lastAppTransitionId = null;
      hoveredEdgeId = null;
      hidePopover();
      updateSelectRect();
      initHistory();
      applyPreviewCollapsed();
      applyCamera();
      persistModel();
      draw();
      syncToApp(true);
    }

    function parseBlueprintDefinitionText(text) {
      let data;
      try {
        data = JSON.parse(text);
      } catch (_) {
        throw new Error("Load expects a formal .state.json definition. Use Export HTML only for the runnable app.");
      }
      return validateBlueprintDefinition(data);
    }

    function loadBlueprintFile(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = async () => {
        try {
          importBlueprintDefinition(parseBlueprintDefinitionText(String(reader.result || "")));
        } catch (err) {
          await modalAlert(err?.message || "Could not load blueprint definition.", "Load failed");
        }
      };
      reader.readAsText(file);
    }

    function scheduleSync(reset) {
      clearTimeout(syncTimer);
      if (reset) return syncToApp(true);
      syncTimer = setTimeout(() => syncToApp(false), 40);
    }

    function normalizeId(text) {
      return String(text || "state")
        .trim()
        .toLowerCase()
        .replace(/[^a-z0-9_]+/g, "_")
        .replace(/^_+|_+$/g, "") || "state";
    }

    function normalizeModel(m) {
      m.version = 2;
      m.name = m.name || "State App";
      m.states = Array.isArray(m.states) ? m.states : [];
      m.transitions = Array.isArray(m.transitions) ? m.transitions : [];
      if (!m.states.length) {
        m.states.push({ id: "start", title: "Start", body: "First screen", x: 100, y: 100 });
      }
      const used = new Set();
      for (const s of m.states) {
        let id = normalizeId(s.id || s.title);
        const base = id;
        let i = 2;
        while (used.has(id)) id = base + "_" + i++;
        used.add(id);
        s.id = id;
        s.title = s.title || s.id;
        s.body = s.body || "";
        s.x = Number.isFinite(s.x) ? s.x : 100;
        s.y = Number.isFinite(s.y) ? s.y : 100;
      }
      const ids = new Set(m.states.map(s => s.id));
      m.transitions = m.transitions.filter(t => ids.has(t.from) && ids.has(t.to));
      for (const t of m.transitions) {
        t.id = t.id || uid("t");
        t.label = t.label || t.event || "Next";
        t.condition = t.condition || "";
      }
      if (!ids.has(m.initial)) m.initial = m.states[0].id;
      if (currentAppState && !ids.has(currentAppState)) currentAppState = null;
      return m;
    }

    function byId(id) { return model.states.find(s => s.id === id); }

    function screenToWorldXY(clientX, clientY) {
      const r = mapEl.getBoundingClientRect();
      return {
        x: (clientX - r.left - camera.x) / camera.scale,
        y: (clientY - r.top - camera.y) / camera.scale
      };
    }

    function screenToWorld(evt) { return screenToWorldXY(evt.clientX, evt.clientY); }

    function selectedNodeIds() {
      if (selected?.type === "node") return new Set([selected.id]);
      if (selected?.type === "nodes") return new Set(selected.ids || []);
      return new Set();
    }

    function nodeAtWorldPoint(p) {
      for (let i = model.states.length - 1; i >= 0; i--) {
        const s = model.states[i];
        if (p.x >= s.x && p.x <= s.x + 168 && p.y >= s.y && p.y <= s.y + 86) return s;
      }
      return null;
    }

    function updateSelectRect() {
      if (!boxSelecting) {
        selectRectEl.style.display = "none";
        return;
      }
      const r = mapEl.getBoundingClientRect();
      const x1 = boxSelecting.startX - r.left;
      const y1 = boxSelecting.startY - r.top;
      const x2 = boxSelecting.currentX - r.left;
      const y2 = boxSelecting.currentY - r.top;
      selectRectEl.style.left = Math.min(x1, x2) + "px";
      selectRectEl.style.top = Math.min(y1, y2) + "px";
      selectRectEl.style.width = Math.abs(x2 - x1) + "px";
      selectRectEl.style.height = Math.abs(y2 - y1) + "px";
      selectRectEl.style.display = boxSelecting.moved ? "block" : "none";
    }

    function nodesInSelection() {
      if (!boxSelecting) return [];
      const a = screenToWorldXY(boxSelecting.startX, boxSelecting.startY);
      const b = screenToWorldXY(boxSelecting.currentX, boxSelecting.currentY);
      const minX = Math.min(a.x, b.x);
      const maxX = Math.max(a.x, b.x);
      const minY = Math.min(a.y, b.y);
      const maxY = Math.max(a.y, b.y);
      return model.states
        .filter(s => s.x < maxX && s.x + 168 > minX && s.y < maxY && s.y + 86 > minY)
        .map(s => s.id);
    }

    function startBoxSelect(evt) {
      evt.preventDefault();
      selected = null;
      hidePopover();
      boxSelecting = {
        startX: evt.clientX,
        startY: evt.clientY,
        currentX: evt.clientX,
        currentY: evt.clientY,
        moved: false
      };
      updateSelectRect();
      draw();
    }

    function applyCamera() {
      camera.scale = crispScale(camera.scale);
      const tx = Math.round(camera.x);
      const ty = Math.round(camera.y);
      worldEl.style.transform = `translate(${tx}px, ${ty}px) scale(${camera.scale})`;
      const grid = 24 * camera.scale;
      mapEl.style.backgroundSize = `${grid}px ${grid}px, ${grid}px ${grid}px, 100% 100%, 100% 100%`;
      mapEl.style.backgroundPosition = `${tx % grid}px ${ty % grid}px, ${tx % grid}px ${ty % grid}px, 0 0, 0 0`;
      saveCamera();
    }

    function crispScale(value) {
      const scale = clamp(value, 0.25, 2.4);
      if (Math.abs(scale - 1) < 0.08) return 1;
      return Math.round(scale * 100) / 100;
    }

    function zoomAtViewportCenter(nextScale) {
      const r = mapEl.getBoundingClientRect();
      const clientX = r.left + r.width / 2;
      const clientY = r.top + r.height / 2;
      const before = screenToWorldXY(clientX, clientY);
      camera.scale = crispScale(nextScale);
      camera.x = clientX - r.left - before.x * camera.scale;
      camera.y = clientY - r.top - before.y * camera.scale;
      applyCamera();
    }

    function viewportCenterWorld() {
      const r = mapEl.getBoundingClientRect();
      return {
        x: (r.width / 2 - camera.x) / camera.scale,
        y: (r.height / 2 - camera.y) / camera.scale
      };
    }

    function resetView() {
      camera = { x: 32, y: 32, scale: 1 };
      applyCamera();
    }

    function fitView() {
      if (!model.states.length) return resetView();
      const r = mapEl.getBoundingClientRect();
      const minX = Math.min(...model.states.map(s => s.x));
      const minY = Math.min(...model.states.map(s => s.y));
      const maxX = Math.max(...model.states.map(s => s.x + 168));
      const maxY = Math.max(...model.states.map(s => s.y + 86));
      const w = Math.max(1, maxX - minX);
      const h = Math.max(1, maxY - minY);
      const pad = 120;
      const rawScale = Math.min(r.width / (w + pad * 2), r.height / (h + pad * 2));
      const scale = rawScale >= 0.92 ? 1 : crispScale(rawScale);
      camera.scale = scale;
      camera.x = Math.round((r.width - w * scale) / 2 - minX * scale);
      camera.y = Math.round((r.height - h * scale) / 2 - minY * scale);
      applyCamera();
    }

    function startPanning(evt) {
      evt.preventDefault();
      evt.stopPropagation();
      panning = { startX: evt.clientX, startY: evt.clientY, cameraX: camera.x, cameraY: camera.y };
      mapEl.classList.add("panning");
      hidePopover();
    }

    function nodeCenter(s, side) {
      if (side === "out") return { x: s.x + 168, y: s.y + 43 };
      if (side === "in") return { x: s.x, y: s.y + 43 };
      return { x: s.x + 84, y: s.y + 43 };
    }

    function edgePath(from, to) {
      const a = nodeCenter(from, "out");
      const b = nodeCenter(to, "in");
      const dx = Math.max(70, Math.abs(b.x - a.x) * 0.45);
      return `M ${a.x} ${a.y} C ${a.x + dx} ${a.y}, ${b.x - dx} ${b.y}, ${b.x} ${b.y}`;
    }

    function midPoint(from, to) {
      const a = nodeCenter(from, "out");
      const b = nodeCenter(to, "in");
      return { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 - 10 };
    }

    function draw() {
      normalizeModel(model);
      const nodeSelection = selectedNodeIds();
      nodesEl.innerHTML = "";
      wiresEl.querySelectorAll(".edge,.hit,.edge-label,.temp-edge").forEach(el => el.remove());
      runtimeStateEl.textContent = "app: " + (currentAppState || "—");

      for (const t of model.transitions) {
        const from = byId(t.from);
        const to = byId(t.to);
        if (!from || !to) continue;
        const pathD = edgePath(from, to);

        const hit = svgEl("path", { d: pathD, class: "hit", "data-edge-id": t.id });
        hit.addEventListener("click", evt => {
          evt.stopPropagation();
          selectEdge(t.id, evt.clientX, evt.clientY);
        });
        hit.addEventListener("mouseenter", () => setEdgeHover(t.id, true));
        hit.addEventListener("mouseleave", () => setEdgeHover(t.id, false));
        wiresEl.appendChild(hit);

        const classes = ["edge"];
        if (selected?.type === "edge" && selected.id === t.id) classes.push("selected");
        if (hoveredEdgeId === t.id) classes.push("hovered");
        if (lastAppTransitionId === t.id) classes.push("runtime");
        const path = svgEl("path", { d: pathD, class: classes.join(" "), "marker-end": "url(#arrow)", "data-edge-id": t.id });
        path.addEventListener("click", evt => {
          evt.stopPropagation();
          selectEdge(t.id, evt.clientX, evt.clientY);
        });
        path.addEventListener("mouseenter", () => setEdgeHover(t.id, true));
        path.addEventListener("mouseleave", () => setEdgeHover(t.id, false));
        wiresEl.appendChild(path);

        const m = midPoint(from, to);
        const labelClasses = ["edge-label"];
        if (hoveredEdgeId === t.id) labelClasses.push("hovered");
        const label = svgEl("text", { x: m.x, y: m.y, class: labelClasses.join(" "), "text-anchor": "middle", "data-edge-id": t.id });
        label.textContent = t.label + (t.condition ? `  [${t.condition}]` : "");
        label.addEventListener("click", evt => {
          evt.stopPropagation();
          selectEdge(t.id, evt.clientX, evt.clientY);
        });
        label.addEventListener("mouseenter", () => setEdgeHover(t.id, true));
        label.addEventListener("mouseleave", () => setEdgeHover(t.id, false));
        wiresEl.appendChild(label);
      }

      if (connecting) {
        const from = byId(connecting.from);
        const a = nodeCenter(from, "out");
        const b = connecting.to;
        const dx = Math.max(60, Math.abs(b.x - a.x) * 0.4);
        wiresEl.appendChild(svgEl("path", {
          d: `M ${a.x} ${a.y} C ${a.x + dx} ${a.y}, ${b.x - dx} ${b.y}, ${b.x} ${b.y}`,
          class: "temp-edge"
        }));
      }

      for (const s of model.states) {
        const el = document.createElement("div");
        const classes = ["node"];
        if (s.id === model.initial) classes.push("initial");
        if (nodeSelection.has(s.id)) classes.push("selected");
        if (currentAppState === s.id) classes.push("active");
        el.className = classes.join(" ");
        el.style.left = s.x + "px";
        el.style.top = s.y + "px";
        el.dataset.id = s.id;
        el.innerHTML = `
          <div class="input-port"></div>
          <div class="port" title="drag to connect"></div>
          <div class="badge">INITIAL</div>
          <div class="live-badge">LIVE</div>
          <div class="title"></div>
          <div class="body"></div>
        `;
        el.querySelector(".title").textContent = s.title || s.id;
        el.querySelector(".body").textContent = s.body || "";

        el.addEventListener("mousedown", evt => {
          if (evt.target.classList.contains("port")) return;
          if (evt.button === 1 || evt.button === 2 || isSpaceDown) return startPanning(evt);
          if (evt.button !== 0) return;
          evt.stopPropagation();
          selected = { type: "node", id: s.id };
          const p = screenToWorld(evt);
          dragging = {
            id: s.id,
            dx: p.x - s.x,
            dy: p.y - s.y,
            startClientX: evt.clientX,
            startClientY: evt.clientY,
            moved: false
          };
          hidePopover();
          draw();
        });

        el.querySelector(".port").addEventListener("mousedown", evt => {
          if (evt.button !== 0) return;
          evt.stopPropagation();
          const p = screenToWorld(evt);
          connecting = { from: s.id, to: p };
          mapEl.classList.add("connecting");
          hidePopover();
          draw();
        });

        nodesEl.appendChild(el);
      }
    }

    function svgEl(name, attrs) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", name);
      for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
      return el;
    }

    function setEdgeHover(id, on) {
      hoveredEdgeId = on ? id : hoveredEdgeId === id ? null : hoveredEdgeId;
      wiresEl.querySelectorAll(`[data-edge-id="${id}"]`).forEach(el => el.classList.toggle("hovered", on));
    }

    function selectEdge(id, x, y) {
      selected = { type: "edge", id };
      const edge = model.transitions.find(t => t.id === id);
      if (!edge) return;
      showEdgePopover(edge, x, y);
      draw();
    }

    function placePopover(x, y) {
      const r = mapEl.getBoundingClientRect();
      popoverEl.style.left = "12px";
      popoverEl.style.top = "12px";
      popoverEl.hidden = false;
      const popW = popoverEl.offsetWidth || 292;
      const popH = popoverEl.offsetHeight || 235;
      const clickX = x - r.left;
      const clickY = y - r.top;
      let localX = clickX + 12;
      let localY = clickY + 12;
      if (localX + popW > r.width - 12) localX = clickX - popW - 12;
      if (localY + popH > r.height - 12) localY = clickY - popH - 12;
      localX = clamp(localX, 12, Math.max(12, r.width - popW - 12));
      localY = clamp(localY, 12, Math.max(12, r.height - popH - 12));
      popoverEl.style.left = localX + "px";
      popoverEl.style.top = localY + "px";
    }

    function showNodePopover(s, x, y) {
      popoverEl.innerHTML = `
        <h3>State / Screen</h3>
        <div class="field"><label>Title</label><input id="pTitle"></div>
        <div class="field"><label>Screen text</label><textarea id="pBody"></textarea></div>
        <div class="small">State id: <b>${escapeHtml(s.id)}</b></div>
        <div class="row" style="margin-top:10px">
          <button id="pInitial">Set initial</button>
          <button id="pDuplicate">Duplicate</button>
        </div>
        <div class="row" style="margin-top:8px">
          <button id="pDelete" class="danger">Delete</button>
        </div>
      `;
      placePopover(x, y);
      const title = popoverEl.querySelector("#pTitle");
      const body = popoverEl.querySelector("#pBody");
      title.value = s.title || "";
      body.value = s.body || "";
      title.oninput = () => { s.title = title.value; saveModel("state:title:" + s.id); draw(); };
      body.oninput = () => { s.body = body.value; saveModel("state:body:" + s.id); draw(); };
      title.onblur = body.onblur = () => { lastHistoryKey = null; };
      popoverEl.querySelector("#pInitial").onclick = () => {
        model.initial = s.id;
        saveModel();
        draw();
      };
      popoverEl.querySelector("#pDuplicate").onclick = () => {
        const copy = makeState(s.x + 34, s.y + 112, (s.title || s.id) + " Copy");
        copy.body = s.body || "";
        model.states.push(copy);
        selected = { type: "node", id: copy.id };
        saveModel();
        draw();
        showNodePopover(copy, x + 20, y + 20);
      };
      popoverEl.querySelector("#pDelete").onclick = () => {
        if (model.states.length <= 1) return;
        model.states = model.states.filter(n => n.id !== s.id);
        model.transitions = model.transitions.filter(t => t.from !== s.id && t.to !== s.id);
        if (model.initial === s.id) model.initial = model.states[0].id;
        selected = null;
        hidePopover();
        saveModel();
        draw();
      };
    }

    function showEdgePopover(t, x, y) {
      const from = byId(t.from);
      const to = byId(t.to);
      popoverEl.innerHTML = `
        <h3>Transition / Button</h3>
        <div class="small"><b>${escapeHtml(from?.title || t.from)}</b> → <b>${escapeHtml(to?.title || t.to)}</b></div>
        <div class="field"><label>Button label</label><input id="pLabel"></div>
        <div class="field"><label>Condition</label><input id="pCond" placeholder="accepted, amount >= 10, !blocked"></div>
        <div class="small">Leer = immer erlaubt. Bedingungen erzeugen in der App automatisch Controls.</div>
        <div class="row" style="margin-top:10px">
          <button id="pFlip">Flip</button>
          <button id="pDelete" class="danger">Delete</button>
        </div>
      `;
      placePopover(x, y);
      const label = popoverEl.querySelector("#pLabel");
      const cond = popoverEl.querySelector("#pCond");
      label.value = t.label || "Next";
      cond.value = t.condition || "";
      label.oninput = () => { t.label = label.value || "Next"; saveModel("edge:label:" + t.id); draw(); };
      cond.oninput = () => { t.condition = cond.value; saveModel("edge:condition:" + t.id); draw(); };
      label.onblur = cond.onblur = () => { lastHistoryKey = null; };
      popoverEl.querySelector("#pFlip").onclick = () => {
        const tmp = t.from; t.from = t.to; t.to = tmp;
        saveModel();
        draw();
        showEdgePopover(t, x, y);
      };
      popoverEl.querySelector("#pDelete").onclick = () => {
        model.transitions = model.transitions.filter(e => e.id !== t.id);
        selected = null;
        hidePopover();
        saveModel();
        draw();
      };
    }

    function hidePopover() {
      popoverEl.hidden = true;
      popoverEl.innerHTML = "";
    }

    function isEditableTarget(target) {
      return target?.closest?.("input, textarea, select, [contenteditable]");
    }

    function escapeHtml(text) {
      return String(text).replace(/[&<>"]/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[ch]));
    }

    function syncToApp(reset) {
      syncStateEl.textContent = reset ? "reset" : "live";
      const payload = { type: "STATE_BLUEPRINT_MODEL", model: JSON.parse(JSON.stringify(model)), reset: Boolean(reset) };
      try { frameEl.contentWindow.postMessage(payload, "*"); } catch (_) {}
      if (appWindow && !appWindow.closed) {
        try { appWindow.postMessage(payload, "*"); } catch (_) {}
      }
      setTimeout(() => { syncStateEl.textContent = "live"; }, 400);
    }

    function nextStateTitle() {
      let i = model.states.length + 1;
      const titles = new Set(model.states.map(s => String(s.title || "").toLowerCase()));
      while (titles.has(("State " + i).toLowerCase())) i++;
      return "State " + i;
    }

    function makeState(x, y, title) {
      title = title || nextStateTitle();
      let base = normalizeId(title);
      let id = base;
      let i = 2;
      const ids = new Set(model.states.map(s => s.id));
      while (ids.has(id)) id = base + "_" + i++;
      return {
        id,
        title,
        body: "Generated screen",
        x: Math.round(clamp(x, WORLD_MIN_X, WORLD_MAX_X - 168)),
        y: Math.round(clamp(y, WORLD_MIN_Y, WORLD_MAX_Y - 86))
      };
    }

    function addStateAt(x, y, showAtX, showAtY) {
      const s = makeState(x - 84, y - 43, nextStateTitle());
      model.states.push(s);
      selected = { type: "node", id: s.id };
      saveModel();
      draw();
      showNodePopover(s, showAtX ?? mapEl.getBoundingClientRect().left + 120, showAtY ?? mapEl.getBoundingClientRect().top + 80);
    }

    document.addEventListener("contextmenu", evt => evt.preventDefault());

    mapEl.addEventListener("wheel", evt => {
      evt.preventDefault();
      const factor = evt.deltaY < 0 ? 1.06 : 0.94;
      zoomAtViewportCenter(camera.scale * factor);
    }, { passive: false });

    mapEl.addEventListener("dblclick", evt => {
      const onEmpty = evt.target === mapEl || evt.target === worldEl || evt.target === wiresEl || evt.target === nodesEl;
      if (!onEmpty) return;
      const p = screenToWorld(evt);
      addStateAt(p.x, p.y, evt.clientX, evt.clientY);
    });

    mapEl.addEventListener("mousedown", evt => {
      if (evt.button === 1 || evt.button === 2 || isSpaceDown) return startPanning(evt);
      if (evt.target === mapEl || evt.target === worldEl || evt.target === wiresEl || evt.target === nodesEl) {
        if (evt.button !== 0) return;
        startBoxSelect(evt);
      }
    });

    window.addEventListener("mousemove", evt => {
      if (boxSelecting) {
        boxSelecting.currentX = evt.clientX;
        boxSelecting.currentY = evt.clientY;
        boxSelecting.moved = Math.hypot(evt.clientX - boxSelecting.startX, evt.clientY - boxSelecting.startY) > 4;
        updateSelectRect();
        if (boxSelecting.moved) {
          const ids = nodesInSelection();
          selected = ids.length > 1 ? { type: "nodes", ids } : ids.length === 1 ? { type: "node", id: ids[0] } : null;
          draw();
        }
        return;
      }
      if (panning) {
        camera.x = panning.cameraX + (evt.clientX - panning.startX);
        camera.y = panning.cameraY + (evt.clientY - panning.startY);
        applyCamera();
        return;
      }
      if (dragging) {
        const s = byId(dragging.id);
        if (!s) return;
        dragging.moved = dragging.moved || Math.hypot(evt.clientX - dragging.startClientX, evt.clientY - dragging.startClientY) > 4;
        const p = screenToWorld(evt);
        s.x = Math.round(clamp(p.x - dragging.dx, WORLD_MIN_X, WORLD_MAX_X - 168));
        s.y = Math.round(clamp(p.y - dragging.dy, WORLD_MIN_Y, WORLD_MAX_Y - 86));
        draw();
        return;
      }
      if (connecting) {
        connecting.to = screenToWorld(evt);
        draw();
      }
    });

    window.addEventListener("mouseup", evt => {
      if (boxSelecting) {
        if (boxSelecting.moved) {
          const ids = nodesInSelection();
          selected = ids.length > 1 ? { type: "nodes", ids } : ids.length === 1 ? { type: "node", id: ids[0] } : null;
        } else {
          selected = null;
        }
        boxSelecting = null;
        updateSelectRect();
        draw();
        return;
      }
      if (panning) {
        panning = null;
        mapEl.classList.remove("panning");
      }
      if (dragging) {
        const s = byId(dragging.id);
        const wasClick = !dragging.moved && Math.hypot(evt.clientX - dragging.startClientX, evt.clientY - dragging.startClientY) <= 4;
        const didMove = dragging.moved;
        const dragId = dragging.id;
        dragging = null;
        lastHistoryKey = null;
        if (wasClick && s) {
          selected = { type: "node", id: s.id };
          draw();
          showNodePopover(s, evt.clientX, evt.clientY);
          return;
        }
        if (didMove) saveModel("state:drag:" + dragId);
      }
      if (connecting) {
        const dropPoint = screenToWorld(evt);
        const targetNode = nodeAtWorldPoint(dropPoint);
        const targetId = targetNode?.id;
        if (targetId && targetId !== connecting.from) {
          const t = { id: uid("t"), from: connecting.from, to: targetId, label: "Next", condition: "" };
          model.transitions.push(t);
          selected = { type: "edge", id: t.id };
          saveModel();
          connecting = null;
          mapEl.classList.remove("connecting");
          draw();
          showEdgePopover(t, evt.clientX, evt.clientY);
          return;
        }
        if (!targetId) {
          const s = makeState(dropPoint.x - 84, dropPoint.y - 43, nextStateTitle());
          const t = { id: uid("t"), from: connecting.from, to: s.id, label: "Next", condition: "" };
          model.states.push(s);
          model.transitions.push(t);
          selected = { type: "node", id: s.id };
          saveModel();
          connecting = null;
          mapEl.classList.remove("connecting");
          draw();
          showNodePopover(s, evt.clientX, evt.clientY);
          return;
        }
        connecting = null;
        mapEl.classList.remove("connecting");
        draw();
      }
    });

    function handleKeyDown(evt) {
      const mod = evt.ctrlKey || evt.metaKey;
      if (mod && evt.key.toLowerCase() === "s") {
        evt.preventDefault();
        evt.stopImmediatePropagation();
        saveDefinitionFile();
        return;
      }
      if (mod && evt.key.toLowerCase() === "o") {
        evt.preventDefault();
        evt.stopImmediatePropagation();
        requestLoadBlueprintFile();
        return;
      }
      if (isEditableTarget(evt.target)) return;
      if (mod && evt.key.toLowerCase() === "z") {
        evt.preventDefault();
        if (evt.shiftKey) redoModel();
        else undoModel();
        return;
      }
      if (mod && evt.key.toLowerCase() === "y") {
        evt.preventDefault();
        redoModel();
        return;
      }
      if (evt.code === "Space") {
        isSpaceDown = true;
        mapEl.classList.add("panning");
        evt.preventDefault();
      }
      if ((evt.key === "Delete" || evt.key === "Backspace") && selected) {
        if (selected.type === "node" || selected.type === "nodes") {
          const ids = selected.type === "node" ? [selected.id] : selected.ids || [];
          const removable = ids.filter(id => byId(id));
          if (removable.length && model.states.length - removable.length >= 1) {
            const removeSet = new Set(removable);
            model.states = model.states.filter(n => !removeSet.has(n.id));
            model.transitions = model.transitions.filter(t => !removeSet.has(t.from) && !removeSet.has(t.to));
            if (removeSet.has(model.initial)) model.initial = model.states[0].id;
            selected = null;
            hidePopover();
            saveModel();
            draw();
          }
        } else if (selected.type === "edge") {
          model.transitions = model.transitions.filter(t => t.id !== selected.id);
          selected = null;
          hidePopover();
          saveModel();
          draw();
        }
      }
    }

    document.addEventListener("keydown", handleKeyDown, { capture: true });

    window.addEventListener("keyup", evt => {
      if (evt.code === "Space") {
        isSpaceDown = false;
        if (!panning) mapEl.classList.remove("panning");
      }
    });

    window.addEventListener("message", evt => {
      const data = evt.data || {};
      if (data.type === "STATE_BLUEPRINT_SHORTCUT") {
        if (data.action === "save") saveDefinitionFile();
        if (data.action === "load") requestLoadBlueprintFile();
        return;
      }
      if (data.type !== "STATE_BLUEPRINT_RUNTIME_STATE") return;
      currentAppState = data.current || null;
      lastAppTransitionId = data.transitionId || null;
      draw();
      if (lastAppTransitionId) {
        const id = lastAppTransitionId;
        setTimeout(() => {
          if (lastAppTransitionId === id) {
            lastAppTransitionId = null;
            draw();
          }
        }, 900);
      }
    });

    function loadEditorModel(nextModel, shouldFit = true) {
      model = normalizeModel(nextModel);
      selected = null;
      dragging = null;
      connecting = null;
      boxSelecting = null;
      currentAppState = null;
      lastAppTransitionId = null;
      hoveredEdgeId = null;
      hidePopover();
      updateSelectRect();
      initHistory();
      saveModel();
      if (shouldFit) fitView();
      draw();
      syncToApp(true);
    }

    document.getElementById("btnNew").onclick = async () => {
      const ok = await modalConfirm("Canvas wirklich neu und leer starten?", "New canvas", {
        confirmText: "Neu starten",
        danger: true
      });
      if (!ok) return;
      loadEditorModel(blankModel(), true);
    };
    document.getElementById("btnSave").onclick = saveDefinitionFile;
    document.getElementById("btnLoad").onclick = requestLoadBlueprintFile;
    document.getElementById("btnExport").onclick = exportHtmlFile;
    fileLoadEl.onchange = () => loadBlueprintFile(fileLoadEl.files?.[0]);
    document.getElementById("btnUndo").onclick = undoModel;
    document.getElementById("btnRedo").onclick = redoModel;
    document.getElementById("btnFit").onclick = fitView;
    document.getElementById("btnResetView").onclick = resetView;
    document.getElementById("btnRun").onclick = () => syncToApp(true);
    document.getElementById("btnOpen").onclick = () => {
      appWindow = window.open(APP_URL, "state_blueprint_app", "width=480,height=760");
      setTimeout(() => syncToApp(true), 300);
    };
    document.getElementById("btnReset").onclick = async () => {
      const ok = await modalConfirm("Demo-Modell wirklich resetten?", "Demo reset", {
        confirmText: "Reset",
        danger: true
      });
      if (!ok) return;
      loadEditorModel(demoModel(), true);
    };
    btnTogglePreview.onclick = () => {
      previewCollapsed = !previewCollapsed;
      applyPreviewCollapsed();
    };

    frameEl.addEventListener("load", () => syncToApp(true));
    frameEl.src = APP_URL;

    worldEl.style.width = WORLD_W + "px";
    worldEl.style.height = WORLD_H + "px";
    wiresEl.setAttribute("viewBox", `${WORLD_MIN_X} ${WORLD_MIN_Y} ${WORLD_W} ${WORLD_H}`);
    wiresEl.style.left = WORLD_MIN_X + "px";
    wiresEl.style.top = WORLD_MIN_Y + "px";
    wiresEl.style.width = WORLD_W + "px";
    wiresEl.style.height = WORLD_H + "px";

    normalizeModel(model);
    initHistory();
    applyPreviewCollapsed();
    applyCamera();
    persistModel();
    draw();
    setTimeout(fitView, 50);
  </script>
</body>
</html>
